* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;

  font-family: Arial, sans-serif;
  background: #000011;
  overflow: hidden;
  user-select: none;
  padding: 30px;
}

/* ===== CANVAS ===== */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: block;
  z-index: 0;
}

#topBar, #midBar {
  display: flex;
  align-items: center;
  gap: 6px;

  padding: 8px;
  margin-bottom: 12px;
  background: transparent;
  border-radius: 6px;

  width: 100%;
  box-sizing: border-box;

  flex-wrap: nowrap;
  position: relative;
  z-index: 2;
}

/* keep midBar offset if you need it */

  top: -15px;
}

/* input takes remaining space but doesn't push layout unpredictably */
#topBar input[type="text"] {
  flex: 1 1 auto;
  min-width: 70px;
  max-width: 140px;

  padding: 6px 8px;
  font-size: 16px;
  border: 1px solid #999;
  border-radius: 4px;
}

/* buttons stay natural size */
#topBar button,
#midBar button {
  flex: 0 0 auto;
  white-space: nowrap;
}

/* optional consistency tweak */
button {
  padding: 6px 6px;   /* was 6px 10px → reduces LEFT/RIGHT width only */
  font-size: 16px;
  border-radius: 4px;
  border: 1px solid #777;
  background: #eef6fb;
  cursor: pointer;

  margin-top: 12px;

  font-weight: bold;
  font-size: 18px;

  overflow-wrap: anywhere;
  word-break: break-word;
  color: white;
  position: relative;
  z-index: 2;
}

#scoreButtons {
  display: none;
  gap: 10px;
  margin: 12px 0 24px 0;
  position: relative;
  z-index: 2;

/* ===== GAME AREA ===== */
#gameArea {
  position: relative;
  top: -30px;
  margin: 16px auto;
  width: 100%;
  max-width: 100%;
  height: 300px;
  padding: 10px;
  border-radius: 6px;
  background: transparent;
  overflow: hidden;
  z-index: 2;
}

.word {
  position: absolute;
  font-size: 24px;
  font-weight: 600;
  white-space: nowrap;
  user-select: none;
  pointer-events: none;
  text-shadow: 0 0 3px rgba(0,0,0,0.8);
  transform-origin: center center;
  z-index: 1;
  color: white;
}

.letter {
  display: inline-block;
  transition: color 0.2s ease;
}

.typed {
  color: red !important;
}

.exploding {
  animation: explodeAnim 0.4s ease forwards;
}

@keyframes explodeAnim {
  0% { transform: scale(1) rotate(0deg); opacity: 1; }
  100% { transform: scale(3) rotate(720deg); opacity: 0; }
}

#typingInput {
  position: fixed;
  left: 5px;
  top: 5px;
  width: 24px;
  height: 24px;
  opacity: 0;
  pointer-events: none;
  background: transparent;
  border: none;
  z-index: 9999;
  font-size: 18px;
  color: black;
  caret-color: transparent;
}

/* ===== FOOTER ===== */
footer {
  position: relative;
  z-index: 2;
  bottom: 20px;
  left: -10px;
  right: 10px;
  padding: 6px 12px;
  font-size: 14px;
  text-align: left;
  color: #666;
  background: transparent;
  border-radius: 6px;
  margin: 0;

/* ===== THROTTLE CONTROL ===== */
#throttle-container {
  position: absolute;
  right: 20px;
  bottom: 20px;
  width: 40px;
  height: 260px;
  border-radius: 20px;

#throttle {

  height: 40px;
  border-radius: 50%;
  position: relative;
  cursor: grab;

<script>
// ---------------- STARFIELD + THROTTLE + SWOOSH AUDIO ----------------
const canvas = document.getElementById("starfield");
const ctx = canvas.getContext("2d");
let width, height;
function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
window.addEventListener("resize", resize);
resize();

const numStars = 500, minSpeed = 0.05, maxSpeed = 1.2;
let targetSpeed = minSpeed, displaySpeed = minSpeed;
let stars = [];
function subtleHue() { const b = 240 + Math.random()*15; return `rgb(${b+Math.random()*10-5},${b+Math.random()*10-5},${b+Math.random()*10-5})`; }
function createStar() {
  const z0 = Math.random()*width + 50;
  return {x:(Math.random()-0.5)*width, y:(Math.random()-0.5)*height, z:z0, size:Math.random()*2+1, color:Math.random()<0.08? `rgb(${20+Math.random()*30},${20+Math.random()*30},${20+Math.random()*30})` : subtleHue(), black:Math.random()<0.05, fade:0};
}
for(let i=0;i<numStars;i++) stars.push(createStar());

// Swoosh Audio
const AudioContext = window.AudioContext||window.webkitAudioContext;
const audioCtx = new AudioContext();
const bufferSize = 2*audioCtx.sampleRate;
const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
const output = noiseBuffer.getChannelData(0);
for(let i=0;i<bufferSize;i++) output[i]=Math.random()*2-1;
const noise = audioCtx.createBufferSource();
noise.buffer = noiseBuffer; noise.loop = true;
const filter = audioCtx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=400; filter.Q.value=1;
const gainNode = audioCtx.createGain(); gainNode.gain.value=0.01;
noise.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
noise.start();
let audioStarted = false;
function startAudio() { if(!audioStarted) audioCtx.resume().then(()=>{ audioStarted=true; }); }

// Doo-dooby oscillator
let humStarted = false;
function startHum() {
  if(humStarted) return;
  humStarted = true;
  const gain = audioCtx.createGain(); gain.gain.value=0.02; gain.connect(audioCtx.destination);
  const osc = audioCtx.createOscillator(); osc.type='sine'; osc.frequency.value=55; osc.connect(gain); osc.start();
  const lfo = audioCtx.createOscillator(); lfo.type='triangle'; lfo.frequency.value=0.33;
  const lfoGain = audioCtx.createGain(); lfoGain.gain.value=0.015; lfo.connect(lfoGain); lfoGain.connect(gain.gain); lfo.start();
}

// Throttle
const throttle = document.getElementById("throttle");
const throttleContainer = document.getElementById("throttle-container");
let dragging = false, shutterProgress = 0;

function setThrottlePosition(y){
  const rect = throttleContainer.getBoundingClientRect();
  let pos = Math.max(0, Math.min(rect.height-throttle.offsetHeight, y-rect.top-throttle.offsetHeight/2));
  throttle.style.bottom = `${rect.height-throttle.offsetHeight-pos}px`;
  shutterProgress = pos/(rect.height-throttle.offsetHeight);
  targetSpeed = minSpeed + shutterProgress*(maxSpeed-minSpeed);
}

throttle.addEventListener('mousedown', e=>{ dragging=true; startAudio(); startHum(); e.preventDefault(); });
throttle.addEventListener('touchstart', e=>{ dragging=true; startAudio(); startHum(); e.preventDefault(); });
window.addEventListener('mouseup', e=>dragging=false);
window.addEventListener('touchend', e=>dragging=false);
window.addEventListener('mousemove', e=>{ if(dragging) setThrottlePosition(e.clientY); });
window.addEventListener('touchmove', e=>{ if(dragging) setThrottlePosition(e.touches[0].clientY); });
setThrottlePosition(throttleContainer.getBoundingClientRect().top);

// Iris Shutter
function drawIrisShutter(progress){
  const cx=width/2, cy=height/2, bladeCount=8;
  const maxRadius=Math.sqrt(width*width+height*height)/1.2;
  const openRadius=maxRadius*progress;
  for(let i=0;i<bladeCount;i++){
    const angleOffset = i*(2*Math.PI/bladeCount);
    const rotation = (1-progress)*Math.PI/2;
    const startAngle = angleOffset - rotation;
    const endAngle = angleOffset + rotation;
    ctx.beginPath();
    const innerRadius=openRadius;
    ctx.moveTo(cx + innerRadius*Math.cos(startAngle), cy + innerRadius*Math.sin(startAngle));
    ctx.lineTo(cx + maxRadius*Math.cos(startAngle), cy + maxRadius*Math.sin(startAngle));
    ctx.arc(cx, cy, maxRadius, startAngle, endAngle, false);
    ctx.lineTo(cx + innerRadius*Math.cos(endAngle), cy + innerRadius*Math.sin(endAngle));
    ctx.arc(cx, cy, innerRadius, endAngle, startAngle, true);
    ctx.closePath();
    const grad = ctx.createLinearGradient(cx,cy,cx + maxRadius*Math.cos(angleOffset), cy + maxRadius*Math.sin(angleOffset));
    grad.addColorStop(0,'#2b2b2b'); grad.addColorStop(0.5,'#1f1f1f'); grad.addColorStop(1,'#2b2b2b');
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle='rgba(180,180,180,0.05)'; ctx.lineWidth=1; ctx.stroke();
  }
}

// Animate
function updateSwooshVolume(speed){
  const vol = Math.min(1,(speed-minSpeed)/(maxSpeed-minSpeed));
  gainNode.gain.setTargetAtTime(0.01 + 0.08*vol,audioCtx.currentTime,0.01);
  filter.frequency.setTargetAtTime(400 + 1000*vol,audioCtx.currentTime,0.01);
}
function animate(){
  ctx.fillStyle='black'; ctx.fillRect(0,0,width,height);
  displaySpeed += (targetSpeed-displaySpeed)*0.05; displaySpeed=Math.max(displaySpeed,minSpeed);
  updateSwooshVolume(displaySpeed);
  for(let s of stars){
    s.z -= displaySpeed; if(s.z<=0) Object.assign(s,createStar());
    if(s.fade<1) s.fade+=0.01;
    const k=128/s.z, x=s.x*k+width/2, y=s.y*k+height/2;
    if(x<0||x>=width||y<0||y>=height) continue;
    let starSize=Math.max(0.5,s.size*(1+(width-s.z)/width));
    const alpha=s.fade;
    const shade=s.black?0:255-Math.floor((s.z/width)*255);
    let streakFactor=0; if(displaySpeed>0.5) streakFactor=(displaySpeed-0.5)/(maxSpeed-0.5);
    const trailLength=displaySpeed*6*(1-s.z/width)*streakFactor;
    if(trailLength>0){
      ctx.strokeStyle=s.black?`rgba(0,0,0,${0.2*alpha})`:`rgba(${shade},${shade},${shade},${0.15*alpha})`;
      ctx.lineWidth=starSize; ctx.beginPath();
      ctx.moveTo(x-s.x*trailLength*0.5,y-s.y*trailLength*0.5); ctx.lineTo(x,y); ctx.stroke();
    }
    ctx.fillStyle=s.black?`rgba(0,0,0,${alpha})`:`rgba(${shade},${shade},${shade},${alpha})`;
    ctx.beginPath(); ctx.arc(x,y,starSize/2,0,Math.PI*2); ctx.fill();
  }
  drawIrisShutter(shutterProgress);
  requestAnimationFrame(animate);
}
animate();
</script>

async function loadVocab(source) {
  let text = "";

  if (typeof source === "string" && source.trim().endsWith(".txt")) {
    const res = await fetch(source.trim());
    text = await res.text();
  } else {
    text = source;
  }

  const sections = [];

  // Split by ~ section delimiter
  const rawSections = text
    .split("~")
    .map(s => s.trim())
    .filter(Boolean);

rawSections.forEach(block => {
  const lines = block
    .split(/\r?\n/)
    .map(l => l.replace(/<br\s*\/?>/gi, "").trim())
    .filter(Boolean);

  if (lines.length === 0) return;

  const sectionName = lines[0];
  const words = [];

  lines.forEach(line => {
    if (!line.startsWith("•")) return;

    const vocabWord = line
      .replace(/^•\s*/, '')
      .split(/[–—-]/)[0]
      .replace(/[^\p{L}\s]/gu, '')
      .trim()
      .toLowerCase()
      .split(/\s+/)[0];

    if (vocabWord) words.push(vocabWord);
  });

  if (words.length) {
    sections.push({
      name: sectionName,
      words
    });
  }
});

return sections;   // ✅ ADD THIS LINE
}

  element.style.left = x + 'px';
  element.style.top = y + 'px';

  // Random movement direction
  const angle = Math.random() * 2 * Math.PI;
const speed = (1 + Math.random() * 0.2) * 0.4; // 👈 slower overall
const dx = Math.cos(angle) * speed;
const dy = Math.sin(angle) * speed;

  // Create the alien

  alien.className = 'alien';
  alien.textContent = '👾';
  alien.style.position = 'absolute';
  alien.style.left = (x + element.offsetWidth / 2) + 'px';
  alien.style.top = (y + element.offsetHeight / 2) + 'px';
  alien.style.transform = 'translate(-50%, -50%)';  // perfectly centered
  gameArea.appendChild(alien);

  return { text, x, y, dx, dy, distance: 0, element, typedIndex: 0, exploded: false, alien };

    wrapper.style.fontFamily = 'monospace';
    wrapper.style.padding = '10px';
    wrapper.style.backgroundColor = '#fff';
    wrapper.style.color = '#000';
    document.body.appendChild(wrapper);

    try {
      if (!window.html2canvas) {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
        document.head.appendChild(script);
        await new Promise(res => script.onload = res);
      }
      const canvas = await html2canvas(wrapper, { scale: 2, backgroundColor: '#fff' });
      const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      downloadBlob(blob, filename);
    } catch (err) {
      console.error(err);
      alert('PNG download failed');
    } finally {
      wrapper.remove();
    }
  }

  // Hijack a download button
  function hijackDownloadButton(button, getScoreText, getFilename, isText) {
    if (!button) return;

    const newBtn = button.cloneNode(true);
    button.parentNode.replaceChild(newBtn, button);

    newBtn.addEventListener('click', async e => {
      e.preventDefault();
      e.stopImmediatePropagation();

      const scoreText = getScoreText();
      if (!scoreText) {
        alert('No scoreboard data found. Submit first.');
        return;
      }

      const filename = sanitizeFilename(getFilename());
      if (isText) {
        downloadBlob(new Blob([scoreText], { type: 'text/plain' }), filename + '.txt');
      } else {
        await downloadScoreAsPNG(scoreText, filename + '.png');
      }
    }, true);
  }

  // Grab scoreboard and buttons
  const scoreboard = document.getElementById('scoreboardContainer');
  const downloadTxtBtn = document.getElementById('downloadTxtBtn');
  const downloadPngBtn = document.getElementById('downloadPngBtn');
  const nameInput = document.getElementById('nameInput');
  const idInput = document.getElementById('idInput');

  if (scoreboard) {
    const getFilename = () => {
      const htmlFile = window.location.pathname.split('/').pop() || 'index.html';
      const name = nameInput?.value.trim() || 'Student';
      const id = idInput?.value.trim() || 'ID';
      const now = new Date();
      const dateStr = `${String(now.getDate()).padStart(2,'0')}${String(now.getMonth()+1).padStart(2,'0')}${now.getFullYear()}`;
      return `${htmlFile}|${name}|${id}|${dateStr}`;
    };

    hijackDownloadButton(downloadTxtBtn, () => scoreboard.textContent.trim(), getFilename, true);
    hijackDownloadButton(downloadPngBtn, () => scoreboard.textContent.trim(), getFilename, false);
  }

})();
</script>

    // Get filename only

    // Remove .html

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);

(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
