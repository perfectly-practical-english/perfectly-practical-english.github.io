<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>BenQ Focus Board</title>

<style>

*{
    box-sizing:border-box;draggable

}

html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#d0d0d0;
}

/* ==========================
   MAIN LAYOUT
========================== */

#main{
    display:flex;
    height:calc(100vh - 58px);
}

/* ==========================
   LEFT COLUMN
========================== */

#leftColumn{
    width:58px;
    min-width:58px;
    background:#ececec;
    border-right:1px solid #999;
    display:flex;
    flex-direction:column;
}

#clearBoardBtn{
    height:24px;
    font-size:10px;
    border:none;
    border-bottom:1px solid #999;
    cursor:pointer;
}

#pageList{
    flex:1;
    overflow-y:auto;
}

.pageBtn{
    width:100%;
    height:18px;
    border:none;
    border-bottom:1px solid #ddd;
    font-size:10px;
    cursor:pointer;
    padding:0;
    background:#f7f7f7;
}

.pageBtn.active{
    background:#4a90e2;
    color:white;
}

/* ==========================
   VIEWER
========================== */

#viewer{
    flex:1;
    overflow:hidden;
    background:white;
    position:relative;
    cursor: move;
}


#spread{
    position:absolute;
    top:0;
    left:0;
    height:100%;
    white-space:nowrap;
    font-size:0;
}
/* ==========================
   PAGES
========================== */

.imagePanel{
    display:inline-block;
    height:100%;
}

.imgWrap{
    width:100%;
    height:100%;
    overflow:hidden;
    position:relative;
}

.pageImage{
    display:block;
    height:100%;
    width:auto;
}

/* left page */

.leftPage{

    left:0;

    width:calc(100% + 2px);

    clip-path: inset(
        0px
        14px
        0px
        0
    );
}

/* right page */

.rightPage{

    left:-15px;

    width:calc(100% + 2px);

    clip-path: inset(
        0px
        14px
        0px
        0
    );
}

/* ==========================
   TILES
========================== */

#tiles{
    height:58px;
    background:#333;

    display:flex;
    flex-wrap:wrap;

    gap:2px;

    padding:1px;

    overflow:auto;

    align-content: flex-start;  /* IMPORTANT */
    justify-content: flex-start;
}

.tile{
    min-width:8ch;
    height:14px;
    line-height:14px;
    font-size:9px;

    padding:0 4px;
    margin:0;

    display:flex;
    align-items:center;
    justify-content:center;

    text-align:center;
    background:#E8D8B5;
    border:1px solid #B99F6B;
    color:#222;

    cursor:pointer;
    white-space:nowrap;
    user-select:none;
}

.tile.selected{
    background:#4a90e2;
    border-color:#2f6fb7;
    color:white;
}

/* ==========================
   DRAGGABLES
========================== */

.draggable{

    position:absolute;

    z-index:9999;

    cursor:move;

    user-select:none;

}

.overlayPng{
    position:absolute;

    width:140px;
    height:auto;

    background:transparent !important;
    border:none !important;
    padding:0 !important;
    margin:0 !important;

    display:block;

    pointer-events:auto;

    object-fit:contain;
}

.draggable {
    position:absolute;
    z-index:9999;
    cursor:default;
    user-select:none;
    -webkit-user-drag: none;
    touch-action: none;
    transform: none;

}



img {
    -webkit-user-drag: none;
    user-drag: none;
    -webkit-touch-callout: none;
}

#viewer, #spread, .imagePanel, .imgWrap {
    user-select: none;
    -webkit-user-select: none;
    -ms-user-select: none;
}

#centerBar {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 35px;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 10;

    /* solid-ish white, slightly see-through */
    background: rgba(255, 255, 255, 0.85);

    /* soft edge glow instead of transparency */
    box-shadow:
        0 0 10px rgba(255, 255, 255, 0.35),
        0 0 25px rgba(255, 255, 255, 0.15);

    /* subtle edge fade (not full transparency) */
    -webkit-mask-image: linear-gradient(
        to right,
        transparent 0%,
        black 15%,
        black 85%,
        transparent 100%
    );

    mask-image: linear-gradient(
        to right,
        transparent 0%,
        black 15%,
        black 85%,
        transparent 100%
    );
}

.pageImage {
    pointer-events: none;
}

.draggable.overlayPng{
    transform:none;
}


.tileAnchor {
    transform: translate(-100%, -100%);
}


.draggable.tile{
    min-width:6ch;
    height:10px;
    font-size:6px;
}


#undoBtn {
    position: fixed;
    top: 10px;
    right: 10px;

    z-index: 2147483647; /* max practical z-index */

    font-size: 10px;
    padding: 6px 10px;

    background: white;
    border: 1px solid #999;
    cursor: pointer;

    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}


</style>
</head>
<body>

<button id="undoBtn">Undo</button>

<input
    type="file"
    id="pngLoader"
    accept=".png"
    hidden>

<div id="main">

    <div id="leftColumn">

        <button id="clearBoardBtn">Clear</button>

        <div style="padding:4px; border-bottom:1px solid #999;">
            <select id="zoomSelect" style="width:100%; font-size:10px;">
                <option value="1">100%</option>
                <option value="1.8">180%</option>
                <option value="2.0">200%</option>
                <option value="2.25">225%</option>
                <option value="2.5">250%</option>
                <option value="2.75">275%</option>
                <option value="3.0">300%</option>
            </select>
        </div>

        <button id="panLockBtn" style="width:100%; font-size:10px; margin-top:4px;">
            Lock
        </button>

        <div id="pageList"></div>

    </div>


    <div id="viewer">

        <div id="spread">

            <div id="centerBar"></div>

            <div class="imagePanel">
                <div class="imgWrap">
                    <img id="leftImage" class="pageImage leftPage">
                </div>
            </div>

            <div class="imagePanel">
                <div class="imgWrap">
                    <img id="rightImage" class="pageImage rightPage">
                </div>
            </div>

        </div>

    </div>

</div>

<div id="tiles"></div>

<script>

spreads.forEach(([left, right]) => {

    const btn = document.createElement("button");

    btn.onclick = () => {

function loadSpread(page){

    `Focus (${page+1}).jpg`;
}

loadSpread(2);

document
.querySelector(".pageBtn")
.classList.add("active");

/* ==========================
   PNG LOADER
========================== */

pngLoader.addEventListener(
"change",
function(e){

    const file =
    e.target.files[0];

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload =
    function(evt){

        pngData =
        evt.target.result;

        placeMode = "png";
    };

    reader.readAsDataURL(file);
});

/* ==========================
   CLEAR BOARD
========================== */

document
.getElementById("clearBoardBtn")
.onclick = ()=>{

    document
    .querySelectorAll(".draggable")
    .forEach(el=>el.remove());
};

/* ==========================
   DRAGGING
========================== */


/* ==========================
   ZOOM
========================== */

let viewerScale = 1;

const zoomSelect = document.getElementById("zoomSelect");
const panLockBtn = document.getElementById("panLockBtn");

panLockBtn.onclick = () => {
    panLocked = !panLocked;
    panLockBtn.textContent = panLocked ? "Unlock" : "Lock";
};


zoomSelect.addEventListener("change", function(){
    viewerScale = parseFloat(this.value);
    updateTransform();
});

let panX = 0;
let panY = 0;

window.spread = document.getElementById("spread");

function updateTransform(){
spread.style.transform =
    `translate(${panX}px, ${panY}px) scale(${viewerScale})`;
spread.style.transformOrigin = "0 0";
}

/* ==========================
   PAN (CLEAN CAMERA STYLE)
========================== */

let isPanning = false;
let lastX = 0;
let lastY = 0;

viewer.addEventListener("pointerdown", (e) => {
    if (panLocked) return;   // 🔒 ADD THIS LINE
    if (e.button !== 0) return;

    isPanning = true;
    lastX = e.clientX;
    lastY = e.clientY;

    viewer.setPointerCapture(e.pointerId);
});

viewer.addEventListener("pointermove", (e) => {
    if (panLocked) return;   // 🔒 ADD THIS LINE
    if (!isPanning) return;


    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;

    panX += dx;
    panY += dy;

lastX = e.clientX;
lastY = e.clientY;

// ==========================
// CLAMP CAMERA (ADD THIS)
// ==========================

const rect = viewer.getBoundingClientRect();

const contentW = spread.offsetWidth * viewerScale;
const contentH = spread.offsetHeight * viewerScale;

const viewW = rect.width;
const viewH = rect.height;

// X axis clamp
if (contentW <= viewW) {
    panX = (viewW - contentW) / 2;
} else {
    const minX = viewW - contentW;
    const maxX = 0;
    panX = Math.max(minX, Math.min(maxX, panX));
}

// Y axis clamp
if (contentH <= viewH) {
    panY = (viewH - contentH) / 2;
} else {
    const minY = viewH - contentH;
    const maxY = 0;
    panY = Math.max(minY, Math.min(maxY, panY));
}

updateTransform();
});

viewer.addEventListener("pointerup", (e) => {
    isPanning = false;
    viewer.releasePointerCapture(e.pointerId);
});

</script>


<script>

/* ==========================
   ANIMALS (RAW STYLE INPUT)
========================== */

const animals = `

A festival.
In Buñol, Spain.
The last Wednesday of every August.
a
an
the
∅
1overlay-small.png
1overlay-large.png
Circleoverlay.png

`.trim().split("\n");

/* ==========================
   STATE
========================== */

let placeMode = null;
let selectedEl = null;

let undoStack = [];   // ← ADD IT RIGHT HERE


let panLocked = false;

/* ==========================
   ANIMAL PALETTE
========================== */

animals.forEach(animal => {

    const tile = document.createElement("div");

    tile.className = "tile";
    tile.textContent = animal;

tile.onclick = () => {

    document.querySelectorAll("#tiles .tile")
        .forEach(t => t.classList.remove("selected"));

    tile.classList.add("selected");

    if (animal.endsWith(".png")) {
        placeMode = {
            type: "image",
            value: animal
        };
    } else {
        placeMode = {
            type: "text",
            value: animal
        };
    }

    selectedEl = null;
};
    tiles.appendChild(tile);

});
/* ==========================
   ADD CRAP
========================== */


/* ==========================
   END ADD CRAP
========================== */
/* ==========================
   SELECT + MOVE + PLACE
========================== */

spread.addEventListener("pointerdown", function(e){

    const el = e.target;

    if (el.classList.contains("draggable")) {

        e.stopPropagation();

        selectedEl = el;
        placeMode = null;

        return;
    }

    if (!placeMode && !selectedEl) return;

const rect = spread.getBoundingClientRect();

const pos = {
    x: (e.clientX - rect.left) / viewerScale,
    y: (e.clientY - rect.top) / viewerScale
};

// MOVE existing (always allowed in lock mode OR normal mode)
if (selectedEl) {

        selectedEl.style.left = pos.x + "px";
        selectedEl.style.top = pos.y + "px";

        selectedEl = null;
        return;
    }

// CREATE new
let obj;

if (placeMode.type === "image") {

    obj = document.createElement("img");

    obj.src = "1overlay.png";

    obj.className = "draggable overlayPng";

    if (placeMode.value === "1overlay-small.png") {
        obj.style.width = "80px";
    }

    if (placeMode.value === "1overlay-large.png") {
        obj.style.width = "140px";
    }

    obj.style.height = "auto";
}

 else {

    obj = document.createElement("div");

    obj.className = "draggable tile tileAnchor";

    obj.textContent = placeMode.value;
}

if (placeMode.type === "image") {

    obj.style.left = (pos.x - 40) + "px";
    obj.style.top  = (pos.y - 40) + "px";

} else {

    obj.style.left = pos.x + "px";
    obj.style.top  = pos.y + "px";


}

spread.appendChild(obj);

if (placeMode.type === "image") {

    obj.addEventListener("pointerdown", function (ev) {

        ev.stopPropagation();
        ev.preventDefault();

        const el = obj;

        const rect = spread.getBoundingClientRect();

        let offsetX = (ev.clientX - rect.left) / viewerScale - parseFloat(el.style.left || 0);
        let offsetY = (ev.clientY - rect.top) / viewerScale - parseFloat(el.style.top || 0);

        function move(e) {
            const x = (e.clientX - rect.left) / viewerScale;
            const y = (e.clientY - rect.top) / viewerScale;

            el.style.left = (x - offsetX) + "px";
            el.style.top  = (y - offsetY) + "px";
        }

        function up() {
            window.removeEventListener("pointermove", move);
            window.removeEventListener("pointerup", up);
        }

        window.addEventListener("pointermove", move);
        window.addEventListener("pointerup", up);
    });

} else {

obj.addEventListener("pointerdown", function (ev) {

    ev.stopPropagation();
    ev.preventDefault();

    const el = obj;

    const rect = spread.getBoundingClientRect();

    let offsetX =
        (ev.clientX - rect.left) / viewerScale -
        parseFloat(el.style.left || 0);

    let offsetY =
        (ev.clientY - rect.top) / viewerScale -
        parseFloat(el.style.top || 0);

    function move(e) {

        const x = (e.clientX - rect.left) / viewerScale;
        const y = (e.clientY - rect.top) / viewerScale;

        el.style.left = (x - offsetX) + "px";
        el.style.top  = (y - offsetY) + "px";
    }

    function up() {
        window.removeEventListener("pointermove", move);
        window.removeEventListener("pointerup", up);
    }

    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
});
}
placeMode = null;

});
</script>


<script>

let undoStack = [];

/* =========================
   REGISTER TILE FOR UNDO
========================= */
function registerUndo(el) {
    undoStack.push(el);
}

/* =========================
   UNDO LAST PLACED TILE
========================= */
function undo() {

    const last = undoStack.pop();

    if (!last) return;

    // safety check in case element already removed
    if (last && last.parentNode) {
        last.remove();
    }
}

/* =========================
   BUTTON HOOK (SAFE INIT)
========================= */
window.addEventListener("DOMContentLoaded", () => {

    const btn = document.getElementById("undoBtn");

    if (!btn) return;

    btn.onclick = undo;
});

</script>

<script>

let selectedEl = null;

/* =========================
   SELECT TILE (TEXT + IMAGE)
========================= */
/*
You MUST already call this when creating tiles:
- for text tiles
- for image tiles
*/

function enableSelection(el) {
    el.addEventListener("pointerdown", function (e) {
        e.stopPropagation();
        selectedEl = el;
    });
}

/* =========================
   DELETE SELECTED TILE
========================= */
function deleteSelectedTile() {

    if (!selectedEl) return;

    selectedEl.remove();
    selectedEl = null;
}

/* =========================
   BUTTON HOOK (optional)
========================= */
document.addEventListener("DOMContentLoaded", () => {

    const btn = document.getElementById("deleteBtn");

    if (btn) {
        btn.onclick = deleteSelectedTile;
    }
});

/* =========================
   KEYBOARD DELETE SUPPORT
========================= */
window.addEventListener("keydown", function (e) {

    if (e.key === "Delete" || e.key === "Backspace") {

        if (document.activeElement.tagName === "INPUT") return;

        deleteSelectedTile();
    }
});

/* =========================
   HOW TO USE (IMPORTANT)
========================= */
/*
WHEN YOU CREATE A TILE:

TEXT TILE:
    enableSelection(obj);

IMAGE TILE:
    enableSelection(obj);
*/

</script>
