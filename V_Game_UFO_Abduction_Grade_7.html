<style>
:root {
  --max-width: 380px;
  --gutter: 12px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

html, body {
  height: 100%;
  width: 100%;
  max-width: none;
  margin: 0 auto;
  overflow-x: hidden;
}

body {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: stretch;

  background: radial-gradient(
    circle at 50% 30%,
    #1a0033 0%,
    #050010 40%,
    #000000 100%
  );
}

/* ───────────────────────── TOP FIELDS ───────────────────────── */
#topFields {
  display: flex;
  gap: 6px;
  margin-top: 20px;
  justify-content: center;
  align-items: center;
  width: 100%;
  max-width: 380px;       /* match section selector max-width */
  margin-left: auto;
  margin-right: auto;
  z-index: 9999;
  position: relative;
}

#topFields input,
#topFields button {
  flex-shrink: 0; /* inputs and buttons won’t shrink below their width */

  height: 36px;            /* match selector buttons */
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
  padding: 0 10px;
  box-sizing: border-box;
}

#topFields input {
  width: 90px;
}

#topFields button {
  background: #6B7280;
  color: white;
  border: none;
  cursor: pointer;
}

#topFields button:disabled {
  background: #888;
  cursor: not-allowed;
}

#countdownOverlay {
  min-width: 36px;
  text-align: center;
  font-weight: bold;
  font-size: 16px;
  color: #0288d1;
  z-index: 9999;
  position: relative;
}

/* ───────────────────────── SECTION SELECTOR ───────────────────────── */
#sectionSelectorRow {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 380px;
  margin: 10px auto 0;
  padding: 0;
  box-sizing: border-box;
  z-index: 9999;
  position: relative;

  /* nudge row 3px left to fix offset */
  transform: translateX(-4px);
}

/* Buttons */
#sectionUp,
#sectionDown {
  flex: 0 0 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid transparent; /* match top inputs */
  background: #6B7280;
  color: white;
  cursor: pointer;
  transition: background 0.15s ease, transform 0.1s ease;
  padding: 0;
  margin: 0;
}

/* Wheel spacing using button margins */
#sectionUp {
  margin-right: 6px;
}

#sectionDown {
  margin-left: 6px;
}

#sectionUp:hover,
#sectionDown:hover {
  background: #0277bd;
}

#sectionUp:active,
#sectionDown:active {
  transform: scale(0.97);
}

#sectionUp:disabled,
#sectionDown:disabled {
  background: #888;
  cursor: not-allowed;
}

/* Wheel Container */
#sectionWheelContainer {
  flex: 0 0 260px;
  height: 36px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background: white;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 0 10px;  /* match top inputs */
  box-sizing: border-box;
  margin: 0;
}

.wheel {
  flex: 1;
  padding-left: 0;
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  box-sizing: border-box;
}
#windCanvas {
  position: fixed;
  inset: 0;

  width: 100vw;
  height: 100vh;

  pointer-events: none;
  z-index: 999; /* above tornado, below UI if needed */
}


#gameArea {
  position: relative;
  width: 100%;
  height: 240px;
  overflow: visible;
  background: transparent;
}


#ufoContainer {
  position: absolute;
  top: -50px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

#ufo {
  font-size: 175px;
}

#beam {
  position: absolute;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  width: 180px;
  height: 230px;
  background: radial-gradient(
    ellipse at top,
    rgba(255,255,150,0.6) 0%,
    rgba(255,255,0,0.1) 80%
  );
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  opacity: 0;
  transition: opacity 0.3s;
}

/* ───────────────────────── ANIMALS ───────────────────────── */

.cow {
  position: absolute;
  bottom: 0px;                 /* anchor all animals to same ground */
  transform: translateY(-10px);
  display: flex;
  align-items: flex-end;    /* align bottoms instead of centers */
  gap: 6px;
  font-size: 35px;
  line-height: 1;           /* remove emoji vertical offset */
  z-index: 5;
}

.cowIcon {
  transform: scaleX(-1);
  display: inline-block;    /* stabilizes emoji box */
  line-height: 1;
}

.cowWord {
  display: none;
}
/* ───────────────────────── INPUT AREA ───────────────────────── */

#inputArea {
  margin-top: -40px;
  padding: 0 var(--gutter);
  display: flex;
  justify-content: center;
  position: relative;
  z-index: 1000;
}

#wordInput {
  width: 160px;
  padding: 6px;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
}


/* ───────────────────────── SCOREBOARD ───────────────────────── */

#scoreboard {
  position: absolute;
  top: 325px;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 320px;
  padding: 8px 12px;
  background: rgba(255,255,255,0.95);
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 12px;
  display: none;
  z-index: 100;
  box-sizing: border-box;
}

#scoreData {
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  word-break: break-word;
  max-width: 100%;
}



#scoreButtons {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}

#scoreButtons button {
  padding: 6px 12px;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background: #6B7280;
  color: white;
  cursor: pointer;

  min-width: 90px;          /* 👈 visual balance when centered */
  text-align: center;
}


/* ───────────────────────── FOOTER ───────────────────────── */

footer {
  text-align: center;
  font-size: 12px;
  margin: 8px;
}

/* ───────────────────────── EFFECTS ───────────────────────── */

.beamOn {
  opacity: 1;
  box-shadow: 0 0 50px 20px rgba(255,255,180,0.6);
}


#ufo {
  filter: brightness(0.5) contrast(1.1);
}

#ufo {
  filter: brightness(0.65) contrast(1.15);

  -webkit-mask-image: linear-gradient(
    to bottom,
    rgba(0,0,0,1) 0%,
    rgba(0,0,0,1) 75%,
    rgba(0,0,0,0) 100%
  );

  mask-image: linear-gradient(
    to bottom,
    rgba(0,0,0,1) 0%,
    rgba(0,0,0,1) 75%,
    rgba(0,0,0,0) 100%
  );
}

#hiddenInput {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  height: 0;
  width: 0;
}

#starLayer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

#groundLayer {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;

  height: 280px; /* was 300px → +10px moves top edge up */
  transform: translateY(-10px); /* shift whole layer up */

  z-index: 1;
  pointer-events: none;

  -webkit-mask-image: linear-gradient(
    to bottom,
    rgba(0,0,0,0) 0px,
    rgba(0,0,0,1) 15px,   /* 15px fade at top edge */
    rgba(0,0,0,1) 100%
  );

  mask-image: linear-gradient(
    to bottom,
    rgba(0,0,0,0) 0px,
    rgba(0,0,0,1) 15px,
    rgba(0,0,0,1) 100%
  );
}
/* canvases fill their containers */
#starCanvas,
#groundCanvas {
  width: 100%;
  height: 100%;
  display: block;
}



</style>

<script>
function parseVocabInput(rawText) {
  if (!rawText) return [];
  return rawText
    .replace(/<br\s*\/?>/gi, "\n")
    .split(/[\n,]+/)
    .map(w =>
      w.trim().toLowerCase().replace(/[^a-z0-9'-]/g, "")
    )
    .filter(Boolean)
    .filter((word, index, array) => array.indexOf(word) === index);
}
</script>

<script>
function parseSections(raw) {
  const chunks = raw.split(/\n(?=~+)/);

  return chunks
    .map(chunk => chunk.trim())
    .filter(chunk => chunk.startsWith("~"))
    .map(chunk => {
      const lines = chunk.split("\n");
      const name = lines.shift().replace(/^~+/, "").trim();
      const text = lines.join("\n").trim();
      return { name, text };
    });
}

function extractWords(sectionText) {
  const lines = sectionText
    .replace(/<br\s*\/?>/gi, "\n")
    .split("\n")
    .map(l => l.trim())
    .filter(Boolean);

  const words = [];

  lines.forEach(line => {
    if (!line.startsWith("•")) return;

    const vocabWord = line
      .replace(/^•\s*/, "")      // remove bullet
      .split(/[–—-]/)[0]         // remove description
      .replace(/[^\p{L}\s]/gu, "") // strip emoji/symbols
      .trim()
      .toLowerCase()
      .split(/\s+/)[0];          // first word only

    if (vocabWord) words.push(vocabWord);
  });

  return words;
}
</script>



<script>
async function loadVocab(raw) {
  // filename mode
  if (
    typeof raw === "string" &&
    raw.trim().endsWith(".txt") &&
    !raw.includes("\n") &&
    !raw.includes(" ")
  ) {
    const res = await fetch(raw.trim());
    const text = await res.text();
    return parseVocabInput(text);
  }

  // embedded raw text mode
  return parseVocabInput(raw);
}
</script>

const spacingPattern = [50, 75, 100, 50]; // spacing between animals
const cowSpeed = 0.5;  // pixels per frame
let nextTrainStartX = -100;
let trainInProgress = false;

function spawnCowTrain() {
  trainInProgress = true;
  let trainCows = [];

  let currentX = nextTrainStartX;

  // create each animal, positioned relative to the previous one
  animalPattern.forEach((emoji, i) => {
    const cow = document.createElement("div");
    cow.className = "cow";
    cow.style.position = "absolute";
    cow.style.left = `${currentX}px`;
    cow.style.bottom = "50px";

    gameArea.appendChild(cow);
    cows.push(cow);
    trainCows.push(cow);

    // move currentX forward for the next cow
    let spacing = spacingPattern[i % spacingPattern.length];
    currentX -= spacing; // animals go off-screen to the left initially
  });

  // move entire train as a unit
  const moveTrain = setInterval(() => {
    trainCows.forEach(cow => {
      let x = parseFloat(cow.style.left);
      x += cowSpeed;
      cow.style.left = x + "px";

      const ufoRect = ufoContainer.getBoundingClientRect();
      const cowRect = cow.getBoundingClientRect();
      const cowCenterX = cowRect.left + cowRect.width / 2;

      if (pendingAbduction && Math.abs(cowCenterX - (ufoRect.left + ufoRect.width/2)) < 20) {

      if (x > window.innerWidth + 150) {

        cows = cows.filter(c => c !== cow);
      }
    });

    if (!trainCows.some(c => gameArea.contains(c))) {
      clearInterval(moveTrain);
      trainInProgress = false;
    }
  }, 20);
}

function suckCowToUFO(cow) {
  clearInterval(cow.moveInterval);
  const ufoRect = ufoContainer.getBoundingClientRect();

  const distX = (ufoRect.left + ufoRect.width / 2) - (cowRect.left + cowRect.width / 2);

  const fontSize = 12;

  const padding = 12;

  ctx.font = `${fontSize}px Arial`;

  // Match narrow iPhone scoreboard width
  const maxTextWidth =
  scoreboard.getBoundingClientRect().width - padding * 2;


function wrapText(text, maxWidth) {
  const lines = [];
  let line = "";

  for (const char of text) {
    const test = line + char;
    if (ctx.measureText(test).width > maxWidth) {
      lines.push(line);
      line = char;
    } else {
      line = test;
    }
  }

  if (line) lines.push(line);
  return lines;
}

  const wrappedLines = wrapText(text, maxTextWidth);

  canvas.width = maxTextWidth + padding * 2;
  canvas.height = wrappedLines.length * lineHeight + padding * 2;

  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "black";
  wrappedLines.forEach((line, i) => {
    ctx.fillText(
      line,
      padding,
      padding + fontSize + i * lineHeight
    );
  });

  const img = canvas.toDataURL("image/png");
  const a = document.createElement("a");
  a.href = img;
  a.download = "score.png";
  a.click();
});

<script>
(function () {

const canvas = document.getElementById("starCanvas");
const ctx = canvas.getContext("2d");

let stars = [];
let t = 0;

const STAR_COUNT = 2000;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  createStars();
}

function createStars() {
  stars = [];

  const w = canvas.width;
  const h = canvas.height;

  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      // expanded field: 2x wider and taller than screen
      x: (Math.random() * 2 - 0.5) * w,
      y: (Math.random() * 2 - 0.5) * h,

      r: Math.random() * 1.6 + 0.3,
      a: Math.random() * 0.5 + 0.5,
      s: Math.random() * 0.01 + 0.005
    });
  }
}

window.addEventListener("resize", resize);
resize();

function draw() {

  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0, 0, w, h);

  const cx = w / 2;
  const cy = h * 0.42; // horizon pivot
const angle = t * 0.0009;
t += 0.08;
  const cos = Math.cos(angle);
  const sin = Math.sin(angle);

  ctx.fillStyle = "white";

  for (let i = 0; i < stars.length; i++) {

    const s = stars[i];

    // translate to center
    let dx = s.x - cx;
    let dy = s.y - cy;

    // rotate
    const rx = dx * cos - dy * sin;
    const ry = dx * sin + dy * cos;

    const x = cx + rx;
    const y = cy + ry;

    // IMPORTANT: NO OVER-FILTERING
    if (x >= -10 && x <= w + 10 && y >= -10 && y <= h + 10) {

      ctx.globalAlpha = s.a;

      ctx.beginPath();
      ctx.arc(x, y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.globalAlpha = 1;

  t += 1;
  requestAnimationFrame(draw);
}

draw();

})();
</script>
<script>
(function () {
  const canvas = document.getElementById("groundCanvas");
  const ctx = canvas.getContext("2d");

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  let t = 0;

  function noise(x, y, t) {
    return (
      Math.sin(x * 0.008 + t) +
      Math.sin(y * 0.012 + t * 1.2) +
      Math.sin((x + y) * 0.006 - t * 0.7)
    ) / 3;
  }

  function draw() {
    const w = canvas.width;
    const h = canvas.height;
    const img = ctx.createImageData(w, h);
    const d = img.data;

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {

        const n =
          noise(x, y, t) +
          noise(x * 0.5, y * 0.5, t * 0.9);

        const swirl = Math.sin(n * 6 + y * 0.02);
        const mix = swirl * 0.5 + 0.5;

        // TAN
        const tr = 210, tg = 180, tb = 120;

        // GREEN
        const gr = 80, gg = 140, gb = 60;

        const r = gr * mix + tr * (1 - mix);
        const g = gg * mix + tg * (1 - mix);
        const b = gb * mix + tb * (1 - mix);

        const i = (y * w + x) * 4;
        d[i]     = r;
        d[i + 1] = g;
        d[i + 2] = b;
        d[i + 3] = 255;
      }
    }

    ctx.putImageData(img, 0, 0);
    t += 0.02;
    requestAnimationFrame(draw);
  }

  draw();
})();
</script>

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);

      html.push(`<hr>`);
      return;

(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();

if (!supabaseClient) {
  console.error("❌ Supabase failed to initialize");
}

let lastUploadedScore = null;

window.saveResult = async function saveResult(text) {

  if (!supabaseClient) {
    console.error("❌ No Supabase client");
    return;
  }

  // ======================
  // NORMALIZE INPUT
  // ======================
  let cleaned;

  try {
    cleaned = (typeof text === "string")
      ? text
      : JSON.stringify(text);

    cleaned = cleaned.replace(/\s+/g, " ").trim();

  } catch (err) {
    console.error("❌ Normalize error:", err);
    return;
  }

  if (!cleaned) {
    console.error("❌ Empty value blocked");
    return;
  }

  if (cleaned === lastUploadedScore) {
    console.log("⚠️ Duplicate blocked");
    return;
  }

  lastUploadedScore = cleaned;

  console.log("📤 INSERTING INTO scoreboard_raw:", cleaned);

  const { data, error } = await supabaseClient
    .from("scoreboard_raw")
    .insert([
      { result_text: cleaned }
    ])
    .select();

  if (error) {
    console.error("❌ INSERT FAILED FULL ERROR:", error);
    return;
  }

  console.log("✅ INSERT SUCCESS:", data);
};
