<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Panel</title>

  <style>
    html, body {
      margin: 0px;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      font-family: sans-serif;
      overflow: hidden;
    }

    /* ===== Main Scroll Area ===== */
    #main {
      display: flex;
      width: 100%;
      height: 100vh;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      align-items: center;
      justify-content: left;
      margin-left: 40px;

  margin-left: 40px; /* keep your left margin */
  gap: 20px;          /* exactly 10px between iframes */

    }

    /* ===== Scrollbar ===== */
    #main::-webkit-scrollbar { height: 50px; }
    #main::-webkit-scrollbar-thumb {
      background: orange;
      border-radius: 10px;
      border: 2px solid black;
  min-width: 285px; /* ensures thumb is at least this long */
      box-shadow: 0 0 4px black;
    }
    #main::-webkit-scrollbar-track {
      background: black;
      box-shadow: 0 0 2px black;
      border-radius: 25px;
    }

    /* ===== Iframes ===== */
    .iframe-wrapper {
      flex: 0 0 auto;
      scroll-snap-align: start;
      border-radius: 16px; /* Keep the rounded corners */
      background: #222;
      box-shadow: 0 0 20px rgba(255,140,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2em;
      color: orange;
      margin: 0;
      position: relative; /* for reload triangle positioning */
    }

    /* Apply rounded corners to iframe itself */
    .iframe-wrapper iframe {
      border-radius: 16px; /* Add rounded corners to iframes */
      width: 100%;
      height: 100%;
      border: none; /* Remove default iframe border */
    }

    /* ===== Reload triangle for main iframes ===== */
.iframe-wrapper .reload-triangle {
  position: absolute;
  top: 10px;
  left: 10px;  /* or right: 10px if you prefer */
  width: 0;
  height: 0;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  border-right: 15px solid orange; /* left-pointing triangle */
  cursor: pointer;
  z-index: 10;
  transition: transform 0.2s, border-right-color 0.2s;
}

.iframe-wrapper .reload-triangle:hover {
  transform: scale(1.2);
  border-right-color: #ffb347;
}
    /* ===== Flyouts ===== */
    .flyout {
      position: fixed;
      background: #111;
      color: white;
      box-shadow: 0 0 20px rgba(255,140,0,0.3);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.4s ease;
      z-index: 10;
    }
/* Closed state stays hidden */
.flyout.left {
  left: 0;
  border-radius: 0 16px 16px 0;
  transform: translateX(-100%); /* fully off-screen */
}

/* Open state slides over the first iframe */
.flyout.open.left {
  transform: translateX(40px); /* 40px is the first iframe width */
}


    .flyout.right { right: 0; border-radius: 16px 0 0 16px; transform: translateX(100%); }

.flyout.open.right { transform: translateX(0); }

    /* ===== Flyout Iframes ===== */
    .flyout iframe {
      border-radius: 16px;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ===== Flyout Buttons ===== */
    .flyout-controls {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 20;
    }
    .flyout-group {
      display: flex;
      gap: 10px;
      pointer-events: all;
      align-items: center;
    }
    .left-buttons { margin-left: 50px; }
    .right-buttons { margin-right: 50px; }
    .flyout-btn {
      background: orange;
      color: black;
      border: 2px solid black;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 6px black;
      transition: background 0.3s ease, transform 0.2s ease;
      font-size: 0.9em;
    }
    .flyout-btn:hover { background: #ffb347; transform: scale(1.1); }
    .flyout-btn.active {
      background: limegreen;
      color: black;
      transform: scale(1.05);
      box-shadow: 0 0 6px rgba(0,0,0,0.8);
    }

    /* ===== Fade Overlay (used by fadein.js) ===== */
    #fadeOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 9999;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s ease;
    }

    /* ===== Marquee Dot Styles ===== */
    .dot {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: orange;
      box-shadow: 0 0 10px orange;
      animation: flash 2s infinite linear;
      opacity: 1;
      transition: opacity 1s ease;
    }
    @keyframes flash {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }
    .fade-out .dot { opacity: 0; }
    .border-dots {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
      transition: opacity 1s ease;
    }


    /* ===== Slide Show ===== */

img {
  border-radius: 15px; /* This applies to all images */
}


#iframes-wrapper, #slideshow-wrapper {
  margin: 0;                /* remove any default margin */
  padding: 0;               /* remove padding */
  border: none;             /* just in case */
  box-sizing: border-box;   /* ensures border-radius works correctly */
  border-radius: 10px;      /* keep your rounded corners */

#slideshow-wrapper img {

#slideshow-wrapper .reload-triangle {

.iframe-wrapper {
  width: 800px;

}

  <script>
let topZIndex = 10; // tracks the highest z-index among flyouts

function togglePanel(id) {
  const panel = document.getElementById(id);
  if (!panel) return;

  const wasOpen = panel.classList.contains('open'); // save previous state
  panel.classList.toggle('open');

  // Bring this panel to front
  if (panel.classList.contains('open')) {
    topZIndex++;
    panel.style.zIndex = topZIndex;
  } else {
    // Optionally reset z-index when closed
    panel.style.zIndex = 10;
  }

  updateButtonsState();

  // Reload iframe only if the panel was open and now is closed
  if (wasOpen) {
    const iframe = panel.querySelector('iframe');
    if (iframe) iframe.src = iframe.src;
  }
}
    function alignFlyouts() {
      const main = document.getElementById('main');
      const firstIframe = main.querySelector('.iframe-wrapper');
      if (!firstIframe) return;
      const mainRect = main.getBoundingClientRect();
      const iframeRect = firstIframe.getBoundingClientRect();
      const topOffset = iframeRect.top - mainRect.top;
      document.querySelectorAll('.flyout').forEach(f => f.style.top = `${topOffset}px`);
    }

window.addEventListener('load', () => {
  alignFlyouts();
  updateButtonsState();

  // Attach reload triangle logic after page load
  document.querySelectorAll('.iframe-wrapper .reload-triangle').forEach(triangle => {
    triangle.addEventListener('click', e => {
      e.stopPropagation();

      const iframe = triangle.parentElement.querySelector('iframe');
      if (!iframe) return;

      // Remove old query parameters
      const baseSrc = iframe.src.split('?')[0];

      // Add a unique query to force reload
      iframe.src = baseSrc + '?reload=' + Date.now();

      // Optional: simple click feedback animation
      triangle.style.transform = 'scale(1.3)';
      setTimeout(() => triangle.style.transform = 'scale(1)', 200);
    });
  });
});

    window.addEventListener('resize', () => {
      alignFlyouts();
      updateButtonsState();
    });
  </script>

(function() {
  const btn = document.createElement('button');
  btn.id = 'coffeeBreakBtn';
  btn.textContent = 'B';
  btn.className = 'flyout-btn';
  btn.style.marginLeft = '10px';

  const rightGroup = document.querySelector('.flyout-group.right-buttons');
  if (rightGroup) rightGroup.insertBefore(btn, rightGroup.firstChild);

  // Overlay and modal container
  const modal = document.createElement('div');
  modal.id = 'breakModal';
  Object.assign(modal.style, {
    position: 'fixed',
    top: '0',
    left: '0',
    width: '100vw',
    height: '100vh',
    backgroundColor: 'rgba(0, 0, 0, 0.4)',
    display: 'none',
    justifyContent: 'center',
    alignItems: 'center',
    flexDirection: 'column',
    fontSize: '30px',
    color: 'white',
    zIndex: '9999',
    pointerEvents: 'none', // clicks pass through
    textAlign: 'center'
  });

  const heading = document.createElement('h1');
  heading.textContent = '☕ Break Time!';
  heading.style.textShadow = '0 0 30px rgba(0,0,0,1), 0 0 50px rgba(0,0,0,0.8)';
  modal.appendChild(heading);

  const timer = document.createElement('div');
  timer.id = 'timer';
  timer.textContent = '5:00';
  timer.style.textShadow = '0 0 30px rgba(0,0,0,1), 0 0 50px rgba(0,0,0,0.8)';
  modal.appendChild(timer);

  document.body.appendChild(modal);

  let timerInterval = null;
  let remainingTime = 300; // default 5 min

  function updateTimerDisplay(time) {
    const m = Math.floor(time / 60);
    const s = (time % 60).toString().padStart(2, '0');
    timer.textContent = `${m}:${s}`;
  }

  function startTimer(duration = 300) {
    remainingTime = duration;
    modal.style.display = 'flex';
    btn.classList.add('active');
    updateTimerDisplay(remainingTime);

    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      remainingTime--;
      updateTimerDisplay(remainingTime);

      if (remainingTime <= 0) {
        clearInterval(timerInterval);
        modal.style.display = 'none';
        btn.classList.remove('active');
      }
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    modal.style.display = 'none';
    btn.classList.remove('active');
  }

  // Button toggles timer: start if not running, stop if running
  btn.addEventListener('click', () => {
    if (modal.style.display === 'flex') {
      stopTimer();
    } else {
      startTimer();
    }
  });
})();
</script>
<script>
(function() {
  const rawList = `
Kom (11).jpg
Kom (12).jpg
Kom (13).jpg
Kom (14).jpg

`;

  const images = rawList.trim().split('\n').map(line => line.trim()).filter(line => line);
  const wrapper = document.getElementById('slideshow-wrapper');

  // Black overlay for fade effect
  let overlay = document.getElementById('fade-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'fade-overlay';
    overlay.style.position = 'absolute';
    overlay.style.top = '0';
    overlay.style.left = '0';
    overlay.style.width = '100%';
    overlay.style.height = '100%';
    overlay.style.backgroundColor = 'black';
    overlay.style.opacity = 0;
    overlay.style.transition = 'opacity 0.5s ease-in-out';
    overlay.style.pointerEvents = 'none';
    wrapper.appendChild(overlay);
  }

  // Permanent background
  wrapper.style.backgroundImage = 'url(The_Head_of_Christ_by_Warner_Sallman_1941.jpg)';
  wrapper.style.backgroundSize = 'cover';
  wrapper.style.backgroundPosition = 'center';
  wrapper.style.backgroundRepeat = 'no-repeat';
  wrapper.style.position = 'relative';
  wrapper.style.overflow = 'hidden';

  // Main image element
  const img = document.createElement('img');
  img.src = images[0];
  img.style.position = 'absolute';
  img.style.top = '0';
  img.style.left = '0';
  img.style.width = '100%';
  img.style.height = '100%';
  img.style.objectFit = 'cover';
  img.style.opacity = 1;
  img.style.transition = 'opacity 0.5s ease-in-out';
  wrapper.appendChild(img);

  // Optional black frame
  const frame = document.createElement('div');
  frame.style.position = 'absolute';
  frame.style.top = '0';
  frame.style.left = '0';
  frame.style.width = '100%';
  frame.style.height = '100%';
  frame.style.pointerEvents = 'none';
  frame.style.border = '2px solid black';
  frame.style.borderRadius = '10px';
  frame.style.boxSizing = 'border-box';
  wrapper.appendChild(frame);

  let currentIndex = 0;
  const fadeDuration = 500;      // ms
  const displayDuration = 2500;  // ms

  function scheduleNext() {
    const nextIndex = (currentIndex + 1) % images.length;
    const nextImg = new Image();
    nextImg.src = images[nextIndex];

    nextImg.onload = () => {
      overlay.style.opacity = 1;

      setTimeout(() => {
        img.src = images[nextIndex];
        currentIndex = nextIndex;
        overlay.style.opacity = 0;

        // Schedule next image reliably
        setTimeout(scheduleNext, displayDuration);
      }, fadeDuration);
    };

    // Safety fallback: if preload fails, skip to next
    nextImg.onerror = () => {
      currentIndex = nextIndex;
      setTimeout(scheduleNext, displayDuration);
    };
  }

  // Start slideshow on page load
  window.addEventListener('load', () => {
    img.style.opacity = 1;
    setTimeout(scheduleNext, displayDuration);
  });
})();
</script>





<script>
// Standalone iframe reload utility
(function() {
  /**
   * Reload an iframe with cache-busting
   * @param {HTMLIFrameElement} iframe
   */
  function reloadIframe(iframe) {
    if (!iframe) return;
    try {
      const url = new URL(iframe.src, window.location.href);
      url.searchParams.set('reload', Date.now()); // add/update query param
      iframe.src = url.toString();
    } catch (e) {
      console.warn('Cannot reload iframe', iframe, e);
    }
  }

  /**
   * Attach click handlers to all triangles inside iframe wrappers
   * Triangle should have class 'reload-triangle'
   */
  function attachTriangleReloads() {
    document.querySelectorAll('.iframe-wrapper .reload-triangle').forEach(triangle => {
      triangle.addEventListener('click', e => {
        e.stopPropagation();
        const iframe = triangle.closest('.iframe-wrapper').querySelector('iframe');
        reloadIframe(iframe);

        // optional visual feedback
        triangle.style.transform = 'scale(1.3)';
        setTimeout(() => triangle.style.transform = 'scale(1)', 200);
      });
    });
  }

  /**
   * Attach reload on flyout open
   * Pass panel element or ID
   */
  function attachFlyoutReload(panel) {
    if (typeof panel === 'string') panel = document.getElementById(panel);
    if (!panel) return;

    // Observe class changes to detect 'open'
    const observer = new MutationObserver(mutations => {
      mutations.forEach(m => {
        if (m.attributeName === 'class') {
          if (panel.classList.contains('open')) {
            const iframe = panel.querySelector('iframe');
            reloadIframe(iframe);
          }
        }

  };
})();

  /* ===============================
        KEYBOARD LEFT / RIGHT
     =============================== */
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") {
      main.scrollBy({ left: STEP, behavior: "smooth" });
    }
    if (e.key === "ArrowLeft") {
      main.scrollBy({ left: -STEP, behavior: "smooth" });
    }
  });

  /* =======================================
        SCROLLBAR TRACK CLICK HANDLING
     ======================================= */
  let isThumbDragging = false;

  // Detect if user is dragging scrollbar thumb
  main.addEventListener("mousedown", (e) => {
    const scrollbarHeight = main.offsetHeight - main.clientHeight;
    const clickedInsideScrollbar = e.clientY > window.innerHeight - scrollbarHeight;

    if (clickedInsideScrollbar) {
      // Track mousedown on thumb
      const thumb = e.target.closest("::-webkit-scrollbar-thumb");
    }
  });

  // Detect pointer down in scrollbar area
  main.addEventListener("pointerdown", (e) => {
    const rect = main.getBoundingClientRect();
    const scrollbarTop = rect.bottom - main.offsetHeight + main.clientHeight;

    // Clicked somewhere in scrollbar track (bottom 50px)
    if (e.clientY > scrollbarTop) {
      const clickX = e.clientX;
      const scrollLeft = main.scrollLeft;
      const visibleWidth = main.clientWidth;

      const clickPosition = scrollLeft + clickX;

      // Determine which direction to move
      if (clickPosition > scrollLeft + visibleWidth) {
        // click to the right of thumb
        main.scrollBy({ left: STEP, behavior: "smooth" });
      } else if (clickPosition < scrollLeft) {
        // click to the left of thumb
        main.scrollBy({ left: -STEP, behavior: "smooth" });
      }
    }
  });

});
</script>

<script>
(function () {

    // ----------------------------------------------------------
    // Read manifest
    // ----------------------------------------------------------
    const raw = document.getElementById("iframeManifest")?.textContent || "";

    const lines = raw.split("\n").map(l => l.trim());

    const headerRe = /^~(.+?)~$/;

    // ----------------------------------------------------------
    // Section storage
    // ----------------------------------------------------------
    const sections = {
        left: [],
        main: [],
        right: []
    };

    let current = null;

    // ----------------------------------------------------------
    // Parse manifest
    // ----------------------------------------------------------
    for (let line of lines) {

        if (!line) continue;              // skip blank
        if (line.startsWith("#")) continue;

        const m = line.match(headerRe);

        if (m) {
            const title = m[1].toLowerCase();

            if (title.includes("left")) current = "left";
            else if (title.includes("main")) current = "main";
            else if (title.includes("right")) current = "right";
            else current = null;

            continue;
        }

        if (current) {
            sections[current].push(line);
        }
    }

    // ----------------------------------------------------------
    // Fill frames
    // ----------------------------------------------------------
    function fill(selector, list) {
        const frames = document.querySelectorAll(selector);

        frames.forEach((frame, i) => {
            if (list[i]) {
                frame.src = list[i];
            }
        });
    }

    fill(".flyout.left iframe", sections.left);
    fill("main iframe", sections.main);
    fill(".flyout.right iframe", sections.right);

})();
</script>


<script>
(function() {
  // ===== 1. Create the movable circular modal =====
  const cameraModal = document.createElement('div');
  cameraModal.id = 'cameraModal';
  Object.assign(cameraModal.style, {
    position: 'fixed',
    top: '100px',
    left: '100px',
    width: '200px',
    height: '200px',
    borderRadius: '50%',
    border: '4px solid orange',
    overflow: 'hidden',
    backgroundColor: 'black',
    zIndex: '9999',
    boxShadow: '0 0 20px rgba(255,140,0,0.5)',
    display: 'none', // initially hidden
    justifyContent: 'center',
    alignItems: 'center',
    cursor: 'grab',
  });

  // Video element for the camera feed
  const video = document.createElement('video');
  video.autoplay = true;
  video.playsInline = true;
  video.style.width = '100%';
  video.style.height = '100%';
  video.style.objectFit = 'cover';
  video.style.borderRadius = '50%';
  cameraModal.appendChild(video);

  document.body.appendChild(cameraModal);

  // ===== 2. Make the modal draggable =====
  let isDragging = false, offsetX = 0, offsetY = 0;
  cameraModal.addEventListener('mousedown', e => {
    isDragging = true;
    offsetX = e.clientX - cameraModal.getBoundingClientRect().left;
    offsetY = e.clientY - cameraModal.getBoundingClientRect().top;
    cameraModal.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    cameraModal.style.left = `${e.clientX - offsetX}px`;
    cameraModal.style.top = `${e.clientY - offsetY}px`;
  });
  window.addEventListener('mouseup', () => {
    isDragging = false;
    cameraModal.style.cursor = 'grab';
  });

  // ===== 3. Add the eyeball button to the right-buttons group =====
  const rightGroup = document.querySelector('.flyout-group.right-buttons');
  if (rightGroup) {
    const btn = document.createElement('button');
    btn.id = 'cameraBtn';
    btn.className = 'flyout-btn'; // matches existing styling
    btn.textContent = '👁️';
    btn.style.marginLeft = '10px';

    // Toggle modal visibility and camera permission
    btn.addEventListener('click', async () => {
      const isVisible = cameraModal.style.display !== 'none';
      if (isVisible) {
        cameraModal.style.display = 'none';
        btn.classList.remove('active');
        // stop the stream
        if (video.srcObject) {
          video.srcObject.getTracks().forEach(track => track.stop());
          video.srcObject = null;
        }
      } else {
        cameraModal.style.display = 'flex';
        btn.classList.add('active');
        // request camera permission and stream
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: true });
          video.srcObject = stream;
        } catch (err) {
          alert('Camera access denied or unavailable.');
          cameraModal.style.display = 'none';
          btn.classList.remove('active');
        }
      }
    });

    rightGroup.appendChild(btn);
  }
})();
</script>

<script>
(function() {
  const SPACING = 20;       
  const MARGIN = 4;         
  const CHASE_SPEED = 50;   
  const CHASE_LAPS = 2;     
  const MODE_DURATION = 5000;

  // Black light neon colors
  const LIGHT_COLORS = ['#8A2BE2', '#4B0082', '#9400D3', '#7B68EE', '#BA55D3'];

  let dots = [];
  let chaseIndex = 0;
  let chaseInterval = null;
  let timeoutHandle = null;
  let mode = 'twinkle';

  // ===== Inject CSS =====
  const style = document.createElement('style');
  style.textContent = `
    .border-dots { position: fixed; inset:0; pointer-events:none; z-index:9999; overflow:hidden; }
    body { background-color: #0a0010; } /* optional dark background for black light effect */
    .dot { position:absolute; width:10px; height:10px; border-radius:50%; opacity:0.6; transition: opacity 0.2s, transform 0.2s; }
    .dot.chase.on { transform: scale(1.5); box-shadow:0 0 12px currentColor,0 0 25px currentColor; opacity:1; }
    .dot.glow { box-shadow:0 0 10px currentColor,0 0 20px currentColor; opacity:1; animation: glowPulse 2s infinite ease-in-out; }
    .dot.twinkle { animation: twinkle 1.5s infinite alternate; }
    @keyframes twinkle {0%{opacity:0.3}50%{opacity:1}100%{opacity:0.3}}
    @keyframes glowPulse {0%,100%{opacity:0.5; transform:scale(1)}50%{opacity:1; transform:scale(1.2)}}
  `;
  document.head.appendChild(style);

  // ===== Create Dots =====
  function createDots() {
    let container = document.getElementById('borderDots');
    if(!container){
      container = document.createElement('div');
      container.id = 'borderDots';
      container.className = 'border-dots';
      document.body.appendChild(container);
    }
    container.innerHTML = '';
    dots = [];

    const w = window.innerWidth - MARGIN*2;
    const h = window.innerHeight - MARGIN*2;
    const positions = [];

    for(let x=MARGIN; x<=w; x+=SPACING) positions.push([x, MARGIN]);        // top
    for(let y=MARGIN; y<=h; y+=SPACING) positions.push([w, y]);            // right
    for(let x=w; x>=MARGIN; x-=SPACING) positions.push([x, h]);            // bottom
    for(let y=h; y>=MARGIN; y-=SPACING) positions.push([MARGIN, y]);       // left

    positions.forEach((pos,i)=>{
      const d = document.createElement('div');
      d.className = 'dot twinkle';
      d.style.left = pos[0]+'px';
      d.style.top = pos[1]+'px';
      const color = LIGHT_COLORS[i % LIGHT_COLORS.length];
      d.style.color = color;
      d.style.backgroundColor = color;
      d.style.boxShadow = `0 0 10px ${color}, 0 0 20px ${color}`;
      d.style.opacity = 1;
      d.style.animationDelay = (Math.random()*2)+'s';
      container.appendChild(d);
      dots.push(d);
    });
  }

  // ===== Animations =====
  function stopAnimation() {
    clearInterval(chaseInterval);
    chaseInterval = null;
    clearTimeout(timeoutHandle);
    timeoutHandle = null;
    dots.forEach(d=>{
      d.className = 'dot';
      d.style.opacity = 0;
    });
  }

  function startChase(duration=MODE_DURATION){
    stopAnimation();
    mode = 'chase';
    chaseIndex = 0;
    const totalSteps = dots.length * CHASE_LAPS;
    dots.forEach(d => { d.style.opacity=1; d.className='dot chase'; });

    chaseInterval = setInterval(()=>{
      dots.forEach(d=>d.classList.remove('on'));
      for(let i=0;i<6;i++){
        const idx = (chaseIndex-i+dots.length)%dots.length;
        const d = dots[idx];
        if(d){
          d.classList.add('on');
          const color = LIGHT_COLORS[(chaseIndex+i)%LIGHT_COLORS.length];
          d.style.color = color;
          d.style.backgroundColor = color;
          d.style.boxShadow = `0 0 12px ${color},0 0 25px ${color}`;
        }
      }
      chaseIndex++;
      if(chaseIndex >= totalSteps) stopAnimation();
    }, CHASE_SPEED);
    timeoutHandle = setTimeout(stopAnimation, duration);
  }

  function startGlow(){
    stopAnimation();
    mode = 'glow';
    dots.forEach((d,i)=>{
      d.className='dot glow';
      const color = LIGHT_COLORS[i % LIGHT_COLORS.length];
      d.style.color = color;
      d.style.backgroundColor = color;
      d.style.boxShadow = `0 0 10px ${color},0 0 20px ${color}`;
      d.style.opacity = 1;
    });
  }

  function startTwinkle(){
    stopAnimation();
    mode = 'twinkle';
    dots.forEach((d,i)=>{
      d.className='dot twinkle';
      const color = LIGHT_COLORS[i % LIGHT_COLORS.length];
      d.style.color = color;
      d.style.backgroundColor = color;
      d.style.boxShadow = `0 0 10px ${color},0 0 20px ${color}`;
      d.style.opacity = 1;
      d.style.animationDelay = (Math.random()*2)+'s';
    });
  }

  // ===== Init =====
  function init() {
    createDots();
    startTwinkle();   // default mode
  }

  window.addEventListener('load', init);
  window.addEventListener('resize', ()=>{
    createDots();
    startTwinkle();
  });

})();


</script>
