<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
:root{
  --paper:#e9e9e9;
  --outer:#b28ae8;
  --rule:#3f74ad;
  --red:#b82b2b;

  --pageW:852px;
  --pageH:1081px;

  --row:34px;
}

*{box-sizing:border-box;touch-action:none;}

html,body{
  margin:0;
  background:#dff2ff;
}

body{
  display:flex;
  justify-content:center;
}

.frame{
  background:var(--outer);
  padding:8px;
}

.page{
  position:relative;
  width:var(--pageW);
  height:var(--pageH);
  background:var(--paper);
  overflow:hidden;
  font-family:"Comic Sans MS",cursive;
}

.lines{
  position:absolute;
  inset:0;

  background:repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent calc(var(--row) - 2px),
    var(--rule) calc(var(--row) - 1px),
    var(--rule) var(--row)
  );

  -webkit-mask-image:linear-gradient(
    to bottom,
    transparent 0,
    transparent calc(var(--row)*3),
    black calc(var(--row)*3),
    black 100%
  );

  mask-image:linear-gradient(
    to bottom,
    transparent 0,
    transparent calc(var(--row)*3),
    black calc(var(--row)*3),
    black 100%
  );
}

.red{
  position:absolute;
  left:135px;
  top:0;
  bottom:0;
  width:2px;
  background:var(--red);
  z-index:5;
}

.sheet{
  position:absolute;
  top:0;
  bottom:0;
  display:grid;
  grid-auto-rows:var(--row);
  align-content:start;
}
.leftSheet{
  left:0;
  width:135px;
  grid-template-columns:135px;
}

.rightSheet{
  left:135px;
  width:calc(100% - 135px);
  grid-template-columns:repeat(5,145px);
}

.cell{
  display:flex;
  align-items:center;
  padding:0 12px;
  white-space:nowrap;
  overflow:hidden;
  user-select:none;
  cursor:pointer;
  border-right:1px solid rgba(0,0,0,.35);
}

.cell.selected{
  background:rgba(90,160,255,.28);
  outline:1px solid rgba(40,100,220,.8);
}
</style>
</head>

<body>

<div class="frame">
<div class="page">

<div class="lines"></div>
<div class="red"></div>

<div class="sheet leftSheet" id="left"></div>
<div class="sheet rightSheet" id="right"></div>

</div>
</div>

<script>

/* ---------------- RAW TEXT ---------------- */

const rawLeft = `

1

26 May 2026
Unit 1
Hobbies





27 May 2026
Unit 1
go
play
have
do
always
sometimes
never



`;

const rawRight = `




video gaming
listening to music
watching movies
football
basketball
drawing
swimming
photography
dancing
badminton
volleyball
reading
running
cycling
singing
table tennis
art
playing guitar
card games
chess
traveling
cooking
baking
board games
writing
playing piano
skateboarding
martial arts
collecting
painting



How
often
do
you
go
to
the
cinema?

I
sometimes
go
to
the
cinema.


How
often
do
you
play
chess?

I
always
play
chess.


How
often
do
you
have
nightmares?

I
never
have
nightmares.
`;

/* ---------------- CONFIG ---------------- */

const ROWS = Math.ceil(1081 / 34);
const COLS = 5;

/* ---------------- STATE ---------------- */

const leftEl=document.getElementById("left");
const rightEl=document.getElementById("right");

let dragging=false;
let editing=false;

let sel=null;
let anchor=null;

/* ---------------- PARSERS ---------------- */

function parseLeft(raw){
  return raw.replace(/\r/g,"").split("\n");
}

/* workflow parser */
function parseRight(raw){

  const lines = raw.replace(/\r/g,"").split("\n");

  const rows=[];

  let current=Array(COLS).fill("");
  let col=0;

  function flush(){
    rows.push(current);
    current=Array(COLS).fill("");
    col=0;
  }

  let blankCount=0;

  for(const line of lines){

    const t=line.trim();

    if(t===""){
      blankCount++;
      continue;
    }

    if(blankCount>0){

      if(col>0){
        flush();
      }

      for(let i=1;i<blankCount;i++){
        rows.push(Array(COLS).fill(""));
      }

      blankCount=0;
    }

    current[col]=t;
    col++;

    if(col>=COLS){
      flush();
    }
  }

  if(blankCount>0){

    if(col>0){
      flush();
    }

    for(let i=1;i<blankCount;i++){
      rows.push(Array(COLS).fill(""));
    }
  }

  if(col>0 || rows.length===0){
    rows.push(current);
  }

  return rows;
}

const leftRows=parseLeft(rawLeft);
const rightRows=parseRight(rawRight);

/* ---------------- SELECTION ---------------- */

function clearSelection(){
  document
    .querySelectorAll(".cell.selected")
    .forEach(c=>c.classList.remove("selected"));
}

function select(cell){

  clearSelection();

  cell.classList.add("selected");

  sel={
    r1:+cell.dataset.r,
    r2:+cell.dataset.r,
    c1:+(cell.dataset.c||0),
    c2:+(cell.dataset.c||0),
    side:cell.dataset.side
  };

  anchor=cell;
}

function selectRange(a,b){

  if(a.dataset.side!==b.dataset.side)return;

  const side=a.dataset.side;

  sel={
    r1:Math.min(+a.dataset.r,+b.dataset.r),
    r2:Math.max(+a.dataset.r,+b.dataset.r),
    c1:Math.min(+(a.dataset.c||0),+(b.dataset.c||0)),
    c2:Math.max(+(a.dataset.c||0),+(b.dataset.c||0)),
    side
  };

  clearSelection();

  const target=side==="L"?leftEl:rightEl;

  for(let r=sel.r1;r<=sel.r2;r++){
    for(let c=sel.c1;c<=sel.c2;c++){

      const el=target.querySelector(
        side==="L"
        ? `[data-r="${r}"][data-side="L"]`
        : `[data-r="${r}"][data-c="${c}"][data-side="R"]`
      );

      if(el) el.classList.add("selected");
    }
  }
}

/* ---------------- COPY CUT PASTE ---------------- */

function copy(){

  if(!sel)return;

  const target=sel.side==="L"?leftEl:rightEl;

  const out=[];

  for(let r=sel.r1;r<=sel.r2;r++){

    const row=[];

    for(let c=sel.c1;c<=sel.c2;c++){

      const el=target.querySelector(
        sel.side==="L"
        ? `[data-r="${r}"][data-side="L"]`
        : `[data-r="${r}"][data-c="${c}"][data-side="R"]`
      );

      row.push(el?.textContent||"");
    }

    out.push(row.join("\t"));
  }

  navigator.clipboard.writeText(out.join("\n"));
}

function cut(){
  copy();
  clearCells();
}

function paste(text){

  if(!sel)return;

  const rows=text
    .replace(/\r/g,"")
    .split("\n")
    .map(r=>r.split("\t"));

  const target=sel.side==="L"?leftEl:rightEl;

  rows.forEach((row,r)=>{

    row.forEach((value,c)=>{

      const el=target.querySelector(
        sel.side==="L"
        ? `[data-r="${sel.r1+r}"][data-side="L"]`
        : `[data-r="${sel.r1+r}"][data-c="${sel.c1+c}"][data-side="R"]`
      );

      if(el) el.textContent=value;
    });

  });
}

function clearCells(){

  if(!sel)return;

  const target=sel.side==="L"?leftEl:rightEl;

  for(let r=sel.r1;r<=sel.r2;r++){
    for(let c=sel.c1;c<=sel.c2;c++){

      const el=target.querySelector(
        sel.side==="L"
        ? `[data-r="${r}"][data-side="L"]`
        : `[data-r="${r}"][data-c="${c}"][data-side="R"]`
      );

      if(el) el.textContent="";
    }
  }
}

/* ---------------- EDIT ---------------- */

function edit(cell){

  editing=true;

  cell.contentEditable=true;

  cell.focus();

  document.execCommand("selectAll");

  cell.onblur=()=>{
    editing=false;
    cell.contentEditable=false;
  };
}

/* ---------------- RENDER ---------------- */

function render(){

leftEl.innerHTML="";
rightEl.innerHTML="";

for(let r=0;r<ROWS;r++){

const L=document.createElement("div");

L.className="cell";
L.dataset.side="L";
L.dataset.r=r;

L.textContent=leftRows[r]??"";

L.onpointerdown=()=>{
dragging=true;
select(L);
};

L.onpointerenter=()=>{
if(dragging&&anchor?.dataset.side==="L"){
selectRange(anchor,L);
}
};

L.ondblclick=()=>edit(L);

leftEl.appendChild(L);

for(let c=0;c<COLS;c++){

const R=document.createElement("div");

R.className="cell";
R.dataset.side="R";
R.dataset.r=r;
R.dataset.c=c;

R.textContent=rightRows[r]?.[c]??"";

R.onpointerdown=()=>{
dragging=true;
select(R);
};

R.onpointerenter=()=>{
if(dragging&&anchor?.dataset.side==="R"){
selectRange(anchor,R);
}
};

R.ondblclick=()=>edit(R);

rightEl.appendChild(R);

}

}

}

document.addEventListener("pointerup",()=>dragging=false);

document.addEventListener("copy",e=>{
copy();
e.preventDefault();
});

document.addEventListener("paste",e=>{
if(editing)return;
paste(e.clipboardData.getData("text"));
e.preventDefault();
});

document.addEventListener("keydown",e=>{

if(editing)return;

if((e.ctrlKey||e.metaKey)&&e.key==="x"){
cut();
e.preventDefault();
}

if(e.key==="Delete"||e.key==="Backspace"){
clearCells();
e.preventDefault();
}

});

render();

(function(){

const hotspot=document.createElement("div");

Object.assign(hotspot.style,{
position:"absolute",
top:"0",
right:"0",
width:"80px",
height:"80px",
zIndex:"9999"
});

hotspot.onclick=()=>{
clearSelection();
sel=null;
anchor=null;
};

document.querySelector(".page")
.appendChild(hotspot);

})();

</script>

</body>
</html>
