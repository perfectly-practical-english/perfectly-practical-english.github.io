<style>

/* PAGE BASE */

<script>
async function resolveRaw(source) {
  // If it looks like inline content, return it directly
  if (source.includes('\n')) return source.trim();

  // Otherwise, treat it as a filename and fetch it
  const res = await fetch(source);
  if (!res.ok) throw new Error("Failed to load " + source);
  return (await res.text()).trim();
}
</script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// --- Starfield ---
const canvas = document.getElementById('terrainCanvas');
const ctx = canvas.getContext('2d');
canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
const stars = [];
for(let i=0;i<200;i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, z: Math.random()*2+0.5});
function drawStarfield(){
  ctx.fillStyle='black'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let s of stars){
    s.x -= 0.5*s.z;
    if(s.x<0){ s.x=canvas.width; s.y=Math.random()*canvas.height; s.z=Math.random()*2+0.5; }
    ctx.fillStyle='white'; ctx.fillRect(s.x,s.y,s.z,s.z);
  }
  requestAnimationFrame(drawStarfield);
}
drawStarfield();

<script>
/* =========================================
   HARD SECTION CORPUS OVERRIDE (MC-IMMUNE)
   ========================================= */

(function () {

  // Preserve original full text
  const FULL_TEXT = window.wordListText;

  // Active corpus exposed globally
  window.activeExerciseText = "";

  // 🔥 OVERRIDE wordListText dynamically
  Object.defineProperty(window, "wordListText", {
    get() {
      return window.activeExerciseText || FULL_TEXT;
    },
    set(val) {
      // allow initial assignment only
      window._wordListText = val;
    }
  });

  // Listen for section changes
window.addEventListener("sectionchange", (e) => {
  const sectionText = e.detail?.text || "";

  // Build sentences ONLY from section
  sentences.length = 0;
  allCorrectAnswers.length = 0;

  const lines = sectionText
    .split("\n")
    .map(s => s.trim())
    .filter(Boolean);

  lines.forEach(line => {
    if (!line.includes("|")) return;
    sentences.push(line);

    const matches = line.match(/\|(.+?)\|/g);
    if (matches) {
      matches.forEach(m =>
        allCorrectAnswers.push(m.replace(/\|/g, ""))
      );
    }
  });

  allCorrectAnswers = [...new Set(allCorrectAnswers)];

  // Reset runtime state
  nextSentenceIndex = 0;
  activeSentences.length = 0;
  totalWords = 0;
  correctWords = 0;

  // Clear UI
  mcButtonsContainer.innerHTML = "";
  typedDisplay.textContent = "";

  console.log("✅ Section locked:", e.detail.name);
});

<script>
/* =========================================
   SECTION DIAL — SCROLL + CLICK ONLY
   (SECTION-SCOPED, MC-SAFE, AUTO-TRIGGERING)
   ========================================= */

(function () {

  const ITEM_HEIGHT = 38;

  let sections = [];
  let currentIndex = 0; // 0 = placeholder
  let offset = 0;
  let startY = 0;
  let dragging = false;

  /* ---------- GLOBAL MC POOL (SECTION ONLY) ---------- */
  window.sectionAnswerPool = [];

  function rebuildMCPool(sectionText) {
    window.sectionAnswerPool = sectionText
      .split("\n")
      .map(line => {
        const m = line.match(/\|([^|]+)\|/);
        return m ? m[1] : null;
      })
      .filter(Boolean);

    // DEBUG — remove later
    console.log("MC pool rebuilt (section only):", window.sectionAnswerPool);
  }

  /* ---------- PARSE SECTIONS (STRICT ~ BOUNDARIES) ---------- */
  function parseSections(raw) {
    const chunks = raw.split(/\n(?=~+)/);

    return chunks
      .map(chunk => chunk.trim())
      .filter(chunk => chunk.startsWith("~"))
      .map(chunk => {
        const lines = chunk.split("\n");
        const name = lines.shift().replace(/^~+/, "").trim();
        const text = lines.join("\n").trim();
        return { name, text };
      });
  }

  const parsedSections = parseSections(window.__RAW_SECTION_TEXT__);


  sections = [
    { name: "Select a category.", text: "" },
    ...parsedSections
  ];

  /* ---------- BUILD UI ---------- */
  const container = document.getElementById("sectionWheelContainer");


// ▲ / ▼ BUTTONS
const btnUp = document.getElementById("sectionUp");
const btnDown = document.getElementById("sectionDown");

btnUp.addEventListener("click", () => {
  if (currentIndex > 1) {   // prevent placeholder
    currentIndex--;        // move UP the list
    snap(true);
  }
});

btnDown.addEventListener("click", () => {
  if (currentIndex < sections.length - 1) {
    currentIndex++;        // move DOWN the list
    snap(true);
  }
});
  container.style.cssText = `
    position: relative;
    height: ${ITEM_HEIGHT}px;
    overflow: hidden;
    margin-bottom: 10px;
    touch-action: pan-y;
    cursor: pointer;
  `;

  const wheel = document.createElement("div");
  wheel.style.cssText = `
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    will-change: transform;
  `;

  sections.forEach((sec, index) => {
    const item = document.createElement("div");
    item.textContent = sec.name;
    item.style.cssText = `
      height: ${ITEM_HEIGHT}px;
      line-height: ${ITEM_HEIGHT}px;
      text-align: center;
      font-size: ${index === 0 ? "14px" : "15px"};
      font-style: ${index === 0 ? "italic" : "normal"};
      color: ${index === 0 ? "#999" : "#777"};
      user-select: none;
      white-space: nowrap;
    `;

    item.addEventListener("click", () => {
      currentIndex = index;
      snap(true);
    });

    wheel.appendChild(item);
  });

  container.appendChild(wheel);

  /* ---------- UPDATE ---------- */
function update() {
  wheel.style.transform = `translateY(${offset}px)`;

  const rawIndex = -offset / ITEM_HEIGHT;
  const snappedIndex = Math.round(rawIndex);

  currentIndex = Math.max(
    0,
    Math.min(sections.length - 1, snappedIndex)
  );

  [...wheel.children].forEach((el, i) => {
    if (i === currentIndex && i !== 0) {
      el.style.color = "#1f5fbf";
      el.style.fontWeight = "700";
    } else {
      el.style.color = i === 0 ? "#999" : "#777";
      el.style.fontWeight = "600";
    }
  });
}

  function fireSectionChange() {
    if (currentIndex === 0) return;

    const section = sections[currentIndex];

    window.sectionSelectionChanged = true;

    // 🔑 BUILD MC POOL HERE
    rebuildMCPool(section.text);

    window.dispatchEvent(new CustomEvent("sectionchange", {
      detail: {
        index: currentIndex,
        name: section.name,
        text: section.text
      }
    }));
  }

  function snap(fireEvent = false) {
    offset = -currentIndex * ITEM_HEIGHT;
    wheel.style.transition = "transform 0.15s ease-out";
    update();
    setTimeout(() => wheel.style.transition = "", 150);

    if (fireEvent) {
      fireSectionChange();
    }
  }

  /* ---------- DRAG ---------- */
  function start(y) {
    dragging = true;
    startY = y;
  }

  function move(y) {
    if (!dragging) return;
    offset += y - startY;
    startY = y;
    update();
  }

  function end() {
    if (!dragging) return;
    dragging = false;
    snap(true);
  }

  container.addEventListener("mousedown", e => start(e.clientY));
  window.addEventListener("mousemove", e => move(e.clientY));
  window.addEventListener("mouseup", end);

  container.addEventListener("touchstart", e => start(e.touches[0].clientY), { passive: true });
  container.addEventListener("touchmove", e => move(e.touches[0].clientY), { passive: true });
  container.addEventListener("touchend", end);

  /* ---------- MOUSE WHEEL ---------- */
  container.addEventListener("wheel", e => {
    e.preventDefault();
    offset += e.deltaY * -0.3;
    update();
    snap(true);
  }, { passive: false });

  /* ---------- INIT ---------- */
  offset = 0;
  update();

// ✅ START ON PLACEHOLDER
currentIndex = 0;
offset = 0;
update();

  /* ---------- SECTION SELECTION BRIDGE ---------- */
  window.getSelectedSectionText = function () {
    if (currentIndex === 0) return "";
    return sections[currentIndex]?.text || "";
  };

  window.getSelectedSectionIndex = function () {
    return currentIndex;
  };

})();
</script>











<script>

// OPTION B: External file (uncomment to use)
// const wordListSource = 'sentences.txt';

let sentences = [];

let contentReady = false;
window.sentences = sentences; // 🔒 ensure global sync
let allCorrectAnswers = []; // rebuilt on every sectionchange

 // <-- NEW: store unique correct answers
let mcOptionCount = 8; // total number of buttons (1 correct + 1 distractor)


(async () => {
  try {
    const raw = await resolveRaw(wordListSource);
    sentences = raw
      .split('\n')
      .map(s => s.trim())
      .filter(Boolean);

    // Extract all unique answers inside |
    const answerSet = new Set();
    sentences.forEach(s => {
      const matches = s.match(/\|(.+?)\|/g);
      if (matches) {
        matches.forEach(m => answerSet.add(m.replace(/\|/g, '')));
      }
    });
    allCorrectAnswers = Array.from(answerSet);

    if (!sentences.length) {
      throw new Error("No sentences loaded");
    }

    contentReady = true;
    console.log("Sentences loaded:", sentences);
    console.log("Unique correct answers:", allCorrectAnswers);
  } catch (err) {
    console.error("Failed to load word list:", err);
    alert("Error loading game content.");
  }
})();



const gameArea=document.getElementById('gameArea');
const typedDisplay=document.getElementById('typedDisplay');
const mcButtonsContainer=document.getElementById('mcButtonsContainer');
const startBtn=document.getElementById('startBtn');

const submitBtn=document.getElementById('submitBtn');
const nameInput=document.getElementById('nameInput');
const idInput=document.getElementById('idInput');
const scoreboardContainer=document.getElementById('scoreboardContainer');
const scoreButtons=document.getElementById('scoreButtons');
const popSound=document.getElementById('popSound');
const plane=document.getElementById('plane');

let activeSentences=[], dropInterval=null, dropTickTime=25, gameStarted=false;

let totalWords=0, correctWords=0, nextSentenceIndex=0;
let planeY=gameArea.clientHeight/2, driftFrame=0;
const rocketLeftOffset = 10*3.78;

// --- Plane & Laser Burst ---
// --- Plane & Laser Burst ---
function spawnPlaneBurst(){
  const planeRect = plane.getBoundingClientRect();
  const gaRect = gameArea.getBoundingClientRect();
  const startX = planeRect.right - gaRect.left - 5; // tip of rocket
  const startY = planeRect.top - gaRect.top + planeRect.height/3;
  const laserLength = 200; // horizontal length
  const numDots = 25;

  for(let i=0;i<numDots;i++){
    setTimeout(()=>{
      const dot = document.createElement('div');
      dot.textContent = '-';
      dot.style.position = 'absolute';
      dot.style.color = 'white'; // white laser
      dot.style.fontSize = '18px';
      dot.style.left = startX + (laserLength/numDots)*i + 'px';
      dot.style.top = startY + 'px'; // horizontal, no vertical change
      dot.style.opacity = 1;
      dot.style.transition = 'all 0.3s linear';
      dot.style.zIndex = 4;
      gameArea.appendChild(dot);

      setTimeout(()=>{dot.style.opacity=0;},100);
      setTimeout(()=>{if(dot.parentNode) dot.parentNode.removeChild(dot);},400);
    }, i*10);
  }
}
// --- Spawn Sentences ---
function spawnSentence(text){
  if(!text.includes('|')) return;
  const span=document.createElement('span'); span.className='sentence'; span.innerHTML='';
  const parts=text.split(/\|(.+?)\|/);
  let blanks=[];
  for(let i=0;i<parts.length;i++){
    if(i%2===0) span.appendChild(document.createTextNode(parts[i]));
    else{
      const b=document.createElement('span'); b.className='blank';
      b.dataset.answer=parts[i]; b.textContent=''; blanks.push({elem:b,answered:false});
      span.appendChild(b);
    }
  }
  gameArea.appendChild(span);
  const minY = gameArea.clientHeight*0.1;
  const maxY = gameArea.clientHeight*0.5 - span.offsetHeight;
  span.style.top = (Math.random()*(maxY-minY)+minY)+'px';
  span.style.left = gameArea.clientWidth+30+'px';
  activeSentences.push({span,x:parseFloat(span.style.left),speed:-0.45-Math.random()*0.2,blanks,finished:false});
  totalWords++;
  generateMCButtons(blanks[0].elem.dataset.answer);
}

function generateMCButtons(correct) {
    mcButtonsContainer.innerHTML = '';

    // Create a copy of all unique answers except the correct one
    let distractors = allCorrectAnswers.filter(a => a !== correct);

    const numDistractors = Math.min(mcOptionCount - 1, distractors.length);
    let choices = [correct];

    for (let i = 0; i < numDistractors; i++) {
        const idx = Math.floor(Math.random() * distractors.length);
        choices.push(distractors.splice(idx, 1)[0]);
    }

    // Shuffle buttons
    choices.sort(() => Math.random() - 0.5);

    // Determine rows: split into two if more than 4 buttons
    const row1Count = choices.length > 4 ? Math.ceil(choices.length / 2) : choices.length;
    const row2Count = choices.length > 4 ? choices.length - row1Count : 0;

    // Create row containers
    const row1 = document.createElement('div');
    row1.style.display = 'flex';
    row1.style.justifyContent = 'center';
    row1.style.gap = '10px';
    row1.style.marginBottom = row2Count > 0 ? '2px' : '0';
    row1.style.width = '100%';  // 🔹 ensures row centers properly

    const row2 = document.createElement('div');
    row2.style.display = 'flex';
    row2.style.justifyContent = 'center';
    row2.style.gap = '10px';
    row2.style.width = '100%';  // 🔹 ensures row centers properly

    choices.forEach((choice, i) => {
        const btn = document.createElement('button');
        btn.textContent = choice;
        btn.dataset.used = 'false';
        btn.onclick = () => handleMCAnswer(choice, correct, btn);

        if (i < row1Count) row1.appendChild(btn);
        else row2.appendChild(btn);
    });

    mcButtonsContainer.appendChild(row1);
    if (row2Count > 0) mcButtonsContainer.appendChild(row2);

    mcButtonsContainer.style.display = 'flex';
    mcButtonsContainer.style.flexDirection = 'column';
    mcButtonsContainer.style.alignItems = 'center';

    // 🔹 Make all buttons the same width
    unifyMCButtonWidths();
}


// --- MC Answer ---
function handleMCAnswer(selected, correct, btn) {
    const targetSentence = activeSentences.find(s => !s.finished);
    if (!targetSentence) return;
    const blank = targetSentence.blanks[0];

    // Record typed selection
    typedDisplay.textContent = selected;

    // Only first click counts
    if (!blank.answered) {
        blank.answered = true;

        if (selected === correct) {
            // Correct feedback
            btn.style.backgroundColor = 'green';
            blank.elem.textContent = correct;
            blank.elem.classList.add('expand');

            // Trigger plane burst and sound
            spawnPlaneBurst();
            popSound.currentTime = 0;
            popSound.play().catch(() => {});

            correctWords++;

            const spanRect = targetSentence.span.getBoundingClientRect();
            const gaRect = gameArea.getBoundingClientRect();
            plane.style.display = 'block';
            planeY = spanRect.top - gaRect.top + spanRect.height / 2;
            plane.style.top = planeY - plane.offsetHeight / 2 + 'px';

            setTimeout(() => blank.elem.classList.remove('expand'), 200);

            // Remove sentence after short delay
            setTimeout(() => {
                if (targetSentence.span.parentNode) {
                    targetSentence.span.parentNode.removeChild(targetSentence.span);
                }
                targetSentence.finished = true;
                typedDisplay.textContent = '';
                mcButtonsContainer.innerHTML = '';

                // Rocket exit if last sentence
                if (nextSentenceIndex >= sentences.length &&
                    activeSentences.filter(s => !s.finished).length === 0) {
                    accelerateRocketExit();
                }
            }, 400);
        } else {
            // Incorrect feedback
            btn.style.backgroundColor = 'red';
            typedDisplay.textContent = '✗';
            setTimeout(() => typedDisplay.textContent = '', 500);
        }
    } else {
        // Optional: highlight correct answer if user clicks again
        if (selected === correct) {
            btn.style.backgroundColor = 'green';
            blank.elem.textContent = correct;
        } else {
            btn.style.backgroundColor = 'red';
        }
    }
}


// --- Rocket exit after last sentence ---
function accelerateRocketExit(){
  let speed = 2;
  const exitInterval = setInterval(()=>{
    let left = parseFloat(plane.style.left);
    left += speed;
    speed *= 1.05; // accelerate
    plane.style.left = left+'px';
    if(left > gameArea.clientWidth){
      clearInterval(exitInterval);
    }
  },20);
}

// --- Drop Sentences ---
function dropSentences(){
  if(!gameStarted) return;
  const gaRect=gameArea.getBoundingClientRect();
  activeSentences.forEach(s=>{
    if(s.finished) return;
    s.x+=s.speed;
    s.span.style.left=s.x+'px';
    // Fade out as it goes under rocket
    const planeRect = plane.getBoundingClientRect();
    const spanRect = s.span.getBoundingClientRect();
    if(spanRect.right > planeRect.left && spanRect.left < planeRect.right){
      s.span.style.opacity = 0.3;
    } else s.span.style.opacity = 1;
    if(s.x+s.span.offsetWidth<0){ s.finished=true; if(s.span.parentNode) s.span.parentNode.removeChild(s.span); mcButtonsContainer.innerHTML=''; }
  });
  activeSentences=activeSentences.filter(s=>!s.finished);
  if(nextSentenceIndex<sentences.length && !activeSentences.some(s=>!s.finished)){
    spawnSentence(sentences[nextSentenceIndex]);
    nextSentenceIndex++;
  }
  if(activeSentences.length>0){
    const target=activeSentences[0];
    const rect=target.span.getBoundingClientRect();
    const sentenceY=rect.top-gaRect.top+rect.height/2;
    planeY+=(sentenceY-planeY)*0.1;
  } else planeY+=Math.sin(driftFrame/10)*2;
  driftFrame++;
  plane.style.top=planeY-plane.offsetHeight/2+'px';
}

// --- Game Controls ---
function startGame() {
  if (!contentReady) {
    alert("Game content is still loading. Please try again.");
    return;
  }

  if (gameStarted) return;

  if (!nameInput.value.trim() || !idInput.value.trim()) {
    alert('Enter Name and ID.');
    return;
  }

  // Reset game state
  resetGame();
  gameStarted = true;
  gameStopped = false;
  startBtn.disabled = true;
  submitBtn.disabled = false;
  nextSentenceIndex = 0;

  // Start continuous swoosh immediately
  swoosh.start();

  // Prepare plane for intro animation
  plane.style.display = 'block';
  plane.style.left = (-100 - rocketLeftOffset) + 'px';
  planeY = gameArea.clientHeight / 2;
  plane.style.top = planeY + 'px';

  // Intro animation: move plane into starting position
  let leftPos = -100;
  const introAnim = setInterval(() => {
    leftPos += 5;
    plane.style.left = (leftPos - rocketLeftOffset) + 'px';
    if (leftPos >= 50) {
      clearInterval(introAnim);
      dropInterval = setInterval(dropSentences, dropTickTime);
    }
  }, 20);
}

function submitResults() {
  if (!gameStarted) return;

  // End gameplay
  gameStarted = false;
  clearInterval(dropInterval);

  startBtn.disabled = false;
  submitBtn.disabled = true;

  // 🚀 Fly plane straight UP and out, then stop swoosh
  let exitY = planeY;

  const exitInterval = setInterval(() => {
    exitY -= 6;
    plane.style.top = exitY + 'px';

    if (exitY + plane.offsetHeight < 0) {
      clearInterval(exitInterval);
      swoosh.stop(); // stop sound AFTER plane leaves
    }
  }, 20);

  // Build scoreboard line
  const pct = totalWords
    ? Math.round((correctWords / totalWords) * 100)
    : 0;

  const dateStr = new Date().toLocaleDateString();
  const fileName =
    location.pathname.split('/').pop() || 'UnknownFile.html';

  const scoreLine =
    `${fileName}|${nameInput.value.trim()}|${idInput.value.trim()}|` +
    `${dateStr}|${correctWords}/${totalWords}|${pct}%`;

  scoreboardContainer.textContent = scoreLine;
scoreButtons.style.display = 'flex';
saveResult(scoreLine);
}

// --- Score Buttons ---
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard

document.getElementById('downloadTxtBtn').addEventListener('click', () => {

function resetGame() {
  activeSentences.forEach(s => {
    if (s.span.parentNode) s.span.parentNode.removeChild(s.span);
  });
  activeSentences = [];
  planeY = gameArea.clientHeight / 2;
  plane.style.top = planeY + 'px';
  plane.style.display = 'none';
  plane.style.left = (10 - rocketLeftOffset) + 'px';
  totalWords = 0;
  correctWords = 0;
  typedDisplay.textContent = '';

  mcButtonsContainer.innerHTML = '';
}

startBtn.addEventListener('click', startGame);

<script>
class AsteroidZSwoosh {
    constructor() {
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const bufferSize = 2 * this.audioCtx.sampleRate;
        const noiseBuffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }

        this.noise = this.audioCtx.createBufferSource();
        this.noise.buffer = noiseBuffer;
        this.noise.loop = true;

        this.filter = this.audioCtx.createBiquadFilter();
        this.filter.type = 'lowpass';
        this.filter.frequency.value = 1200; // base swoosh tone

        this.gainNode = this.audioCtx.createGain();
        this.gainNode.gain.value = 0;

        this.noise.connect(this.filter);
        this.filter.connect(this.gainNode);
        this.gainNode.connect(this.audioCtx.destination);

        this.noise.start();
        this.maxGain = 0.2;
    }

    start() {
        if (this.audioCtx.state === 'suspended') {
            this.audioCtx.resume();
        }
        const now = this.audioCtx.currentTime;
        this.gainNode.gain.cancelScheduledValues(now);
        this.gainNode.gain.setValueAtTime(this.gainNode.gain.value, now);
        this.gainNode.gain.linearRampToValueAtTime(this.maxGain, now + 0.1);
    }

    stop() {
        const now = this.audioCtx.currentTime;
        this.gainNode.gain.cancelScheduledValues(now);
        this.gainNode.gain.setValueAtTime(this.gainNode.gain.value, now);
        this.gainNode.gain.linearRampToValueAtTime(0, now + 1);
    }

    // 🎛️ LIVE FREQUENCY CONTROL
    setFrequency(freq) {
        this.filter.frequency.setValueAtTime(
            freq,
            this.audioCtx.currentTime
        );
    }
}

const swoosh = new AsteroidZSwoosh();

// --- Ensure all MC buttons are equal width ---
function unifyMCButtonWidths() {
    const allBtns = mcButtonsContainer.querySelectorAll('button');
    let maxWidth = 0;

    // Find the widest button
    allBtns.forEach(btn => {
        btn.style.width = 'auto'; // reset first
        const w = btn.offsetWidth;
        if (w > maxWidth) maxWidth = w;
    });

    // Apply the max width to all buttons
    allBtns.forEach(btn => {
        btn.style.width = maxWidth + 'px';
    });
}

</script>

How to play...

/* =========================
   RAW TEXT PARSER
========================= */

function parseRawInstructions(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const html = [];

  lines.forEach(line => {

    if(line === "---"){
      html.push(`<hr>`);
      return;
    }

    if(/^\d+\./.test(line)){
      html.push(`<p>${line}</p>`);
      return;
    }

    if(!/[.!?:]$/.test(line)){
      html.push(`<h3>${line}</h3>`);
      return;
    }

    html.push(`<p>${line}</p>`);
  });

  return html.join("");
}

(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
