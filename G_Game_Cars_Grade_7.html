<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AntZ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
html, body { height: 100%; width: 100%; }
body {
background: linear-gradient(to bottom, #dcdcdc 0%, #2f2f2f 45%, #dcdcdc 100%);
  

display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0;
  overflow-x: hidden;
}


/* ===============================
   GLOBAL BUTTON STYLE (MASTER)
   =============================== */
button {
  display: inline-flex;
  align-items: center;
  justify-content: center;

  height: 36px;
  padding: 0 12px;
  min-width: 80px;

  font-size: 12px;
  line-height: 1;

  background: 2b5d84;
  color: #444;

  border: none;
  border-radius: 6px;

  cursor: pointer;
  user-select: none;

  transition: background 0.15s ease, transform 0.1s ease;
}

button:hover:not(:disabled) { background: #0277bd; }
button:active:not(:disabled) { transform: scale(0.97); }
button:disabled { background:#888; cursor:not-allowed; }

/* ===============================
   TOP FIELDS
   =============================== */
#topFields {
  display:flex;
  gap:6px;
  align-items:center;
  justify-content: center;
  margin-top:20px;
  margin-bottom:10px;
  width: 100%;
  max-width: 400px;
}

#topFields input {
  flex: 1;
  min-width: 0;
  padding:8px;
  border:1px solid #ccc;
  border-radius:4px;
  font-size:14px;
}

.countdownOverlay {
  margin-left:6px;
  font-size:14px;
  color:#333;
  white-space: nowrap;
}

/* ===============================
   CONVEYOR
   =============================== */
#conveyorContainer {
  position: relative;
  overflow: visible;          /* allow taller content */
  margin-top: 10px;

  height: 90px;               /* ⬅ taller container */

  width: 100vw;
  display: flex;
  align-items: flex-end;      /* ⬅ baseline stays at bottom */
  margin-bottom: 10px;
}


#conveyor {
  display:flex;
  gap:6px;
  white-space:nowrap;
  will-change:transform;
  position:absolute;
  left:0;
  bottom:0;
}

.tileWrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  position: relative;
  margin-top: 6px;   /* ✅ enough spacing, no clipping */
}

/* ===============================
   DROP ZONE
   =============================== */
#dropBand {
  width: 100vw;
  height: 90px;
  margin-top: 8px;
  padding: 2px 0 0;
  background: rgba(245,245,220,0.5);
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

#dropContainer {
  width: 90%;
  max-width: 600px;
  height: 84px;
  padding: 8px 10px 0;

  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-content: flex-start;

  column-gap: 6px;
  row-gap: 5px;

  overflow: hidden;
}

/* kill ant layout inside drop zone */
#dropContainer .tileWrapper {
  margin-top: 0;
  padding: 0;
  height: auto;
  flex-direction: row;
}

/* tiles */
.tile {
  padding: 8px 12px;
  background: #ffd8a8;
  border-radius: 6px;
  cursor: pointer;
  user-select: none;
  font-size: 14px;
  display: inline-block;

  margin-bottom: -7px; /* 👈 pulls tile closer to vehicle */
}

.tile:hover { transform:translateY(-1px); }

.tile.sushi {
  background: transparent;
  font-size: 30px;
  cursor: default;
  padding: 0;
  line-height: 1;
}

.ant {
  font-size:44px;
  line-height:1;
  margin-top:-4px;
  pointer-events:none;
}

/* ===============================
   CONTROLS
   =============================== */
.controls {
  display:flex;
  gap:4px;
  margin-top:20px;
  justify-content:center;
}

/* ===============================
   SECTION SELECTOR
   =============================== */
#sectionSelector {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  max-width: 400px;
  margin-bottom: 10px;
  justify-content: center;
}

/* ▲ ▼ ONLY */
#sectionUp,
#sectionDown {
  width: 36px;
  min-width: 36px;
  padding: 0;
  font-size: 14px;
}

/* selector window */
#sectionWheelContainer {
  flex: 1;
  height: 36px;
  position: relative;
  background: #fff;
  border: 1px solid #999;
  border-radius: 6px;
  overflow: hidden;
  min-width: 0;
}

#sectionWheelContainer .wheel {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: auto;
  will-change: transform;
}

.wheel-item {
  height: 36px;
  line-height: 36px;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  color: #666;
  white-space: nowrap;
}

.wheel-item.selected { color:#000; }

/* START button */
#startButton {
  min-width: 90px;
}


/* ===============================
   SCOREBOARD
   =============================== */
#scoreboard {
  margin-top:25px;
  padding:6px;
  background:#fff;
  border:1px solid #ccc;
  border-radius:6px;
  display:none;
  font-size:12px;
}

/* ===============================
   MOBILE
   =============================== */
@media (max-width: 500px) {
  #topFields {
    margin-left: 1mm;
    gap: 4px;
    justify-content: flex-start;
    width: calc(100% - 10mm);
  }

  #topFields input {
    width: 30%;
    padding: 6px;
  }

  .countdownOverlay {
    font-size: 12px;
    margin-left: auto;
  }
}

  footer {
    margin-top: 16px;
    padding: 10px 12px;
    text-align: left;
    font-size: 10px;
    color: #666;
    background: #none;
    border-radius: 6px;
  }

#skyline {
  position: fixed;
  left: 0;
  width: 100vw;
  pointer-events: none;
}


</style>
</head>

  <input type="text" id="nameField" placeholder="Name">
  <input type="text" id="idField" placeholder="ID">
  <div class="countdownOverlay" id="countdownOverlay">60</div>
</div>

<div class="controls">

<div id="scoreboard">

    <button id="copyButton">Copy</button>

</div>

<script>
/* =========================================
   UNIVERSAL RAW TEXT RESOLVER (PER BLOCK)
   ========================================= */

/**
 * resolveRaw(source)
 * - If source is a filename (single line, no newlines), load it
 * - Otherwise treat source as literal raw text
 */
async function resolveRaw(source) {
  if (typeof source === "string" && !source.includes("\n")) {
    try {
      const res = await fetch(source, { cache: "no-store" });
      if (res.ok) return await res.text();
    } catch {}
  }
  return source;
}
</script>

<script>
// Your original JS remains unchanged
const conveyor = document.getElementById('conveyor');
const dropContainer = document.getElementById('dropContainer');
const backButton = document.getElementById('backButton');
const nextButton = document.getElementById('nextButton');
const submitButton = document.getElementById('submitButton');
const startButton = document.getElementById('startButton');

const nameField = document.getElementById('nameField');
const idField = document.getElementById('idField');
const countdownOverlay = document.getElementById('countdownOverlay');
const scoreboard = document.getElementById('scoreboard');
const scoreData = document.getElementById('scoreData');

const copyButton = document.getElementById('copyButton');
const downloadTxtButton = document.getElementById('downloadTxtButton');
const downloadPngButton = document.getElementById('downloadPngButton');

function parseSections(raw) {
  const lines = raw.split('\n').map(l => l.trim());
  const sections = [];
  let current = null;

  for (const line of lines) {
    if (!line) continue;

    if (line.startsWith('~')) {
      current = {
        title: line.replace(/^~+/, '').trim(),
        lines: []
      };
      sections.push(current);
    } else if (current) {
      current.lines.push(line);
    }
  }
  return sections;
}

const rawText = document.getElementById('rawTextInput').value;
const sections = parseSections(rawText);
const wheel = document.querySelector('#sectionWheelContainer .wheel');

/* 👇 PUT FIX #5 RIGHT HERE 👇 */

let currentSectionIndex = -1; // placeholder state

let gameStarted = false;


const sectionUp = document.getElementById('sectionUp');
const sectionDown = document.getElementById('sectionDown');


sectionUp.addEventListener('click', () => {
  if (gameStarted) saveAnswer();

  if (currentSectionIndex === -1) {
    currentSectionIndex = sections.length - 1;
  } else {
    currentSectionIndex =
      (currentSectionIndex - 1 + sections.length) % sections.length;
  }

  renderSectionWheel();
});

sectionDown.addEventListener('click', () => {
  if (gameStarted) saveAnswer();

  if (currentSectionIndex === -1) {
    currentSectionIndex = 0;
  } else {
    currentSectionIndex =
      (currentSectionIndex + 1) % sections.length;
  }

  renderSectionWheel();
});

function renderSectionWheel() {
  wheel.innerHTML = '';

  // placeholder row
  const placeholder = document.createElement('div');
  placeholder.className =
    'wheel-item' + (currentSectionIndex === -1 ? ' selected' : '');
  placeholder.textContent = 'Select a topic.';
  wheel.appendChild(placeholder);

  // section titles
  sections.forEach((sec, i) => {
    const div = document.createElement('div');
    div.className =
      'wheel-item' + (i === currentSectionIndex ? ' selected' : '');
    div.textContent = sec.title;
    wheel.appendChild(div);
  });

  // scroll so selected row is centered
  wheel.style.transform =
    `translateY(${-(currentSectionIndex + 1) * 36}px)`;
}





let remainingWords = [];
let selectedTile = null;
let timer = 60, timerInterval;
const sushiEmojis = ['','','','','',''];
const vehicleEmojis = ['🚗','🚙','🚌','🚐','🛻','🚚','🚛','🛵'];
let sushiIndex = 0;
let conveyorItems = [];
let scrollPos = 0;


startButton.addEventListener('click', () => {

  if (currentSectionIndex === -1) {
    alert('Please select a topic first.');
    return;
  }
  gameStarted = true;

  currentIndex = 0;
  dropContainer.innerHTML = '';
  conveyor.innerHTML = '';
  conveyorItems = [];
  scrollPos = 0;

  renderSectionWheel();
  renderCurrent();
  startTimer();
});


requestAnimationFrame(animateConveyor);


/* 👆 END FIX #5 👆 */

let currentIndex = 0;
let userAnswers = sections.map(sec => new Array(sec.lines.length).fill(null));


function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
let maxSushiInRow = 3;

function buildConveyor(){
  conveyorItems = conveyorItems.filter(item => item && !item.consumed);
  const targetLength = 30;
  let sushiInRow = 0;

  while(conveyorItems.length < targetLength){
    const minSushiBeforeWord = 1 + Math.floor(Math.random() * 2);
    const shouldAddWord = remainingWords.length > 0 && sushiInRow >= minSushiBeforeWord;

    if(shouldAddWord){
      const w = remainingWords.shift();
      conveyorItems.push({ text: w, sushi: false, consumed: false });
      sushiInRow = 0;
      maxSushiInRow = 2 + Math.floor(Math.random() * 4);
    } else {
      const s = sushiEmojis[sushiIndex];
      sushiIndex = (sushiIndex + 1) % sushiEmojis.length;
      conveyorItems.push({ text: s, sushi: true });
      sushiInRow++;
    }
  }

  conveyor.innerHTML = '';
  conveyorItems.forEach(item=>{
    const wrapper = document.createElement('div');
    wrapper.className = 'tileWrapper';
    const tile = document.createElement('span');
    tile.className = item.sushi ? 'tile sushi' : 'tile';
    tile.textContent = item.text;
    if(!item.sushi && !item.consumed) tile.addEventListener('click',()=>addToDrop(tile,item));
    const ant = document.createElement('div');
    ant.className = 'ant';
    if(!item.vehicle) item.vehicle = vehicleEmojis[Math.floor(Math.random()*vehicleEmojis.length)];
    ant.textContent = item.vehicle;

    wrapper.appendChild(tile);
    wrapper.appendChild(ant);
    item.element = wrapper;
    conveyor.appendChild(wrapper);
  });

} // ✅ CLOSE buildConveyor()


function animateConveyor(){
  scrollPos -= 1;
  const firstItem = conveyorItems[0];
  if(firstItem && firstItem.element.getBoundingClientRect().right < conveyor.parentElement.getBoundingClientRect().left){
    conveyorItems.shift();
    conveyorItems.push(firstItem);
    scrollPos += firstItem.element.offsetWidth + 6;
    buildConveyor();
  }
  conveyor.style.transform = `translateX(${scrollPos}px)`;
  requestAnimationFrame(animateConveyor);
}

function addToDrop(span, item){
  if(item.sushi || item.consumed) return;
  const wrapper = document.createElement('div');
  wrapper.className = 'tileWrapper';
  const newTile = document.createElement('span');
  newTile.className = 'tile';
  newTile.textContent = span.textContent;
  newTile.addEventListener('click', ()=>selectDropTile(newTile));
  wrapper.appendChild(newTile);
  dropContainer.appendChild(wrapper);
  item.consumed = true;
  if(item.element && item.element.parentNode) item.element.remove();
  maxSushiInRow = 2 + Math.floor(Math.random() * 4);
  buildConveyor();
}

function selectDropTile(tile){
  if(!selectedTile){ selectedTile=tile; tile.style.border='2px solid yellow'; }
  else if(selectedTile===tile){ tile.style.border=''; selectedTile=null; }
  else { const tmp=selectedTile.textContent; selectedTile.textContent=tile.textContent; tile.textContent=tmp; selectedTile.style.border=''; selectedTile=null; }
}

function saveAnswer() {
  // 🚫 do nothing while placeholder is active
  if (currentSectionIndex === -1) return;

  const words = [...dropContainer.children]
    .map(t => t.querySelector('.tile').textContent);

  userAnswers[currentSectionIndex][currentIndex] = words;
}


function renderCurrent(){
  dropContainer.innerHTML="";
  const sentence = sections[currentSectionIndex].lines[currentIndex];
remainingWords = shuffle(sentence.match(/[\w'-]+[.,!?;:]?/g) || []);

if (userAnswers[currentSectionIndex][currentIndex]) {
  userAnswers[currentSectionIndex][currentIndex].forEach(w => {

      const wrapper=document.createElement('div');
      wrapper.className='tileWrapper';
      const t=document.createElement('span');
      t.className='tile';
      t.textContent=w;
      t.addEventListener('click',()=>selectDropTile(t));
      wrapper.appendChild(t);
      dropContainer.appendChild(wrapper);
      const idx = remainingWords.indexOf(w);
      if(idx>-1) remainingWords.splice(idx,1);
    });
  }
  conveyorItems = [];
  sushiIndex = 0;
  maxSushiInRow = 3;
  buildConveyor();
}

backButton.addEventListener('click', () => {
  saveAnswer();
  currentIndex--;
  if (currentIndex < 0) {
    currentIndex = sections[currentSectionIndex].lines.length - 1;
  }
  renderCurrent();
});

nextButton.addEventListener('click', () => {
  saveAnswer();
  currentIndex++;
  if (currentIndex >= sections[currentSectionIndex].lines.length) {
    currentIndex = 0;
  }
  renderCurrent();
});

submitButton.addEventListener('click', () => {
  saveAnswer(); // Save the current dropContainer

  const name = nameField.value.trim() || 'Anonymous';
  const id = idField.value.trim() || 'N/A';
  const filename = window.location.pathname.split('/').pop() || 'unknown.html';

// --- Count correct answers (CURRENT SECTION ONLY) ---
if (currentSectionIndex === -1 || !sections[currentSectionIndex]) {
  alert("No section selected.");
  return;
}

let correctCount = 0;
let total = 0;

const sec = sections[currentSectionIndex];
const answers = userAnswers[currentSectionIndex];

sec.lines.forEach((line, lIdx) => {
  total++;

  const orig = line.match(/[\w'-]+[.,!?;:]?/g) || [];
  const ans = answers[lIdx];

  if (
    ans &&
    ans.length === orig.length &&
    ans.every((w, k) => w === orig[k])
  ) {
    correctCount++;
  }
});

  
  const percentage = Math.round((correctCount / total) * 100);

  // --- Build date string with military time ---
  const now = new Date();
  const pad = n => n.toString().padStart(2,'0');
  const dateString = `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} ` +
                     `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

  // --- Final data string ---
const resultText = `${filename}|${name}|${id}|${dateString}|${correctCount}/${total}|${percentage}%`;

// --- Show on scoreboard ---
scoreData.textContent = resultText;
scoreboard.style.display = 'block';

// --- SAFE SUPABASE PAYLOAD (DO NOT TOUCH UI ABOVE) ---
const resultPayload = {
  filename,
  name,
  id,
  date: dateString,
  correct: correctCount,
  total,
  percentage,
  raw: resultText
};

// send to Supabase
saveResult(resultPayload);
});

downloadPngButton.addEventListener('click', () => {
  const text = scoreData.textContent;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const fontSize = 14;
  ctx.font = `${fontSize}px Arial`;

  const textWidth = ctx.measureText(text).width;
  canvas.width = textWidth + 20;
  canvas.height = fontSize + 20;

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#000';
  ctx.font = `${fontSize}px Arial`;
  ctx.textBaseline = 'top';
  ctx.fillText(text, 10, 10);

  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'score.png';
  a.click();
});

(function () {

  style.textContent = `
    #skylineBackdrop {
      position: absolute;
      left: 0;
      width: 100vw;
      pointer-events: none;
      z-index: 0;

      align-items: flex-end;

      position: relative;
      z-index: 1;

  `;
  document.head.appendChild(style);

  /* -----------------------------
     Create container
     ----------------------------- */
  const skyline = document.createElement('div');
  skyline.id = 'skylineBackdrop';
  document.body.appendChild(skyline);

  /* -----------------------------
     Position skyline
     ----------------------------- */
  function positionSkyline() {
    const dropBand = document.getElementById('dropBand');
    if (!dropBand) return;

    const rect = dropBand.getBoundingClientRect();

const viewportHeight = window.innerHeight;
const baseline = viewportHeight - rect.top;

skyline.style.bottom = `${baseline + 20}px`; // ⬆ move buildings up 50px

    skyline.style.height = '120px';           // ⬇ slightly shorter overall
  }

  /* -----------------------------
     Build skyline
     ----------------------------- */
  function buildSkyline() {
    skyline.innerHTML = '';

    const screenWidth = window.innerWidth;
    let usedWidth = 0;

    while (usedWidth < screenWidth) {
      const building = document.createElement('div');

const width = 6 + Math.random() * 10; // ⬅ wider buildings
      const height = 20 + Math.random() * 90;  // shorter buildings
      const shade = 175 + Math.floor(Math.random() * 50);

      building.className = 'skyline-building';
      building.style.width = width + 'px';
      building.style.height = height + 'px';
      building.style.backgroundColor =
        `rgb(${shade},${shade},${shade})`;

      skyline.appendChild(building);
      usedWidth += width;
    }
  }

  /* -----------------------------
     Init
     ----------------------------- */
  function initSkyline() {
    positionSkyline();
    buildSkyline();
  }

  window.addEventListener('resize', initSkyline);
  setTimeout(initSkyline, 0);
})();


</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>

========================= */

const RAW_TEXT = `

How to play...

1. Enter Name and ID
2. Select a category.
3. Click Start to begin.
4. Grab words as they go by.
5. Rearrange the words into the correct order.
6. Click next to go to the next exercise, or click previous to go back.

/* =========================
   RAW TEXT PARSER
========================= */

function parseRawInstructions(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const html = [];

  lines.forEach(line => {

    if(line === "---"){
      html.push(`<hr>`);
      return;
    }

    if(/^\d+\./.test(line)){
      html.push(`<p>${line}</p>`);
      return;
    }

    if(!/[.!?:]$/.test(line)){
      html.push(`<h3>${line}</h3>`);
      return;
    }

    html.push(`<p>${line}</p>`);
  });

  return html.join("");
}
