    function parseImageSections(raw) {
  const lines = raw.split('\n').map(l => l.trim());
  const sections = [];
  let current = null;

  lines.forEach(line => {
    if (!line) return;

    if (line.startsWith("~")) {
      current = {
        title: line.replace(/~/g, "").trim(),
        images: []
      };
      sections.push(current);
    } else if (current) {
      current.images.push(line);
    }
  });

  return sections;
}

const imageSections = parseImageSections(rawImageList);

const startBtn = document.getElementById('sectionStart');
const wheelEl = document.querySelector('#sectionWheelContainer .wheel');

let sectionIndex = -1; // placeholder state
let activeSection = null;
let images = [];

function updateSectionWheel() {
  if (!wheelEl) return;

  // No sections loaded → show placeholder
  if (!Array.isArray(imageSections) || imageSections.length === 0) {
    wheelEl.textContent = "Select a category.";
    startBtn.disabled = true;
    return;
  }

  // Placeholder state → show placeholder text
  if (sectionIndex === -1) {
    wheelEl.textContent = "Select a category.";
    startBtn.disabled = true;
    return;
  }

  // Wrap section index
  sectionIndex =
    ((sectionIndex % imageSections.length) + imageSections.length) %
    imageSections.length;

  const section = imageSections[sectionIndex];

  // Invalid section → show placeholder
  if (!section || !section.title || !Array.isArray(section.images)) {
    wheelEl.textContent = "Select a category.";
    startBtn.disabled = true;
    return;
  }

  // Valid section → show title + count
  wheelEl.textContent =
    `${section.title} (${section.images.length} images)`;

  startBtn.disabled = false;
}

// Initialize wheel text on page load
if (wheelEl) wheelEl.textContent = "Select a category.";

// SECTION NAVIGATION
document.getElementById('sectionUp').addEventListener('click', () => {
  if (sectionIndex === -1) sectionIndex = imageSections.length - 1;
  else sectionIndex = (sectionIndex - 1 + imageSections.length) % imageSections.length;
  updateSectionWheel();
});

document.getElementById('sectionDown').addEventListener('click', () => {
  if (sectionIndex === -1) sectionIndex = 0;
  else sectionIndex = (sectionIndex + 1) % imageSections.length;
  updateSectionWheel();
});

// START BUTTON
startBtn.addEventListener("click", () => {
  if (sectionIndex === -1) return; // safety check
  activeSection = imageSections[sectionIndex];

  images = activeSection.images;
  currentImageIndex = 0;
  morphStep = 0;
  isPaused = false;

  // Clear previous responses
  responsesDiv.innerHTML = "";

  images.forEach((_, i) => {
    const numberPrefix = `${i + 1}. `;
    const ta = document.createElement('textarea');
    ta.className = 'responseField';
    ta.id = `response${i + 1}`;
    ta.value = numberPrefix;
    ta.disabled = false;

    ta.addEventListener("input", function () {
      if (!this.value.startsWith(numberPrefix)) {
        const cursorPos = this.selectionStart;
        this.value = numberPrefix + this.value.replace(/^\d+\.\s*/, '');
        this.selectionStart = this.selectionEnd =
          Math.max(cursorPos, numberPrefix.length);
      }

      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
      updateScoreboardFromTextAreas();
    });

    responsesDiv.appendChild(ta);
  });

  document.getElementById('response1').style.display = 'block';

  loadImages();

  document.getElementById('submitButton').disabled = false;
  document.getElementById('pauseButton').disabled = false;
  document.getElementById('nextButton').disabled = false;
  document.getElementById('backButton').disabled = false;
});

    let currentImageIndex = 0, isPaused = false, morphStep = 0;
    const totalSteps = 20, morphingSpeed = 50, displayTime = 120000;
    let morphingInterval, displayTimeout, timerInterval, imageElements = [], timeLeft = displayTime/1000;

    const canvas = document.getElementById('morphCanvas');
    const ctx = canvas.getContext('2d');
    const overlayNumber = document.getElementById('overlayNumber');
    const responsesDiv = document.getElementById('responses');
    const pauseButton = document.getElementById('pauseButton');
    const countdownOverlay = document.createElement('div');
    countdownOverlay.className = 'countdownOverlay';
    let interactionAllowed = false;

    

    function updateOverlay(index) {
      overlayNumber.style.display = showOverlayNumber ? "block" : "none";
      overlayNumber.textContent = index + 1;
    }

    function attachTimerToActiveField(index) {
      const activeInput = document.getElementById(`response${index+1}`);
      if(!activeInput) return;
      if(countdownOverlay.parentElement) countdownOverlay.parentElement.removeChild(countdownOverlay);
      activeInput.insertAdjacentElement("afterend", countdownOverlay);
    }

    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = displayTime / 1000;
      updateTimer();
      timerInterval = setInterval(() => {
        if(!isPaused) {
          timeLeft--;
          updateTimer();
          if(timeLeft <= 0) clearInterval(timerInterval);
        }
      }, 1000);
    }

    function updateTimer() {
      const m = String(Math.floor(timeLeft/60)).padStart(2,'0');
      const s = String(timeLeft%60).padStart(2,'0');
      countdownOverlay.textContent = `${m}:${s}`;
    }

    function loadImages() {
      const promises = images.map(src => new Promise(res => {
        const img = new Image();
        img.src = src;
        img.onload = () => res(img);
        img.onerror = () => res(new Image());
      }));

      Promise.all(promises).then(loaded => {
        imageElements = loaded;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(imageElements[0],0,0,canvas.width,canvas.height);
        updateOverlay(0);
        attachTimerToActiveField(0);
        startTimer();
        // displayTimeout = setTimeout(startMorphing, displayTime);

      });
    }

    function morphImages() {
      if(isPaused) return;
      const current = imageElements[currentImageIndex];
      const next = imageElements[(currentImageIndex + 1) % images.length];
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const alpha = morphStep / totalSteps;
      ctx.globalAlpha = 1 - alpha;
      ctx.drawImage(current,0,0,canvas.width,canvas.height);
      ctx.globalAlpha = alpha;
      ctx.drawImage(next,0,0,canvas.width,canvas.height);
      morphStep++;
      if(morphStep >= totalSteps) {
        clearInterval(morphingInterval);
        morphStep = 0;
        currentImageIndex = (currentImageIndex + 1) % images.length;
        showImage(currentImageIndex);
      }
    }

    function showImage(index) {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.globalAlpha = 1;
      ctx.drawImage(imageElements[index],0,0,canvas.width,canvas.height);
      updateOverlay(index);
      document.querySelectorAll('.responseField').forEach((el,i)=>{
        el.style.display = (i === index) ? 'block' : 'none';
        el.disabled = !interactionAllowed;
      });
      attachTimerToActiveField(index);
      startTimer();
      displayTimeout = setTimeout(startMorphing, displayTime);
    }

    function startMorphing() {
      morphingInterval = setInterval(morphImages, morphingSpeed);
    }

function fadeToImage(targetIndex) {
  clearInterval(morphingInterval);
  clearTimeout(displayTimeout);

  let step = 0;
  const current = imageElements[currentImageIndex];
  const next = imageElements[targetIndex];

  const fadeInterval = setInterval(() => {
    const alpha = step / totalSteps;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.globalAlpha = 1 - alpha;
    ctx.drawImage(current,0,0,canvas.width,canvas.height);
    ctx.globalAlpha = alpha;
    ctx.drawImage(next,0,0,canvas.width,canvas.height);
    step++;

    if(step > totalSteps) {
      clearInterval(fadeInterval);
      currentImageIndex = targetIndex;
      ctx.globalAlpha = 1;
      ctx.drawImage(next,0,0,canvas.width,canvas.height);

      updateOverlay(currentImageIndex);
      renderMCForImage(currentImageIndex);
      startTimer();
      displayTimeout = setTimeout(startMorphing, displayTime);
    }
  }, morphingSpeed);
}
    pauseButton.addEventListener('click', () => {
      isPaused = !isPaused;
      pauseButton.textContent = isPaused ? 'Resume' : 'Pause';
      if(isPaused) {
        clearInterval(morphingInterval);
        clearTimeout(displayTimeout);
      } else {
        displayTimeout = setTimeout(startMorphing, displayTime);
      }
    });

    document.getElementById('nextButton').addEventListener('click', () => fadeToImage((currentImageIndex+1) % images.length));
    document.getElementById('backButton').addEventListener('click', () => fadeToImage((currentImageIndex-1+images.length) % images.length));

    function checkUnlock() {
      const nameFilled = document.getElementById('nameField').value.trim() !== "";
      const idFilled = document.getElementById('idField').value.trim() !== "";

        document.querySelectorAll('.controls button').forEach(b => b.disabled = false);
        document.querySelectorAll('.responseField').forEach(r => r.disabled = false);
      }
    }

    document.getElementById('nameField').addEventListener('input', checkUnlock);
    document.getElementById('idField').addEventListener('input', checkUnlock);

const scoreDataEl = document.getElementById('scoreData');
const copyMessage = document.getElementById('copyMessage');

/* nothing else that touches copyButton below this line */

document.getElementById('copyButton').addEventListener('click', async () => {

    function updateTextAreasFromScoreboard() {
      const lines = scoreDataEl.innerText.split("\n");
      let currentIdx = null;
      let buffer = [];
      function flushBuffer() {
        if(currentIdx !== null) {
          const ta = document.getElementById(`response${currentIdx}`);
          if(ta) ta.value = `${currentIdx}. ` + buffer.join("\n").trim().replace(/^\d+\.\s*/, '');
        }
        buffer = [];
      }
      lines.forEach(line => {
        const match = line.match(/^(\d+)\.\s*(.*)$/);
        if(match){
          flushBuffer();
          currentIdx = parseInt(match[1], 10);
          buffer.push(match[2]);
        } else if(currentIdx !== null) {
          buffer.push(line);
        }
      });
      flushBuffer();
    }

function updateScoreboardFromTextAreas() {
  const name = document.getElementById('nameField').value;
  const id = document.getElementById('idField').value;

  // HTML filename
  const fileName = location.pathname.split("/").pop() || "index.html";

  // Section name
  const sectionName = activeSection ? activeSection.title : "";

  // International date, military time (YYYY-MM-DD HH:mm)
  const now = new Date();
  const date =
    now.getFullYear() + "-" +
    String(now.getMonth() + 1).padStart(2, "0") + "-" +
    String(now.getDate()).padStart(2, "0") + " " +
    String(now.getHours()).padStart(2, "0") + ":" +
    String(now.getMinutes()).padStart(2, "0");

  const responsesText = images
    .map((_, i) => document.getElementById(`response${i+1}`).value)
    .join("\n");

  scoreDataEl.innerText =
    `${fileName} | ${sectionName} | ${name} | ${id} | ${date}\n\n${responsesText}`;
}


    scoreDataEl.addEventListener('input', updateTextAreasFromScoreboard);

    document.getElementById('submitButton').addEventListener('click', () => {
      clearInterval(morphingInterval);
      clearTimeout(displayTimeout);
      updateTextAreasFromScoreboard();
      updateScoreboardFromTextAreas();
      document.getElementById('scoreboard').style.display='block';
      scoreDataEl.scrollTop = scoreDataEl.scrollHeight;
    });



    const script = document.createElement('script');
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
    document.head.appendChild(script);

    document.getElementById('downloadPngButton').addEventListener('click', () => {
      const scoreboardControls = document.querySelector('#scoreboard .controls');
      scoreboardControls.style.display='none';
      html2canvas(document.getElementById('scoreboard')).then(canvas => {
        const link = document.createElement('a');

    document.getElementById('downloadTxtButton').addEventListener('click', () => {
      const blob = new Blob([scoreDataEl.innerText], {type:'text/plain'});

      link.download = 'responses.txt';
      link.click();
    });

    const borderDiv = document.createElement('div');
    borderDiv.style.position='fixed';
    borderDiv.style.inset='0';
    borderDiv.style.border='12px solid #39FF14';
    borderDiv.style.boxSizing='border-box';
    borderDiv.style.zIndex='9999';
    borderDiv.style.pointerEvents='none';
    document.body.appendChild(borderDiv);

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>

(function(){

/* =========================
   RAW INSTRUCTIONS TEXT
========================= */

const RAW_TEXT = `

How to play...

1. Enter Name and ID.
2. Select a category.
3. Click Start to begin.
4. Write captions for each image you see.
5. Click Next for the next exercise.
6. Click Back to go to the previous exercise.
7. Click Submit to see your work.
8. Copy or download your work.

`;


/* =========================
   RAW TEXT PARSER
========================= */

function parseRawInstructions(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const html = [];

  lines.forEach(line => {

    if(line === "---"){
      html.push(`<hr>`);
      return;
    }

    if(/^\d+\./.test(line)){
      html.push(`<p>${line}</p>`);
      return;
    }

    if(!/[.!?:]$/.test(line)){
      html.push(`<h3>${line}</h3>`);
      return;
    }

    html.push(`<p>${line}</p>`);
  });

  return html.join("");
}


/* =========================
   CREATE STYLE
========================= */

const style = document.createElement("style");

style.textContent = `
#instructionsBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 16px;
  background:#2e8b57;
  color:#fff;
  border:none;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,0.6);
  z-index:99998;
}

#instructionsBtn:hover{
  background:#257047;
}

#instructionsRoot{
  position:fixed;
  inset:0;
  display:none;
  z-index:99999;
}

#instructionsBackdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
}

#instructionsModal{
  position:absolute;
  top:25px;
  left:50%;
  transform:translateX(-50%);
  width:min(650px,90vw);
  max-height:90vh;
  background:#fff;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#instructionsHeader{
  padding:12px 16px;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  gap:10px;
}

#instructionsTitle{
  color:#1976d2;
  font-weight:600;
  font-size:1.1em;
}

#instructionsBack{
  border:none;
  background:none;
  font-size:20px;
  cursor:pointer;
  color:#1976d2;
  font-weight:600;
}

#instructionsContent{
  padding:2px 18px 18px 18px;
  overflow-y:auto;
  line-height:1.6;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

#instructionsContent::-webkit-scrollbar{
  display:none;
}

#instructionsContent h3{
  color:#1976d2;
  margin:12px 0 4px 0;
  font-weight:600;
}

#instructionsContent p{
  margin:4px 0;
}

#instructionsContent hr{
  margin:12px 0;
}
`;

document.head.appendChild(style);


/* =========================
   CREATE BUTTON
========================= */

const btn = document.createElement("button");
btn.id = "instructionsBtn";
btn.textContent = "Instructions";

document.body.appendChild(btn);


/* =========================
   CREATE MODAL
========================= */

const root = document.createElement("div");
root.id = "instructionsRoot";

root.innerHTML = `
<div id="instructionsBackdrop"></div>

<div id="instructionsModal">

  <div id="instructionsHeader">
    <button id="instructionsBack">←</button>
    <span id="instructionsTitle">Instructions</span>
  </div>

  <div id="instructionsContent">
    ${parseRawInstructions(RAW_TEXT)}
  </div>

</div>
`;

document.body.appendChild(root);


/* =========================
   SCROLL LOCK
========================= */

const modalContent = document.getElementById("instructionsContent");

modalContent.addEventListener("wheel", e=>{
  e.stopPropagation();
},{passive:false});

modalContent.addEventListener("touchmove", e=>{
  e.stopPropagation();
},{passive:false});


/* =========================
   OPEN / CLOSE
========================= */

function openModal(){
  root.style.display="block";
  document.body.style.overflow="hidden";
  document.documentElement.style.overflow="hidden";
}

function closeModal(){
  root.style.display="none";
  document.body.style.overflow="";
  document.documentElement.style.overflow="";
}

btn.onclick = openModal;

document.getElementById("instructionsBack").onclick = closeModal;
document.getElementById("instructionsBackdrop").onclick = closeModal;

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeModal();
});

/* =========================
   DYNAMIC BODY PADDING FOR BUTTON
========================= */

function adjustBodyPadding(){
  const btnHeight = btn.offsetHeight + -25; // include some gap
  document.body.style.paddingBottom = `${btnHeight}px`;
}

// Initial adjustment
adjustBodyPadding();

// Update if window is resized (responsive)
window.addEventListener("resize", adjustBodyPadding);

})();
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>
