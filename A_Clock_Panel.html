<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clock Slim</title>
<style>
html, body {
  font-family: Arial, sans-serif;
  background: #000;
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  color: #fff;
  box-sizing: border-box;
  overflow: hidden; /* prevent scrolling inside iframe */
}

/* Center horizontally, move upward slightly */
body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 25px; /* move layout upward */
}

/* Container fits nicely in 500px height iframe */
#container {
  display: flex;
  flex-direction: column;
  gap: 8px; /* modest vertical spacing */
  width: 100%;
  max-width: 158px;
  align-items: center;
  box-sizing: border-box;
}

/* Panels */
.panel {
  background: #000;
  border-radius: 4px;
  padding: 3px 0;
  box-shadow: none;
  width: 100%;
  box-sizing: border-box;
  font-size: 13px;
  text-align: center;
  line-height: 1.5em;
  margin: 0;
}

.spaced-line {
  display: block;
  margin: 2px 0;
  line-height: 1.4em;
}

.row {
  display: flex;
  gap: 3px;
  justify-content: center;
  align-items: center;
  margin: 2px 0;
}

.month-header {
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 2px;
  background: #000;
  color: #fff;
  border-radius: 4px;
  padding: 2px 0;
}

.month-nav {
  cursor: pointer;
  font-size: 13px;
  padding: 0 3px;
  user-select: none;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 17px);
  justify-content: center;
  gap: 1px;
  text-align: center;
  margin: 0;
  background: #000;
  border-radius: 4px;
  padding: 1px 0;
}

.calendar .day {
  width: 17px;
  height: 17px;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 2px;
  background: #000;
  cursor: pointer;
  font-size: 10px;
}

.calendar .header {
  font-weight: bold;
  background: #000;
}

.today {
  background: #FFFF00 !important;
  font-weight: 700;
  color: #000;
}

.time-display {
  font-size: 13px;
  display: block;
  margin: 2px 0;
}

.clock-line {
  display: block;
  background: #000;
  padding: 3px 0;
  border-radius: 4px;
  margin: 0;
}

input[type="number"], button {
  width: 36px;
  height: 26px;
  line-height: 26px;
  font-size: 10px;
  text-align: center;
  border-radius: 2px;
  border: 1px solid #333;
  background: #000;
  color: #fff;
  box-sizing: border-box;
  padding: .5px;

}
input::placeholder { 
  text-align: center; 
  font-size: 10px;  /* smaller placeholder text */
  opacity: 0.7;     /* slightly faded */
}

button { 
  cursor: pointer; 
  font-size: 12px;   
  text-align: center;
  border-radius: 2px;
  border: 1px solid #333;
  /* width removed so text fits naturally */
  height: 26px;
  line-height: 26px;
  background: #000;  /* default black */
  color: #fff;
  box-sizing: border-box;
}

/* Start / Stop / Reset overrides */
button.start { 
  background-color: #4CAF50 !important; /* green */
  color: #fff !important;
}

button.stop { 
  background-color: #f44336; 
  color: #fff; 
}

button.reset { 
  background-color: #777; 
  color: #fff; 
}

footer p {
  color: #555;
  font-size: 6px;
  text-align: center;
  margin: 4px 0 0;
  padding: 2px 0;
}

/* Optional green border for aesthetic consistency */
#greenBorder {
  position: absolute;
  inset: 0;
  border: 8px solid #39FF14;
  box-sizing: border-box;
  z-index: 9999;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="container">
  <!-- Calendar -->
  <div class="panel">
    <div class="month-header">
      <span class="month-nav" id="prevMonth">◀</span>
      <span id="monthName"></span>
      <span class="month-nav" id="nextMonth">▶</span>
    </div>
    <div class="calendar" id="calendar"></div>
  </div>

  <!-- Date -->
  <div class="panel clock-line">
    <span class="spaced-line" id="date"></span>
  </div>

  <!-- 24H / 12H -->
  <div class="panel clock-line">
    <span class="spaced-line">24H: <span id="clock24"></span></span>
    <span class="spaced-line">12H: <span id="clock12"></span></span>
  </div>

  <!-- Countdown -->
  <div class="panel">
    <span class="spaced-line">Countdown</span>
    <span class="time-display spaced-line" id="countdownDisplay">00:00:00</span>
    <div class="row">
      <input type="number" id="countHours" min="0" max="99" placeholder="HH" />
      <input type="number" id="countMinutes" min="0" max="59" placeholder="MM" />
      <input type="number" id="countSeconds" min="0" max="59" placeholder="SS" />
    </div>
    <div class="row">
      <button class="start" onclick="startCountdown()">Start</button>
      <button class="stop" onclick="stopCountdown()">Stop</button>
      <button class="reset" onclick="resetCountdown()">Reset</button>
    </div>
  </div>

  <!-- Stopwatch -->
  <div class="panel">
    <span class="spaced-line">Stopwatch</span>
    <span class="time-display spaced-line" id="stopwatchDisplay">00:00:00</span>
    <div class="row">
      <button class="start" onclick="startStopwatch()">Start</button>
      <button class="stop" onclick="stopStopwatch()">Stop</button>
      <button class="reset" onclick="resetStopwatch()">Reset</button>
    </div>
  </div>

  <footer><p>&copy; 2025 David Lee Cherry</p></footer>
</div>

<div id="greenBorder"></div>

<script>
// Calendar
let currentDate = new Date();
function buildCalendar(){
  const calendarEl=document.getElementById('calendar');
  const monthNameEl=document.getElementById('monthName');
  calendarEl.innerHTML='';
  const year=currentDate.getFullYear();
  const month=currentDate.getMonth();
  const today=new Date();
  monthNameEl.textContent=`${currentDate.toLocaleString('default',{month:'short'})} ${year}`;
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const startDay=firstDay.getDay();
  const weekdays=['S','M','T','W','T','F','S'];
  weekdays.forEach(day=>{
    const h=document.createElement('div');h.classList.add('day','header');h.textContent=day;calendarEl.appendChild(h);
  });
  for(let i=0;i<startDay;i++){calendarEl.appendChild(document.createElement('div'));}
  for(let d=1;d<=lastDay.getDate();d++){
    const cell=document.createElement('div');cell.classList.add('day');cell.textContent=d;
    if(d===today.getDate() && month===today.getMonth() && year===today.getFullYear()){cell.classList.add('today');}
    calendarEl.appendChild(cell);
  }
}
document.getElementById('prevMonth').addEventListener('click',()=>{currentDate.setMonth(currentDate.getMonth()-1);buildCalendar();});
document.getElementById('nextMonth').addEventListener('click',()=>{currentDate.setMonth(currentDate.getMonth()+1);buildCalendar();});
buildCalendar();

// Date & Clocks
function updateDate(){
  const now=new Date();
  const weekday=now.toLocaleDateString('en-GB',{weekday:'short'});
  const day=now.getDate();
  const month=now.toLocaleDateString('en-GB',{month:'short'});
  const year=now.getFullYear();
  document.getElementById('date').textContent=`${weekday}. ${day} ${month} ${year}`;
}
function updateClocks(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock24').textContent=`${h}:${m}:${s}`;
  let h12=now.getHours()%12||12;
  let ampm=now.getHours()<12?'AM':'PM';
  document.getElementById('clock12').textContent=`${h12.toString().padStart(2,'0')}:${m}:${s} ${ampm}`;
}
updateDate();updateClocks();setInterval(updateDate,60000);setInterval(updateClocks,1000);

// Countdown
let countdownTime=0,countdownInterval,buzzerPlayed=false;
function formatTime(t){const hrs=Math.floor(t/3600).toString().padStart(2,'0');const mins=Math.floor((t%3600)/60).toString().padStart(2,'0');const secs=(t%60).toString().padStart(2,'0');return`${hrs}:${mins}:${secs}`;}
function updateCountdownDisplay(){document.getElementById('countdownDisplay').textContent=formatTime(countdownTime);}
function playBuzzer(){try{const AudioContext=window.AudioContext||window.webkitAudioContext;const audioCtx=new AudioContext();const oscillator=audioCtx.createOscillator();const gainNode=audioCtx.createGain();oscillator.type='square';oscillator.frequency.setValueAtTime(440,audioCtx.currentTime);gainNode.gain.setValueAtTime(0.5,audioCtx.currentTime);oscillator.connect(gainNode);gainNode.connect(audioCtx.destination);oscillator.start();oscillator.stop(audioCtx.currentTime+0.3);oscillator.onended=()=>audioCtx.close();}catch(e){console.error(e);}}
function countdownTick(){if(countdownTime>0){countdownTime--;updateCountdownDisplay();}else{if(!buzzerPlayed){playBuzzer();buzzerPlayed=true;}clearInterval(countdownInterval);}}
function startCountdown(){if(countdownTime<=0){alert("Please enter a time >0!");return;}countdownInterval=setInterval(countdownTick,1000);}
function stopCountdown(){clearInterval(countdownInterval);}
function resetCountdown(){countdownTime=0;buzzerPlayed=false;updateCountdownDisplay();stopCountdown();document.getElementById('countHours').value='';document.getElementById('countMinutes').value='';document.getElementById('countSeconds').value='';}
document.getElementById('countHours').addEventListener('input',handleCountdownInput);
document.getElementById('countMinutes').addEventListener('input',handleCountdownInput);
document.getElementById('countSeconds').addEventListener('input',handleCountdownInput);
function handleCountdownInput(){stopCountdown();buzzerPlayed=false;const h=parseInt(document.getElementById('countHours').value)||0;const m=parseInt(document.getElementById('countMinutes').value)||0;const s=parseInt(document.getElementById('countSeconds').value)||0;countdownTime=h*3600+m*60+s;updateCountdownDisplay();}

// Stopwatch
let swStart = null;
let swElapsed = 0;
let swTimer = null;
function updateStopwatchDisplay() {
  const now = Date.now();
  const totalMs = swElapsed + (swStart ? (now - swStart) : 0);
  const totalSec = Math.floor(totalMs / 1000);
  document.getElementById('stopwatchDisplay').textContent = formatTime(totalSec);
}
function stopwatchLoop() { updateStopwatchDisplay(); swTimer = requestAnimationFrame(stopwatchLoop); }
function startStopwatch() { if(swStart!==null) return; swStart=Date.now(); if(!swTimer) swTimer=requestAnimationFrame(stopwatchLoop); }
function stopStopwatch() { if(swStart===null) return; swElapsed+=Date.now()-swStart; swStart=null; if(swTimer){cancelAnimationFrame(swTimer); swTimer=null;} updateStopwatchDisplay(); }
function resetStopwatch() { swElapsed=0; swStart=null; if(swTimer){cancelAnimationFrame(swTimer); swTimer=null;} updateStopwatchDisplay(); }
updateStopwatchDisplay();
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>

</body>
</html>
