<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rustic Compass</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #d8c3a5; /* sand */
    font-family: Georgia, serif;
  }

  .compass {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, #e6d3b3, #bfa37a);
    box-shadow:
      inset 0 0 20px rgba(0,0,0,0.3),
      0 10px 25px rgba(0,0,0,0.4);
    position: relative;
    border: 6px solid #8b6b4f;
  }

  .compass::before {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    border: 2px dashed #8b6b4f;
    opacity: 0.6;
  }

  .directions {
    position: absolute;
    width: 100%;
    height: 100%;
    text-align: center;
    color: #5a4632;
    font-weight: bold;
  }

  .north { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); }
  .south { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); }
  .east  { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); }
  .west  { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); }

  .needle {
    position: absolute;
    width: 4px;
    height: 120px;
    background: linear-gradient(red 50%, #5a4632 50%);
    top: 50%;
    left: 50%;
    transform-origin: bottom center;
    transform: translate(-50%, -100%) rotate(0deg);
    border-radius: 2px;
  }

  .center {
    width: 12px;
    height: 12px;
    background: #5a4632;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .button {
    position: absolute;
    bottom: -60px;
    background: #8b6b4f;
    color: #f5f0e6;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-family: Georgia, serif;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="compass">
  <div class="directions">
    <div class="north">N</div>
    <div class="south">S</div>
    <div class="east">E</div>
    <div class="west">W</div>
  </div>

  <div class="needle" id="needle"></div>
  <div class="center"></div>

  <button class="button" onclick="startCompass()">Enable Compass</button>
</div>

<script>
let currentHeading = 0;

function startCompass() {
  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {

    // iOS permission
    DeviceOrientationEvent.requestPermission()
      .then(permission => {
        if (permission === "granted") {
          window.addEventListener("deviceorientation", handleOrientation);
        }
      })
      .catch(console.error);

  } else {
    // Other browsers
    window.addEventListener("deviceorientation", handleOrientation);
  }
}

function handleOrientation(event) {
  let heading = event.alpha;

  if (heading === null) return;

  // Smooth rotation (optional)
  currentHeading = currentHeading * 0.9 + heading * 0.1;

  rotateNeedle(currentHeading);
}

function rotateNeedle(angle) {
  const needle = document.getElementById("needle");
  needle.style.transform = `translate(-50%, -100%) rotate(${-angle}deg)`;
}
</script>

</body>
</html>
