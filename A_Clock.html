<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clock</title>
  <style>




    body {
      font-family: Arial, sans-serif;
      font-weight: 600;
      background: #b3d9ff;
      display: flex;
      flex-direction: column;
      align-items: center; /* left-align panels */
      gap: 14px;
      padding: 24px;
      box-sizing: border-box;
    }

    .panel {
      background: #000;
      color: #fff;
      border-radius: 10px;
      padding: 14px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 360px;
      box-sizing: border-box;
      text-align: left; /* left-align text inside panels */
    }

    .panel h3 {
      margin: 0;
      font-size: 1rem;
      display: inline-block;
    }

    .time-display {
      display: inline-block;
      font-size: 1.2rem;
      margin-left: 6px;
    }

    .row {
      display: flex;
      justify-content: space-between; /* stretch inputs/buttons across */
      gap: 8px;
      margin-top: 8px;
      flex-wrap: nowrap;
    }

    input[type="number"] {
      flex: 1; /* stretch evenly */
      height: 42px;
      font-weight: 600;
      font-size: 1rem;
      text-align: center; /* placeholder centered */
      background: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      min-width: 0; /* prevent overflow */
    }

    input[type="number"]::placeholder {
      text-align: center;
    }

    .row.buttons {
      justify-content: space-between; /* stretch buttons evenly */
      margin-top: 8px;
    }

    button {
      flex: 1; /* stretch evenly */
      height: 42px;
      font-weight: 600;
      font-size: 1rem;
      text-align: center;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      min-width: 0; /* prevent overflow */
    }

    button.start { background-color: #4CAF50; color: #fff; }
    button.stop { background-color: #f44336; color: #fff; }
    button.reset { background-color: #777; color: #fff; }

    footer p {
      color: #777;
      font-size: 10px;
      margin: 0;
      text-align: center;
    }
#date {
  display: inline-block;   /* keep it inline with any label */
  margin-left: -4px;       /* move it a bit to the left */
}
  </style>
</head>
<body>

  <div class="panel">
    <span class="time-display" id="date"></span>
  </div>

  <div class="panel">
    <h3>24-Hour Clock:</h3><span class="time-display" id="clock24"></span>
  </div>

  <div class="panel">
    <h3>12-Hour Clock:</h3><span class="time-display" id="clock12"></span>
  </div>

  <div class="panel">
    <h3>Countdown Timer:</h3><span class="time-display" id="countdownDisplay">00:00:00</span>
    <div class="row">
      <input type="number" id="countHours" min="0" max="99" placeholder="HH" />
      <input type="number" id="countMinutes" min="0" max="59" placeholder="MM" />
      <input type="number" id="countSeconds" min="0" max="59" placeholder="SS" />
    </div>
    <div class="row buttons">
      <button class="start" onclick="startCountdown()">Start</button>
      <button class="stop" onclick="stopCountdown()">Stop</button>
      <button class="reset" onclick="resetCountdown()">Reset</button>
    </div>
  </div>

  <div class="panel">
    <h3>Stopwatch:</h3><span class="time-display" id="stopwatchDisplay">00:00:00</span>
    <div class="row buttons">
      <button class="start" onclick="startStopwatch()">Start</button>
      <button class="stop" onclick="stopStopwatch()">Stop</button>
      <button class="reset" onclick="resetStopwatch()">Reset</button>
    </div>
  </div>

  <script>
    function updateDate() {
      const now = new Date();
      const weekday = now.toLocaleDateString('en-GB', { weekday: 'long' });
      const day = now.getDate();
      const month = now.toLocaleDateString('en-GB', { month: 'long' });
      const year = now.getFullYear();
      document.getElementById('date').textContent = `${weekday} ${day} ${month} ${year}`;
    }

    function updateClocks() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock24').textContent = `${h}:${m}:${s}`;
      let hour12 = now.getHours() % 12 || 12;
      let ampm = now.getHours() < 12 ? 'AM' : 'PM';
      document.getElementById('clock12').textContent = `${hour12.toString().padStart(2, '0')}:${m}:${s} ${ampm}`;
    }

    function formatTime(t) {
      const hrs = String(Math.floor(t / 3600)).padStart(2, '0');
      const mins = String(Math.floor((t % 3600) / 60)).padStart(2, '0');
      const secs = String(t % 60).padStart(2, '0');
      return `${hrs}:${mins}:${secs}`;
    }

    let countdownInterval, countdownTime = 0, countdownRunning = false, buzzerPlayed = false;

    function updateCountdownDisplay() {
      document.getElementById('countdownDisplay').textContent = formatTime(countdownTime);
    }

    function playBuzzer() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.3);
        oscillator.onended = () => audioCtx.close();
      } catch (e) {
        console.error('AudioContext error:', e);
      }
    }

    function countdownTick() {
      if (countdownTime > 0) {
        countdownTime--;
        updateCountdownDisplay();
      } else {
        if (!buzzerPlayed) { playBuzzer(); buzzerPlayed = true; }
        clearInterval(countdownInterval);
        countdownRunning = false;
      }
    }

    function startCountdown() {
      if (countdownTime <= 0) { alert("Please enter a time greater than zero!"); return; }
      if (!countdownRunning) { buzzerPlayed = false; countdownRunning = true; countdownInterval = setInterval(countdownTick, 1000); }
    }

    function stopCountdown() { clearInterval(countdownInterval); countdownRunning = false; }
    function resetCountdown() {
      countdownTime = 0; updateCountdownDisplay(); buzzerPlayed = false; stopCountdown();
      document.getElementById('countHours').value = '';
      document.getElementById('countMinutes').value = '';
      document.getElementById('countSeconds').value = '';
    }

    document.getElementById('countHours').addEventListener('input', handleCountdownInput);
    document.getElementById('countMinutes').addEventListener('input', handleCountdownInput);
    document.getElementById('countSeconds').addEventListener('input', handleCountdownInput);

    function handleCountdownInput() {
      stopCountdown(); buzzerPlayed = false;
      const hrs = parseInt(document.getElementById('countHours').value) || 0;
      const mins = parseInt(document.getElementById('countMinutes').value) || 0;
      const secs = parseInt(document.getElementById('countSeconds').value) || 0;
      countdownTime = hrs*3600 + mins*60 + secs;
      updateCountdownDisplay();
    }

    let stopwatchTime = 0, stopwatchInterval, stopwatchRunning = false;

    function updateStopwatchDisplay() { document.getElementById('stopwatchDisplay').textContent = formatTime(stopwatchTime); }
    function stopwatchTick() { stopwatchTime++; updateStopwatchDisplay(); }
    function startStopwatch() { if (!stopwatchRunning) { stopwatchRunning = true; stopwatchInterval = setInterval(stopwatchTick, 1000); } }
    function stopStopwatch() { clearInterval(stopwatchInterval); stopwatchRunning = false; }
    function resetStopwatch() { stopwatchTime = 0; updateStopwatchDisplay(); }

    updateDate(); updateClocks(); updateCountdownDisplay(); updateStopwatchDisplay();
    setInterval(updateDate, 60000); setInterval(updateClocks, 1000);
  </script>

  <footer>
    <p>&copy; 2026 Perfectly Practical English™. All rights reserved.</p>
  </footer>

  <script>
    const borderDiv = document.createElement('div');
    borderDiv.style.position = 'fixed';
    borderDiv.style.inset = '0';
    borderDiv.style.border = '12px solid #39FF14';
    borderDiv.style.boxSizing = 'border-box';
    borderDiv.style.zIndex = '9999';
    borderDiv.style.pointerEvents = 'none';
    document.body.appendChild(borderDiv);
  </script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>

</body>
</html>
