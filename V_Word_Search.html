const sections = [];

const blocks = rawWords
  .split(/(?=[~|])/g)
  .map(b => b.trim())
  .filter(Boolean);

blocks.forEach(block => {
  const type = block[0]; // "~" or "|"
  const lines = block.split('\n').map(l => l.trim()).filter(Boolean);

  // =====================
  // ~ SECTION TYPE
  // =====================
  if (type === '~') {
    const sectionTitle = lines[0].slice(1).trim();
    const words = [];

    for (let i = 1; i < lines.length; i++) {
      if (lines[i].startsWith('•')) {
        const firstWord = lines[i]
          .slice(1)
          .trim()
          .split(/\s+/)[0]; // ✅ FIRST WORD ONLY

        if (firstWord) words.push(firstWord);
      }
    }

    sections.push({
      title: sectionTitle,
      description: sectionTitle,
      words
    });
  }

  // =====================
  // | SECTION TYPE
  // =====================
  if (type === '|') {
    for (let i = 1; i < lines.length; i++) {
      if (!lines[i].startsWith('•')) continue;

      const header = lines[i].slice(1).trim();
      const sectionTitle = header.split('-')[0].trim();

      const secondLine =
        lines[i + 1] && !lines[i + 1].startsWith('•')
          ? lines[i + 1]
          : '';

      const words = secondLine
        .split(',')
        .map(w => w.trim())
        .filter(Boolean);

      sections.push({
        title: sectionTitle,
        description: header,
        words
      });
    }
  }
});

let activeSectionIndex = 0;

function buildSectionTOC() {
  const toc = document.getElementById('section-toc');

      document.getElementById('toc-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'block';


      resetGame();
    };

    toc.appendChild(button);
  });
}

        function createRandomGrid() {
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            randomGridTemplate = Array(15).fill().map(() => 
                Array(15).fill().map(() => alphabet.charAt(Math.floor(Math.random() * alphabet.length)))
            );
        }

        // Generate a grid from the static random template
        function generateGrid() {
            grid = randomGridTemplate.map(row => [...row]);
            const gridContainer = document.getElementById('grid-container');
            gridContainer.innerHTML = '';

            for (let row = 0; row < 15; row++) {
                for (let col = 0; col < 15; col++) {
                    const gridSquare = document.createElement('div');
                    gridSquare.classList.add('grid-square');
gridSquare.addEventListener('click', () =>
    toggleSquare(gridSquare, row, col)
);

                    gridContainer.appendChild(gridSquare);
                }
            }

            placeWordsOnGrid();
            updateWordBank();
            updateUnplacedWords();
        }

        function placeWordsOnGrid() {
            words.forEach(word => {
                let placed = false;
                let attempts = 0;
                const maxAttempts = 10; // Max attempts per word to place it

                while (!placed && attempts < maxAttempts) {
                    const direction = Math.random() < 0.5 ? 'horizontal' : 'vertical';
                    const startRow = Math.floor(Math.random() * 15);
                    const startCol = Math.floor(Math.random() * 15);

                    const gridWord = word.replace(/[^a-z]/gi, '').toUpperCase();

if (canPlaceWord(gridWord, startRow, startCol, direction)) {

placeWord(gridWord, startRow, startCol, direction);
usedWords.push(word);

                        placed = true;
                    }
                    attempts++;
                }

                // If the word couldn't be placed, mark it as unplaced
                if (!placed) {
                    unplacedWords.push(word);
                }
            });
        }

        function canPlaceWord(word, row, col, direction) {
            if (direction === 'horizontal' && col + word.length <= 15) {
                for (let i = 0; i < word.length; i++) {
                    if (grid[row][col + i] !== randomGridTemplate[row][col + i]) {
                        return false;
                    }
                }
                return true;
            } else if (direction === 'vertical' && row + word.length <= 15) {
                for (let i = 0; i < word.length; i++) {
                    if (grid[row + i][col] !== randomGridTemplate[row + i][col]) {
                        return false;
                    }
                }
                return true;
            }
            return false;
        }

        function placeWord(word, row, col, direction) {
            const wordCoords = [];
            for (let i = 0; i < word.length; i++) {
                if (direction === 'horizontal') {
                    grid[row][col + i] = word[i].toUpperCase();
                    wordCoords.push({ row, col: col + i });
                } else {
                    grid[row + i][col] = word[i].toUpperCase();
                    wordCoords.push({ row: row + i, col });
                }
            }

            wordCoordinates[word] = wordCoords;
            refreshGrid();
        }

        function refreshGrid() {
            const gridContainer = document.getElementById('grid-container');
            let index = 0;
            for (let row = 0; row < 15; row++) {
                for (let col = 0; col < 15; col++) {
                    const gridSquare = gridContainer.children[index];
                    gridSquare.textContent = grid[row][col] === ' ' ? '' : grid[row][col];
                    index++;
                }
            }
        }

        function toggleSquare(square, row, col) {
            const letter = grid[row][col];
            if (letter === ' ') return;

            const word = getWordFromCoordinates(row, col);
            if (word && wordCoordinates[word].some(coord => coord.row === row && coord.col === col)) {
                square.classList.add('active');
                square.style.backgroundColor = '#add8e6';
            }
        }

        function getWordFromCoordinates(row, col) {
            for (const [word, coords] of Object.entries(wordCoordinates)) {
                if (coords.some(coord => coord.row === row && coord.col === col)) {
                    return word;
                }
            }
            return null;
        }

function updateWordBank() {
    const wordBankElement = document.getElementById('word-bank-list');
    wordBankElement.innerHTML = '';  // Clear existing word bank

    if (usedWords.length > 0) {
        const displayWords = usedWords.map(word => word.toLowerCase());
        wordBankElement.innerHTML =
            `<strong>Word Bank:</strong> ${displayWords.join(', ')}`;
    }
}

function updateUnplacedWords() {
    const unplacedWordsElement = document.getElementById('unplaced-words');

    if (unplacedWords.length > 0) {
        const displayWords = unplacedWords.map(word => word.toLowerCase());
        unplacedWordsElement.innerHTML =
            `<strong>Unused Words:</strong> ${displayWords.join(', ')}`;
    } else {
        unplacedWordsElement.innerHTML = '';
    }
}

function resetGame() {
    usedWords = [];
    unplacedWords = [];
    wordCoordinates = {};

    const section = sections[activeSectionIndex];

    // ✅ SET HEADER TEXT
    document.getElementById('section-header').textContent = section.description;

words = section.words
    .map(w => w.trim())
    .filter(w => w.length > 1);


    createRandomGrid();
    generateGrid();
    updateWordBank();
}

function parseRawInstructions(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const html = [];

  lines.forEach(line => {

    if(line === "---"){
      html.push(`<hr>`);
      return;
    }

    if(/^\d+\./.test(line)){
      html.push(`<p>${line}</p>`);
      return;
    }

    if(!/[.!?:]$/.test(line)){
      html.push(`<h3>${line}</h3>`);
      return;
    }

    html.push(`<p>${line}</p>`);
  });

}

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>
