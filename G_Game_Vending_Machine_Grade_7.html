<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vending Matching</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body {
  background:#b3d9ff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px; /* more space from green border */
  padding-top: 2px;  /* less space from top of viewport */
  min-height:100vh;
}

/* ---- Container Shadow ---- */
.container {
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 400px;
  gap: 6px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.35);
  border-radius: 8px;
  background: #e0f0ff;
  padding: 12px;
  margin-top: 20px; /* extra spacing from top border */
  margin-bottom: 20px; /* extra spacing from bottom border */
}

/* ---- Top Inputs ---- */
#topFields { display:flex; gap:6px; margin-bottom:4px; }
#topFields input {
  width: 160px;  /* slightly narrower so it fits better */
  padding: 6px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 14px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.35);
  flex: none;
}

/* ---- Game Area ---- */
.gameArea {
  display:flex;
  gap:6px;
  align-items:flex-start;
  justify-content:center;
}

/* ---- White Grid ---- */
.whiteGrid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:4px;
  background:#C0C0C0;
  border-radius:6px;
  padding:5px;
  width:100%;
  max-width:440px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.35);
}

/* ---- Grid Cells ---- */
.whiteCell {
  display: flex;
  flex-direction: column;
  justify-content: flex-start; /* keeps content near top */
  align-items: center;         /* horizontally center content */
  background: #000;
  border: 1px solid #333;
  border-radius: 6px;
  cursor: pointer;
  height: 50px;
  font-size: 13px;
  padding: 2px;               /* uniform padding */
  color: #fff;
  text-align: center;
  overflow: hidden;
  position: relative;
  box-shadow: 0 4px 8px rgba(0,0,0,0.4);
}

/* Reduce space between word and number */
.whiteCell .wordBox {
  margin-bottom: 0px;        /* minimal space to number */
}

.whiteCell .cellNumber {
  position: absolute;
  bottom: 1px;               /* closer to bottom edge */
  font-size: 10px;
}

.whiteCell.taken { opacity:0.5; pointer-events:none; }
.whiteCell.soldOut { background:#000; }
.whiteCell.soldOut .wordBox { color:#ff3030; background:transparent; font-weight:bold; }
.whiteCell.soldOut .cellNumber { color:#fff; }

/* --- Word / Number Layout --- */
.wordBox {
  background:#ffd8a8;
  padding:3px 5px;
  border-radius:4px;
  text-align:center;
  max-width:95%;
  font-size:10px;
  color:#000;
  display:inline-block;
  word-wrap:break-word;
  overflow-wrap:break-word;
  hyphens:auto;
  line-height:1.1em;
}
.cellNumber { position:absolute; bottom:3px; font-size:10px; color:#fff; }

/* ---- Button Panel ---- */
.buttonPanel {
  display:grid;
  grid-template-columns:repeat(4,auto);
  gap:4px;
  justify-content:center;
  margin-bottom:4px;
}
.buttonPanel button, .controlButton {
  width:22px;
  height:22px;
  border-radius:50%;
  border:none;
  background:#0288d1;
  color:#fff;
  cursor:pointer;
  font-weight:bold;
  font-size:9px;
  box-shadow:0 4px 10px rgba(0,0,0,0.45);
  transition: transform 0.1s, box-shadow 0.1s;
}
.buttonPanel button:hover, .controlButton:hover {
  transform:translateY(-2px);
  box-shadow:0 6px 12px rgba(0,0,0,0.5);
}
.buttonPanel button:disabled, .controlButton:disabled { background:#888; }

/* ---- Control Buttons ---- */
.buttonControls {
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:4px;
}
.buttonControls .buttonRow { display:flex; gap:4px; }

/* Timer under buttons, flush right */
.controls { display:flex; width:100%; margin-top:2px; }
.countdownOverlay { margin-left:auto; color:#666; font-size:14px; }

/* ---- Drop Container ---- */
#dropContainer {
  background:#000;
  color:#fff;
  height:60px;
  padding:4px;
  border-radius:6px;
  border:4px solid #C0C0C0;
  display:flex;
  flex-wrap:wrap;        /* allows wrapping */
  gap:3px;
  margin-top:0px;
  overflow-y:auto;
  box-shadow:0 5px 12px rgba(0,0,0,0.4);
}
.wordTile {
  background: #ffd8a8;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  user-select: none;
  color: #000;
  box-shadow: 0 3px 6px rgba(0,0,0,0.4);
  transition: transform 0.1s, box-shadow 0.1s;

  /* Fixed size and centering */
  height: 17px;             /* fixed height */
  padding: 0 6px;           /* horizontal padding only */
  display: flex;            /* enable flexbox */
  align-items: center;      /* vertical centering */
  justify-content: center;  /* horizontal centering */
  flex: 0 0 auto;           /* don't shrink or grow */
  text-align: center;       /* center text horizontally for multi-line */
}
.wordTile.selected { border:1px solid yellow; }
.wordTile:hover {
  transform:translateY(-1px);
  box-shadow:0 5px 10px rgba(0,0,0,0.45);
}

/* ---- Scoreboard ---- */
#scoreboard {
  padding:6px;
  background:#fff;
  border:1px solid #ccc;
  border-radius:6px;
  display:none;
  font-size:12px;
  margin-top:6px;
  box-shadow:0 6px 15px rgba(0,0,0,0.4);
}
#scoreboard pre {
  white-space:pre-wrap;
  word-wrap:break-word;
  font-size:12px;
  margin-bottom:6px;
}

footer {
  width: 100%;
  max-width: 400px;
  margin: 0px auto 0;
  margin-top: -20px;
  padding: 0;
  text-align: left;
  font-size: 10px;
  box-sizing: border-box;
}

/* ===============================
   SECTION DIAL — UNIFIED ROW
   =============================== */

#sectionSelector {
  display: flex;
  align-items: stretch;    /* 🔑 forces equal height */
  gap: 3px;
  width: 100%;
  margin: 0 0 10px;
}

/* BUTTONS */
#sectionSelector button {
  flex: 0 0 38px;          /* fixed width */
  height: 38px;            /* SAME height as selector */
  padding: 0;
  font-size: 18px;
  line-height: 38px;       /* vertical centering */
  display: flex;
  align-items: center;
  justify-content: center;
}

/* SELECTOR FIELD */
#sectionWheelContainer {
  flex: 1 1 auto;          /* fills space between buttons */
  height: 38px;            /* SAME height */
  position: relative;
  background: #fff;
  border: 1px solid #999;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.15);
}

/* MOVING WHEEL */
#sectionWheelContainer .wheel {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  will-change: transform;
}

/* ITEMS */
#sectionWheelContainer .wheel-item {
  height: 38px;
  line-height: 38px;
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  color: #666;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  user-select: none;
  pointer-events: none;
}

/* SELECTED */
#sectionWheelContainer .wheel-item.selected {
  color: #000;
}

/* SUBTLE FOCUS RING */
#sectionWheelContainer::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 6px;
  pointer-events: none;
  border: 1px solid rgba(31,95,191,0.35);
}

/* BUTTONS */
.sectionBtn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 38px;
  height: 38px;
  font-size: 18px;
  padding: 0;
  line-height: 1;
  z-index: 2;
}

#sectionUp {
  left: -3px;
}

#sectionDown {
  right: -3px;
}


.wheel-item.placeholder {
  color: #999;
  font-style: italic;
  pointer-events: none; /* cannot select */
}


</style>
</head>

<script>
// --- JS fully preserved ---
const whiteGrid=document.getElementById('whiteGrid');
const buttonPanel=document.getElementById('buttonPanel');
const dropContainer=document.getElementById('dropContainer');
const buzzer=document.getElementById('buzzer');
const clickSound=document.getElementById('clickSound');
const backButton=document.getElementById('backButton');
const nextButton=document.getElementById('nextButton');
const submitButton=document.getElementById('submitButton');
const returnButton=document.getElementById('returnButton');
const countdownOverlay=document.getElementById('countdownOverlay');
const nameField=document.getElementById('nameField');
const idField=document.getElementById('idField');
const scoreboard=document.getElementById('scoreboard');
const scoreData=document.getElementById('scoreData');
const copyButton=document.getElementById('copyButton');
const downloadTxtButton=document.getElementById('downloadTxtButton');
const downloadPngButton=document.getElementById('downloadPngButton');


const sectionUp = document.getElementById('sectionUp');
const sectionDown = document.getElementById('sectionDown');
const startButton = document.getElementById('startButton');


/* 🔽🔽🔽 PUT THIS BLOCK RIGHT HERE 🔽🔽🔽 */

const wheel = document.querySelector('#sectionWheelContainer .wheel');

const sectionUpBtn   = document.getElementById('sectionUp');
const sectionDownBtn = document.getElementById('sectionDown');


function renderSectionWheel() {
  wheel.innerHTML = '';

  if (currentSectionIndex === -1) {
    const div = document.createElement('div');
    div.className = 'wheel-item selected placeholder';
    div.textContent = 'Select a topic.';
    wheel.appendChild(div);
    wheel.style.transform = 'translateY(0)';
    return;
  }

  sections.forEach((sec, i) => {
    const div = document.createElement('div');
    div.className =
      'wheel-item' + (i === currentSectionIndex ? ' selected' : '');
    div.textContent = sec.title;
    wheel.appendChild(div);
  });

  wheel.style.transform = `translateY(${-currentSectionIndex * 38}px)`;
}

sectionUp.addEventListener('click', () => {
  if (!sections.length) return;

  currentSectionIndex =
    currentSectionIndex <= 0
      ? sections.length - 1
      : currentSectionIndex - 1;

  currentIndex = 0;
  renderSectionWheel();
});

sectionDown.addEventListener('click', () => {
  if (!sections.length) return;

  currentSectionIndex =
    currentSectionIndex >= sections.length - 1
      ? 0
      : currentSectionIndex + 1;

  currentIndex = 0;
  renderSectionWheel();
});

function activateSelectedSection() {
  if (currentSectionIndex === -1) return;

  currentIndex = 0;
  renderPuzzle(currentIndex);
}

startButton.addEventListener('click', () => {
  if (!sections.length) return;

  activateSelectedSection();
  startTimer();
});




/* 🔼🔼🔼 END INSERT 🔼🔼🔼 */



function parseSections(raw) {
  const lines = raw.split('\n').map(l => l.trim());
  const sections = [];
  let current = null;

  for (const line of lines) {
    if (!line) continue;

    if (line.startsWith('~')) {
      current = {
        title: line.replace(/^~+/, '').trim(),
        lines: []
      };
      sections.push(current);
    } else if (current) {
      current.lines.push(line);
    }
  }
  return sections;
}

const rawText = document.getElementById('rawTextInput').value;
const sections = parseSections(rawText);


let currentSectionIndex = -1; // show placeholder initially
let currentIndex = 0;



let userAnswers = sections.map(
  sec => sec.lines.map(() => [])
);

let gridState = sections.map(
  sec => sec.lines.map(() => null)
);
let selectedTile=null;
let timer=60;
let timerInterval;

function shuffle(a){const arr=a.slice();for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function splitWordsWithPunctuation(sentence) {
  // 1️⃣ Remove pipe symbols but keep the text inside them
  const cleaned = sentence.replace(/\|/g, '');

  // 2️⃣ Split into words + punctuation
  const regex = /[A-Za-z0-9’'\-]+(?:[.,!?;:]+)?(?=\s|$)/g;
  return cleaned.match(regex) || [];
}


function addWordToDropContainer(word){
  const tile=document.createElement('div');
  tile.className='wordTile';
  tile.textContent=word;
  tile.addEventListener('click',()=>{if(selectedTile===tile){ selectedTile.classList.remove('selected'); selectedTile=null; } else if(selectedTile){ dropContainer.insertBefore(selectedTile,tile); selectedTile.classList.remove('selected'); selectedTile=null; } else { selectedTile=tile; tile.classList.add('selected'); }});
  dropContainer.appendChild(tile);
}

function renderPuzzle(index){
  whiteGrid.innerHTML=""; buttonPanel.innerHTML=""; dropContainer.innerHTML="";
let cells, takenCells;

const state = gridState[currentSectionIndex][index];

if (state) {
  cells = state.cells.slice();
  takenCells = state.taken.slice();
} else {
  const sentence =
    sections[currentSectionIndex].lines[index];

  const words =
    splitWordsWithPunctuation(sentence);

  const totalCells = 24;
  cells = [...words];
  while (cells.length < totalCells) cells.push("Sold Out");
  cells = shuffle(cells);
  takenCells = [];

  gridState[currentSectionIndex][index] = {
    cells: cells.slice(),
    taken: takenCells.slice()
  };
}
  for(let i=0;i<24;i++){
    const word=cells[i]; const cell=document.createElement('div'); cell.className='whiteCell'; if(word==="Sold Out")cell.classList.add('soldOut'); if(takenCells.includes(i))cell.classList.add('taken');
    const wordDiv=document.createElement('div'); wordDiv.className='wordBox'; wordDiv.textContent=word;
    const numDiv=document.createElement('div'); numDiv.className='cellNumber'; numDiv.textContent=i+1;
    cell.appendChild(wordDiv); cell.appendChild(numDiv); whiteGrid.appendChild(cell);
    const btn=document.createElement('button'); btn.textContent=i+1; btn.addEventListener('click',()=>{if(word==="Sold Out"){ buzzer.currentTime=0; buzzer.play(); return; } if(!cell.classList.contains('taken')){ addWordToDropContainer(word); cell.classList.add('taken'); takenCells.push(i); clickSound.currentTime=0; clickSound.play(); } });
    buttonPanel.appendChild(btn);
  }
const saved = userAnswers[currentSectionIndex][index];
if (saved && saved.length) {
  saved.forEach(word => addWordToDropContainer(word));
}
} // ✅ CLOSE renderPuzzle

// ✅ SAVE ANSWER MUST BE GLOBAL
function saveAnswer() {
  const words = [...dropContainer.children].map(t => t.textContent);
  userAnswers[currentSectionIndex][currentIndex] = words;

  const state = gridState[currentSectionIndex][currentIndex];
  if (state) {
    let takenCells = [];
    const cells = whiteGrid.children;
    for (let i = 0; i < cells.length; i++) {
      if (cells[i].classList.contains('taken')) takenCells.push(i);
    }
    state.taken = takenCells.slice();
  }
}
backButton.addEventListener('click',()=>{saveAnswer(); const len = sections[currentSectionIndex].lines.length;
currentIndex = (currentIndex - 1 + len) % len;
 renderPuzzle(currentIndex);});
nextButton.addEventListener('click',()=>{saveAnswer(); const len = sections[currentSectionIndex].lines.length;
currentIndex = (currentIndex + 1) % len;
 renderPuzzle(currentIndex);});
submitButton.addEventListener('click', () => {
  saveAnswer(); // Save the current dropContainer

  const name = nameField.value.trim() || 'Anonymous';
  const id = idField.value.trim() || 'N/A';
  const filename = window.location.pathname.split('/').pop() || 'unknown.html';

// --- Count correct answers ---
let correctCount = 0;
let total = 0;

    ) {
      correctCount++;
    }
  });
});

  // --- Final data string ---
  const resultText = `${filename}|${name}|${id}|${dateString}|${correctCount}/${total}|${percentage}%`;

saveResult(resultText);

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});

<script>

(function(){

/* =========================
   RAW INSTRUCTIONS TEXT
========================= */

const RAW_TEXT = `

How to play...

1. Enter Name and ID.
2. Select a category.
3. Click Start to begin.
4. Click numbers to select words.
5. Rearrange the words into the correct order.
6. Click the forward arrow button to go to the next exercise, or click the back arrow button to go back.
7. Click Submit to see your score.
8. Copy or download your score.

`;


/* =========================
   RAW TEXT PARSER
========================= */

function parseRawInstructions(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const html = [];

  lines.forEach(line => {

    if(line === "---"){
      html.push(`<hr>`);
      return;
    }

    if(/^\d+\./.test(line)){
      html.push(`<p>${line}</p>`);
      return;
    }

    if(!/[.!?:]$/.test(line)){
      html.push(`<h3>${line}</h3>`);
      return;
    }

    html.push(`<p>${line}</p>`);
  });

  return html.join("");
}


/* =========================
   CREATE STYLE
========================= */

const style = document.createElement("style");

style.textContent = `
#instructionsBtn{

`;

document.head.appendChild(style);


/* =========================

========================= */

const btn = document.createElement("button");
btn.id = "instructionsBtn";

document.body.appendChild(btn);


/* =========================
   CREATE MODAL
========================= */

const root = document.createElement("div");
root.id = "instructionsRoot";

root.innerHTML = `
<div id="instructionsBackdrop"></div>

<div id="instructionsModal">

  <div id="instructionsHeader">
    <button id="instructionsBack">←</button>
    <span id="instructionsTitle">Instructions</span>
  </div>

  <div id="instructionsContent">
    ${parseRawInstructions(RAW_TEXT)}

</div>
`;

document.body.appendChild(root);


/* =========================

========================= */

const modalContent = document.getElementById("instructionsContent");

modalContent.addEventListener("wheel", e=>{

},{passive:false});

modalContent.addEventListener("touchmove", e=>{

/* =========================
   OPEN / CLOSE
========================= */

function openModal(){
  root.style.display="block";
  document.body.style.overflow="hidden";

}

function closeModal(){
  root.style.display="none";
  document.body.style.overflow="";

}

})();
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>
