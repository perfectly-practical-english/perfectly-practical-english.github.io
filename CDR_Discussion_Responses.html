<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Classroom Thread Display</title>

<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background: #fff;
    color: #111;
    overflow: hidden;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 10px;
  }

  .container {
    width: 100%;
    max-width: 800px;
  }

  h1 {
    font-size: 20px;
    margin: 0 0 10px 0;
    color: #222;
  }

  /* THREAD DISPLAY */
  #thread {
    height: 90vh;
    overflow-y: auto;
    border: 2px solid #39FF14;
    border-radius: 6px;
    padding: 12px;
    background: #fafafa;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .post {
    border-bottom: 1px solid #ddd;
    padding: 8px 0;
  }

  .postHeader {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: #444;
  }

  .postName {
    font-weight: bold;
    color: #222;
  }

  .postBody {
    font-size: 16px;
    margin-top: 4px;
    white-space: pre-wrap;
  }

  /* CLEAN SCROLLBAR (optional aesthetic) */
  #thread::-webkit-scrollbar {
    width: 8px;
  }

  #thread::-webkit-scrollbar-thumb {
    background: #39FF14;
    border-radius: 10px;
  }
</style>
</head>

<body>

<div class="container">
  <h1>Live Class Thread</h1>
  <div id="thread"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://etwwriloppklhhkmswpr.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0d3dyaWxvcHBrbGhoa21zd3ByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NDM3NTcsImV4cCI6MjA5NDExOTc1N30.rmquTqYW6WqS7jZUbHM_gWecka3jkiWzYb14eJ10hpQ"
);

const thread = document.getElementById("thread");

/* RENDER */
function renderPost(p) {
  const div = document.createElement("div");
  div.className = "post";

  const header = document.createElement("div");
  header.className = "postHeader";

  const name = document.createElement("span");
  name.className = "postName";
  name.textContent = `${p.name} (${p.student_id})`;

  const time = document.createElement("span");
  time.textContent = p.time;

  header.appendChild(name);
  header.appendChild(time);

  const body = document.createElement("div");
  body.className = "postBody";
  body.textContent = p.message;

  div.appendChild(header);
  div.appendChild(body);

  thread.appendChild(div);
}

/* LOAD THREAD */
async function loadThread() {

  const { data, error } = await supabaseClient
    .from("instant_input")
    .select("entry")
    .order("id", { ascending: false });

  if (error) {
    console.error("Load error:", error);
    return;
  }

  thread.innerHTML = "";

  for (const row of data) {
    try {
      const post = JSON.parse(row.entry);
      renderPost(post);
    } catch (e) {
      console.warn("Bad row:", row.entry);
    }
  }
}

/* INIT */
loadThread();
setInterval(loadThread, 5000);
</script>

</body>
</html>
