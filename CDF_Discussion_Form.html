<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Perfectly Practical English™</title>

<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background: #fff;
    color: #111;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
    gap: 8px;
  }

  .container {
    width: 100%;
    max-width: 375px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  h1 {
    font-size: 20px;
    margin: 0;
    color: #222;
  }

  /* THREAD (SUPABASE DISPLAY) */
  #thread {
    height: 300px;
    overflow-y: auto;
    border: 2px solid #39FF14;
    border-radius: 6px;
    padding: 10px;
    background: #fafafa;
    display: flex;
    flex-direction: column;
  }

  .post {
    border-bottom: 1px solid #ddd;
    padding: 6px 0;
  }

  .postHeader {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #444;
  }

  .postName {
    font-weight: bold;
    color: #222;
  }

  .postBody {
    font-size: 15px;
    margin-top: 4px;
    white-space: pre-wrap;
  }

  /* ROW: NAME + ID + POST */
  #inputRow {
    display: flex;
    gap: 6px;
  }

  #nameInput, #idInput {
    width: 140px;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #aaa;
  }

  #postBtn {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 6px;
    background: #007aff;
    color: white;
    cursor: pointer;
  }

  /* MESSAGE INPUT */
  #messageInput {
    width: 100%;
    min-height: 60px;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #aaa;
    font-size: 15px;
  }

  /* SPEECH CONTROLS */
  #speechRow {
    display: flex;
    gap: 6px;
  }

  #startBtn, #stopBtn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
  }

  #startBtn { background: #2ecc71; }
  #stopBtn { background: #e74c3c; }

  #status {
    font-size: 12px;
    color: #444;
  }

  /* NEON BORDER */
  #border {
    position: fixed;
    inset: 0;
    border: 10px solid #39FF14;
    pointer-events: none;
    z-index: 9999;
  }

</style>
</head>

<body>

<div id="border"></div>

<div class="container">

  <h1>Comments Section</h1>

  <!-- 1. THREAD (SUPABASE OUTPUT) -->
  <div id="thread"></div>

  <!-- 2. NAME + ID + POST -->
  <div id="inputRow">
    <input id="nameInput" placeholder="Name">
    <input id="idInput" placeholder="ID">
    <button id="postBtn">Post</button>
  </div>

  <!-- 3. MESSAGE INPUT -->
  <textarea id="messageInput" placeholder="Type your message…"></textarea>

  <!-- 4. SPEECH -->
  <div id="status"></div>

  <div id="speechRow">
    <button id="startBtn">Start</button>
    <button id="stopBtn">Stop</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://etwwriloppklhhkmswpr.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0d3dyaWxvcHBrbGhoa21zd3ByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NDM3NTcsImV4cCI6MjA5NDExOTc1N30.rmquTqYW6WqS7jZUbHM_gWecka3jkiWzYb14eJ10hpQ"
);

/* ELEMENTS */
const thread = document.getElementById("thread");

const nameInput = document.getElementById("nameInput");
const idInput = document.getElementById("idInput");
const msgInput = document.getElementById("messageInput");

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const postBtn = document.getElementById("postBtn");

const statusBox = document.getElementById("status");

/* SPEECH */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.continuous = true;
recognition.interimResults = true;
recognition.lang = "en-US";

recognition.onresult = (event) => {
  let text = "";
  for (let i = 0; i < event.results.length; i++) {
    text += event.results[i][0].transcript + " ";
  }
  msgInput.value = text.trim();
};

recognition.onerror = (e) => {
  statusBox.textContent = "Speech error: " + e.error;
};

/* START / STOP */
startBtn.onclick = () => {
  recognition.start();
  statusBox.textContent = "Recording...";
};

stopBtn.onclick = () => {
  recognition.stop();
  statusBox.textContent = "Stopped";
};

/* THREAD RENDER */
function renderPost(p) {
  const div = document.createElement("div");
  div.className = "post";
  div.innerHTML = `
    <div class="postHeader">
      <span class="postName">${p.name} (${p.student_id})</span>
      <span>${p.time}</span>
    </div>
    <div class="postBody">${p.message}</div>
  `;
  thread.prepend(div);
}

/* TIME */
function timeStamp() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

/* POST → SUPABASE */
postBtn.onclick = async () => {

  const payload = {
    name: nameInput.value || "Anonymous",
    student_id: idInput.value || "-",
    time: timeStamp(),
    message: msgInput.value || ""
  };

  if (!payload.message.trim()) return;

  renderPost(payload);

  const { error } = await supabaseClient
    .from("instant_input")
    .insert({
      entry: JSON.stringify(payload)
    });

  if (error) {
    statusBox.textContent = "❌ " + error.message;
  } else {
    statusBox.textContent = "Saved";
    msgInput.value = "";
  }
};

</script>

<script>
/* =========================
   THREAD LOADER (SINGLE SOURCE OF TRUTH)
========================= */

async function loadThread() {

  const { data, error } = await supabaseClient
.from("instant_input")
.select("entry")
.order("created_at", { ascending: false });

  if (error) {
    console.error("Load error:", error);
    return;
  }

  thread.innerHTML = "";

  for (const row of data) {
    try {
      const post = JSON.parse(row.entry);
      renderPost(post);
    } catch (e) {
      console.warn("Bad row:", row.entry);
    }
  }
}

/* INITIAL LOAD */
loadThread();

/* AUTO REFRESH */
setInterval(loadThread, 5000);
</script>

</body>
</html>
