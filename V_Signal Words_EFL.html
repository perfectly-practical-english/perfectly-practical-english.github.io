<script>
/* =========================================
   UNIVERSAL RAW TEXT RESOLVER (PER BLOCK)
   ========================================= */

/**
 * resolveRaw(source)
 * - If source is a filename (single line, no newlines), load it
 * - Otherwise treat source as literal raw text
 */
async function resolveRaw(source) {
  if (typeof source === "string" && !source.includes("\n")) {
    try {
      const res = await fetch(source, { cache: "no-store" });
      if (res.ok) return await res.text();
    } catch {}
  }
  return source;
}
</script>




<script>

   STANDALONE SECTION VISIBILITY PATCH

(function () {
  const up = document.getElementById("sectionUp");
  const down = document.getElementById("sectionDown");
  const wheel = document.querySelector("#sectionWheelContainer .wheel");
  const startBtn = document.getElementById("sectionStart");

  if (!up || !down || !wheel || !startBtn) return;

  function waitForSections() {
    if (
      !Array.isArray(window.SCRAMBLE_SECTIONS) ||
      !Array.isArray(window.RAW_SECTIONS)
    ) {
      setTimeout(waitForSections, 50);
      return;
    }

    /* ---------- PLACEHOLDER STATE ---------- */
    window.SCRAMBLE_INDEX = -1;           // no selection yet
    window.CURRENT_SECTION = null;
    wheel.textContent = "Select a category.";
    startBtn.disabled = true;

    /* ---------- START BUTTON ---------- */
    startBtn.addEventListener("click", () => {
      if (
        window.SCRAMBLE_INDEX >= 0 &&
        typeof window.startPOSSection === "function"
      ) {
        window.startPOSSection();
      }
    });

    /* ---------- INDEX HANDLER ---------- */
    function setIndex(index) {
      if (index < 0) index = 0;
      if (index >= window.RAW_SECTIONS.length) {
        index = window.RAW_SECTIONS.length - 1;
      }

      window.SCRAMBLE_INDEX = index;
      window.CURRENT_SECTION = window.RAW_SECTIONS[index];

      const section = window.SCRAMBLE_SECTIONS[index];
      wheel.textContent = section?.name || "";
      startBtn.disabled = false;
    }

    /* ---------- NAVIGATION ---------- */
    up.addEventListener("click", () => {
      setIndex(
        window.SCRAMBLE_INDEX < 0
          ? 0
          : window.SCRAMBLE_INDEX - 1
      );
    });

    down.addEventListener("click", () => {
      setIndex(
        window.SCRAMBLE_INDEX < 0
          ? 0
          : window.SCRAMBLE_INDEX + 1
      );
    });

    /* 🚫 DO NOT AUTO-SELECT ANY SECTION */
    /* (this is what was killing the placeholder) */
  }

  waitForSections();
})();
</script>

(async function initQuiz() {
  // Resolve raw text FIRST
  const rawExercises = await resolveRaw(rawExercisesSource);

// ===============================
// PARSE ~Section blocks
// ===============================
function parseRawExerciseSections(raw) {
  const sections = [];
  let current = null;

  raw.split(/\r?\n/).forEach(line => {
    const text = line.trim();
    if (!text) return;

    // "~" starts a new section (grammar only)
    if (text[0] === "~") {
      current = {
        name: text.slice(1).trim(),
        exercises: []
      };
      sections.push(current);
      return;
    }

    // any other non-empty line is an exercise
    if (current) {
      current.exercises.push(text);
    }
  });

  return sections;
}

// Parse raw exercise text into full section objects
window.RAW_SECTIONS = parseRawExerciseSections(rawExercises);

// Use first section’s first line as intro (section-safe)
const firstSection = window.RAW_SECTIONS[0];
if (firstSection && firstSection.exercises.length) {
  const instructionsEl = document.getElementById("instructions");
  if (instructionsEl) {
    instructionsEl.textContent = firstSection.exercises[0];
  }
}

// Expose section names ONLY to the selector wheel
window.SCRAMBLE_SECTIONS = window.RAW_SECTIONS.map((s, i) => ({
  id: i,
  name: s.name
}));

// Initial selector index
window.SCRAMBLE_INDEX = 0;


function parseExercise(exerciseText, index) {
  let prompt = `${index}.`;
  let sentence = exerciseText;

  // If a prompt delimiter exists, split safely
  if (exerciseText.includes(' - ')) {
    const parts = exerciseText.split(' - ');
    prompt = `${index}. ${parts[0]}`;
    sentence = parts.slice(1).join(' - ');
  }

  if (!sentence) sentence = exerciseText;

  // Tokenize: pipes > words > spaces > punctuation
  const tokens = sentence.match(
    /\|\s*[^|]+\s*\||\s+|[A-Za-z0-9']+|[.,!?;]/g
  ) || [];

  const parsedSentence = tokens.map(token => {
    // ✅ Pipe-delimited = correct answer
    if (token.startsWith('|') && token.endsWith('|')) {
      const clean = token.slice(1, -1);
      return `<span class="word" data-correct="true">${clean}</span>`;
    }

    return token.trim()
      ? `<span>${token}</span>`
      : token;
  }).join('');

  return `${prompt} ${parsedSentence}`;
}


function renderExercises() {
  const exercisesContainer = document.getElementById('exercises');

// allow rendering once exercises exist
if (!window.quizExercises || window.quizExercises.length === 0) {
  exercisesContainer.innerHTML = "";

  exercisesContainer.innerHTML = "";

  });

  document.querySelectorAll('.word').forEach(word => {
    word.addEventListener('click', handleWordClick);
  });
}

    `${String(date.getDate()).padStart(2,'0')}/` +

    `|${percentage}%`;

  document.getElementById('result').textContent = resultText;
document.getElementById('scoreboardContainer').style.display = 'block';
document.getElementById('scoreboardBtns').style.display = 'flex';

// SEND TO SUPABASE
window.saveResult(resultText);
});
  // ---------------------- EXPORT ACTIONS ----------------------

  document.getElementById('grammarCopyBtn').addEventListener('click', () => {

  document.getElementById('grammarDownloadTxtBtn').addEventListener('click', () => {

    link.download = 'score.txt';

document.getElementById('grammarDownloadPngBtn').addEventListener('click', () => {
  const resultEl = document.getElementById('result');

  const wrapper = document.createElement('div');

  // Clone result text
  const clone = resultEl.cloneNode(true);
  wrapper.appendChild(clone);

  // Temporarily add to DOM
  document.body.appendChild(wrapper);

  html2canvas(wrapper, {

  }).then(canvas => {
    const link = document.createElement('a');

<script>
/* =========================
   Buttons
========================= */
const highlightBtn = document.getElementById('highlightSelected');
const copyBtn = document.getElementById('copySelected');
const restartBtn = document.getElementById('restartBtn');
const pauseResumeBtn = document.getElementById('pauseResumeBtn');
const readStartBtn = document.getElementById('startBtn');


/* =========================
   State & Voices
========================= */
let isPaused = false;
let teacherVoice = null;
let studentVoice = null;

/* =========================
   Load voices (teacher = Zira/Samantha/US Female, student = Aria/Victoria/UK Female)
========================= */
function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;

  // Teacher: en-US Zira (Windows), Google US English Female (Chrome), Samantha (Mac)
  teacherVoice =
    voices.find(v => v.name === "Microsoft Zira" && v.lang === "en-US") ||
    voices.find(v => v.name === "Google US English Female") ||
    voices.find(v => v.name === "Samantha") ||
    voices.find(v => v.lang.startsWith("en") && v.name.toLowerCase().includes("female")) ||
    voices[0];

  // Student: en-GB Aria (Windows), Google UK English (Chrome), Victoria (Mac)
  studentVoice =
    voices.find(v => v.name === "Microsoft Aria" && v.lang === "en-GB") ||
    voices.find(v => v.name === "Google UK English") ||
    voices.find(v => v.name === "Victoria") ||
    voices.find(v => v.lang.startsWith("en") && v.name.toLowerCase().includes("female")) ||
    voices[0];
}

// Load voices dynamically
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

/* =========================
   Selection helpers
========================= */
function getSelectedText() {
  return window.getSelection().toString().trim();
}

function getReadableFromCaret() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;

  const range = sel.getRangeAt(0);

  let node = range.startContainer;
  if (node.nodeType === 3) node = node.parentElement;

  const block = node.closest('p, div, li, article, section');
  if (!block) return null;

  const subRange = document.createRange();
  subRange.selectNodeContents(block);
  subRange.setStart(range.startContainer, range.startOffset);

  const text = subRange.toString().trim();
  return text || null; // return null only if empty
}


/* =========================
   Highlight toggle
========================= */
highlightBtn.addEventListener('click', () => {
  const selection = window.getSelection();
  if (!selection.rangeCount) return;

  const range = selection.getRangeAt(0);
  if (range.collapsed) return;

  let alreadyHighlighted = false;
  const spans = range.commonAncestorContainer.querySelectorAll
    ? range.commonAncestorContainer.querySelectorAll('span.highlighted')
    : [];

  spans.forEach(span => {
    if (selection.containsNode(span, true)) {
      alreadyHighlighted = true;
    }
  });

  if (!alreadyHighlighted) {
    const span = document.createElement('span');
    span.className = 'highlighted';
    range.surroundContents(span);
  } else {
    const contents = range.cloneContents();
    const frag = document.createDocumentFragment();

    Array.from(contents.childNodes).forEach(node => {
      if (node.nodeType === 1 && node.classList.contains('highlighted')) {
        while (node.firstChild) frag.appendChild(node.firstChild);
      } else {
        frag.appendChild(node.cloneNode(true));
      }
    });

    range.deleteContents();
    range.insertNode(frag);
  }

  selection.removeAllRanges();
  selection.addRange(range);
});

/* =========================
   Copy selected text
========================= */
copyBtn.addEventListener('click', async () => {
  const text = getSelectedText();
  if (!text) return alert('No text selected');

  try {
    await navigator.clipboard.writeText(text);
    alert('Copied to clipboard!');
  } catch (err) {
    alert('Copy failed');
  }
});

/* =========================
   Speech functions
========================= */
function speakTeacher(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.voice = teacherVoice;
  u.rate = 0.88;    // slightly slower, more mature
  u.pitch = 1.15;   // slightly lower for adult warmth
  u.volume = 0.95;
  u.text = text.replace(/([,.!?])/g, "$1 "); // slight pause after punctuation
  speechSynthesis.speak(u);
}


function speakStudent(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.voice = studentVoice;
  u.rate = 0.98;
  u.pitch = 1.50;
  u.volume = 0.80;
  speechSynthesis.speak(u);
}


function speakDialog(text) {
  const lines = text.split(/\n+/).map(l => l.trim()).filter(Boolean);

  lines.forEach(line => {
    if (/^teacher:/i.test(line)) {
      speakTeacher(line.replace(/^teacher:\s*/i, ""));
    } else if (/^student:/i.test(line)) {
      speakStudent(line.replace(/^student:\s*/i, ""));
    } else {
      speakTeacher(line);
    }
  });
}

/* =========================
   START
========================= */
readStartBtn.addEventListener('click', () => {
  speechSynthesis.cancel();
  isPaused = false;
  pauseResumeBtn.textContent = '⏸';

  const selectedText = getSelectedText();
  if (selectedText) {
    speakStudent(selectedText);
    return;
  }

  const caretText = getReadableFromCaret();
  if (!caretText) {
    alert("Place the cursor inside readable text.");
    return;
  }

  speakDialog(caretText);
});

/* =========================
   Pause / Resume

    <div id="outputContainerReadingSpeaking">

      ...RAW_EXCLUDED_DIVS.matchAll(/id="([^"]+)"/g)
    ].map(m => `#${m[1]}`);


    /* =========================================
       4. Overlay engine
       ========================================= */

    const numberPattern = /^(?:Question\s*)?\d+[\.\)\:\-]/i;

    function isExcluded(el) {
      if (OVERLAY_EXCLUSIONS.some(sel => el.closest(sel))) return true;
      if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') return true;
      return false;
    }

    function createOverlay(numberEl, line) {
      if (numberEl.dataset.overlayApplied) return;

      const overlayDiv = document.createElement("div");
      overlayDiv.style.fontSize = "10px";
      overlayDiv.style.lineHeight = "10px";
      overlayDiv.style.color = "#1976d2";
      overlayDiv.style.fontWeight = "bold";
      overlayDiv.style.pointerEvents = "none";
      overlayDiv.style.marginBottom = "2px";
      overlayDiv.textContent = line;

      numberEl.parentNode.insertBefore(overlayDiv, numberEl);
      numberEl.dataset.overlayApplied = "1";
    }

    function scanAndAssignOverlays() {
      const numberEls = [];

      document.querySelectorAll("body *").forEach(el => {
        if (isExcluded(el)) return;
        if (el.childElementCount !== 0) return;

        const text = el.textContent.trim();
        if (!numberPattern.test(text)) return;

        numberEls.push(el);
      });

      numberEls.forEach((el, index) => {
        const line =
          (teamA.length && teamB.length)
            ? (index % 2 === 0
                ? teamA[Math.floor(Math.random() * teamA.length)]
                : teamB[Math.floor(Math.random() * teamB.length)])
            : allLines[Math.floor(Math.random() * allLines.length)];

        createOverlay(el, line);
      });
    }


    /* =========================================
       5. Run
       ========================================= */

    scanAndAssignOverlays();
    setInterval(scanAndAssignOverlays, 700);

  })();

<script>
// ---------------------- UNIVERSAL PIPE-BASED FEEDBACK ----------------------
document.addEventListener("DOMContentLoaded", () => {

  // --- Web Audio context ---
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioContext();

  function playCorrect() {
    audioCtx.resume().then(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    });
  }

  function playWrong() {
    audioCtx.resume().then(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(450, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.25);
      gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    });
  }

  // --- normalize strings for comparison ---
  function normalize(str) {
    return str.trim().toLowerCase().replace(/\s+/g, ' ');
  }

  // --- feedback for multiple-choice (radio/checkbox) ---
  function handleSelection(exercise, selectedValues) {
    const correct = exercise.dataset.correct.split('|').map(normalize);
    let isCorrect;

    if (exercise.querySelectorAll('input[type="checkbox"]').length > 0) {
      // Checkbox / multi-select: all selected must match all correct
      const normalizedSelected = selectedValues.map(normalize).sort();
      isCorrect = normalizedSelected.join('|') === correct.sort().join('|');
    } else {
      // Single choice or fill-in-the-blank
      isCorrect = normalize(selectedValues[0]) === correct[0];
    }

    // Remove old emoji
    exercise.querySelectorAll('.mc-emoji').forEach(span => span.remove());

    // Add emoji for radio/checkbox labels
    exercise.querySelectorAll('input').forEach(input => {
      const lbl = input.closest('label');
      if (!lbl) return;

      const inputValue = normalize(input.value || input.value);
      const span = document.createElement('span');
      span.className = 'mc-emoji';
      span.style.marginLeft = "8px";
      if (input.checked) span.textContent = isCorrect ? "😊" : "😢";
      else span.textContent = '';
      lbl.appendChild(span);
    });

    // Play sound
    if (isCorrect) playCorrect();
    else playWrong();
  }

  // --- universal event listener ---
  document.body.addEventListener('change', e => {
    const input = e.target;
    const exercise = input.closest('.exercise');
    if (!exercise) return;

    if (input.type === 'radio' || input.type === 'checkbox') {
      const selected = Array.from(exercise.querySelectorAll('input:checked')).map(inp => inp.value);
      handleSelection(exercise, selected);
    } else if (input.tagName === 'INPUT' || input.tagName === 'TEXTAREA') {
      // For FIB / text input: compare value
      handleSelection(exercise, [input.value]);
    }
  });

  console.log("✅ Universal pipe-based emoji + audio feedback initialized.");
});
</script>

(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
