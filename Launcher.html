<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Icon Grid Home</title>

<style>
  body {
    margin: 0;
    background: #f1e6ff;
    font-family: sans-serif;
    overflow: hidden;
  }

  /* Wrapper for scaling */
  .grid-wrapper {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* 5x5 GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 10px;
    width: 100vw;
    height: 100vh;
    box-sizing: border-box;

    /* Scale entire layout to half size */
    transform: scale(0.5);
    transform-origin: top left;
  }

  /* SQUARE TILE */
  .tile {
    background: #6a1bb1;
    border-radius: 18px;

    aspect-ratio: 1 / 1;
    width: 100%;

    display: flex;
    align-items: center;
    justify-content: center;

    text-decoration: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.18);

    transition: transform 0.12s ease, opacity 0.12s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .tile:active {
    transform: scale(0.95);
    opacity: 0.85;
  }

  /* CENTERED ICON */
  .tile img {
    width: 60%;
    height: 60%;
    object-fit: contain;
    display: block;
    margin: auto;
    pointer-events: none;
  }
</style>
</head>

<body>

<div class="grid-wrapper">
  <div class="grid" id="grid"></div>
</div>

<script>
const rawData = `
dining.png | A_Seating_Chart_Optimum.html
presentation.png | index.html
folder.png | .
coffee-cup.png | A_Break_Time.html
clock.png | A_Clock.html
flash-card.png | V_Flash_Cards_Grade_7.html
rabbit.png | R_A_Basic_English_Primer.html
tally-marks.png | Tallyman.html
tally-marks2.png | Tallyman.html
audio.png | Audio
big-ben.png | PPE URL.url
error.png | Junk
schedule.png | A_My_Schedule.html
`;

const items = rawData
  .trim()
  .split("\n")
  .map(line => {
    const [icon, page] = line.split("|").map(s => s.trim());
    return { icon, page };
  });

const grid = document.getElementById("grid");

items.forEach(item => {
  const a = document.createElement("a");
  a.className = "tile";
  a.href = item.page;
a.target = "_blank";


  const img = document.createElement("img");
  img.src = item.icon;

  a.appendChild(img);
  grid.appendChild(a);
});
</script>

</body>
</html>
