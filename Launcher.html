<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Icon Grid Home</title>

<style>
  body {
    margin: 0;
    background: #f1e6ff;
    font-family: sans-serif;
    overflow: hidden;
  }

  /* 5x5 GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 10px;
    height: 100vh;
    box-sizing: border-box;
  }

  /* SQUARE TILE */
  .tile {
    background: #6a1bb1;
    border-radius: 18px;

    /* KEY FIX: force square shape */
    aspect-ratio: 1 / 1;
    width: 100%;

    display: flex;
    align-items: center;
    justify-content: center;

    text-decoration: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.18);

    transition: transform 0.12s ease, opacity 0.12s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .tile:active {
    transform: scale(0.95);
    opacity: 0.85;
  }

  /* CENTERED ICON */
  .tile img {
    width: 60%;
    height: 60%;
    object-fit: contain;

    /* extra centering safety */
    display: block;
    margin: auto;

    pointer-events: none;
  }
</style>
</head>

<body>

<div class="grid" id="grid"></div>

<script>
const rawData = `
dining.png | C:\Users\User\Documents\PerfectlyPracticalEnglish.GitHub.app_6_10_2026\A_Seating_Chart_Optimum.html
book.png | C:\Users\User\Documents\PerfectlyPracticalEnglish.GitHub.app_6_10_2026\W_Composition_Book_Food_Product.html
presentation.png | C:\Users\User\Documents\PerfectlyPracticalEnglish.GitHub.app_6_10_2026\index.html
folder.png | C:\Users\User\Documents\PerfectlyPracticalEnglish.GitHub.app_6_10_2026
exam.png | C:\Users\User\Documents\PerfectlyPracticalEnglish.GitHub.app_6_10_2026\!!2026 Roll Sheets and Grades 7 David Cherry.xlsx
coffee-cup.png | C:\Users\User\Documents\PerfectlyPracticalEnglish.GitHub.app_6_10_2026\A_Break_Time.html
clock.png | C:\Users\User\Documents\PerfectlyPracticalEnglish.GitHub.app_6_10_2026\A_Clock.html
flash-card.png | C:\Users\User\Documents\PerfectlyPracticalEnglish.GitHub.app_6_10_2026\V_Flash_Cards_Grade_7.html
rabbit.png | C:\Users\User\Documents\PerfectlyPracticalEnglish.GitHub.app_6_10_2026\R_A_Basic_English_Primer.html
tally-marks.png | C:\Users\User\Documents\PerfectlyPracticalEnglish.GitHub.app_6_10_2026\Tallyman.html
tally-marks2.png | C:\Users\User\Documents\PerfectlyPracticalEnglish.GitHub.app_6_10_2026\Tallyman.html
audio.png | D:\Shortcut Folder\Audio
big-ben.png | D:\Shortcut Folder\PPE URL.url
error.png | D:\Shortcut Folder\Junk
schedule.png | C:\Users\User\Documents\PerfectlyPracticalEnglish.GitHub.app_6_10_2026\A_My_Schedule.html
`;

const items = rawData
  .trim()
  .split("\n")
  .map(line => {
    const [icon, page] = line.split("|").map(s => s.trim());
    return { icon, page };
  });

const grid = document.getElementById("grid");

items.forEach(item => {
  const a = document.createElement("a");
  a.className = "tile";
  a.href = item.page;

  const img = document.createElement("img");
  img.src = `icons/${item.icon}`;

  a.appendChild(img);
  grid.appendChild(a);
});
</script>

</body>
</html>
