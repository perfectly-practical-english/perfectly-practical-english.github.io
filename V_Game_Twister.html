<style>
:root {
  --max-width: 380px;
  --gutter: 12px;

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

html, body {
  height: 100%;
  width: 100%;
  max-width: none;
  margin: 0 auto;
  overflow-x: hidden;
}

body {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  background: #7fa9c6; /* fallback */
}


/* ───────────────────────── TOP FIELDS ───────────────────────── */
#topFields {
  display: flex;
  gap: 6px;
  margin-top: 20px;
  justify-content: center;
  align-items: center;
  width: 100%;
  max-width: 380px;       /* match section selector max-width */
  margin-left: auto;
  margin-right: auto;
  z-index: 9999;
  position: relative;
}

#topFields input,
#topFields button {
  flex-shrink: 0; /* inputs and buttons won’t shrink below their width */

  height: 36px;            /* match selector buttons */
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
  padding: 0 10px;
  box-sizing: border-box;
}

#topFields input {
  width: 90px;
}

#topFields button {
  background: #6B7280;
  color: white;
  border: none;
  cursor: pointer;
}

#topFields button:disabled {
  background: #888;
  cursor: not-allowed;
}

#countdownOverlay {
  min-width: 36px;
  text-align: center;
  font-weight: bold;
  font-size: 16px;
  color: #0288d1;
  z-index: 9999;
  position: relative;
}

/* ───────────────────────── SECTION SELECTOR ───────────────────────── */
#sectionSelectorRow {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 380px;
  margin: 10px auto 0;
  padding: 0;
  box-sizing: border-box;
  z-index: 9999;
  position: relative;

  /* nudge row 3px left to fix offset */
  transform: translateX(-4px);
}

/* Buttons */
#sectionUp,
#sectionDown {
  flex: 0 0 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid transparent; /* match top inputs */
  background: #6B7280;
  color: white;
  cursor: pointer;
  transition: background 0.15s ease, transform 0.1s ease;
  padding: 0;
  margin: 0;
}

/* Wheel spacing using button margins */
#sectionUp {
  margin-right: 6px;
}

#sectionDown {
  margin-left: 6px;
}

#sectionUp:hover,
#sectionDown:hover {
  background: #0277bd;
}

#sectionUp:active,
#sectionDown:active {
  transform: scale(0.97);
}

#sectionUp:disabled,
#sectionDown:disabled {
  background: #888;
  cursor: not-allowed;
}

/* Wheel Container */
#sectionWheelContainer {
  flex: 0 0 260px;
  height: 36px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background: white;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 0 10px;  /* match top inputs */
  box-sizing: border-box;
  margin: 0;
}

.wheel {
  flex: 1;
  padding-left: 0;
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  box-sizing: border-box;
}
#windCanvas {
  position: fixed;
  inset: 0;

  width: 100vw;
  height: 100vh;

  pointer-events: none;
  z-index: 999; /* above tornado, below UI if needed */
}


#gameArea {
  position: relative;
  width: 100%;
  height: 240px;
  overflow: visible;
  background: transparent;
}


#ufoContainer {
  position: absolute;
  top: -60px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

#ufo {
  font-size: 200px;
}

#beam {
  position: absolute;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  width: 180px;
  height: 230px;
  background: radial-gradient(
    ellipse at top,
    rgba(255,255,150,0.6) 0%,
    rgba(255,255,0,0.1) 80%
  );
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  opacity: 0;
  transition: opacity 0.3s;
}

/* ───────────────────────── ANIMALS ───────────────────────── */

.cow {
  position: absolute;
  bottom: 50px;                 /* anchor all animals to same ground */
  display: flex;
  align-items: flex-end;    /* align bottoms instead of centers */
  gap: 6px;

.cowWord {

/* ───────────────────────── INPUT AREA ───────────────────────── */

<script>
function parseVocabInput(rawText) {
  if (!rawText) return [];
  return rawText
    .replace(/<br\s*\/?>/gi, "\n")
    .split(/[\n,]+/)
    .map(w =>
      w.trim().toLowerCase().replace(/[^a-z0-9'-]/g, "")
    )
    .filter(Boolean)
    .filter((word, index, array) => array.indexOf(word) === index);
}
</script>

<script>
function parseSections(raw) {
  const chunks = raw.split(/\n(?=~+)/);

  return chunks
    .map(chunk => chunk.trim())
    .filter(chunk => chunk.startsWith("~"))
    .map(chunk => {
      const lines = chunk.split("\n");
      const name = lines.shift().replace(/^~+/, "").trim();
      const text = lines.join("\n").trim();
      return { name, text };
    });
}

function extractWords(sectionText) {
  const lines = sectionText
    .replace(/<br\s*\/?>/gi, "\n")
    .split("\n")
    .map(l => l.trim())
    .filter(Boolean);

  const words = [];

  lines.forEach(line => {
    if (!line.startsWith("•")) return;

    const vocabWord = line
      .replace(/^•\s*/, "")      // remove bullet
      .split(/[–—-]/)[0]         // remove description
      .replace(/[^\p{L}\s]/gu, "") // strip emoji/symbols
      .trim()
      .toLowerCase()
      .split(/\s+/)[0];          // first word only

    if (vocabWord) words.push(vocabWord);
  });

  return words;
}
</script>



<script>
async function loadVocab(raw) {
  // filename mode
  if (
    typeof raw === "string" &&
    raw.trim().endsWith(".txt") &&
    !raw.includes("\n") &&
    !raw.includes(" ")
  ) {
    const res = await fetch(raw.trim());
    const text = await res.text();
    return parseVocabInput(text);
  }

  // embedded raw text mode
  return parseVocabInput(raw);
}
</script>

const spacingPattern = [50, 75, 100, 50]; // spacing between animals
const cowSpeed = 1.2;  // pixels per frame
let nextTrainStartX = -100;
let trainInProgress = false;

function spawnCowTrain() {
  trainInProgress = true;
  let trainCows = [];

  let currentX = nextTrainStartX;

  // create each animal, positioned relative to the previous one
  animalPattern.forEach((emoji, i) => {
    const cow = document.createElement("div");
    cow.className = "cow";
    cow.style.position = "absolute";
    cow.style.left = `${currentX}px`;
    cow.style.bottom = "50px";
    cow.innerHTML = `<span class="cowIcon">${emoji}</span>`;
    gameArea.appendChild(cow);
    cows.push(cow);
    trainCows.push(cow);

    // move currentX forward for the next cow
    let spacing = spacingPattern[i % spacingPattern.length];
    currentX -= spacing; // animals go off-screen to the left initially
  });

  // move entire train as a unit
  const moveTrain = setInterval(() => {
    trainCows.forEach(cow => {
      let x = parseFloat(cow.style.left);
      x += cowSpeed;
      cow.style.left = x + "px";

      const ufoRect = ufoContainer.getBoundingClientRect();
      const cowRect = cow.getBoundingClientRect();
      const cowCenterX = cowRect.left + cowRect.width / 2;

      if (pendingAbduction && Math.abs(cowCenterX - (ufoRect.left + ufoRect.width/2)) < 20) {
        pendingAbduction = false;
        beam.classList.add('beamOn');
        suckCowToUFO(cow);
        setTimeout(() => beam.classList.remove('beamOn'), 1000);
      }

      if (x > window.innerWidth + 150) {
        cow.remove();
        cows = cows.filter(c => c !== cow);
      }
    });

    if (!trainCows.some(c => gameArea.contains(c))) {
      clearInterval(moveTrain);
      trainInProgress = false;
    }
  }, 20);
}

  if (gameStarted && !trainInProgress) {
    nextTrainStartX = -100;
    spawnCowTrain();
  }

function suckCowToUFO(cow) {
  clearInterval(cow.moveInterval);
  const ufoRect = ufoContainer.getBoundingClientRect();
  const cowRect = cow.getBoundingClientRect();
  const distX = (ufoRect.left + ufoRect.width / 2) - (cowRect.left + cowRect.width / 2);
  const distY = (ufoRect.top + ufoRect.height / 2) - (cowRect.top + cowRect.height / 2);

  cow.style.transition = "transform 1.5s linear, opacity 1.2s linear";
  requestAnimationFrame(() => {
    cow.style.transform = `translate(${distX}px, ${distY}px)`;
    cow.style.opacity = "0";
  });

  setTimeout(() => {
    cow.remove();
    cows = cows.filter(c => c !== cow);
  }, 1500);
}

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const fontSize = 12;
  const lineHeight = 18;
  const padding = 12;

  ctx.font = `${fontSize}px Arial`;

  // Match narrow iPhone scoreboard width
  const maxTextWidth =
  scoreboard.getBoundingClientRect().width - padding * 2;


function wrapText(text, maxWidth) {
  const lines = [];
  let line = "";

  for (const char of text) {
    const test = line + char;
    if (ctx.measureText(test).width > maxWidth) {
      lines.push(line);
      line = char;
    } else {
      line = test;
    }
  }

  if (line) lines.push(line);
  return lines;
}

  const wrappedLines = wrapText(text, maxTextWidth);

  canvas.width = maxTextWidth + padding * 2;
  canvas.height = wrappedLines.length * lineHeight + padding * 2;

  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "black";
  wrappedLines.forEach((line, i) => {
    ctx.fillText(
      line,
      padding,
      padding + fontSize + i * lineHeight
    );
  });

  const img = canvas.toDataURL("image/png");
  const a = document.createElement("a");
  a.href = img;
  a.download = "score.png";
  a.click();
});

<script>
(function () {
  const canvas = document.getElementById("skyCanvas");
  const ctx = canvas.getContext("2d");

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  let t = 0;

  function noise(x, y, t) {
    return (
      Math.sin(x * 0.008 + t) +
      Math.sin(y * 0.012 + t * 1.2) +
      Math.sin((x + y) * 0.006 - t * 0.7)
    ) / 3;
  }

function draw() {
  const w = canvas.width;
  const h = canvas.height;
  const img = ctx.createImageData(w, h);
  const d = img.data;

  const groundStart = h * 0.42;     // where ground begins
  const featherHeight = h * 0.08;   // softness of the blend

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {

      // ── Feather blend factor (0 = sky, 1 = ground)
      let blend;
      if (y < groundStart) {
        blend = 0;
      } else if (y > groundStart + featherHeight) {
        blend = 1;
      } else {
        blend = (y - groundStart) / featherHeight;
      }

      // 🌤️ SKY COLOR (clean, no fog)
      const skyR = 150;
      const skyG = 190;
      const skyB = 220;

      // 🌪️ BOILING GROUND NOISE
      const n =
        noise(x, y, t) +
        noise(x * 0.5, y * 0.5, t * 0.9);

      const swirl = Math.sin(n * 4 + y * 0.015);

      // dark wheat
      const wr = 170, wg = 160, wb = 105;
      // dark green
      const gr = 65, gg = 100, gb = 60;

      const mix = swirl * 0.5 + 0.5;

      const groundR = gr * mix + wr * (1 - mix);
      const groundG = gg * mix + wg * (1 - mix);
      const groundB = gb * mix + wb * (1 - mix);

      // 🌫️ Final feathered color
      const r = skyR * (1 - blend) + groundR * blend;
      const g = skyG * (1 - blend) + groundG * blend;
      const b = skyB * (1 - blend) + groundB * blend;

      const i = (y * w + x) * 4;
      d[i]     = r;
      d[i + 1] = g;
      d[i + 2] = b;
      d[i + 3] = 255;
    }
  }

  ctx.putImageData(img, 0, 0);
  t += 0.02;
  requestAnimationFrame(draw);
}

draw();

})();
</script>

<script>
(function () {
  const canvas = document.getElementById("topCloudCanvas");
  const ctx = canvas.getContext("2d");

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = canvas.offsetHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  let t = 0;

  function noise(x, y, t) {
    return (
      Math.sin(x * 0.02 + t) +
      Math.sin(y * 0.04 + t * 1.3) +
      Math.sin((x + y) * 0.01 - t)
    );
  }

  function draw() {
    const w = canvas.width;
    const h = canvas.height;
    const img = ctx.createImageData(w, h);
    const d = img.data;

    for (let y = 0; y < h; y++) {
      const feather = Math.min(1, (h - y) / (h * 0.25));


      for (let x = 0; x < w; x++) {
        const n = noise(x, y, t);
        const flicker = Math.random() < 0.0006 ? 80 : 0;

        // dark storm greys
        let v = 60 + n * 25 + flicker;
        v = Math.max(0, Math.min(255, v));

        const i = (y * w + x) * 4;
        d[i]     = v;
        d[i + 1] = v;
        d[i + 2] = v;
        d[i + 3] = Math.floor(255 * feather);
      }
    }

    ctx.putImageData(img, 0, 0);
    t += 0.03;
    requestAnimationFrame(draw);
  }

  draw();
})();
</script>

<script>
const windCanvas = document.getElementById("windCanvas");
const ctx = windCanvas.getContext("2d");

function resize() {
  windCanvas.width = window.innerWidth;
  windCanvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ── fast particulate wind ──
const COUNT = 1800;
const particles = [];

for (let i = 0; i < COUNT; i++) {
  particles.push(spawn());
}

function spawn() {
  return {
    x: Math.random() * windCanvas.width,
    y: Math.random() * windCanvas.height,

    w: 10 + Math.random() * 3,   // hyphen width
    h: 1 + Math.random(),      // thin

    vx: 15 + Math.random() * 6, // 🔥 FAST left → right
    vy: (Math.random() - 0.5) * 0.3, // tiny vertical jitter

    a: 0.04 + Math.random() * 0.05,
    g: 215 + Math.random() * 25
  };
}

function draw() {
  ctx.clearRect(0, 0, windCanvas.width, windCanvas.height);

  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;

    // wrap quickly → streaky feel
    if (p.x > windCanvas.width + p.w || p.y < -10 || p.y > windCanvas.height + 10) {
      Object.assign(p, spawn(), { x: -p.w });
    }

    ctx.fillStyle = `rgba(${p.g},${p.g},${p.g},${p.a})`;
    ctx.fillRect(p.x, p.y, p.w, p.h);
  }

  requestAnimationFrame(draw);
}

draw();
</script>

   RAW TEXT PARSER
========================= */

function parseRawInstructions(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const html = [];

  lines.forEach(line => {

    if(line === "---"){
      html.push(`<hr>`);
      return;
    }

    if(/^\d+\./.test(line)){
      html.push(`<p>${line}</p>`);
      return;
    }

    if(!/[.!?:]$/.test(line)){
      html.push(`<h3>${line}</h3>`);
      return;
    }

    html.push(`<p>${line}</p>`);
  });

  return html.join("");
}

========================= */

/* =========================

========================= */

    ${parseRawInstructions(RAW_TEXT)}

/* =========================
   SCROLL LOCK
========================= */

const modalContent = document.getElementById("instructionsContent");

modalContent.addEventListener("wheel", e=>{
  e.stopPropagation();
},{passive:false});

modalContent.addEventListener("touchmove", e=>{
  e.stopPropagation();
},{passive:false});


/* =========================
   OPEN / CLOSE
========================= */

function openModal(){
  root.style.display="block";
  document.body.style.overflow="hidden";
  document.documentElement.style.overflow="hidden";
}

function closeModal(){
  root.style.display="none";
  document.body.style.overflow="";
  document.documentElement.style.overflow="";
}

btn.onclick = openModal;

document.getElementById("instructionsBack").onclick = closeModal;
document.getElementById("instructionsBackdrop").onclick = closeModal;

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeModal();
});

/* =========================
   DYNAMIC BODY PADDING FOR BUTTON
========================= */

function adjustBodyPadding(){
  const btnHeight = btn.offsetHeight + -25; // include some gap
  document.body.style.paddingBottom = `${btnHeight}px`;
}

// Initial adjustment
adjustBodyPadding();

// Update if window is resized (responsive)
window.addEventListener("resize", adjustBodyPadding);

})();

<script>
  // Grab the elements
  const gameArea = document.getElementById("gameArea");
  const wordInput = document.getElementById("wordInput");

  // Focus input on touch or click inside game area
  gameArea.addEventListener("pointerdown", () => {
    if (!wordInput.disabled) {
      wordInput.focus({ preventScroll: true });
    }
  });

  // Optional: keep mobile keyboards open even after focus lost
  wordInput.addEventListener("blur", () => {
    setTimeout(() => {
      if (document.activeElement !== wordInput && !wordInput.disabled) {
        wordInput.focus({ preventScroll: true });
      }
    }, 50);
  });
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>
