<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
        overflow-x: hidden;
    }

    .columns-container {
        display: flex;
        gap: 10px;
        padding: 10px;
        box-sizing: border-box;
        flex-wrap: nowrap;
    }

    .column {
        flex: 1 1 0;
        padding: 10px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 20px;
        border-radius: 10px;
    }

    .column h2 {
        text-align: center;
        margin: 0 0 10px 0;
    }

    #positive-column { background-color: #8bc34a77; }
    #negative-column { background-color: #FF9800; }

    .button-container {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 100%;
        border-radius: 10px;
    }

    .button {
        width: 100%;
        padding: 8px 12px;
        border: none;
        border-radius: 5px;
        color: white;
        font-size: 14px;
        cursor: pointer;
        text-align: left;
        box-sizing: border-box;
    }

    .positive-button {
        background-color: #81c784;
    }
    .positive-button:hover { background-color: #66bb6a; }
    .positive-button:active, .positive-button.selected { background-color: #388e3c; }

    .negative-button {
        background-color: #F44336;
    }
    .negative-button:hover { background-color: #D32F2F; }
    .negative-button:active, .negative-button.selected { background-color: #C62828; }

    .copy-button, .reset-button {
        width: 100%;
        padding: 8px 12px;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        cursor: pointer;
        color: white;
        margin-top: 5px;
        box-sizing: border-box;
        background-color: #1976d2;
    }
    .copy-button:hover, .reset-button:hover { background-color: #1565c0; }

    .notification {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background-color: #4CAF50;
        color: white;
        padding: 10px 20px;
        border-radius: 5px;
        visibility: hidden;
        transition: visibility 0s, opacity 0.5s linear;
        z-index: 10000;
    }
    .notification.visible { visibility: visible; opacity: 1; }

    /* Modal styles */
    #modal {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.7);
        justify-content: center;
        align-items: center;
        z-index: 10001;
    }
    #modal-content {
        background: white;
        color: black;
        padding: 20px;
        border-radius: 10px;
        max-width: 90%;
        max-height: 80%;
        overflow-y: auto;
        font-size: 16px;
        text-align: left;
        position: relative;
        word-wrap: break-word;
        transition: background 0.3s ease;
    }
    #modal-close {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 24px;
        font-weight: bold;
        cursor: pointer;
    }

    @media screen and (max-width: 600px) {
        .columns-container { flex-direction: column; }
        .button { font-size: 16px; padding: 12px 16px; }
        .copy-button, .reset-button { font-size: 16px; padding: 12px 16px; }
        .column h2 { font-size: 20px; }

    function createColumn(columnId, rawText, isPositive) {
        const container = document.getElementById(columnId);
        const sections = rawText.trim().split(/\n(?=M\d+\.\d+)/);
        sections.forEach(section => {
            const lines = section.split('\n').filter(l => l.trim() !== '');
            const title = lines.shift();
            const sectionDiv = document.createElement('div');
            sectionDiv.classList.add('button-container');

            const copyBtn = document.createElement('button');
            copyBtn.classList.add('copy-button');
            copyBtn.textContent = `Copy Selected in ${title}`;
            copyBtn.onclick = () => {
                const selected = Array.from(sectionDiv.querySelectorAll('.selected'));
                const text = selected.map(b => b.dataset.info).join('\n');
                if(text) { copyToClipboard(text); showNotification(); }
                else { alert('Please select some students to copy!'); }
            };
            sectionDiv.appendChild(copyBtn);

            lines.forEach(line => {
                const [id,name,message] = line.split(' - ');
                const btn = document.createElement('button');
                btn.classList.add('button', isPositive ? 'positive-button' : 'negative-button');
                btn.textContent = `${id} - ${name}`;
                btn.dataset.info = `${id} - ${name} - ${message}`;
                btn.onclick = () => {
                    btn.classList.toggle('selected');
                    showModal(btn.dataset.info, isPositive);
                };
                sectionDiv.appendChild(btn);
            });

            const resetBtn = document.createElement('button');
            resetBtn.classList.add('reset-button');
            resetBtn.textContent = 'Reset Selections';
            resetBtn.onclick = () => {
                sectionDiv.querySelectorAll('.button').forEach(b => b.classList.remove('selected'));
            };
            sectionDiv.appendChild(resetBtn);

            container.appendChild(sectionDiv);
        });
    }

    function copyToClipboard(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
    }

    function showNotification() {
        const note = document.getElementById('notification');
        note.classList.add('visible');
        setTimeout(()=>note.classList.remove('visible'),3000);
    }

    function showModal(text, isPositive = true) {
        const modal = document.getElementById('modal');
        const content = document.getElementById('modal-text');
        content.textContent = text;
        if(isPositive){
            document.getElementById('modal-content').style.backgroundColor = '#006400';
            document.getElementById('modal-content').style.color = 'white';
        } else {
            document.getElementById('modal-content').style.backgroundColor = '#8B0000';
            document.getElementById('modal-content').style.color = 'white';
        }
        modal.style.display = 'flex';
    }

    document.getElementById('modal-close').onclick = () => { document.getElementById('modal').style.display = 'none'; };
    document.getElementById('modal').onclick = (e) => { if(e.target === document.getElementById('modal')) { document.getElementById('modal').style.display = 'none'; } };

    createColumn('positive-column', positiveRaw, true);
    createColumn('negative-column', negativeRaw, false);
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>
