<style>
/* ==============================
   GLOBAL RESET & BASE STYLES
   ============================== */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  padding: 30px;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #a0e0ff 0%, #ffffff 95%);
  user-select: none;
}

/* ==============================
   TOP + MID BARS
   ============================== */
#topBar,
#midBar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px;
  margin: 0 auto 16px auto;
  background: #f0f8ff;
  border-radius: 6px;
  flex-wrap: nowrap;
  width: 100%;
  max-width: 100%;
}

#topBar input[type="text"] {
  flex: 1 1 0;
  min-width: 70px;
  max-width: 140px;
}

#topBar button,
#midBar button {
  flex: 0 0 auto;
  white-space: nowrap;
}

#countdownOverlay {
  flex: 0 0 auto;
  min-width: 32px;
  text-align: center;
}

/* ==============================
   INPUTS & BUTTONS
   ============================== */
input[type="text"] {
  padding: 6px 10px;
  font-size: 16px;
  width: 140px;
  border: 1px solid #999;
  border-radius: 4px;
}

button {
  padding: 6px 12px;
  font-size: 16px;
  border-radius: 4px;
  border: 1px solid #777;
  background: #eef6fb;
  cursor: pointer;
  user-select: none;
}

button:disabled {
  opacity: 0.5;
  cursor: default;
}

/* ==============================
   SCOREBOARD & BUTTONS
   ============================== */
#scoreboardContainer {
  margin: 12px 0 0 0;
  font-family: monospace;
  font-weight: bold;
  font-size: 18px;
  white-space: normal;
}

#scoreButtons {
  margin: 12px 0 24px 0;
  display: none;
  gap: 10px;
  flex-wrap: wrap;
}

/* ==============================
   GAME AREA / CANVAS
   ============================== */
#gameArea {
  position: relative;
  margin: 0 auto 16px auto;
  height: 240px;
  width: 100%;
  max-width: 100%;
  border-radius: 6px;
  overflow: hidden;
  display: block;
}

/* ==============================
   INVISIBLE TYPING INPUT
   ============================== */
#typingInput {
  position: fixed;
  left: 5px;
  top: 5px;
  width: 24px;
  height: 24px;
  opacity: 0;
  pointer-events: none;
  background: transparent;
  border: none;
  z-index: 9999;
  font-size: 18px;
  color: black;
  caret-color: transparent;
}

/* ==============================
   FOOTER
   ============================== */
footer {
  margin-top: 16px;
  padding: 10px 12px;
  text-align: left;
  font-size: 10px;
  color: #666;
  background: #f0f8ff;
  border-radius: 6px;
}

/* ==============================
   FORM ROWS & WHEEL
   ============================== */
.formRow {
  display: flex;
  align-items: center;
  gap: 8px;
}

#sectionWheelContainer {
  height: 34px;
  flex: 1 1 0;
  min-width: 0;
  overflow: hidden;
  border: 1px solid #999;
  border-radius: 4px;
  background: #fff;
  position: relative;
}

#wheel,
.wheel {
  position: absolute;
  top: 0;
  width: 100%;
  transition: transform 0.25s ease;
}

.wheelItem {
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  user-select: none;
  font-size: 15px;
  line-height: 1;
}

/* ==============================
   BUBBLE STYLING (EXTRA TEMPLATE)
   ============================== */
.bubble {
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: white;
  text-align: center;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  transition: transform 0.3s ease, opacity 0.3s ease;
}

.bubble-ambient {
  opacity: 0.5;
}

.bubble-exploding {
  animation: popScale 0.4s forwards;
}

@keyframes popScale {
  0%   { transform: scale(1) rotate(0deg); opacity: 1; }
  50%  { transform: scale(1.5) rotate(180deg); opacity: 1; }
  100% { transform: scale(2.5) rotate(720deg); opacity: 0; }
}

/* ==============================
   RESPONSIVE & TOUCH ADJUSTMENTS
   ============================== */
@media (max-width: 480px) {
  body { padding: 16px; }
  input[type="text"] { width: 100px; }
  button { padding: 4px 8px; font-size: 14px; }
  #gameArea { height: 180px; }
  .wheelItem { font-size: 13px; }
}

</style>

  function darkVariant(color) {
    const match = color.match(/hsla\((\d+),\s*(\d+)%,\s*(\d+)%,\s*([\d.]+)\)/);

  class Bubble {
    constructor(word=null) {
      this.word = word;
      this.typedIndex = 0;
      this.exploded = false;
      if(word){
        this.radius = 50 + Math.random()*40;
        this.color = brightColor(0.35);
      } else {
        this.radius = 10 + Math.random()*30;
        this.color = brightColor(0.2);
      }
      this.shadowColor = darkVariant(this.color);
      this.x = Math.random() * (canvas.width - this.radius*2) + this.radius;
      this.y = canvas.height + this.radius;
      this.speed = (word ? 0.6 : 0.2) + Math.random()*0.6;
      this.swayAmplitude = (word ? 20 : 10) + Math.random()*20;
      this.swaySpeed = Math.random()*0.02 + 0.01;
      this.swayPhase = Math.random()*Math.PI*2;
    }

    draw() {
      const offsetX = Math.sin(this.swayPhase + this.y*this.swaySpeed) * this.swayAmplitude;

      const gradient = ctx.createRadialGradient(
        this.x - this.radius*0.2 + offsetX,
        this.y - this.radius*0.2,
        this.radius*0.05,
        this.x + offsetX,
        this.y,
        this.radius*1.8
      );
      gradient.addColorStop(0, 'rgba(255,255,255,0.2)');
      gradient.addColorStop(0.3, this.color);
      gradient.addColorStop(1, this.color);

      ctx.beginPath();
      ctx.arc(this.x + offsetX, this.y, this.radius, 0, Math.PI*2);
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.stroke();

        ctx.fillStyle = 'white';
        ctx.shadowColor = this.shadowColor;
        ctx.shadowBlur = 20;
        ctx.fillText(this.word, this.x + offsetX, this.y);
        ctx.shadowBlur = 0;

      this.y -= this.speed;
      if(this.y + this.radius < 0) this.exploded = true;

  class ExplodingBubble {

      const elapsed = time - this.startTime;
      const t = Math.min(elapsed / this.duration, 1);

      const scale = 1 + 1.5 * t; // scale up
      const rotation = 2 * Math.PI * 2 * t; // 720 deg
      const alpha = 1 - t;

      ctx.save();
      ctx.translate(this.x, this.y);

<script>
(async function() {
  'use strict';

  // Sanitize filenames to remove illegal characters
  function sanitizeFilename(name) {
    return name.trim()
      .replace(/[\\/:*?"<>|]+/g, '_')
      .replace(/[\r\n]+/g, '_')
      .slice(0, 200) || 'score';
  }

  // Generic download function
  function downloadBlob(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(a.href);
      a.remove();
    }, 2000);
  }

  // Convert scoreboard to PNG using html2canvas
  async function downloadScoreAsPNG(text, filename) {
  const wrapper = document.createElement('div');
  wrapper.innerHTML = text.replace(/\n/g, '<br>');

  /* MATCH SCOREBOARD APPEARANCE */
  wrapper.style.display = 'inline-block';
  wrapper.style.whiteSpace = 'pre-wrap';
  wrapper.style.fontFamily = 'monospace';
  wrapper.style.fontWeight = 'bold';
  wrapper.style.fontSize = '18px';
  wrapper.style.lineHeight = '1.2';
  wrapper.style.padding = '6px 8px';
  wrapper.style.backgroundColor = '#fff';
  wrapper.style.color = '#000';

  document.body.appendChild(wrapper);

  try {
    if (!window.html2canvas) {
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
      document.head.appendChild(script);
      await new Promise(res => script.onload = res);
    }

    const canvas = await html2canvas(wrapper, {
      scale: 2,
      backgroundColor: '#fff',
      width: wrapper.offsetWidth,
      height: wrapper.offsetHeight
    });

    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    downloadBlob(blob, filename);
  } catch (err) {
    console.error(err);
    alert('PNG download failed');
  } finally {
    wrapper.remove();
  }
}


  // Hijack a download button
  function hijackDownloadButton(button, getScoreText, getFilename, isText) {
    if (!button) return;

    const newBtn = button.cloneNode(true);
    button.parentNode.replaceChild(newBtn, button);

    newBtn.addEventListener('click', async e => {
      e.preventDefault();
      e.stopImmediatePropagation();

        await downloadScoreAsPNG(scoreText, filename + '.png');
      }

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>
