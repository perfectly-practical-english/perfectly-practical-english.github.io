<style>
* { box-sizing: border-box; }

body { 
    margin:0; 
    padding:30px;

    background:#d0e7f9; 
    user-select:none; 
}

/* ===============================
   CORE ROW LAYOUT (Top bar + Form rows)
   =============================== */

#topBar,
.formRow {
  display: flex;
  flex-direction: row;
  margin-top: 12px;    /* pushes selector down */
  align-items: center;   /* vertical center */
  gap: 6px;
  height: 38px;          /* container height = children height */
}

/* ===============================
   SELECTOR FIELD (Wheel Container)
   =============================== */

.formRow > #sectionWheelContainer {

  box-sizing: border-box;

  flex: 1 1 auto;
  min-width: 0;
  height: 38px;

  display: flex;
  align-items: flex-start;
  justify-content: center;

  background: #fff;
  border: 1px solid #999;
  border-radius: 6px;
  overflow: hidden;
  contain: layout;


  box-shadow: inset 0 1px 2px rgba(0,0,0,0.15);
  position: static;
}

/* ===============================
   SHARED CHILD HEIGHT ONLY
   =============================== */

.formRow > button,
.formRow > #sectionWheelContainer {  /* 🔑 FIXED */
  height: 38px;
  min-height: 0;
  max-height: 38px;

  display: flex;
  justify-content: center;
}

/* ===============================
   BUTTON-SPECIFIC BEHAVIOR
   =============================== */

.formRow > button {
  flex: 0 0 38px;
  align-items: center;   /* keep button content centered */
}

/* ===============================
   INPUT + BUTTON SIZING + COLORS
   =============================== */
#topBar {
  margin-top: 0;       /* stays at top */
}

#topBar button,
.formRow > button {
  flex: 0 0 38px;
  height: 38px;
  white-space: nowrap;

  background: #2b5d84;
  border: 1px solid #1f4563;
  color: #fff;
  cursor: pointer;
  transition: background 0.2s ease, border-color 0.2s ease;
}

#topBar button:hover,
.formRow > button:hover {
  background: #1f4563;
  border-color: #1f4563;
}

#topBar input[type="text"] {
  flex: 1 1 0;
  min-width: 0;

  height: 38px;        /* 🔑 lock height */
  padding: 0 10px;      /* 🔑 remove vertical padding */
  font-size: 16px;
  line-height: 38px;    /* 🔑 vertical centering */

  border: 1px solid #999;
  border-radius: 4px;
}

input[type=text] {
  width: 150px;
  min-width: 0;

  padding: 6px 10px;
  font-size: 16px;
  border: 1px solid #999;
  border-radius: 4px;
}


/* ===============================
   FORM ROW BUTTON ALIGNMENT
   =============================== */

.formRow > button {
  margin-top: 0px;

  display: flex;
  align-items: center;
  justify-content: center;

  padding: 0;
  font-size: 18px;
}


/* ===============================
   SECTION SELECTOR BAR
   =============================== */

#sectionSelector {
  display: flex;
  align-items: stretch;
  line-height: 1;
  gap: 3px;
  width: 100%;
  margin: 0px;   /* removed extra spacing */
}

#sectionSelector > button {
  width: 38px;
  height: 38px;

  display: flex;
  align-items: center;
  justify-content: center;
}




/* ===============================
   SELECTOR BUTTONS (Overlay Arrows)
   =============================== */

/* Remove absolute positioning entirely */
.sectionBtn {
  position: static;       /* no absolute positioning */
  width: 38px;
  height: 38px;
  font-size: 18px;
  padding: 0;
  line-height: 1;
  display: flex;
  align-items: center;    /* centers arrow vertically */
  justify-content: center;/* centers arrow horizontally */
  z-index: 2;             /* optional if you need it above wheel */
}
#sectionUp {
  left: -3px;
}

#sectionDown {
  right: -3px;
}


/* ===============================
   BASE BUTTON STYLE
   =============================== */

button {
  padding: 6px 12px;
  font-size: 16px;
  border-radius: 4px;
  border: 1px solid #777;
  background: #2b5d84;
  color: #fff;
  cursor: pointer;
}

button:disabled {
  opacity: 0.5;
  cursor: default;
}

/* === SCOREBOARD BUTTONS === */
#scoreButtons {
    display:none;
    flex-direction:row;      /* horizontal row */
    gap:10px;
    padding:10px;
    background:#f0f8ff;
    border-radius:6px;
    flex-wrap:nowrap;        /* ❌ prevent stacking */
}

#scoreButtons button {       /* ensure scoreboard buttons are also blue */
    background:#2b5d84;
    color:white;
    border:none;
    white-space: nowrap;
    flex-shrink:0;
}

#scoreButtons button:disabled {
    opacity:0.5;
    cursor:default;
}

/* === SCOREBOARD DISPLAY === */
#scoreboardContainer {
    margin: 12px 0 0 0;
    font-family: monospace;
    font-weight: bold;
    font-size: 18px;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
    max-width: 100%;
}

/* === GAME AREA === */
#gameArea { 
    position: relative; 
    margin: 16px auto; 
    height: 300px; 
    width: calc(100% - 2px); 
    padding: 10px; 
    border-radius: 6px; 
    background: #000; 
    overflow: hidden; 
    box-shadow: inset 0 0 12px rgba(57, 255, 20, 0.6);

#terrainCanvas { 
    position:absolute; 
    top:0; 
    left:0; 
    width:100%; 
    height:100%; 
    z-index:0; 
}

.sentence {
    position: absolute;
    font-size: clamp(12px, 2vw, 18px);
    font-weight: 600;
    color: white;
    white-space: normal;
    max-width: 80%;
    word-wrap: break-word;
    user-select: none;
    pointer-events: auto;
    text-shadow: 0 0 3px rgba(0,0,0,0.3);
    transition: opacity 1s linear;
    z-index: 2;
}

.blank {
    display: inline-block;
    border-bottom: 2px solid #fff;
    min-width: 2ch;
    text-align: center;
    color: red;
    white-space: nowrap;
    transition: transform 0.3s ease, opacity 0.3s ease;
}

.blank.poof {
    transform: scale(1.4);
    opacity: 0.8;
}

#typedDisplay { 
    position:absolute; 
    bottom:5px; 
    right:5px; 
    font-size:20px; 
    color:red; 
    font-weight:bold; 
    z-index:2; 
}

#plane { 
    position: absolute; 
    bottom: 200px; 
    font-size: 90px; 
    color: #6B8E23; 
    user-select: none; 
    pointer-events: none; 
    transition: left 0.05s linear; 
    z-index: 3; 
    display: none; 
}

#planeShadow { 
    position:absolute; 
    bottom:60px; 
    font-size:90px; 
    color: rgba(0,0,0,0.3); 
    transform:rotate(-90deg); 
    user-select:none; 
    pointer-events:none; 
    filter: blur(6px); 
    transition:left 0.05s linear, bottom 0.05s linear; 
    z-index:2; 
    display:none; 
}

#typingInput { 
    position: fixed; 
    left: 0; 
    top: 0; 
    width: 1px; 
    height: 1px; 
    opacity: 0.01; 
    pointer-events: auto; 
    background: transparent; 
    border: none;

    color: black;

footer {

    z-index: 1; 
    backdrop-filter: blur(6px); 
    background: rgba(255, 255, 255, 0.15); 
    pointer-events: none;

</style>

<script>
/* =========================================
   SECTION DIAL — BUTTON-AUTHORITATIVE
   (NO SCROLL, NO DRAG, NO DESYNC)
   ========================================= */

document.addEventListener("DOMContentLoaded", () => {

  const ITEM_HEIGHT = 38;

  const container = document.getElementById("sectionWheelContainer");
  const btnUp = document.getElementById("sectionUp");
  const btnDown = document.getElementById("sectionDown");

  if (!container || !btnUp || !btnDown) {
    console.error("Section dial DOM elements missing");
    return;
  }

  /* ---------- PARSE SECTIONS ---------- */
  function parseSections(raw) {
    if (!raw) return [];
    return raw
      .split(/\n(?=~+)/)
      .map(c => c.trim())
      .filter(c => c.startsWith("~"))
      .map(chunk => {
        const lines = chunk.split("\n");
        const name = lines.shift().replace(/^~+/, "").trim();
        const text = lines.join("\n").trim();
        return { name, text };
      });
  }

const parsed = parseSections(window.__RAW_SECTION_TEXT__);

  const sections = [
    { name: "Select a category.", text: "" },
    ...parsed
  ];

  /* ---------- BUILD WHEEL ---------- */
  const wheel = document.createElement("div");
  wheel.className = "wheel";
  wheel.style.position = "absolute";
  wheel.style.top = "0";
  wheel.style.left = "0";
  wheel.style.width = "100%";
  wheel.style.transition = "transform 0.15s ease-out";

  sections.forEach(sec => {
    const div = document.createElement("div");
    div.textContent = sec.name;
    div.style.height = ITEM_HEIGHT + "px";
    div.style.lineHeight = ITEM_HEIGHT + "px";
    div.style.textAlign = "center";
    div.style.fontWeight = "600";
    div.style.color = "#777";
    wheel.appendChild(div);
  });

  container.innerHTML = "";
  container.style.position = "relative";
  container.style.overflow = "hidden";
  container.style.height = ITEM_HEIGHT + "px";
  container.appendChild(wheel);

  let currentIndex = 0;

  /* ---------- RENDER ---------- */
  function render() {
    wheel.style.transform = `translateY(${-currentIndex * ITEM_HEIGHT}px)`;

    [...wheel.children].forEach((el, i) => {
      if (i === currentIndex && i !== 0) {
        el.style.color = "#1f5fbf";
        el.style.fontWeight = "700";
      } else {
        el.style.color = i === 0 ? "#999" : "#777";
        el.style.fontWeight = "600";
      }
    });
  }

  /* ---------- FIRE SELECTION ---------- */
  function select() {
    if (currentIndex === 0) return;

    const section = sections[currentIndex];

    window.dispatchEvent(new CustomEvent("sectionchange", {
      detail: {
        index: currentIndex,
        name: section.name,
        text: section.text
      }
    }));
  }

  /* ---------- BUTTONS ---------- */
  btnUp.onclick = () => {
    if (currentIndex > 1) {
      currentIndex--;
      render();
      select();
    }
  };

  btnDown.onclick = () => {
    if (currentIndex < sections.length - 1) {
      currentIndex++;
      render();
      select();
    }
  };

  /* ---------- INIT ---------- */
  render();
  select();

});
</script>



<script>
async function resolveRaw(source) {
    // If source is a URL string (no newlines), fetch it
    if (typeof source === 'string' && !source.includes('\n')) {
        try {
            const res = await fetch(source, { cache: 'no-store' });
            if (!res.ok) throw new Error(`Failed to load: ${source}`);
            return await res.text();
        } catch (err) {
            console.error(err);
            return '';
        }
    }
    // Otherwise, it's already raw text
    return source;
}




/* ⬇️ ADD THIS RIGHT AFTER ⬇️ */
function parseRawExercises(text) {
    // The section buttons already decide WHAT text comes in.
    // This function only interprets that text.

    const lines = text
        .split('\n')
        .map(l => l.trim())
        .filter(Boolean);

    return lines
        .map(line => {
            // Inline |answer| defines correctness
            const match = line.match(/\|([^|]+)\|/);
            if (!match) return null;

            const correctAnswer = match[1];

// BUILD SECTION-LOCAL MC POOL (DO NOT MOVE)
const distractors = text
  .split("\n")
  .map(l => {
    const m = l.match(/\|([^|]+)\|/);
    return m ? m[1] : null;
  })
  .filter(a => a && a !== correctAnswer);

            return {
                sentence: line.replace(/\|[^|]+\|/, '___'),
choices: [
  { label: correctAnswer, correct: true },
  ...distractors.map(d => ({ label: d, correct: false }))
]

            };
        })
        .filter(Boolean);
}


let sentences = [];
let totalExercises = 0;
let correctExercises = 0;

// Call this at the start of the game to load either internal or external source
async function loadExercises(source = wordListText) {
    const raw = await resolveRaw(source);
    sentences = parseRawExercises(raw);
    totalExercises = sentences.length;
    correctExercises = 0;
}

// Initial load ONLY if no section has been selected yet
if (!window.activeExerciseText) {
    loadExercises(wordListText);
}



const gameArea = document.getElementById('gameArea');
const typedDisplay = document.getElementById('typedDisplay');
const typingInput = document.getElementById('typingInput');
const startBtn = document.getElementById('startBtn');
const submitBtn = document.getElementById('submitBtn');
const nameInput = document.getElementById('nameInput');
const idInput = document.getElementById('idInput');
const scoreboardContainer = document.getElementById('scoreboardContainer');
const scoreButtons = document.getElementById('scoreButtons');
const popSound = document.getElementById('popSound');
const plane = document.getElementById('plane');
const planeShadow = document.getElementById('planeShadow');

let activeSentences = [];
let dropInterval = null;
let dropTickTime = 25;
let gameStarted = false;
let gameStopped = false;

// MC scoring
let nextSentenceIndex = 0;

// Plane animation state
let planeX = 0;
let swayAngle = 0;
let planeTargetX = null;
let planeSpeed = 0;
let planeExiting = false;

// --- Sentence Spawning ---
function spawnSentence(exercise) {
    const span = document.createElement('span');
    span.className = 'sentence';

    span.innerHTML = exercise.sentence.replace(
        '___',
        `<span class="blank"></span>`
    );
    const blankElem = span.querySelector('.blank');

    // --- PRE-ALLOCATE BLANK WIDTH ---
    const correctChoice = exercise.choices.find(c => c.correct);
    if (correctChoice) {
        blankElem.style.width = `${correctChoice.label.length}ch`;
        blankElem.style.display = 'inline-block';
        blankElem.style.textAlign = 'center';
    }

// ---- OPTIONS BOX (Fade-in stationary at bottom) ----
// ---- OPTIONS BOX (Fade-in at bottom) ----
const optionsBox = document.createElement('div');
optionsBox.style.position = 'absolute';
optionsBox.style.bottom = '10px';
optionsBox.style.left = '50%';
optionsBox.style.transform = 'translateX(-50%)';
optionsBox.style.display = 'grid';
optionsBox.style.gap = '10px';
optionsBox.style.opacity = 0;                   // start invisible
optionsBox.style.transition = 'opacity 0.8s ease-in-out';
optionsBox.style.zIndex = 2;

// --- Adaptive grid layout ---
// ---- FORCE MC BUTTON COUNT ----
const mcCount = 3; // ← change to 2,3,4,6, or 8 as needed
const correct = exercise.choices.find(c => c.correct);
let distractors = exercise.choices.filter(c => !c.correct);

// Shuffle distractors
for (let i = distractors.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [distractors[i], distractors[j]] = [distractors[j], distractors[i]];
}

// Pick enough distractors
distractors = distractors.slice(0, mcCount - 1);

// Rebuild choices array
exercise.choices = [correct, ...distractors];

// Shuffle final array
for (let i = exercise.choices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [exercise.choices[i], exercise.choices[j]] = [exercise.choices[j], exercise.choices[i]];
}

// --- Grid layout
const n = exercise.choices.length;
if (n <= 4) {
    optionsBox.style.gridTemplateColumns = `repeat(${n}, auto)`;
} else {
    const cols = n <= 6 ? 3 : 4;
    optionsBox.style.gridTemplateColumns = `repeat(${cols}, auto)`;
}

exercise.choices.forEach(choice => {
    const bar = document.createElement('div');
    bar.textContent = choice.label;
    bar.style.padding = '6px 12px';
    bar.style.background = '#6fa3ef';
    bar.style.color = '#fff';
    bar.style.borderRadius = '4px';
    bar.style.cursor = 'pointer';
    bar.style.textAlign = 'center';
    bar.style.userSelect = 'none';
    bar.style.transition = 'transform 0.1s, background 0.2s';

    bar.addEventListener('click', () => {
        const currentSentence = activeSentences[activeSentences.length - 1];
        if (!currentSentence || currentSentence.finished) return;

        const blankObj = currentSentence.blanks[0];

        // --- VISUAL FEEDBACK (ALWAYS ALLOWED) ---
        bar.style.background = choice.correct ? '#2ecc71' : '#e74c3c';
        bar.style.color = '#fff';

        // --- FIRST CLICK: SCORE DECISION ---
        if (!currentSentence.scored) {
            currentSentence.scored = true;

            if (choice.correct) {
                correctExercises++;

                blankElem.textContent = choice.label;
                blankElem.dataset.answer = choice.label;

                blankObj.committed = true;
                blankObj.coconutAllowed = true; // 🎃 ONLY FIRST-CORRECT enables coconut
            }

            // ❌ first click wrong → nothing else happens

            // ⏱️ fade after 5 seconds (always)
            currentSentence.fadeTimer = setTimeout(() => {
                triggerFadeOut(currentSentence);
            }, 5000);

            return;
        }

        // --- LATER CLICKS (NO SCORE, NO COCONUT) ---
        if (choice.correct && !blankObj.committed) {
            // show word for feedback only
            blankElem.textContent = choice.label;
            blankElem.dataset.answer = choice.label;
            // 🚫 DO NOT set committed here
        }
    });

    optionsBox.appendChild(bar);
});

// append **directly to gameArea**, not to sentence span
optionsBox.style.zIndex = 10;  // buttons above everything
span.style.zIndex = 5;         // sentence above palms/mist
gameArea.appendChild(span);
gameArea.appendChild(optionsBox);

// trigger fade-in
setTimeout(() => { optionsBox.style.opacity = 1; }, 50);

    // ---- PRE-WRAP MEASUREMENT ----
    const measureDiv = document.createElement('div');
    measureDiv.style.position = 'absolute';
    measureDiv.style.visibility = 'hidden';
    measureDiv.style.whiteSpace = 'nowrap';
    measureDiv.style.fontSize = 'clamp(12px, 2vw, 18px)';
    measureDiv.style.fontWeight = '600';
    document.body.appendChild(measureDiv);

    let totalWidth = 0;
    exercise.choices.forEach(choice => {
        measureDiv.textContent = choice.label;
        totalWidth += measureDiv.offsetWidth;
    });

    const avgOptionWidth = totalWidth / exercise.choices.length;
    const maxSentenceWidth = Math.max(avgOptionWidth * 2, 220);

    span.style.position = 'absolute';
    span.style.visibility = 'hidden';
    span.style.whiteSpace = 'normal';
    span.style.maxWidth = maxSentenceWidth + 'px';
    gameArea.appendChild(span);
    span.style.width = span.offsetWidth + 'px';
    span.style.visibility = 'visible';

    // ---- POSITION & ANIMATE ----
    const x = gameArea.clientWidth + 100;
    const y = 150;
    span.style.left = `${x}px`;
    span.style.top = `${y}px`;
    span.style.opacity = 1;
    span.style.transition = 'left 2s ease-out';
    setTimeout(() => {
        span.style.left = `${gameArea.clientWidth / 2 - span.offsetWidth / 2}px`;
    }, 10);

    // ---- ACTIVE SENTENCE OBJECT ----
const activeSentence = {
    span,
    optionsBox,
    y,
    speed: 0.45 + Math.random() * 0.2,
    blanks: [{
        elem: blankElem,
        committed: false,
        coconutAllowed: false   // 👈 NEW
    }],
    finished: false,
    paused: false,
    scored: false,
    fadeTimer: null
};


    activeSentences.push(activeSentence);

    // Reference for click events
    const blankObj = activeSentence.blanks[0];
}

// --- Typing Handler ---
function handleTyping(e){
    if(!gameStarted || gameStopped) return;
    const key = e.key || e.data;
    if(!key) return;

    // Allow letters, numbers, punctuation, space
    if(key.length !== 1) return;

    const target = activeSentences.find(s => s.blanks.some(b => !b.committed));
    if(!target) return;

    const blankObj = target.blanks.find(b => !b.committed);
    if(!blankObj) return;

    const answer = blankObj.elem.dataset.answer;

    // Append the typed character to a temporary buffer
    blankObj.typedIndex++;
    const typedSoFar = answer.slice(0, blankObj.typedIndex);
    typedDisplay.textContent = typedSoFar;

    // Check if typed matches answer (case-insensitive)
    if(answer.toLowerCase().startsWith(typedSoFar.toLowerCase())){
        if(blankObj.typedIndex >= answer.length){
            blankObj.committed = true;
            correctWords++;
            triggerExplosion(target);
        }
    } else {
        // Wrong key: reset typed index (optional: play error)
        blankObj.typedIndex = 0;
        typedDisplay.textContent = '';
        triggerFadeOut(target);
    }

    typingInput.value = '';
}
// --- Explosion & Fade (no scaling) ---
function triggerExplosion(targetSentence){
    popSound.currentTime = 0;
    popSound.play().catch(()=>{});

    // Optional: subtle opacity flash
    targetSentence.span.style.opacity = '1';

    setTimeout(() => {
        // Fade out smoothly without scaling
        targetSentence.span.style.transition = 'opacity 0.5s ease-out';
        targetSentence.span.style.opacity = '0';
    }, 100);

    setTimeout(() => {
targetSentence.span.remove();
targetSentence.optionsBox?.remove();   // 👈 REMOVE BUTTONS
targetSentence.finished = true;
        typedDisplay.textContent = '';
if(activeSentences.every(s => s.finished) && nextSentenceIndex < sentences.length){
spawnSentence(sentences[nextSentenceIndex]);
nextSentenceIndex++;
}
    }, 600); // slightly longer than opacity transition
}
function triggerFadeOut(targetSentence){
    targetSentence.span.style.transition='opacity 0.8s';
    targetSentence.span.style.opacity=0;
    setTimeout(()=>{
targetSentence.span.remove();
targetSentence.optionsBox?.remove();   // 👈 REMOVE BUTTONS
targetSentence.finished = true;
        typedDisplay.textContent='';
        if(activeSentences.every(s=>s.finished) && nextSentenceIndex < sentences.length){
            spawnSentence(sentences[nextSentenceIndex]);
            nextSentenceIndex++;
        }
    },800);
}

// --- Drop Sentences & Plane ---
function dropSentences(){
    if(!gameStarted) return;
    if(activeSentences.length && plane.style.display==='none'){
        plane.style.display='block'; planeShadow.style.display='block';
        planeX = gameArea.clientWidth + 100; planeTargetX = gameArea.clientWidth/2; planeSpeed=5; planeExiting=false;
    }

    const targetSentence = activeSentences.find(s=>!s.finished);
    const planeY = plane.offsetTop + plane.offsetHeight/2;

    for(let s of activeSentences){
        if(s.finished) continue;
        const gaRect = gameArea.getBoundingClientRect();
        s.blanks.forEach(blankObj=>{
            if(blankObj.committed && !blankObj.intercepted){
                const rect = blankObj.elem.getBoundingClientRect();
                const blankY = rect.top - gaRect.top + rect.height/2;
                if(blankY >= planeY){
                    blankObj.intercepted=true;
                    blankObj.elem.textContent=blankObj.elem.dataset.answer;
                    blankObj.elem.classList.add('poof');
                    popSound.currentTime=0; popSound.play().catch(()=>{});
                    setTimeout(()=>blankObj.elem.classList.remove('poof'),300);
                }
            }
        });
    }

    activeSentences = activeSentences.filter(s=>!s.finished);

    swayAngle+=0.03; let swayAmplitude=5;
    if(targetSentence && targetSentence.blanks.length>0){
        const rect = targetSentence.blanks[0].elem.getBoundingClientRect();
        const gaRect = gameArea.getBoundingClientRect();
        const blankCenterX = rect.left - gaRect.left + rect.width/2;
        planeTargetX = blankCenterX;
        swayAmplitude += Math.min(15, Math.abs(blankCenterX-planeX)/15);
        planeSpeed = 0.08;
    } else {
        if(nextSentenceIndex>=sentences.length && activeSentences.length===0 && !planeExiting){
            planeExiting=true; let speed=2;
            const moveUp=()=>{
                speed*=1.05;
                plane.style.bottom = (parseFloat(plane.style.bottom)+speed)+'px';
                planeShadow.style.bottom = (parseFloat(plane.style.bottom)-10)+'px';
                swayAngle+=0.05;
                plane.style.left = planeX + Math.sin(swayAngle)*10 - plane.offsetWidth/2 + 'px';
                planeShadow.style.left = planeX + Math.sin(swayAngle)*10 - plane.offsetWidth/2 + 15 + 'px';
                if(parseFloat(plane.style.bottom) < gameArea.clientHeight+200) requestAnimationFrame(moveUp);
            }; moveUp();
        } else { swayAmplitude +=12; planeSpeed=0.08; }
    }

    if(!planeExiting && planeTargetX!==null) planeX+=(planeTargetX-planeX)*planeSpeed;
    if(!planeExiting){
        plane.style.left = planeX + Math.sin(swayAngle)*swayAmplitude - plane.offsetWidth/2 + 'px';
        planeShadow.style.left = planeX + Math.sin(swayAngle)*swayAmplitude - plane.offsetWidth/2 + 15 + 'px';
        planeShadow.style.bottom = parseFloat(plane.style.bottom)-10+'px';
        planeShadow.style.display='block';
    }
}

// --- Game Control ---
async function startGame() {
    if(gameStarted) return;
    if(!nameInput.value.trim() || !idInput.value.trim()) { 
        alert('Enter Name and ID.');
        return;
    }

    dropInterval = setInterval(dropSentences, dropTickTime);
}

function stopGame(){ if(!gameStarted||gameStopped) return; gameStopped=true; clearInterval(dropInterval); startBtn.disabled=false; submitBtn.disabled=false; }
function submitResults(){
    if(!gameStarted) return;

if (window.saveResult) {

}

}function resetGame(){

correctExercises = 0;

}

// --- Coconuts ---
(function(){
    const alreadyDropped = new WeakSet();

        setTimeout(()=>{

            setTimeout(()=>{ coconut.style.transition='left 1s linear, transform 1s linear'; coconut.style.left=(gaRect.width+100)+'px'; coconut.style.transform='rotate(720deg)'; }, delay+50);

}, 100);

})();

<script>
(async function() {
  'use strict';

  // --- Sanitize a filename
  function sanitizeFilename(name) {
    return name.trim()
      .replace(/[\\/:*?"<>|]+/g, '_')
      .replace(/[\r\n]+/g, '_')
      .slice(0, 200) || 'score';
  }

  // --- Download a blob as a file
  function downloadBlob(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(a.href);
      a.remove();
    }, 2000);
  }

  // --- Convert scoreboard text to PNG and download ---
  async function downloadScoreAsPNG(text, filename) {
    const wrapper = document.createElement('div');
    wrapper.innerHTML = text.replace(/\n/g, '<br>');
    wrapper.style.whiteSpace = 'pre-wrap';
    wrapper.style.fontFamily = 'monospace';
    wrapper.style.padding = '10px';
    wrapper.style.backgroundColor = '#fff';
    wrapper.style.color = '#000';
    wrapper.style.width = 'max-content';
    wrapper.style.maxWidth = '800px';
    document.body.appendChild(wrapper);

    try {
      const canvas = await html2canvas(wrapper, { scale: 2, backgroundColor: '#fff' });
      const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      downloadBlob(blob, filename);
    } catch (err) {
      console.error(err);
      alert('PNG download failed');
    } finally {
      wrapper.remove();
    }
  }

  // --- Hijack a single button ---
  function hijackDownloadButton(button, getScoreText, getFilename, isText) {
    if (!button) return;
    const newBtn = button.cloneNode(true);
    button.parentNode.replaceChild(newBtn, button);

    newBtn.addEventListener('click', async e => {
      e.preventDefault();
      e.stopImmediatePropagation();

      const scoreText = getScoreText();
      if (!scoreText) {
        alert('No scoreboard data found. Submit first.');
        return;
      }

      const filename = sanitizeFilename(getFilename());
      if (isText) {
        downloadBlob(new Blob([scoreText], { type: 'text/plain' }), filename + '.txt');
      } else {
        await downloadScoreAsPNG(scoreText, filename + '.png');
      }
    }, true);
  }

  // --- Setup hijack for Text/PNG buttons only ---
  function setupScoreboardHijack() {
    const scoreboard = document.getElementById('scoreboardContainer');
    if (!scoreboard) return;

    const nameInput = document.getElementById('nameInput');
    const idInput = document.getElementById('idInput');

    const getFilename = () => {
      const rawFilename = window.location.pathname.split('/').pop() || 'score';
      const name = nameInput?.value.trim() || 'Player';
      const id = idInput?.value.trim() || 'ID';
      const dateStr = new Date().toISOString().split('T')[0];
      return `${rawFilename}|${name}|${id}|${dateStr}`;
    };

    const buttons = document.querySelectorAll('#scoreButtons button');
    buttons.forEach(btn => {
      const btnId = btn.id.toLowerCase();
      const btnText = btn.innerText.toLowerCase();

      if (/copy/.test(btnId) || /copy/.test(btnText)) {
        // ✅ Leave Copy button alone
        return;
      }

      const isTextButton = /text|txt/.test(btnId) || /text|txt/.test(btnText);
      hijackDownloadButton(btn, () => scoreboard.textContent.trim(), getFilename, isTextButton);
    });
  }

  // --- Hook into submit button to ensure hijack runs after submit ---
  const submitBtn = document.getElementById('submitBtn');
  if (submitBtn) {
    const originalSubmit = submitBtn.onclick || (() => {});
    submitBtn.onclick = function(...args) {
      const result = originalSubmit.apply(this, args);
      setTimeout(setupScoreboardHijack, 50); // ensure scoreboardContainer is updated
      return result;
    };
  }

  // --- Initial hijack in case scoreboard already exists ---
  setupScoreboardHijack();
})();
</script>


<script>


/* =====================================================
   Swirling Storm Clouds (Vortex Field)
   True rotational motion – no drifting
   ===================================================== */
(function () {
  'use strict';

  const gameArea = document.getElementById('gameArea');
  if (!gameArea) return;

  if (getComputedStyle(gameArea).position === 'static') {
    gameArea.style.position = 'relative';
  }

  const canvas = document.createElement('canvas');
  canvas.style.position = 'absolute';
  canvas.style.inset = '0';
  canvas.style.zIndex = '0';
  canvas.style.pointerEvents = 'none';
  gameArea.prepend(canvas);

  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = gameArea.clientWidth;
    canvas.height = gameArea.clientHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  let t = 0;

  function swirl(x, y, t) {
    const cx = canvas.width * 0.5;
    const cy = canvas.height * 0.5;

    const dx = x - cx;
    const dy = y - cy;

    const r = Math.sqrt(dx * dx + dy * dy);
    const a = Math.atan2(dy, dx);

    // Rotational distortion
    const spin =
      Math.sin(r * 0.015 - t * 1.2) +
      Math.sin(a * 3 + t * 0.7);

    return Math.sin(a * 4 + r * 0.02 + spin);
  }

  function draw() {
    const w = canvas.width;
    const h = canvas.height;
    const img = ctx.createImageData(w, h);
    const d = img.data;

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const n = swirl(x, y, t);

        // Dark tornado cloud tone
        let v = 50 + n * 30;
        v = Math.max(10, Math.min(130, v));

        const i = (y * w + x) * 4;
        d[i]     = v * 0.9;
        d[i + 1] = v * 0.9;
        d[i + 2] = v + 15;
        d[i + 3] = 255;
      }
    }

    ctx.putImageData(img, 0, 0);
    t += 0.015; // rotation speed
    requestAnimationFrame(draw);
  }

  draw();
})();


</script>

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);

  lines.forEach(line => {

    if(line === "---"){
      html.push(`<hr>`);
      return;

    if(/^\d+\./.test(line)){

    if(!/[.!?:]$/.test(line)){

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>
