<script>
/* =========================================
   UNIVERSAL RAW TEXT RESOLVER (PER BLOCK)
   ========================================= */

/**
 * resolveRaw(source)
 * - If source is a filename (single line, no newlines), load it
 * - Otherwise treat source as literal raw text
 */
async function resolveRaw(source) {
  if (typeof source === "string" && !source.includes("\n")) {
    try {
      const res = await fetch(source, { cache: "no-store" });
      if (res.ok) return await res.text();
    } catch {}
  }
  return source;
}
</script>

   STANDALONE SECTION VISIBILITY PATCH
   (SCRAMBLE SECTION IS ALWAYS VISIBLE)

(function () {

  /* 🔗 Declare dependencies here (ONE place, declarative) */
  const SECTION_DEPENDENCIES = {
    readingSection: ["#text1"],
    mcSection: ["#mcContainer"],
    fibSection: ["#fibContainer"],

    // 🔒 DO NOT AUTO-HIDE SCRAMBLE (it contains controls)
    scrambleSection: [],

    sequenceSection: ["#sequenceContainer"],

    instructionsSectionReadingSpeaking: [
      "#instructionsContainerReadingSpeaking"
    ],
    instructionsSectionWritingSpeaking: [
      "#instructionsContainerWritingSpeaking"
    ],

    vocabSection: ["#wordTiles", "#definitionTiles"],
    posSection: ["#instructions", "#exercises"]
  };

  function hasContent(el) {
    return el && el.textContent.trim().length > 0;
  }

  function update(sectionId, selectors) {
    const section = document.getElementById(sectionId);
    if (!section) return;

    // Empty dependency list = always visible
    if (!selectors.length) {
      section.style.display = "";
      return;
    }

    const visible = selectors.some(sel =>
      hasContent(document.querySelector(sel))
    );

    section.style.display = visible ? "" : "none";
  }

  function observe(sectionId, selectors) {
    if (!selectors.length) return;

    selectors.forEach(sel => {
      const target = document.querySelector(sel);
      if (!target) return;

      new MutationObserver(() =>
        update(sectionId, selectors)
      ).observe(target, {
        childList: true,
        subtree: true,
        characterData: true
      });
    });
  }

  function init() {
    Object.entries(SECTION_DEPENDENCIES).forEach(
      ([sectionId, selectors]) => {
        update(sectionId, selectors);
        observe(sectionId, selectors);
      }
    );
  }

  document.addEventListener("DOMContentLoaded", init);
})();

</script>

    const div = document.createElement('div');
    div.style.marginBottom = '8px';

    const tokens = s.match(/[\w'-]+|[.,!?;:"“”‘’()]/g) || [];
    const words = tokens
      .filter(t => /\w/.test(t))
      .sort(() => Math.random() - 0.5);

    const tileEls = [];

    div.innerHTML = `<strong>${i + 1}. </strong>`;

    tokens.forEach(tok => {
      const span = document.createElement('span');
      if (/\w/.test(tok)) {
        span.textContent = words.shift();
        span.className = 'word-tile';
        tileEls.push(span);
      } else {
        span.textContent = tok;
      }
      div.appendChild(span);
      div.appendChild(document.createTextNode(' '));
    });

    scrambleContainer.appendChild(div);

    let selected = null;
    tileEls.forEach(tile =>
      tile.addEventListener('click', () => {
        if (!selected) {

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;

  // Teacher: en-US Zira (Windows), Google US English Female (Chrome), Samantha (Mac)
  teacherVoice =
    voices.find(v => v.name === "Microsoft Zira" && v.lang === "en-US") ||
    voices.find(v => v.name === "Google US English Female") ||
    voices.find(v => v.name === "Samantha") ||
    voices.find(v => v.lang.startsWith("en") && v.name.toLowerCase().includes("female")) ||
    voices[0];

  // Student: en-GB Aria (Windows), Google UK English (Chrome), Victoria (Mac)
  studentVoice =
    voices.find(v => v.name === "Microsoft Aria" && v.lang === "en-GB") ||
    voices.find(v => v.name === "Google UK English") ||
    voices.find(v => v.name === "Victoria") ||
    voices.find(v => v.lang.startsWith("en") && v.name.toLowerCase().includes("female")) ||
    voices[0];
}

// Load voices dynamically
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

/* =========================
   Selection helpers
========================= */
function getSelectedText() {
  return window.getSelection().toString().trim();
}

function getReadableFromCaret() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;

  const range = sel.getRangeAt(0);

  let node = range.startContainer;
  if (node.nodeType === 3) node = node.parentElement;

  const block = node.closest('p, div, li, article, section');
  if (!block) return null;

  const subRange = document.createRange();
  subRange.selectNodeContents(block);
  subRange.setStart(range.startContainer, range.startOffset);

  const text = subRange.toString().trim();
  return text || null; // return null only if empty
}


/* =========================
   Highlight toggle
========================= */
highlightBtn.addEventListener('click', () => {
  const selection = window.getSelection();
  if (!selection.rangeCount) return;

  const range = selection.getRangeAt(0);
  if (range.collapsed) return;

  let alreadyHighlighted = false;
  const spans = range.commonAncestorContainer.querySelectorAll
    ? range.commonAncestorContainer.querySelectorAll('span.highlighted')
    : [];

  spans.forEach(span => {
    if (selection.containsNode(span, true)) {
      alreadyHighlighted = true;
    }
  });

  if (!alreadyHighlighted) {
    const span = document.createElement('span');
    span.className = 'highlighted';
    range.surroundContents(span);
  } else {
    const contents = range.cloneContents();
    const frag = document.createDocumentFragment();

    Array.from(contents.childNodes).forEach(node => {
      if (node.nodeType === 1 && node.classList.contains('highlighted')) {
        while (node.firstChild) frag.appendChild(node.firstChild);
      } else {
        frag.appendChild(node.cloneNode(true));
      }
    });

    range.deleteContents();
    range.insertNode(frag);
  }

  selection.removeAllRanges();
  selection.addRange(range);
});

/* =========================
   Copy selected text
========================= */
copyBtn.addEventListener('click', async () => {
  const text = getSelectedText();
  if (!text) return alert('No text selected');

  try {
    await navigator.clipboard.writeText(text);
    alert('Copied to clipboard!');
  } catch (err) {
    alert('Copy failed');
  }
});

/* =========================
   Speech functions
========================= */
function speakTeacher(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.voice = teacherVoice;
  u.rate = 0.88;    // slightly slower, more mature
  u.pitch = 1.15;   // slightly lower for adult warmth
  u.volume = 0.95;
  u.text = text.replace(/([,.!?])/g, "$1 "); // slight pause after punctuation
  speechSynthesis.speak(u);
}


function speakStudent(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.voice = studentVoice;
  u.rate = 0.98;
  u.pitch = 1.50;
  u.volume = 0.80;
  speechSynthesis.speak(u);
}


function speakDialog(text) {
  const lines = text.split(/\n+/).map(l => l.trim()).filter(Boolean);

  lines.forEach(line => {
    if (/^teacher:/i.test(line)) {
      speakTeacher(line.replace(/^teacher:\s*/i, ""));
    } else if (/^student:/i.test(line)) {
      speakStudent(line.replace(/^student:\s*/i, ""));
    } else {
      speakTeacher(line);
    }
  });
}

/* =========================
   START
========================= */
startBtn.addEventListener('click', () => {
  speechSynthesis.cancel();
  isPaused = false;
  pauseResumeBtn.textContent = '⏸';

  const selectedText = getSelectedText();
  if (selectedText) {
    speakStudent(selectedText);
    return;
  }

  const caretText = getReadableFromCaret();
  if (!caretText) {
    alert("Place the cursor inside readable text.");
    return;
  }

  speakDialog(caretText);
});

/* =========================
   Pause / Resume
========================= */
pauseResumeBtn.addEventListener('click', () => {
  if (!speechSynthesis.speaking) return;

  if (!isPaused) {
    speechSynthesis.pause();
    isPaused = true;
    pauseResumeBtn.textContent = '▶';
  } else {
    speechSynthesis.resume();
    isPaused = false;
    pauseResumeBtn.textContent = '⏸';
  }
});

/* =========================
   Restart
========================= */
restartBtn.addEventListener('click', () => {
  speechSynthesis.cancel();
  isPaused = false;
  pauseResumeBtn.textContent = '⏸';
  startBtn.click();
});
</script>

       ========================================= */

    const numberPattern = /^(?:Question\s*)?\d+[\.\)\:\-]/i;

    function isExcluded(el) {
      if (OVERLAY_EXCLUSIONS.some(sel => el.closest(sel))) return true;
      if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') return true;
      return false;
    }

    function createOverlay(numberEl, line) {
      if (numberEl.dataset.overlayApplied) return;

      const overlayDiv = document.createElement("div");
      overlayDiv.style.fontSize = "10px";
      overlayDiv.style.lineHeight = "10px";
      overlayDiv.style.color = "#1976d2";
      overlayDiv.style.fontWeight = "bold";
      overlayDiv.style.pointerEvents = "none";
      overlayDiv.style.marginBottom = "2px";
      overlayDiv.textContent = line;

      numberEl.parentNode.insertBefore(overlayDiv, numberEl);
      numberEl.dataset.overlayApplied = "1";
    }

    function scanAndAssignOverlays() {
      const numberEls = [];

      document.querySelectorAll("body *").forEach(el => {
        if (isExcluded(el)) return;
        if (el.childElementCount !== 0) return;

        const text = el.textContent.trim();
        if (!numberPattern.test(text)) return;

        numberEls.push(el);
      });

      numberEls.forEach((el, index) => {
        const line =
          (teamA.length && teamB.length)
            ? (index % 2 === 0
                ? teamA[Math.floor(Math.random() * teamA.length)]
                : teamB[Math.floor(Math.random() * teamB.length)])
            : allLines[Math.floor(Math.random() * allLines.length)];

        createOverlay(el, line);
      });
    }


    /* =========================================
       5. Run
       ========================================= */

    scanAndAssignOverlays();
    setInterval(scanAndAssignOverlays, 700);

  })();

<script>
// ---------------------- UNIVERSAL PIPE-BASED FEEDBACK ----------------------
document.addEventListener("DOMContentLoaded", () => {

  // --- Web Audio context ---
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioContext();

  function playCorrect() {
    audioCtx.resume().then(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    });
  }

  function playWrong() {
    audioCtx.resume().then(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(450, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.25);
      gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    });
  }

  // --- normalize strings for comparison ---
  function normalize(str) {
    return str.trim().toLowerCase().replace(/\s+/g, ' ');
  }

  // --- feedback for multiple-choice (radio/checkbox) ---
  function handleSelection(exercise, selectedValues) {
    const correct = exercise.dataset.correct.split('|').map(normalize);
    let isCorrect;

    if (exercise.querySelectorAll('input[type="checkbox"]').length > 0) {
      // Checkbox / multi-select: all selected must match all correct
      const normalizedSelected = selectedValues.map(normalize).sort();
      isCorrect = normalizedSelected.join('|') === correct.sort().join('|');
    } else {
      // Single choice or fill-in-the-blank
      isCorrect = normalize(selectedValues[0]) === correct[0];
    }

    // Remove old emoji
    exercise.querySelectorAll('.mc-emoji').forEach(span => span.remove());

    // Add emoji for radio/checkbox labels
    exercise.querySelectorAll('input').forEach(input => {
      const lbl = input.closest('label');
      if (!lbl) return;

      const inputValue = normalize(input.value || input.value);
      const span = document.createElement('span');
      span.className = 'mc-emoji';
      span.style.marginLeft = "8px";
      if (input.checked) span.textContent = isCorrect ? "😊" : "😢";
      else span.textContent = '';
      lbl.appendChild(span);
    });

    // Play sound
    if (isCorrect) playCorrect();
    else playWrong();
  }

  // --- universal event listener ---
  document.body.addEventListener('change', e => {
    const input = e.target;
    const exercise = input.closest('.exercise');
    if (!exercise) return;

    if (input.type === 'radio' || input.type === 'checkbox') {
      const selected = Array.from(exercise.querySelectorAll('input:checked')).map(inp => inp.value);
      handleSelection(exercise, selected);
    } else if (input.tagName === 'INPUT' || input.tagName === 'TEXTAREA') {
      // For FIB / text input: compare value
      handleSelection(exercise, [input.value]);
    }
  });

  console.log("✅ Universal pipe-based emoji + audio feedback initialized.");
});
</script>

  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
}

#instructionsModal{
  position:absolute;
  top:25px;
  left:50%;
  transform:translateX(-50%);
  width:min(650px,90vw);
  max-height:90vh;
  background:#fff;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#instructionsHeader{
  padding:12px 16px;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  gap:10px;
}

#instructionsTitle{
  color:#1976d2;
  font-weight:600;
  font-size:1.1em;
}

#instructionsBack{
  border:none;
  background:none;
  font-size:20px;
  cursor:pointer;
  color:#1976d2;
  font-weight:600;
}

#instructionsContent{
  padding:2px 18px 18px 18px;
  overflow-y:auto;
  line-height:1.6;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

#instructionsContent::-webkit-scrollbar{
  display:none;
}

#instructionsContent h3{
  color:#1976d2;
  margin:12px 0 4px 0;
  font-weight:600;
}

#instructionsContent p{
  margin:4px 0;
}

#instructionsContent hr{
  margin:12px 0;
}
`;

document.head.appendChild(style);


/* =========================
   CREATE BUTTON
========================= */

const btn = document.createElement("button");
btn.id = "instructionsBtn";
btn.textContent = "Instructions";

document.body.appendChild(btn);


/* =========================
   CREATE MODAL
========================= */

const root = document.createElement("div");
root.id = "instructionsRoot";

root.innerHTML = `
<div id="instructionsBackdrop"></div>

<div id="instructionsModal">

  <div id="instructionsHeader">
    <button id="instructionsBack">←</button>
    <span id="instructionsTitle">Instructions</span>
  </div>

  <div id="instructionsContent">
    ${parseRawInstructions(RAW_TEXT)}
  </div>

</div>
`;

document.body.appendChild(root);


/* =========================
   SCROLL LOCK
========================= */

const modalContent = document.getElementById("instructionsContent");

modalContent.addEventListener("wheel", e=>{
  e.stopPropagation();
},{passive:false});

modalContent.addEventListener("touchmove", e=>{
  e.stopPropagation();
},{passive:false});


/* =========================
   OPEN / CLOSE
========================= */

function openModal(){
  root.style.display="block";
  document.body.style.overflow="hidden";
  document.documentElement.style.overflow="hidden";
}

function closeModal(){
  root.style.display="none";
  document.body.style.overflow="";
  document.documentElement.style.overflow="";
}

btn.onclick = openModal;

document.getElementById("instructionsBack").onclick = closeModal;
document.getElementById("instructionsBackdrop").onclick = closeModal;

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeModal();
});

/* =========================
   DYNAMIC BODY PADDING FOR BUTTON
========================= */

function adjustBodyPadding(){
  const btnHeight = btn.offsetHeight + -25; // include some gap
  document.body.style.paddingBottom = `${btnHeight}px`;
}

// Initial adjustment
adjustBodyPadding();

// Update if window is resized (responsive)
window.addEventListener("resize", adjustBodyPadding);

})();
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>
