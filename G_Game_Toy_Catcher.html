<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Rorschach Ink Blot Unscramble (Mobile)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial,sans-serif; background:#b3d9ff; display:flex; justify-content:center; padding:10px; }
.container { display:flex; flex-direction:column; align-items:left; gap:10px; width:100%; max-width:400px; }
#topFields { width:100%; display:flex; gap:6px; }
#topFields input { flex:1; padding:6px; border:1px solid #ccc; border-radius:6px; font-size:12px; }

canvas { width:100%; max-width:400px; height:200px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.4); background:#000; position:relative; display:block; }
#overlayNumber { position:absolute; right:8px; bottom:8px; color:#222; font-size:14px; font-weight:bold; pointer-events:none; }
#headerText { font-size:14px; font-weight:bold; text-align:left; margin-bottom:6px; }

.controls { display:flex; gap:3px; width:100%; justify-content:flex-start; align-items:center; }
button { flex:0 0 auto; padding:6px 8px; min-width:50px; background:#000; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:12px; }
button:disabled { background:#888; cursor:not-allowed; }
button:hover:enabled { background:#444; }

#scoreboard { margin-top:8px; padding:8px; background:#fff; border:1px solid #ccc; border-radius:6px; width:100%; display:none; text-align:left; font-size:12px; }
#scoreboard pre { font-size:12px; white-space:pre-wrap; word-wrap:break-word; }

#scrambleContainer { background:#fff; padding:6px; border:1px solid #aaa; min-height:50px; border-radius:6px; font-size:10px; display:grid; grid-template-columns:repeat(15,1fr); justify-items:center; align-items:center; gap:4px;}
#dropContainer { background:#000; padding:6px; border:1px solid #444; min-height:30px; border-radius:6px; color:#fff; margin-top:4px; font-size:10px; display:flex; flex-wrap:wrap; gap:2px; justify-content:flex-start;}
.word-tile { display:inline-block; padding:4px 6px; margin:2px; background:#ffd8a8; border:1px solid #0288d1; border-radius:4px; cursor:pointer; font-size:10px; user-select:none; color:#000; text-align:center; }
.word-tile.selected { outline:2px solid #ff0000; }
.sold-out { background:#ffae42; cursor:pointer; color:#000; font-weight:bold; }

.grabber-container { display:flex; justify-content:center; margin-top:4px; }
.grabber { display:flex; flex-direction:column; gap:2px; position:relative; width:90%; }
.grabber input[type="range"] { width:100%; -webkit-appearance:none; height:6px; background:#000; border-radius:3px; }
.grabber input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; background:#0288d1; border-radius:50%; cursor:pointer; }
.grabber button { font-size:10px; padding:4px; margin-top:2px; border-radius:6px; }

footer { margin-top:8px; font-size:10px; color:#777; text-align:center; }
.highlight { outline:2px solid #ff0000; border-radius:4px; }
</style>
</head>
<body>
<div class="container">
  <div id="topFields">
    <input type="text" id="nameField" placeholder="Name" />
    <input type="text" id="idField" placeholder="ID" />
  </div>

  <div id="headerText"></div>

  <div style="position:relative; width:100%;">
    <canvas id="morphCanvas" width="300" height="200"></canvas>
    <div id="overlayNumber">1</div>
  </div>

  <div id="scrambleContainer"></div>

  <div class="grabber-container">
    <div class="grabber">
      <input type="range" id="slider" min="0" max="1" step="0.01" value="0">
      <div style="display:flex; gap:2px; justify-content:center;">
        <button id="grabBtn" disabled>Grab</button>
        <button id="dropBtn" disabled>Drop</button>
        <button id="returnBtn" disabled>Return</button>
      </div>
    </div>
  </div>

  <div id="dropContainer"></div>

  <div class="controls" id="mainControls">
    <button id="backButton" disabled>Back</button>
    <button id="pauseButton" disabled>Pause</button>
    <button id="nextButton" disabled>Next</button>
    <button id="submitButton" disabled>Submit</button>
  </div>

  <div id="scoreboard">
    <pre id="scoreData"></pre>
    <div class="controls">
      <button id="copyButton">Copy</button>
      <button id="downloadTxtButton">↓TXT</button>
      <button id="downloadPngButton">↓PNG</button>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 David Lee Cherry, Nearly Perfect.</p>
  </footer>

  <audio id="grabSound" src="grab.wav" preload="auto"></audio>
  <audio id="buzzSound" src="buzz.wav" preload="auto"></audio>

  <textarea id="rawTextInput" style="display:none;">
|Sayings|
The quick, brown fox jumps over the lazy dog!

Knowledge is power. To be or not to be, that is the question.

Actions speak louder than words.

Practice makes perfect.

Time and tide wait for no man.

Why did the chicken cross the road?

Less is more. Honesty is the best policy.

Every end is a new beginning.
  </textarea>
</div>

<script>
let showBlot = true;
let currentImageIndex = 0, heldTile = null, highlightIndex = -1;
const maxCells = 15;

const canvas = document.getElementById('morphCanvas');
const ctx = canvas.getContext('2d'); canvas.style.display = showBlot?'block':'none';
const overlayNumber = document.getElementById('overlayNumber');
const scrambleContainer = document.getElementById('scrambleContainer');
const dropContainer = document.getElementById('dropContainer');
const slider = document.getElementById('slider');
const grabBtn = document.getElementById('grabBtn');
const dropBtn = document.getElementById('dropBtn');
const returnBtn = document.getElementById('returnBtn');
const nameField = document.getElementById('nameField');
const idField = document.getElementById('idField');
const mainControls = document.getElementById('mainControls');
const grabSound = document.getElementById('grabSound');
const buzzSound = document.getElementById('buzzSound');

const rawText = document.getElementById('rawTextInput').value.trim();
const headerMatch = rawText.match(/\|(.*?)\|/);
document.getElementById("headerText").textContent = headerMatch?headerMatch[1].trim():"";
const rawTextData = rawText.replace(/\|.*?\|/,"").split(/\n\s*\n/).map(l=>l.trim()).filter(l=>l.length>0);
let userAnswers = new Array(rawTextData.length).fill(null);

// Enable main controls only after name & ID filled
function checkFields(){
  const filled = nameField.value.trim()!=="" && idField.value.trim()!=="";
  [...mainControls.children].forEach(b=>b.disabled = !filled);
}
nameField.addEventListener('input', checkFields);
idField.addEventListener('input', checkFields);

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function renderPuzzle(index){
    scrambleContainer.innerHTML = ''; dropContainer.innerHTML = ''; heldTile = null; highlightIndex = -1;
    const sentence = rawTextData[index];
    const regex = /[\w'-]+[.,!?;:"“”‘’()]*|\s+/g;
    const tokens = [];
    let m;
    while((m=regex.exec(sentence))!==null){ 
        if(/\S/.test(m[0])) tokens.push({text:m[0]});
    }
    const words = tokens.map(t=>t.text);
    const shuffled = shuffle(words);
    
    // Fill shuffled words
    shuffled.forEach(tok=>{
        const span = document.createElement('span'); 
        span.textContent = tok;
        span.className='word-tile';
        scrambleContainer.appendChild(span);
    });
    
    // Add "Sold Out" to fill empty cells randomly
    const emptyCount = maxCells - shuffled.length;
    const positions = [];
    while(positions.length < emptyCount){
        const pos = Math.floor(Math.random()*maxCells);
        if(!positions.includes(pos) && !scrambleContainer.children[pos]) positions.push(pos);
    }
    positions.forEach(pos=>{
        const sold = document.createElement('span');
        sold.textContent='Sold Out';
        sold.className='sold-out';
        scrambleContainer.insertBefore(sold, scrambleContainer.children[pos]||null);
    });

    // Ensure grid has exactly maxCells
    while(scrambleContainer.children.length<maxCells){
        const filler = document.createElement('span');
        filler.className='sold-out';
        filler.textContent='Sold Out';
        scrambleContainer.appendChild(filler);
    }

    updateSliderAndHighlight();
    updateButtons();
}

// Slider highlight
function updateSliderAndHighlight(){
    const tiles = [...scrambleContainer.children];
    if(tiles.length===0) return;
    highlightIndex = Math.min(tiles.length-1, Math.floor(slider.value * tiles.length));
    tiles.forEach((t,i)=>{
        t.classList.toggle('highlight', i===highlightIndex);
    });
}

slider.addEventListener('input', ()=>{
    updateSliderAndHighlight();
    updateButtons();
});

// Buttons logic
function updateButtons(){
    const tiles = [...scrambleContainer.children].filter(c=>c.classList.contains('word-tile'));
    const dropTiles = [...dropContainer.children].filter(c=>c.classList.contains('word-tile'));
    grabBtn.disabled = tiles.length===0 || heldTile;
    dropBtn.disabled = !heldTile;
    returnBtn.disabled = dropTiles.length===0 && !heldTile;
}

// Grab / Drop / Return
grabBtn.addEventListener('click', ()=>{
    const tiles = [...scrambleContainer.children].filter(c=>c.classList.contains('word-tile'));
    if(tiles.length>0 && highlightIndex>=0){
        heldTile = tiles[highlightIndex];
        heldTile.style.visibility='hidden';
        grabSound.play();
        updateButtons();
    } else if(highlightIndex>=0 && scrambleContainer.children[highlightIndex].classList.contains('sold-out')){
        buzzSound.play();
    }
});
dropBtn.addEventListener('click', ()=>{
    if(heldTile){
        heldTile.style.visibility='visible';
        dropContainer.appendChild(heldTile);
        heldTile.addEventListener('click', ()=>{ 
            heldTile.classList.toggle('selected');
        });
        heldTile = null;
        updateButtons();
    }
});
returnBtn.addEventListener('click', ()=>{
    const selected = [...dropContainer.children].filter(c=>c.classList.contains('selected'));
    if(selected.length>0){
        selected.forEach(t=>{
            t.classList.remove('selected');
            scrambleContainer.appendChild(t);
        });
    } else if(heldTile){
        heldTile.style.visibility='visible';
        heldTile = null;
    } else if(dropContainer.children.length>0){
        const tile = dropContainer.lastElementChild;
        scrambleContainer.appendChild(tile);
    }
    updateButtons();
});

function saveCurrentAnswer(){ userAnswers[currentImageIndex] = [...dropContainer.children]; }

document.getElementById('nextButton').addEventListener('click',()=>{
    saveCurrentAnswer(); 
    currentImageIndex=(currentImageIndex+1)%rawTextData.length; 
    renderPuzzle(currentImageIndex);
});
document.getElementById('backButton').addEventListener('click',()=>{
    saveCurrentAnswer(); 
    currentImageIndex=(currentImageIndex-1+rawTextData.length)%rawTextData.length; 
    renderPuzzle(currentImageIndex);
});
document.getElementById('submitButton').addEventListener('click', ()=>{
    saveCurrentAnswer(); 
    const name = nameField.value.trim(); 
    const id = idField.value.trim();
    const date = new Date().toLocaleDateString('en-GB'); 
    let correctCount=0;
    userAnswers.forEach((ans,i)=>{
        const orig = rawTextData[i].match(/[\w'-]+[.,!?;:"“”‘’()]*/g)||[]; 
        if(ans && ans.length===orig.length && ans.every((t,k)=>t.textContent===orig[k])) correctCount++;
    });
    const total = rawTextData.length; 
    const percent = Math.round((correctCount/total)*100);
    document.getElementById('scoreData').textContent = `${name} | ${id} | ${date} | ${correctCount}/${total} | ${percent}%`; 
    document.getElementById('scoreboard').style.display='block';
});

renderPuzzle(0);
</script>
</body>
</html>
