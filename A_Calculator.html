<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scientific Calculator</title>

<style>
:root {
  --bg: #000;
  --panel: #1c1c1e;
  --display-bg: #111;
  --btn-dark: #2c2c2e;
  --btn-light: #3a3a3c;
  --btn-orange: #ff9500;
  --text: #fff;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #111;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.calculator {
  width: 100%;
  max-width: 420px;
  background: var(--panel);
  padding: 15px;
  border-radius: 25px;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

.display {
  background: var(--display-bg);
  color: var(--text);
  font-size: 2.2rem;
  padding: 20px;
  border-radius: 15px;
  text-align: right;
  word-wrap: break-word;
  min-height: 60px;
  margin-bottom: 15px;
}

.mode {
  text-align: right;
  font-size: 0.8rem;
  opacity: 0.6;
  margin-bottom: 5px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

button {
  padding: 18px 0;
  font-size: 1rem;
  border-radius: 12px;
  border: none;
  background: var(--btn-dark);
  color: var(--text);
  cursor: pointer;
  transition: 0.15s;
}

button:active {
  transform: scale(0.95);
}

.operator { background: var(--btn-orange); }
.function { background: var(--btn-light); }
.wide { grid-column: span 2; }

@media (max-height: 700px){
  button { padding: 12px 0; }
}
</style>
</head>

<body>

<div class="calculator">
  <div class="mode" id="mode">DEG</div>
  <div class="display" id="display">0</div>

  <div class="buttons">
    <button class="function" onclick="toggleMode()">DEG/RAD</button>
    <button class="function" onclick="clearDisplay()">AC</button>
    <button class="function" onclick="backspace()">⌫</button>
    <button class="function" onclick="append('%')">%</button>
    <button class="operator" onclick="append('/')">÷</button>

    <button class="function" onclick="append('Math.sin(')">sin</button>
    <button class="function" onclick="append('Math.cos(')">cos</button>
    <button class="function" onclick="append('Math.tan(')">tan</button>
    <button class="function" onclick="append('Math.log10(')">log</button>
    <button class="operator" onclick="append('*')">×</button>

    <button class="function" onclick="append('Math.asin(')">sin⁻¹</button>
    <button class="function" onclick="append('Math.acos(')">cos⁻¹</button>
    <button class="function" onclick="append('Math.atan(')">tan⁻¹</button>
    <button class="function" onclick="append('Math.log(')">ln</button>
    <button class="operator" onclick="append('-')">−</button>

    <button onclick="append('Math.PI')">π</button>
    <button onclick="append('Math.E')">e</button>
    <button onclick="append('(')">(</button>
    <button onclick="append(')')">)</button>
    <button class="operator" onclick="append('+')">+</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('**')">xʸ</button>
    <button onclick="factorial()">x!</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('Math.sqrt(')">√</button>
    <button onclick="append('Math.random()')">rand</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('.')">.</button>
    <button class="operator" onclick="calculate()">=</button>

    <button class="wide" onclick="append('0')">0</button>
    <button onclick="memoryAdd()">M+</button>
    <button onclick="memoryRecall()">MR</button>
    <button onclick="memoryClear()">MC</button>
  </div>
</div>

<script>
let display = document.getElementById("display");
let modeDisplay = document.getElementById("mode");
let expression = "";
let memory = 0;
let isDegree = true;

function append(value){
  expression += value;
  display.textContent = expression;
}

function clearDisplay(){
  expression = "";
  display.textContent = "0";
}

function backspace(){
  expression = expression.slice(0,-1);
  display.textContent = expression || "0";
}

function toggleMode(){
  isDegree = !isDegree;
  modeDisplay.textContent = isDegree ? "DEG" : "RAD";
}

function calculate(){
  try{
    let exp = expression;
    if(isDegree){
      exp = exp.replace(/Math\.(sin|cos|tan)\(/g,
        (match,fn)=>`Math.${fn}((Math.PI/180)*`);
    }
    let result = eval(exp);
    display.textContent = result;
    expression = result.toString();
  } catch{
    display.textContent = "Error";
    expression = "";
  }
}

function factorial(){
  let num = parseFloat(expression);
  if(num < 0) return display.textContent="Error";
  let result = 1;
  for(let i=1;i<=num;i++) result*=i;
  display.textContent = result;
  expression = result.toString();
}

function memoryAdd(){
  memory += parseFloat(display.textContent)||0;
}

function memoryRecall(){
  expression += memory;
  display.textContent = expression;
}

function memoryClear(){
  memory = 0;
}
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>

</body>
</html>
