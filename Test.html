<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
:root{
  --paper:#e9e9e9;
  --outer:#b28ae8;
  --rule:#3f74ad;
  --red:#b82b2b;

  --pageW:852px;
  --pageH:1200px;

  --row:34px;
  --inputH:150px;

  --leftW:135px;
  --rightW:calc(var(--pageW) - var(--leftW));
}

*{box-sizing:border-box;}

html,body{
  margin:0;
  background:#dff2ff;
}

body{
  display:flex;
  justify-content:center;
}

.frame{
  background:var(--outer);
  padding:8px;
}

.page{
  position:relative;
  width:var(--pageW);
  height:var(--pageH);
  background:var(--paper);
  overflow:hidden;
  font-family:"Comic Sans MS",cursive;
}

/* ================= INPUTS ================= */

.inputBar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:var(--inputH);
  display:flex;
  z-index:20;
  border-bottom:2px solid var(--rule);
}

textarea{
  resize:none;
  font-family:inherit;
  font-size:14px;
  padding:10px 6px 6px 6px;
  border:none;
  outline:none;
  background:var(--paper);
  user-select:text;
  touch-action:auto;
  line-height:1.2;
}

#leftInput{ width:var(--leftW); }
#rightInput{ width:var(--rightW); }

/* ================= GRID ================= */

.lines{
  position:absolute;
  inset:var(--inputH) 0 0 0;

  background:repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent calc(var(--row) - 2px),
    var(--rule) calc(var(--row) - 1px),
    var(--rule) var(--row)
  );
}

.red{
  position:absolute;
  left:var(--leftW);
  top:0;
  bottom:0;
  width:3px;
  background:var(--red);
  z-index:9999;
  pointer-events:none;
  box-shadow:0 0 6px rgba(184,43,43,.4);
}

/* ================= SHEETS ================= */

.sheet{
  position:absolute;
  top:var(--inputH);
  bottom:0;
  display:grid;
  grid-auto-rows:var(--row);
  align-content:start;
}

.leftSheet{
  left:0;
  width:var(--leftW);
  grid-template-columns:var(--leftW);
}

.rightSheet{
  left:var(--leftW);
  width:var(--rightW);
  grid-template-columns:repeat(6,1fr);
}

.cell{
  display:flex;
  align-items:center;
  padding:0 1px;            /* nearly full-width tile */
  white-space:nowrap;
  overflow:hidden;
  user-select:none;
  cursor:pointer;
  border-right:1px solid rgba(0,0,0,.35);
}

.cell.selected{
  background:rgba(90,160,255,.28);
  outline:1px solid rgba(40,100,220,.8);
}

.tile{
  display:flex;
  align-items:center;

  width:100%;               /* fill cell width */
  height:calc(100% - 4px);

  padding:3px 8px;

  border:1px solid #666;
  border-radius:6px;
  background:white;

  cursor:grab;
  user-select:none;

  position:relative;
  top:-1px;                 /* move tile up ~1px */

  overflow:hidden;
}

.visually-hidden{
  display:none !important;
}


.color-Interjections { background:#8f8f8f; color:#ffffff; }          /* pastel gray */
.color-Verbs { background:#ffcccc; color:#333; }          /* pastel red */
.color-Adjectives { background:#d9f7b2; color:#333; }     /* pastel yellow-green */
.color-Adverbs { background:#ffd1dc; color:#333; }        /* pastel pink */
.color-Determiners { background:#c8f7c5; color:#333; }    /* pastel green */
.color-Pronouns { background:#e0c3fc; color:#333; }       /* pastel purple */
.color-Prepositions { background:#ffd8b1; color:#333; }   /* pastel orange */
.color-Conjunctions { background:#cfe8ff; color:#333; }   /* pastel blue */
.color-Interjections { background:#d3d3d3; color:#333; }  /* pastel gray */

</style>
</head>

<body>


<div class="frame">
<div class="page">

<div class="inputBar">
  <textarea id="leftInput"></textarea>
  <textarea id="rightInput"></textarea>
</div>

<div class="lines"></div>
<div class="red"></div>

<div class="sheet leftSheet" id="left"></div>
<div class="sheet rightSheet" id="right"></div>

</div>
</div>

<script>

const ROWS = Math.ceil(1081 / 34);
const COLS = 6;

const leftEl = document.getElementById("left");
const rightEl = document.getElementById("right");

const leftInput = document.getElementById("leftInput");
const rightInput = document.getElementById("rightInput");

(function waitForSystem(){

  function ready(){
    return (
      typeof update === "function" &&
      typeof render === "function" &&
      typeof applyPOS === "function" &&
      typeof rightInput !== "undefined"
    );
  }

  function start(){
    fetch("./data.txt", { cache: "no-store" })
      .then(r => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.text();
      })
.then(text => {

    const sections = parseSectionedText(text);

    const instructions =
        sections.find(s =>
            s.heading.toLowerCase() === "instructions"
        );

    rightInput.value =
        instructions
            ? instructions.body.join("\n")
            : "";

    window.__tileSource = text;

    requestAnimationFrame(() => {
        update();
    });

})

      .catch(err => {
        console.error("data.txt load failed:", err);
      });
  }

  (function loop(){
    if(ready()) start();
    else requestAnimationFrame(loop);
  })();

})();


let dragging = false;
let editing = false;

let anchorCell = null;
let focusCell = null;

let tiles = [];
let selectedTile = null;

const cellText = Array.from(
  {length:ROWS},
  ()=>Array(COLS).fill("")
);;

/* ================= PARSING ================= */

function parseLeft(text){
  return text.replace(/\r/g,"").split("\n").map(t=>t.trim());
}

function buildTilesFromSections(sections){

  const active = sections.find(s =>
    s.heading.toLowerCase().includes("active section")
  );

  const words = [];

  if(active){
    active.body.forEach(line => {
      const t = line.trim();
      if(!t) return;
      if(t.startsWith("~")) return;
      if(t.startsWith("|") && t.endsWith("|")) return;
      words.push(t);
    });
  }

  return words.map((word, index) => ({
    id: index,
    text: word,
    row: Math.floor(index / COLS),
    col: index % COLS
  }));
}
/* ================= UPDATE ================= */

function update(){

const text = window.__tileSource || "";

const sections = parseSectionedText(text);
  tiles = buildTilesFromSections(sections);

  if(typeof applyPOS === "function") applyPOS();
  if(typeof render === "function") render();
}

/* LIVE INPUT HOOKS */
leftInput.addEventListener("input", update);
rightInput.addEventListener("input", update);
/* ================= SELECTION ================= */

function clearSelection(){
  document.querySelectorAll(".cell.selected")
    .forEach(c=>c.classList.remove("selected"));
}

function renderSelection(){
  clearSelection();
  if(!anchorCell || !focusCell) return;
  if(anchorCell.dataset.side !== focusCell.dataset.side) return;

  const side = anchorCell.dataset.side;

  const r1 = Math.min(+anchorCell.dataset.r, +focusCell.dataset.r);
  const r2 = Math.max(+anchorCell.dataset.r, +focusCell.dataset.r);

  const c1 = Math.min(+(anchorCell.dataset.c||0), +(focusCell.dataset.c||0));
  const c2 = Math.max(+(anchorCell.dataset.c||0), +(focusCell.dataset.c||0));

  const target = side === "L" ? leftEl : rightEl;

  for(let r=r1;r<=r2;r++){
    for(let c=c1;c<=c2;c++){
      const el = side === "L"
        ? target.querySelector(`[data-r="${r}"][data-side="L"]`)
        : target.querySelector(`[data-r="${r}"][data-c="${c}"][data-side="R"]`);

      if(el) el.classList.add("selected");
    }
  }
}

function setSelection(a, b, additive=false){
  if(editing) return;

  if(!additive || !anchorCell){
    anchorCell = a;
  }

  focusCell = b;
  renderSelection();
}

/* ================= EDIT (FIXED) ================= */

function edit(cell){

  editing = true;

  dragging = false;
  clearSelection();

  cell.contentEditable = true;
  cell.focus();

  const range = document.createRange();
  range.selectNodeContents(cell);

  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  cell.onblur = () => {

    if(cell.dataset.side==="R"){

      const r=+cell.dataset.r;
      const c=+cell.dataset.c;

      cellText[r][c]=cell.textContent;
    }

    editing=false;
    cell.contentEditable=false;
  };
}
/* ================= COPY / PASTE (UNCHANGED) ================= */

function copy(){
  const active = document.activeElement;
  if (active instanceof HTMLTextAreaElement) return;

  if(!anchorCell || !focusCell) return;

  const selSide = anchorCell.dataset.side;
  const target = selSide==="L"?leftEl:rightEl;

  const r1 = Math.min(+anchorCell.dataset.r, +focusCell.dataset.r);
  const r2 = Math.max(+anchorCell.dataset.r, +focusCell.dataset.r);

  const c1 = Math.min(+(anchorCell.dataset.c||0), +(focusCell.dataset.c||0));
  const c2 = Math.max(+(anchorCell.dataset.c||0), +(focusCell.dataset.c||0));

  const out=[];

  for(let r=r1;r<=r2;r++){
    const row=[];
    for(let c=c1;c<=c2;c++){
      const el = selSide==="L"
        ? target.querySelector(`[data-r="${r}"][data-side="L"]`)
        : target.querySelector(`[data-r="${r}"][data-c="${c}"][data-side="R"]`);

      row.push(el?.textContent||"");
    }
    out.push(row.join("\t"));
  }

  navigator.clipboard.writeText(out.join("\n"));
}

function paste(text){
  const active = document.activeElement;
  if (active instanceof HTMLTextAreaElement) return;

  if(!anchorCell) return;

  const rows = text.replace(/\r/g,"").split("\n").map(r=>r.split("\t"));

  const target = anchorCell.dataset.side==="L"?leftEl:rightEl;

  rows.forEach((row,r)=>{
    row.forEach((val,c)=>{
      const el = anchorCell.dataset.side==="L"
        ? target.querySelector(`[data-r="${+anchorCell.dataset.r+r}"][data-side="L"]`)
        : target.querySelector(`[data-r="${+anchorCell.dataset.r+r}"][data-c="${+(anchorCell.dataset.c||0)+c}"][data-side="R"]`);

      if(el) el.textContent=val;
    });
  });
}

/* ================= CLEAR ================= */

function clearCells(){
  if(!anchorCell || !focusCell) return;

  const side = anchorCell.dataset.side;
  const target = side==="L"?leftEl:rightEl;

  const r1 = Math.min(+anchorCell.dataset.r, +focusCell.dataset.r);
  const r2 = Math.max(+anchorCell.dataset.r, +focusCell.dataset.r);

  const c1 = Math.min(+(anchorCell.dataset.c||0), +(focusCell.dataset.c||0));
  const c2 = Math.max(+(anchorCell.dataset.c||0), +(focusCell.dataset.c||0));

  for(let r=r1;r<=r2;r++){
    for(let c=c1;c<=c2;c++){
      const el = side==="L"
        ? target.querySelector(`[data-r="${r}"][data-side="L"]`)
        : target.querySelector(`[data-r="${r}"][data-c="${c}"][data-side="R"]`);

      if(el) el.textContent="";
    }
  }
}

/* ================= RENDER ================= */

function render(){
  leftEl.innerHTML="";
  rightEl.innerHTML="";

  for(let r=0;r<ROWS;r++){

    const L=document.createElement("div");
    L.className="cell";
    L.dataset.side="L";
    L.dataset.r=r;
    L.textContent=cellText[r]?.[0] || "";

    L.onpointerdown=(e)=>{
      if(editing) return;
      dragging=true;
      setSelection(L,L,e.shiftKey);
    };

    L.onpointerenter=()=>{
      if(dragging && anchorCell?.dataset.side==="L"){
        focusCell=L;
        renderSelection();
      }
    };

    L.ondblclick=()=>edit(L);   /* FIXED */

    leftEl.appendChild(L);

    for(let c=0;c<COLS;c++){
      const R=document.createElement("div");
      R.className="cell";
      R.dataset.side="R";
      R.dataset.r=r;
      R.dataset.c=c;
const tile = (tiles || []).find(
  t => t.row===r && t.col===c
);

if(tile){

  const tileEl=document.createElement("div");

const cls = window.POS_COLORS_INDEX?.get((tile.text || "").trim().toLowerCase()) || "";
tileEl.className = "tile " + cls;

  tileEl.textContent=tile.text;
const len = tile.text.length;
const size = Math.max(8, 16 - (len - 10) * 0.5);

tileEl.style.fontSize = size + "px";

tileEl.onclick=(e)=>{

  e.stopPropagation();

  if(selectedTile===tile){

    tileEl.contentEditable=true;
    tileEl.focus();

    const range=document.createRange();
    range.selectNodeContents(tileEl);

    const sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);

    tileEl.onblur=()=>{

      tile.text=tileEl.textContent;

      tileEl.contentEditable=false;

      render();
    };

    return;
  }

  selectedTile=tile;
};
tileEl.ondblclick=(e)=>{
  e.stopPropagation();

  tileEl.contentEditable = true;
  tileEl.focus();

  const range = document.createRange();
  range.selectNodeContents(tileEl);

  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  tileEl.onblur = ()=>{
    tile.text = tileEl.textContent;
    tileEl.contentEditable = false;
  };
};

  R.appendChild(tileEl);

}else{

  R.textContent=cellText[r][c];

}

R.onpointerdown=(e)=>{

if(selectedTile){

  const occupied = tiles.some(
    t => t !== selectedTile &&
         t.row === r &&
         t.col === c
  );

  if(occupied){
    selectedTile = null;
    return;
  }

  selectedTile.row = r;
  selectedTile.col = c;

  selectedTile = null;

  render();

  return;
}

  if(editing) return;

  dragging = true;
  setSelection(R,R,e.shiftKey);
};
      R.onpointerenter=()=>{
        if(dragging && anchorCell?.dataset.side==="R"){
          focusCell=R;
          renderSelection();
        }
      };

      R.ondblclick=()=>{

  const occupied = tiles.some(
    t => t.row===r && t.col===c
  );

  if(occupied) return;

  edit(R);
};

      rightEl.appendChild(R);
    }
  }
}

/* ================= POINTER ================= */

document.addEventListener("pointermove",(e)=>{
  if(!dragging || !anchorCell) return;

  const el=document.elementFromPoint(e.clientX,e.clientY);
  if(!el || !el.classList.contains("cell")) return;

  if(el.dataset.side!==anchorCell.dataset.side) return;

  focusCell=el;
  renderSelection();
});

document.addEventListener("pointerup",()=>{
  dragging=false;
});

/* ================= KEYBOARD ================= */

function getCell(side,r,c=0){
  return document.querySelector(
    `[data-side="${side}"][data-r="${r}"]${side==="R"?`[data-c="${c}"]`:""}`
  );
}

function moveCell(cell,key){
  const r=+cell.dataset.r;
  const c=+(cell.dataset.c||0);
  const side=cell.dataset.side;

  if(key==="ArrowDown") return getCell(side,r+1,c);
  if(key==="ArrowUp") return getCell(side,r-1,c);
  if(key==="ArrowRight") return getCell(side,r,c+1);
  if(key==="ArrowLeft") return getCell(side,r,c-1);

  return cell;
}

document.addEventListener("keydown",(e)=>{
  if(editing) return;

  const active=document.activeElement;
  if(active instanceof HTMLTextAreaElement) return;

  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)){
    e.preventDefault();

    const start=focusCell||anchorCell;
    if(!start) return;

    const next=moveCell(start,e.key);
    if(!next) return;

    focusCell=next;

    if(e.shiftKey){
      if(!anchorCell) anchorCell=start;
    }else{
      anchorCell=next;
    }

    renderSelection();
  }

  if ((e.ctrlKey||e.metaKey)&&e.key==="x"){
    copy();
    clearCells();
    e.preventDefault();
  }

  if(e.key==="Delete"||e.key==="Backspace"){
    clearCells();
    e.preventDefault();
  }
});

/* ================= COPY/PASTE ================= */

document.addEventListener("copy",(e)=>{
  if(document.activeElement instanceof HTMLTextAreaElement) return;
  if(!anchorCell||!focusCell) return;
  copy();
  e.preventDefault();
});

document.addEventListener("paste",(e)=>{
  if(document.activeElement instanceof HTMLTextAreaElement) return;
  if(editing) return;
  if(!anchorCell) return;
  paste(e.clipboardData.getData("text"));
  e.preventDefault();
});

update();
render();

</script>

<script>

let historyStack = [];
let historyIndex = -1;
let isRestoring = false;

function captureState() {

  return {

    left: leftInput.value,
    right: rightInput.value,

    tileState: tiles.map(t => ({
      id: t.id,
      text: t.text,
      row: t.row,
      col: t.col
    })),

    cells: [...document.querySelectorAll(".cell")]
      .filter(el => !el.querySelector(".tile"))
      .map(el => ({
        side: el.dataset.side,
        r: +el.dataset.r,
        c: +(el.dataset.c || 0),
        v: el.textContent
      }))
  };
}

function pushState() {

  if(isRestoring) return;

  historyStack.length = historyIndex + 1;

  historyStack.push(captureState());

  historyIndex = historyStack.length - 1;
}

function undo() {

  if(historyIndex <= 0) return;

  historyIndex--;

  apply(historyStack[historyIndex]);
}

function redo() {

  if(historyIndex >= historyStack.length - 1) return;

  historyIndex++;

  apply(historyStack[historyIndex]);
}

document.addEventListener("keydown", e => {

  if(e.ctrlKey || e.metaKey){

    if(e.key.toLowerCase() === "z" && !e.shiftKey){

      e.preventDefault();
      undo();
    }

    if(
      e.key.toLowerCase() === "y" ||
      (e.key.toLowerCase() === "z" && e.shiftKey)
    ){

      e.preventDefault();
      redo();
    }
  }
});

requestAnimationFrame(pushState);

</script>


<script>
function apply(state) {

  isRestoring = true;

  leftInput.value = state.left;
  rightInput.value = state.right;

  if (typeof update === "function") update();

  requestAnimationFrame(() => {

    /* RESTORE TILE POSITIONS */

    if (
      Array.isArray(state.tileState) &&
      Array.isArray(tiles)
    ) {

      state.tileState.forEach(saved => {

        const tile = tiles.find(
          t => t.id === saved.id
        );

        if (!tile) return;

        tile.row = saved.row;
        tile.col = saved.col;
        tile.text = saved.text;
      });
    }

    if (typeof render === "function") render();

    /* RESTORE NORMAL CELL TEXT ONLY */

    if (Array.isArray(state.cells)) {

      state.cells.forEach(c => {

        const selector =
          c.side === "L"
            ? `[data-side="L"][data-r="${c.r}"]`
            : `[data-side="R"][data-r="${c.r}"][data-c="${c.c}"]`;

        const el = document.querySelector(selector);

        if (!el) return;

        if (el.querySelector(".tile")) return;

        el.textContent = c.v;
      });
    }

    isRestoring = false;

  });
}
</script>

<script>
(function(){

  let activeSectionTitle = null;

  // Holds the COMPLETE contents of data.txt.
  // The textarea will only display the Instructions section.
  window.__tileSource = window.__tileSource || "";

  window.getTileSourceText = function getTileSourceText(){

    return window.__tileSource;

  };

  function parseSectionedText(text){

    text = text.replace(/\r/g,"");

    const sections = [];
    let current = null;

    text.split("\n").forEach(line => {

      const trimmed = line.trim();

      // SECTION HEADER
      if(trimmed.startsWith("~")){
        current = {
          heading: trimmed.slice(1).trim(),
          body: []
        };
        sections.push(current);
        return;
      }

      if(!current) return;

      current.body.push(line);

    });

    return sections;
  }

  window.getInstructionText = function(){

    const sections = parseSectionedText(window.__tileSource);

    const instructions = sections.find(
      s => s.heading.toLowerCase() === "instructions"
    );

    return instructions
      ? instructions.body.join("\n")
      : "";

  };

function parseSectionedText(text){

  text = text.replace(/\r/g,"");

  const sections = [];
  let current = null;

  text.split("\n").forEach(line => {

    const trimmed = line.trim();

// INSTRUCTION LAYER
if(trimmed.startsWith("!")){
    if(current){
        current.body.push(line);
    }else{
        sections.push({
            heading: "__INSTRUCTION__",
            body:[trimmed.slice(1).trim()]
        });
    }
    return;
}

    if(!current) return;

    // DROP SUBHEADERS
    if(trimmed.startsWith("|") && trimmed.endsWith("|")){
      return;
    }

    current.body.push(line);
  });

  return sections;
}

(function(){

window.buildTiles = function(sourceText){

  const text =
    sourceText ??
    getTileSourceText?.() ??
    rightInput.value ??
    "";

  const sections = parseSectionedText(text);

  const newTiles = buildTilesFromSections(sections);

  tiles = newTiles;

  window.activeSectionTitle =
    sections.find(s =>
      s.heading.toLowerCase().includes("active section")
    )?.heading || null;

applyPOS();
render();};

})();

</script>


<script>
(function(){

  const CLEAR_TILE_CLASS = "clearTile";

  if(!document.getElementById("clearTileStyle")){
    const style = document.createElement("style");
    style.id = "clearTileStyle";

    style.textContent = `
      .tile.${CLEAR_TILE_CLASS}{
        background:transparent !important;
      }
    `;

    document.head.appendChild(style);
  }

  const originalRender = render;

  render = function(){

    originalRender();

    document.querySelectorAll(".tile").forEach(tileEl => {

      const tileObj = tiles.find(
        t => t.text === tileEl.textContent
      );

      if(tileObj && tileObj.clearTile){
        tileEl.classList.add(CLEAR_TILE_CLASS);
      }
    });
  };

  const originalEdit = edit;

  edit = function(cell){

    if(cell.dataset.side !== "R"){
      return originalEdit(cell);
    }

    editing = true;

    dragging = false;
    clearSelection();

    cell.contentEditable = true;
    cell.focus();

    const range = document.createRange();
    range.selectNodeContents(cell);

    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);

    cell.onblur = () => {

      const text = cell.textContent.trim();

      const r = +cell.dataset.r;
      const c = +cell.dataset.c;

      cell.contentEditable = false;
      editing = false;

      if(!text){
        cellText[r][c] = "";
        return;
      }

      cellText[r][c] = "";

      const occupied = tiles.some(
        t => t.row === r && t.col === c
      );

      if(occupied){
        render();
        return;
      }

      tiles.push({
        id: Date.now() + Math.random(),
        text,
        row: r,
        col: c,
        clearTile: true
      });

      render();
    };
  };

})();
</script>

<script>
(function(){

  // --- safety: wait for global tiles/render ---
  function ready(fn){
    if (typeof tiles !== "undefined" && typeof render === "function") fn();
    else requestAnimationFrame(() => ready(fn));
  }

  ready(() => {

    /* =========================
       CORE DELETE FUNCTION
    ========================== */

    window.deleteTile = function(tile){
      const idx = tiles.findIndex(t => t.id === tile.id);
      if(idx !== -1){
        tiles.splice(idx, 1);
      }
    };

    /* =========================
       KEYBOARD DELETE (selectedTile)
    ========================== */

    document.addEventListener("keydown", (e) => {

      const active = document.activeElement;
      if(active instanceof HTMLTextAreaElement) return;

      if(!selectedTile) return;

      if(e.key === "Delete" || e.key === "Backspace"){
        e.preventDefault();

        deleteTile(selectedTile);
        selectedTile = null;

        render();
      }

    });

    /* =========================
       PATCH: EMPTY EDIT = DELETE
    ========================== */


    const originalEdit = edit;

    edit = function(cell){

      if(cell.dataset.side !== "R"){
        return originalEdit(cell);
      }

      editing = true;
      dragging = false;
      clearSelection();

      cell.contentEditable = true;
      cell.focus();

      const range = document.createRange();
      range.selectNodeContents(cell);

      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);

      cell.onblur = () => {

        const r = +cell.dataset.r;
        const c = +cell.dataset.c;

        const text = cell.textContent.trim();

        cell.contentEditable = false;
        editing = false;

        // --- DELETE IF EMPTY ---
        if(!text){
          const tile = tiles.find(t => t.row === r && t.col === c);
          if(tile) deleteTile(tile);
          render();
          return;
        }

        // otherwise update tile if one exists
        const tile = tiles.find(t => t.row === r && t.col === c);

        if(tile){
          tile.text = text;
        } else {
          tiles.push({
            id: Date.now() + Math.random(),
            text,
            row: r,
            col: c
          });
        }

        render();
      };
    };

  });

})();
</script>

<script>
(function(){

  window.POS_COLORS = {
    Nouns: "color-Nouns",
    Verbs: "color-Verbs",
    Adjectives: "color-Adjectives",
    Adverbs: "color-Adverbs",
    Determiners: "color-Determiners",
    Pronouns: "color-Pronouns",
    Prepositions: "color-Prepositions",
    Conjunctions: "color-Conjunctions",
    Interjections: "color-Interjections"
  };

  function parsePOSSections(text){

    const sections = [];
    let current = null;

    text.split("\n").forEach(line => {

      const t = line.trim();
      if(!t) return;

if(t.startsWith("~")){
    current = null;
    return;
}

      if(t.startsWith("|") && t.endsWith("|")){
        current = t.replaceAll("|","").trim();
        return;
      }

      if(current){
        sections.push({
          pos: current,
          word: t
        });
      }
    });

    return sections;
  }

  function buildPOSMap(){

    const sourceText =
      (typeof getTileSourceText === "function")
        ? getTileSourceText()
        : "";

    const parsed = parsePOSSections(sourceText);

    const map = new Map();

    parsed.forEach((item, i) => {
      map.set((item.word || "").trim().toLowerCase(), POS_COLORS[item.pos] || "");
    });

    return map;
  }

window.applyPOS = function applyPOS(){
  const posMap = buildPOSMap();
  window.POS_COLORS_INDEX = posMap;

  document.querySelectorAll(".tile").forEach(tileEl => {
    const word = (tileEl.textContent || "").trim().toLowerCase();
    const cls = posMap.get(word);

    tileEl.classList.remove(
      "color-Nouns",
      "color-Verbs",
      "color-Adjectives",
      "color-Adverbs",
      "color-Determiners",
      "color-Pronouns",
      "color-Prepositions",
      "color-Conjunctions",
      "color-Interjections"
    );

    if (cls) tileEl.classList.add(cls);
  });
};

  applyPOS();

})();
</script>

<script>

/* ==========================================================
   PNG OVERLAY TOOL (FIXED: overlay-based placement)
   Drop in before </body>
========================================================== */

(function(){

/* ==========================================================
   CONFIG
========================================================== */

const PNGS = [
    { label:"Small", file:"1overlay-small.png", width:80 },
    { label:"Large", file:"1overlay-large.png", width:140 },
    { label:"Circle", file:"Circleoverlay.png", width:120 }
];

/* ==========================================================
   CSS
========================================================== */

const style = document.createElement("style");

style.textContent = `
#pngToolbar{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:12px;
    display:flex;
    gap:6px;
    padding:6px;
    background:#333;
    border-radius:6px;
    z-index:2147483647;
    box-shadow:0 2px 10px rgba(0,0,0,.4);
}

#pngToolbar button{
    font-size:12px;
    padding:5px 12px;
    cursor:pointer;
}

#pngToolbar button.selected{
    background:#4a90e2;
    color:white;
}

/* FULL PAGE OVERLAY */
#overlayLayer{
    position:absolute;
    inset:0;
    z-index:99999;
    pointer-events:none; /* OFF by default */
}

/* draggable PNGs */
.overlayPng{
    position:absolute;
    pointer-events:auto;
    cursor:move;
    user-select:none;
    -webkit-user-drag:none;
}
`;

document.head.appendChild(style);

/* ==========================================================
   PAGE CONTAINER
========================================================== */

const page = document.querySelector(".page");
if(!page){
    console.error("No .page found.");
    return;
}

if(getComputedStyle(page).position === "static"){
    page.style.position = "relative";
}

/* ==========================================================
   OVERLAY
========================================================== */

const overlay = document.createElement("div");
overlay.id = "overlayLayer";
page.appendChild(overlay);

/* ==========================================================
   TOOLBAR
========================================================== */

const bar = document.createElement("div");
bar.id = "pngToolbar";
document.body.appendChild(bar);

let placeMode = null;

/* ==========================================================
   ENABLE / DISABLE PLACEMENT MODE
========================================================== */

function setPlaceMode(mode){
    placeMode = mode;

    // highlight button state handled externally
    overlay.style.pointerEvents = mode ? "auto" : "none";
}

/* ==========================================================
   BUTTONS
========================================================== */

PNGS.forEach(item => {
    const b = document.createElement("button");
    b.textContent = item.label;

    b.onclick = () => {
        [...bar.querySelectorAll("button")]
            .forEach(x => x.classList.remove("selected"));

        b.classList.add("selected");
        setPlaceMode(item);
    };

    bar.appendChild(b);
});

/* CLEAR */
const clear = document.createElement("button");
clear.textContent = "Clear";

clear.onclick = () => {
    overlay.innerHTML = "";
};

bar.appendChild(clear);

/* ==========================================================
   PLACEMENT (NOW ON OVERLAY ONLY)
========================================================== */

overlay.addEventListener("pointerdown", function(e){

    if(!placeMode) return;

    const rect = page.getBoundingClientRect();

    const img = document.createElement("img");
    img.className = "overlayPng";
    img.src = placeMode.file;
    img.style.width = placeMode.width + "px";

    img.style.left =
        (e.clientX - rect.left - placeMode.width / 2) + "px";

    img.style.top =
        (e.clientY - rect.top - placeMode.width / 2) + "px";

    overlay.appendChild(img);
    enableDrag(img);

    // EXIT placement mode immediately
    setPlaceMode(null);

    [...bar.querySelectorAll("button")]
        .forEach(x => x.classList.remove("selected"));
});

/* ==========================================================
   DRAGGING
========================================================== */

function enableDrag(el){

    el.addEventListener("pointerdown", function(ev){
        ev.stopPropagation();
        ev.preventDefault();

        const rect = page.getBoundingClientRect();

        const startLeft = parseFloat(el.style.left) || 0;
        const startTop = parseFloat(el.style.top) || 0;

        const offsetX = (ev.clientX - rect.left) - startLeft;
        const offsetY = (ev.clientY - rect.top) - startTop;

        function move(e){
            el.style.left =
                ((e.clientX - rect.left) - offsetX) + "px";

            el.style.top =
                ((e.clientY - rect.top) - offsetY) + "px";
        }

        function up(){
            window.removeEventListener("pointermove", move);
            window.removeEventListener("pointerup", up);
        }

        window.addEventListener("pointermove", move);
        window.addEventListener("pointerup", up);
    });
}

})();

</script>

</body>
</html>
