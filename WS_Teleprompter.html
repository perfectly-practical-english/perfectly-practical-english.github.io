document.addEventListener('DOMContentLoaded', async () => {
  const teleEdit = document.getElementById('teleEdit');
  const gsWordBank = document.getElementById('gsWordBank');

  // --- LOAD RAW TEXT FOR EDITOR ---
  const editorScripts = document.querySelectorAll('script[type="text/plain"].rawText');
  for (const s of editorScripts) {
    const text = await resolveRaw(s.textContent.trim());
    teleEdit.innerText += text + "\n\n";
  }

  // --- LOAD WORDS FOR WORD BANK ---
  const wordScripts = document.querySelectorAll('script[type="text/plain"].wordBank');
  for (const s of wordScripts) {
    const words = (await resolveRaw(s.textContent.trim())).split('\n').filter(Boolean);
    words.forEach(word => {
      const sp = document.createElement('span');
      sp.className = 'word-tile';
      sp.textContent = word;
      sp.addEventListener('click', ()=> handleWordInsert(teleEdit, word));
      gsWordBank.appendChild(sp);
    });
  }

  // Initial overlay and placeholder
  if (window.rebuildLinesFromSource) window.rebuildLinesFromSource(teleEdit.innerText);
});

<script>
/* =========================================
   SECTION PARSER (RAW TEXT → SECTIONS)
   ========================================= */

function parseSectionsFromRaw(raw) {
  const sections = [];
  let current = null;

  raw.split(/\r?\n/).forEach(line => {
    const t = line.trim();
    if (!t) return;

    if (t.startsWith("~")) {
      current = {
        id: t.slice(1).trim().toLowerCase().replace(/\s+/g, "-"),
        name: t.slice(1).trim(),
        text: ""
      };
      sections.push(current);
      return;
    }

    if (current) {
      current.text += line + "\n";
    }
  });

  return sections;
}
function parseVocabSections(raw) {
  const sections = {};
  let current = null;

  raw.split(/\r?\n/).forEach(line => {
    const t = line.trim();
    if (!t) return;

    if (t.startsWith("~")) {
      current = t.slice(1).trim();
      sections[current] = [];
      return;
    }

    if (current && t.startsWith("•")) {
      const m = t.match(/•\s*([^\s–]+)/);
      if (m) sections[current].push(m[1]);
    }
  });

  return sections;
}


</script>

  /* -------------------------
     RAW TEXT LOADING (supports multiple raw blocks)
     ------------------------- */
  function loadRawTextBlocks(){
    const blobs = [];
    const byId = document.getElementById('rawText');
    if(byId && byId.textContent) blobs.push(byId.textContent.trim());
    document.querySelectorAll('script[type="text/plain"].rawText, script[type="text/plain"]').forEach((s) => {
      if(s.id === 'rawText') return;
      if(s.textContent && s.textContent.trim()) blobs.push(s.textContent.trim());
    });
    return blobs.join("\n\n");
  }

  /* -------------------------
     WORD BANK + insertion behavior
     ------------------------- */
function parseVocabText(rawText) {
  return rawText.trim().split('\n')
    .map(line => {
      const match = line.match(/•\s*([^\s–<]+)/); // capture word after bullet, before space, dash, or <br>
      if (match) return match[1]; // only the main word
      return null;
    })
    .filter(Boolean);
}

  /* -------------------------
     CARET & INSERT helpers
     ------------------------- */
  function insertTextAtCaretIntoElement(el, text){
    if(!el) return;
    if(el instanceof HTMLInputElement || el instanceof HTMLTextAreaElement){
      const start = el.selectionStart || 0;
      const end = el.selectionEnd || 0;
      const val = el.value || '';
      el.value = val.slice(0,start) + text + val.slice(end);
      const pos = start + text.length;
      el.setSelectionRange(pos,pos);
      el.focus();
      el.dispatchEvent(new Event('input',{bubbles:true}));
      return;
    }
    el.focus();
    const sel = window.getSelection();
    if(!sel || !sel.rangeCount){
      el.appendChild(document.createTextNode(text));
      placeCaretAtEnd(el);
      el.dispatchEvent(new Event('input',{bubbles:true}));
      return;
    }
    const range = sel.getRangeAt(0);
    range.deleteContents();
    const tn = document.createTextNode(text);
    range.insertNode(tn);
    range.setStartAfter(tn);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
    el.dispatchEvent(new Event('input',{bubbles:true}));
  }

  function placeCaretAtEnd(el){
    el.focus();
    if(typeof window.getSelection !== 'undefined' && typeof document.createRange !== 'undefined'){
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
  }

  function getCaretCharacterOffsetWithin(element) {
    let caretOffset = 0;
    const sel = window.getSelection();
    if(sel.rangeCount > 0) {
      const range = sel.getRangeAt(0);
      const preRange = range.cloneRange();
      preRange.selectNodeContents(element);
      preRange.setEnd(range.startContainer, range.startOffset);
      caretOffset = preRange.toString().length;
    }
    return caretOffset;
  }

  /* -------------------------
     LINE SPLITTING / WRAPPING / WIDOW BALANCING
     ------------------------- */
  function willWrap(candidate){
    if(!candidate) return false;
    const style = getComputedStyle(teleEdit);
    measure.style.fontSize = style.fontSize;
    measure.style.fontFamily = style.fontFamily;
    measure.style.fontWeight = style.fontWeight;
    measure.style.letterSpacing = style.letterSpacing;
    measure.style.padding = style.padding;
    measure.textContent = candidate;
    return measure.scrollWidth > teleScrollWrapper.clientWidth - 6;
  }

  function splitIntoSentences(paragraph){
    const s = paragraph.trim();
    if(!s) return [];
    const re = /[^.!?]+[.!?]+["')\]]*|[^.!?]+$/g;
    const matches = s.match(re);
    if(!matches) return [s];
    return matches.map(sentence=>{
      sentence = sentence.trim();
      if(!sentence) return '';
      return sentence.charAt(0).toUpperCase() + sentence.slice(1);
    });
  }

  function balanceWidows(linesArray){
    if(linesArray.length < 2) return;
    for(let i=0;i<linesArray.length-1;i++){
      const words = linesArray[i].trim().split(/\s+/).filter(Boolean);
      const nextWords = linesArray[i+1].trim().split(/\s+/).filter(Boolean);
      if(words.length>2 && nextWords.length<=1){
        const move = words.pop();
        linesArray[i] = words.join(' ');
        linesArray[i+1] = move + (linesArray[i+1] ? " " + linesArray[i+1] : "");
      }
    }
    for(let k=linesArray.length-1;k>=0;k--){
      if(!linesArray[k].trim()) linesArray.splice(k,1);
    }
  }

  function breakLongSentence(sentence){
    if(!willWrap(sentence)) return [sentence];
    const tokensRaw = sentence.split(/([,;:—–])/g);
    const clauses = [];
    for(let i=0;i<tokensRaw.length;i++){
      const t = tokensRaw[i];
      if(!t) continue;
      if(/^[,;:—–]$/.test(t) && clauses.length){
        clauses[clauses.length-1] += t;
      } else {
        clauses.push(t);
      }
    }
    const out = [];
    let current = "";
    for(let i=0;i<clauses.length;i++){
      const c = clauses[i].trim();
      if(!c) continue;
      const attempt = current ? current + " " + c : c;
      if(!willWrap(attempt)) current = attempt;
      else {
        if(current) out.push(current);
        current = c;
      }
    }
    if(current) out.push(current);

    for(let i=0;i<out.length;i++){
      while(willWrap(out[i])){
        const words = out[i].split(" ");
        let line = "";
        let j=0;
        for(; j<words.length; j++){
          const test = line ? line + " " + words[j] : words[j];
          if(willWrap(test)) break;
          line = test;
        }
        const remainder = words.slice(j).join(" ");
        out[i] = line;
        if(remainder) out.splice(i+1,0,remainder);
      }
    }

    for(let k=1;k<out.length;k++){
      const prev = out[k-1].trim();
      if(prev && !/[.!?]$/.test(prev)) out[k] = out[k].charAt(0).toUpperCase() + out[k].slice(1);
    }

    balanceWidows(out);
    return out;
  }

  function paragraphToLines(p){
    const sentences = splitIntoSentences(p);
    const final = [];
    sentences.forEach(s=>{
      if(!s.trim()) return;
      final.push(...breakLongSentence(s));
    });
    return final;
  }

  /* caret save / restore for contenteditable */
  function saveCaretPosition(container){
    const sel = window.getSelection();
    if(!sel.rangeCount) return null;
    const range = sel.getRangeAt(0);
    const preSelectionRange = range.cloneRange();
    preSelectionRange.selectNodeContents(container);
    preSelectionRange.setEnd(range.startContainer, range.startOffset);
    return preSelectionRange.toString().length;
  }

  function restoreCaretPosition(container, chars){
    container.focus();
    const sel = window.getSelection();
    sel.removeAllRanges();
    let nodeStack = [container], node, charIndex = 0, range = document.createRange();
    while(nodeStack.length){
      node = nodeStack.pop();
      if(node.nodeType === 3){
        const nextCharIndex = charIndex + node.length;
        if(chars <= nextCharIndex){
          range.setStart(node, chars - charIndex);
          range.collapse(true);
          sel.addRange(range);
          return true;
        }
        charIndex = nextCharIndex;
      } else {
        let i = node.childNodes.length - 1;
        while(i >= 0){ nodeStack.push(node.childNodes[i]); i--; }
      }
    }
    return false;
  }

 function rebuildLinesFromSource(src){

  function saveScroll(){

    if(sel.rangeCount){

      const preRange = range.cloneRange();
      preRange.selectNodeContents(teleEdit);
      preRange.setEnd(range.startContainer, range.startOffset);
      caretOffset = preRange.toString().length;

    const scrollFraction = teleScrollWrapper.scrollTop / Math.max(teleEdit.scrollHeight - teleScrollWrapper.clientHeight, 1);

  function restoreScroll(state){

  function restoreCaret(chars){
    teleEdit.focus();
    const sel = window.getSelection();
    sel.removeAllRanges();
    let nodeStack = [teleEdit], node, charIndex = 0, range = document.createRange();
    while(nodeStack.length){
      node = nodeStack.pop();
      if(node.nodeType === 3){
        const nextCharIndex = charIndex + node.length;
        if(chars <= nextCharIndex){
          range.setStart(node, chars - charIndex);
          range.collapse(true);
          sel.addRange(range);
          return;
        }
        charIndex = nextCharIndex;
      } else {
        for(let i=node.childNodes.length-1;i>=0;i--) nodeStack.push(node.childNodes[i]);
      }
    }
  }
}

<script>
(function() {
  const teleEdit = document.getElementById('teleEdit');
  const teleScrollWrapper = document.getElementById('teleScrollWrapper');
  const teleOverlay = document.getElementById('teleOverlay');

function loadSectionByIndex(index) {
  const section = window.SCRAMBLE_SECTIONS[index];
  if (!section) return;

  // Load section text
  teleEdit.innerText = section.text.trim();
  rebuildLinesFromSource(teleEdit.innerText);

  // Load vocab
  renderVocabForSection(section.name);

  // Reset state
  currentLineIndex = 0;
  teleScrollWrapper.scrollTop = 0;

  updateOverlay();
  updatePlaceholder();
}


  // Save scroll relative to caret
  function saveScroll() {
    const sel = window.getSelection();
    if (!sel.rangeCount) return teleScrollWrapper.scrollTop;
    const range = sel.getRangeAt(0);
    const preRange = range.cloneRange();
    preRange.selectNodeContents(teleEdit);
    preRange.setEnd(range.startContainer, range.startOffset);
    const caretOffset = preRange.toString().length;

    const totalText = teleEdit.innerText.length;
    const scrollFraction = teleScrollWrapper.scrollTop / Math.max(teleEdit.scrollHeight - teleScrollWrapper.clientHeight, 1);
    return { caretOffset, scrollFraction };
  }

  function restoreScroll(state) {
    if (!state) return;
    restoreCaret(state.caretOffset);
    const scrollTop = state.scrollFraction * (teleEdit.scrollHeight - teleScrollWrapper.clientHeight);
    teleScrollWrapper.scrollTop = scrollTop;
  }

  function restoreCaret(chars) {
    teleEdit.focus();
    const sel = window.getSelection();
    sel.removeAllRanges();
    let nodeStack = [teleEdit], node, charIndex = 0, range = document.createRange();
    while (nodeStack.length) {
      node = nodeStack.pop();
      if (node.nodeType === 3) {
        const nextCharIndex = charIndex + node.length;
        if (chars <= nextCharIndex) {
          range.setStart(node, chars - charIndex);
          range.collapse(true);
          sel.addRange(range);
          return;
        }
        charIndex = nextCharIndex;
      } else {
        for (let i = node.childNodes.length - 1; i >= 0; i--) nodeStack.push(node.childNodes[i]);
      }
    }
  }

  function rebuildLinesPreserveScroll(src) {
    const state = saveScroll();
    teleEdit.innerHTML = '';

    const paragraphs = src.split(/\n/);
    paragraphs.forEach(p => {
      const div = document.createElement('div');
      div.className = 'line';
      div.textContent = p || "\u200B"; // keep empty lines visible
      teleEdit.appendChild(div);
    });

    restoreScroll(state);
  }

  // Patch word insert to use scroll-preserving rebuild
  document.querySelectorAll('.word-tile').forEach(tile => {
    tile.addEventListener('click', () => {
      const word = tile.textContent;
      const caretOffset = getCaretCharacterOffset(teleEdit);
      const charBefore = teleEdit.innerText[caretOffset - 1] || '';
      const prefix = (charBefore === '' || charBefore === ' ' || charBefore === '\n') ? '' : ' ';
      insertTextAtCaret(teleEdit, prefix + word + ' ');
      updateOverlay();

      // Rebuild lines after insertion (optional, debounce if many words)
      rebuildLinesPreserveScroll(teleEdit.innerText);
    });
  });

  function insertTextAtCaret(el, text) {
    el.focus();
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) {
      el.appendChild(document.createTextNode(text));
      placeCaretAtEnd(el);
      return;
    }
    const range = sel.getRangeAt(0);
    range.deleteContents();
    const tn = document.createTextNode(text);
    range.insertNode(tn);
    range.setStartAfter(tn);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function placeCaretAtEnd(el) {
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function getCaretCharacterOffset(element) {
    let caretOffset = 0;
    const sel = window.getSelection();
    if (sel.rangeCount > 0) {
      const range = sel.getRangeAt(0);
      const preRange = range.cloneRange();
      preRange.selectNodeContents(element);
      preRange.setEnd(range.startContainer, range.startOffset);
      caretOffset = preRange.toString().length;
    }
    return caretOffset;
  }

  function updateOverlay() {
    const t = teleEdit.innerText || '';
    const s = (t.match(/[.!?]+/g) || []).length;
    teleOverlay.textContent = `${t.length} chars · ${s} sent`;
  }
})();

safeInsert(activeSpeechTarget, finalText + " ");

</script>


<script>
(async function() {
  'use strict';

  function sanitizeFilename(name) {
    return name.trim()
      .replace(/[\\/:*?"<>|]+/g, '_')
      .replace(/[\r\n]+/g, '_')
      .slice(0, 200) || 'score';
  }

  function downloadBlob(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(a.href);
      a.remove();
    }, 2000);
  }

  async function downloadScoreAsPNG(text, filename) {
    const wrapper = document.createElement('div');
    wrapper.innerHTML = text.replace(/\n/g, '<br>');
    wrapper.style.whiteSpace = 'pre-wrap';
    wrapper.style.fontFamily = 'monospace';
    wrapper.style.padding = '10px';
    wrapper.style.backgroundColor = '#fff';
    wrapper.style.color = '#000';
    document.body.appendChild(wrapper);

    try {
      const canvas = await html2canvas(wrapper, { scale: 2, backgroundColor: '#fff' });
      const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      downloadBlob(blob, filename);
    } catch (err) {
      console.error(err);
      alert('PNG download failed');
    } finally {
      wrapper.remove();
    }
  }

  function hijackDownloadButton(originalBtn, getScoreText, getFilename, isText) {
    if (!originalBtn) return;

    // Clone button (preserve type)
    const newBtn = originalBtn.cloneNode(true);
    originalBtn.parentNode.replaceChild(newBtn, originalBtn);

    newBtn.addEventListener('click', async e => {
      e.preventDefault();
      e.stopImmediatePropagation();

      const scoreText = getScoreText();
      if (!scoreText) {
        alert('No scoreboard data found. Submit first.');
        return;
      }

      const filename = sanitizeFilename(getFilename());
      if (isText) {
        downloadBlob(new Blob([scoreText], { type: 'text/plain' }), filename + '.txt');
      } else {
        await downloadScoreAsPNG(scoreText, filename + '.png');
      }
    }, true);
  }

  const submitButtons = document.querySelectorAll('button[id$="SubmitBtn"], button[id$="submit"]');

  submitButtons.forEach(submitBtn => {
    submitBtn.addEventListener('click', () => {
      const section = submitBtn.closest('section') || document;

      // Flexible scoreboard detection
      const scoreboardSelectors = ['pre', '.scoreboard pre', '#result', '.output'];
      let scoreboard = null;
      for (const sel of scoreboardSelectors) {
        scoreboard = section.querySelector(sel);
        if (scoreboard) break;
      }
      if (!scoreboard) return;

      // Name/ID inputs
      const nameInput = section.querySelector('input[id*="Name"], input[name*="name"], #name');
      const idInput   = section.querySelector('input[id*="Id"], input[name*="id"], #id');

      const getFilename = () => {
        const rawFilename = window.location.pathname.split('/').pop() || 'score';
        const sectionName = section.querySelector('h3')?.textContent.trim() || section.id || 'section';
        const name = nameInput?.value.trim() || 'Student';
        const id   = idInput?.value.trim() || 'ID';
        const now = new Date();
        const dateStr = String(now.getDate()).padStart(2,'0') +
                        String(now.getMonth()+1).padStart(2,'0') +
                        String(now.getFullYear());
        return `${rawFilename}|${sectionName}|${name}|${id}|${dateStr}`;
      };

      // Hijack buttons in this section
      const buttons = section.querySelectorAll('button, .scoreboard button, #scoreboardBtns button');
      buttons.forEach(btn => {
        const idLower = btn.id.toLowerCase();
        const classLower = btn.className?.toLowerCase() || '';
        const isTextButton = /text|txt/.test(idLower) || /text|txt/.test(classLower);
        hijackDownloadButton(btn, () => scoreboard.textContent.trim(), getFilename, isTextButton);
      });

    }, true);
  });

})();
</script>
