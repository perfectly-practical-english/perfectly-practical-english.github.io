button:disabled {

  margin: 12px 0 0 0;

  position: relative;

  width: 100%;
  max-width: 600px;
  padding: 10px;
  border-radius: 6px;
  background: #9fd0ff;
  overflow: hidden;
  box-shadow: inset 0 0 12px #5f9eff;

.word {

  user-select: none;
  pointer-events: none;
  transition: transform 0.1s linear;
  text-shadow: 0 0 3px rgba(0,0,0,0.3);

.letter {
  display: inline-block;
  transition: color 0.2s ease;
}

.typed {

}

.exploding {
  animation: explodeAnim 0.4s ease forwards;
}

@keyframes explodeAnim {

.game-over {

function parseSections(raw) {
  const sections = [];

  // Split on any line that STARTS with ~
  const blocks = raw
    .split(/^\s*~\s*/m)
    .map(b => b.trim())
    .filter(Boolean);

  blocks.forEach(block => {
    const lines = block
      .split(/\r?\n/)
      .map(l => l.replace(/<br\s*\/?>/gi, '').trim())
      .filter(Boolean);

    if (!lines.length) return;

    const sectionName = lines[0];
    const entries = [];

    lines.forEach(line => {
      if (!line.startsWith('•')) return;

      const entry = line
        .replace(/^•\s*/, '')
        .split(/[–—-]/)[0]
        .replace(/[^\p{L}\s]/gu, '')
        .trim()
        .toLowerCase()
        .split(/\s+/)[0];

      if (entry) entries.push(entry);
    });

    if (entries.length) {
      sections.push({
        name: sectionName,
        entries
      });
    }
  });

  return sections;
}

<script>
(async function() {
  'use strict';

  // Sanitize filenames to remove illegal characters
  function sanitizeFilename(name) {
    return name.trim()
      .replace(/[\\/:*?"<>|]+/g, '_')
      .replace(/[\r\n]+/g, '_')
      .slice(0, 200) || 'score';
  }

  // Generic download function
  function downloadBlob(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(a.href);
      a.remove();
    }, 2000);
  }

  // Convert scoreboard to PNG using html2canvas
  async function downloadScoreAsPNG(text, filename) {
  const wrapper = document.createElement('div');
  wrapper.innerHTML = text.replace(/\n/g, '<br>');

  /* MATCH SCOREBOARD APPEARANCE */
  wrapper.style.display = 'inline-block';
  wrapper.style.whiteSpace = 'pre-wrap';
  wrapper.style.fontFamily = 'monospace';
  wrapper.style.fontWeight = 'bold';
  wrapper.style.fontSize = '18px';
  wrapper.style.lineHeight = '1.2';
  wrapper.style.padding = '6px 8px';
  wrapper.style.backgroundColor = '#fff';
  wrapper.style.color = '#000';

  document.body.appendChild(wrapper);

  try {
    if (!window.html2canvas) {
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
      document.head.appendChild(script);
      await new Promise(res => script.onload = res);
    }

    const canvas = await html2canvas(wrapper, {
      scale: 2,
      backgroundColor: '#fff',
      width: wrapper.offsetWidth,
      height: wrapper.offsetHeight
    });

    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    downloadBlob(blob, filename);
  } catch (err) {
    console.error(err);
    alert('PNG download failed');
  } finally {
    wrapper.remove();
  }
}


  // Hijack a download button
  function hijackDownloadButton(button, getScoreText, getFilename, isText) {
    if (!button) return;

    const newBtn = button.cloneNode(true);
    button.parentNode.replaceChild(newBtn, button);

    newBtn.addEventListener('click', async e => {
      e.preventDefault();
      e.stopImmediatePropagation();

      const scoreText = getScoreText();
      if (!scoreText) {
        alert('No scoreboard data found. Submit first.');
        return;
      }

      const filename = sanitizeFilename(getFilename());
      if (isText) {
        downloadBlob(new Blob([scoreText], { type: 'text/plain' }), filename + '.txt');
      } else {
        await downloadScoreAsPNG(scoreText, filename + '.png');
      }
    }, true);
  }

  // Grab scoreboard and buttons
  const scoreboard = document.getElementById('scoreboardContainer');
  const downloadTxtBtn = document.getElementById('downloadTxtBtn');
  const downloadPngBtn = document.getElementById('downloadPngBtn');
  const nameInput = document.getElementById('nameInput');
  const idInput = document.getElementById('idInput');

  if (scoreboard) {

      const htmlFile = window.location.pathname.split('/').pop() || 'index.html';

      const id = idInput?.value.trim() || 'ID';
      const now = new Date();
      const dateStr = `${String(now.getDate()).padStart(2,'0')}${String(now.getMonth()+1).padStart(2,'0')}${now.getFullYear()}`;
      return `${htmlFile}|${name}|${id}|${dateStr}`;
    };

    hijackDownloadButton(downloadTxtBtn, () => scoreboard.textContent.trim(), getFilename, true);
    hijackDownloadButton(downloadPngBtn, () => scoreboard.textContent.trim(), getFilename, false);
  }

})();

function parseRawInstructions(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);

  lines.forEach(line => {

      html.push(`<hr>`);
