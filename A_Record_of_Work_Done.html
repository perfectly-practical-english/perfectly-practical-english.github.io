<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Speech Recorder</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: 0 auto;
    padding: 15px;
}

h2{
    text-align:center;
}

button{
    width:100%;
    padding:15px;
    margin:5px 0;
    font-size:18px;
    cursor:pointer;
}

textarea{
    width:100%;
    height:300px;
    padding:10px;
    font-size:18px;
    box-sizing:border-box;
}

#status{
    margin-top:10px;
    font-weight:bold;
    text-align:center;
}
</style>
</head>
<body>

<h2>Speech Recorder</h2>

<button id="startBtn">🎤 Start Recording</button>
<button id="stopBtn">⏹ Stop Recording</button>

<textarea
    id="transcript"
    placeholder="Speech will appear here. You can edit before saving."
></textarea>

<button id="saveBtn">💾 Save To Supabase</button>

<div id="status">Ready</div>

<script>

/* =========================
   SUPABASE
   ========================= */

const supabaseClient = window.supabase?.createClient(
  'https://etwwriloppklhhkmswpr.supabase.co',
  'YOUR_SUPABASE_ANON_KEY'
);

if (!supabaseClient) {
  console.error("❌ Supabase failed to initialize");
}

/* =========================
   SPEECH RECOGNITION
   ========================= */

const SpeechRecognition =
  window.SpeechRecognition ||
  window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  alert(
    "Speech Recognition is not supported on this browser. Use Chrome on Android."
  );
}

const recognition = new SpeechRecognition();

recognition.continuous = true;
recognition.interimResults = true;
recognition.lang = "en-US";

const transcriptBox = document.getElementById("transcript");
const statusBox = document.getElementById("status");

/* ✅ FIXED TRANSCRIPT HANDLING */
let finalTranscript = "";

recognition.onresult = function(event){

  let interimTranscript = "";

  for (let i = event.resultIndex; i < event.results.length; i++) {
    const transcript = event.results[i][0].transcript;

    if (event.results[i].isFinal) {
      finalTranscript += transcript + " ";
    } else {
      interimTranscript += transcript;
    }
  }

  transcriptBox.value = finalTranscript + interimTranscript;
};

recognition.onerror = function(event){
  statusBox.textContent =
    "Speech Error: " + event.error;
};

/* =========================
   BUTTONS
   ========================= */

document
  .getElementById("startBtn")
  .addEventListener("click", () => {

    recognition.start();

    statusBox.textContent =
      "Recording...";
});

document
  .getElementById("stopBtn")
  .addEventListener("click", () => {

    recognition.stop();

    statusBox.textContent =
      "Recording stopped";
});

/* =========================
   SAVE FUNCTION
   ========================= */

window.saveTranscript = async function(text){

  const cleaned = String(text || "")
    .replace(/\u00A0/g, " ")
    .replace(/\r?\n/g, "\n")
    .trim();

  if (!cleaned) {
    throw new Error("Nothing to upload");
  }

  const now = new Date();

  const record = `
Day: ${now.getDate()}
Month: ${now.toLocaleString('en-US',{month:'long'})}
Year: ${now.getFullYear()}
12 Hour Time: ${now.toLocaleTimeString('en-US',{hour12:true})}
24 Hour Time: ${now.toLocaleTimeString('en-GB',{hour12:false})}

Transcript:
${cleaned}
`.trim();

  const { data, error } = await supabaseClient
    .from("record_of_work_done")
    .insert({
      entry: record
    })
    .select();

  if (error) {
    console.error(error);
    throw new Error(error.message);
  }

  return data;
};

/* =========================
   SAVE BUTTON
   ========================= */

document
  .getElementById("saveBtn")
  .addEventListener("click", async () => {

    try {

      statusBox.textContent =
        "Saving...";

      await window.saveTranscript(
        transcriptBox.value
      );

      statusBox.textContent =
        "✅ Saved successfully";

      transcriptBox.value = "";
      finalTranscript = ""; // ✅ reset after save

    } catch(err) {

      console.error(err);

      statusBox.textContent =
        "❌ " + err.message;
    }
});

</script>

</body>
</html>
