<style>
/* ==============================
   GLOBAL RESET & BASE STYLES
   ============================== */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  padding: 30px;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #a0e0ff 0%, #ffffff 95%);
  user-select: none;
}

/* ==============================
   TOP + MID BARS
   ============================== */
#topBar,
#midBar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px;
  margin: 0 auto 16px auto;
  background: #f0f8ff;
  border-radius: 6px;
  flex-wrap: nowrap;
  width: 100%;
  max-width: 100%;
}

#topBar input[type="text"] {
  flex: 1 1 0;
  min-width: 70px;
  max-width: 140px;
}

#topBar button,
#midBar button {
  flex: 0 0 auto;
  white-space: nowrap;
}

#countdownOverlay {
  flex: 0 0 auto;
  min-width: 32px;
  text-align: center;
}

/* ==============================
   INPUTS & BUTTONS
   ============================== */
input[type="text"] {
  padding: 6px 10px;
  font-size: 16px;
  width: 140px;
  border: 1px solid #999;
  border-radius: 4px;
}

button {
  padding: 6px 12px;
  font-size: 16px;
  border-radius: 4px;
  border: 1px solid #777;
  background: #eef6fb;
  cursor: pointer;
  user-select: none;
}

button:disabled {
  opacity: 0.5;
  cursor: default;
}

/* ==============================
   SCOREBOARD & BUTTONS
   ============================== */
#scoreboardContainer {
  margin: 12px 0 0 0;
  font-family: monospace;
  font-weight: bold;
  font-size: 18px;
  white-space: normal;
}

#scoreButtons {
  margin: 12px 0 24px 0;
  display: none;
  gap: 10px;
  flex-wrap: wrap;
}

/* ==============================
   GAME AREA / CANVAS
   ============================== */
#gameArea {
  position: relative;
  margin: 0 auto 16px auto;
  height: 240px;
  width: 100%;
  max-width: 100%;
  border-radius: 6px;
  overflow: hidden;
  display: block;
}

/* ==============================
   INVISIBLE TYPING INPUT
   ============================== */
#typingInput {
  position: fixed;
  left: 5px;
  top: 5px;
  width: 24px;
  height: 24px;
  opacity: 0;
  pointer-events: none;
  background: transparent;
  border: none;
  z-index: 9999;
  font-size: 18px;
  color: black;
  caret-color: transparent;
}

/* ==============================
   FOOTER
   ============================== */
footer {
  margin-top: 16px;
  padding: 10px 12px;
  text-align: left;
  font-size: 10px;
  color: #666;
  background: #f0f8ff;
  border-radius: 6px;
}

/* ==============================
   FORM ROWS & WHEEL
   ============================== */
.formRow {
  display: flex;
  align-items: center;
  gap: 8px;
}

#sectionWheelContainer {
  height: 34px;
  flex: 1 1 0;
  min-width: 0;
  overflow: hidden;
  border: 1px solid #999;
  border-radius: 4px;
  background: #fff;
  position: relative;
}

#wheel,
.wheel {
  position: absolute;
  top: 0;
  width: 100%;
  transition: transform 0.25s ease;
}

.wheelItem {
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  user-select: none;
  font-size: 15px;
  line-height: 1;
}

/* ==============================
   BUBBLE STYLING (EXTRA TEMPLATE)
   ============================== */
.bubble {
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: white;
  text-align: center;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  transition: transform 0.3s ease, opacity 0.3s ease;
}

.bubble-ambient {
  opacity: 0.5;
}

.bubble-exploding {
  animation: popScale 0.4s forwards;
}

@keyframes popScale {
  0%   { transform: scale(1) rotate(0deg); opacity: 1; }
  50%  { transform: scale(1.5) rotate(180deg); opacity: 1; }
  100% { transform: scale(2.5) rotate(720deg); opacity: 0; }
}

/* ==============================
   RESPONSIVE & TOUCH ADJUSTMENTS
   ============================== */
@media (max-width: 480px) {
  body { padding: 16px; }
  input[type="text"] { width: 100px; }
  button { padding: 4px 8px; font-size: 14px; }
  #gameArea { height: 180px; }
  .wheelItem { font-size: 13px; }
}

</style>

async function loadVocab(source) {
  let text = "";
  // If it looks like a filename (ends with .txt), fetch it
  if (source.trim().endsWith(".txt")) {
    try {
      const res = await fetch(source.trim());
      if (!res.ok) throw new Error("Failed to load file");
      text = await res.text();
    } catch (err) {
      console.error("Error loading vocab file:", err);
      return [];
    }
  } else {
    // Otherwise treat as raw text
    text = source;
  }
  return parseVocabInput(text);
}

function parseSections(raw) {
  const chunks = raw.split(/\n(?=~+)/);

  return chunks
    .map(chunk => chunk.trim())
    .filter(chunk => chunk.startsWith("~"))
    .map(chunk => {
      const lines = chunk.split("\n");
      const name = lines.shift().replace(/^~+/, "").trim();
      const text = lines.join("\n").trim();
      return { name, text };
    });
}

function extractWords(sectionText) {
  return sectionText
    .split("\n")
    .map(line => {
      const match = line.match(/•\s*([^\s–]+)/);
      return match ? match[1] : null;
    })
    .filter(Boolean);
}

    return `hsla(${hue},90%,65%,${alpha})`;
  }

  function darkVariant(color) {
    const match = color.match(/hsla\((\d+),\s*(\d+)%,\s*(\d+)%,\s*([\d.]+)\)/);
    if(!match) return 'rgba(0,0,0,0.5)';
    const h = match[1], s = match[2], l = Math.max(0, match[3]-35), a = match[4];
    return `hsla(${h},${s}%,${l}%,${a})`;
  }

  class Bubble {
    constructor(word=null) {
      this.word = word;
      this.typedIndex = 0;
      this.exploded = false;
      if(word){
        this.radius = 50 + Math.random()*40;
        this.color = brightColor(0.35);
      } else {
        this.radius = 10 + Math.random()*30;
        this.color = brightColor(0.2);
      }
      this.shadowColor = darkVariant(this.color);
      this.x = Math.random() * (canvas.width - this.radius*2) + this.radius;
      this.y = canvas.height + this.radius;
      this.speed = (word ? 0.6 : 0.2) + Math.random()*0.6;
      this.swayAmplitude = (word ? 20 : 10) + Math.random()*20;
      this.swaySpeed = Math.random()*0.02 + 0.01;
      this.swayPhase = Math.random()*Math.PI*2;
    }

    draw() {
      const offsetX = Math.sin(this.swayPhase + this.y*this.swaySpeed) * this.swayAmplitude;

      const gradient = ctx.createRadialGradient(
        this.x - this.radius*0.2 + offsetX,
        this.y - this.radius*0.2,
        this.radius*0.05,
        this.x + offsetX,
        this.y,
        this.radius*1.8
      );
      gradient.addColorStop(0, 'rgba(255,255,255,0.2)');
      gradient.addColorStop(0.3, this.color);
      gradient.addColorStop(1, this.color);

      ctx.beginPath();
      ctx.arc(this.x + offsetX, this.y, this.radius, 0, Math.PI*2);
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.stroke();

      if(this.word){
        ctx.font = `bold ${Math.floor(this.radius/2.5)}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = 'white';
        ctx.shadowColor = this.shadowColor;
        ctx.shadowBlur = 20;
        ctx.fillText(this.word, this.x + offsetX, this.y);
        ctx.shadowBlur = 0;
      }
    }

    update() {
      this.y -= this.speed;
      if(this.y + this.radius < 0) this.exploded = true;
    }
  }

  class ExplodingBubble {
    constructor(bubble) {
      this.x = bubble.x;
      this.y = bubble.y;
      this.radius = bubble.radius;
      this.color = bubble.color;
      this.shadowColor = bubble.shadowColor;
      this.word = bubble.word;
      this.startTime = performance.now();
      this.duration = 400; // ms
    }

    draw(time) {
      const elapsed = time - this.startTime;
      const t = Math.min(elapsed / this.duration, 1);

      const scale = 1 + 1.5 * t; // scale up
      const rotation = 2 * Math.PI * 2 * t; // 720 deg
      const alpha = 1 - t;

      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(rotation);
      ctx.scale(scale, scale);

      const gradient = ctx.createRadialGradient(0,0,this.radius*0.05,0,0,this.radius*1.8);
      gradient.addColorStop(0, 'rgba(255,255,255,0.2)');
      gradient.addColorStop(0.3, this.color);
      gradient.addColorStop(1, this.color);

      ctx.beginPath();
      ctx.arc(0,0,this.radius,0,Math.PI*2);
      ctx.fillStyle = gradient;
      ctx.globalAlpha = alpha;
      ctx.fill();
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.stroke();

      if(this.word){
        ctx.font = `bold ${Math.floor(this.radius/2.5)}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = 'white';
        ctx.shadowColor = this.shadowColor;
        ctx.shadowBlur = 30;
        ctx.fillText(this.word,0,0);
        ctx.shadowBlur = 0;
      }

      ctx.restore();
    }

    isDone(time) {
      return time - this.startTime >= this.duration;
    }
  }

function spawnNextWord() {
  if (nextWordIndex >= wordList.length) return;
  const bubble = new Bubble(wordList[nextWordIndex]);
  activeBubbles.push(bubble);
  nextWordIndex++;
}

  function spawnAmbientBurst() {
    const count = 5 + Math.floor(Math.random()*6);
    for(let i=0;i<count;i++){
      ambientBubbles.push(new Bubble());
    }
  }

  function floatBubbles(time) {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ambientBubbles.forEach(b=>{b.update(); b.draw();});
    ambientBubbles = ambientBubbles.filter(b=>!b.exploded);

    activeBubbles.forEach(bubble=>{bubble.update(); bubble.draw();});
    activeBubbles = activeBubbles.filter(b=>!b.exploded);

    explodingBubbles.forEach(b=>b.draw(time));
    explodingBubbles = explodingBubbles.filter(b=>!b.isDone(time));

    if(Math.random() < 0.01) spawnAmbientBurst();
    if(!gameStopped && activeBubbles.length === 0) spawnNextWord();

    requestAnimationFrame(floatBubbles);
  }

  function handleTypingInput(e) {
    if(!gameStarted || gameStopped) return;
    const key = e.data || e.key;
    if(!key) return;

    if(!/^[a-z]$/.test(lowerKey)) return;
    if(activeBubbles.length === 0) return;

    let wordToType = currentTypedWord;
    const canTypeWord = (b)=>!b.exploded && b.typedIndex < b.word.length && b.word[b.typedIndex].toLowerCase()===lowerKey;
    if(!wordToType || !canTypeWord(wordToType)){
      const candidate = activeBubbles.find(canTypeWord);
      if(candidate){ currentTypedWord = candidate; wordToType = candidate; }
      else { typingInput.value=''; return; }
    }

    wordToType.typedIndex++;
    if(wordToType.typedIndex === wordToType.word.length) explodeWord(wordToType,true);
    typingInput.value='';
  }

  function explodeWord(bubble, success){
    if(bubble.exploded) return;
    bubble.exploded = true;
    popSound.currentTime=0; popSound.play().catch(()=>{});

    explodingBubbles.push(new ExplodingBubble(bubble));
  }

// ===== STEP 8: LOCK SECTION INTO THIS RUN =====

<script>
(async function() {
  'use strict';

  // Sanitize filenames to remove illegal characters
  function sanitizeFilename(name) {
    return name.trim()
      .replace(/[\\/:*?"<>|]+/g, '_')
      .replace(/[\r\n]+/g, '_')
      .slice(0, 200) || 'score';
  }

  // Generic download function
  function downloadBlob(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(a.href);
      a.remove();
    }, 2000);
  }

  // Convert scoreboard to PNG using html2canvas
  async function downloadScoreAsPNG(text, filename) {
  const wrapper = document.createElement('div');
  wrapper.innerHTML = text.replace(/\n/g, '<br>');

  /* MATCH SCOREBOARD APPEARANCE */
  wrapper.style.display = 'inline-block';
  wrapper.style.whiteSpace = 'pre-wrap';
  wrapper.style.fontFamily = 'monospace';
  wrapper.style.fontWeight = 'bold';
  wrapper.style.fontSize = '18px';
  wrapper.style.lineHeight = '1.2';
  wrapper.style.padding = '6px 8px';
  wrapper.style.backgroundColor = '#fff';
  wrapper.style.color = '#000';

  document.body.appendChild(wrapper);

  try {
    if (!window.html2canvas) {
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
      document.head.appendChild(script);
      await new Promise(res => script.onload = res);
    }

    const canvas = await html2canvas(wrapper, {
      scale: 2,
      backgroundColor: '#fff',
      width: wrapper.offsetWidth,
      height: wrapper.offsetHeight
    });

    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    downloadBlob(blob, filename);
  } catch (err) {
    console.error(err);
    alert('PNG download failed');
  } finally {
    wrapper.remove();
  }
}


  // Hijack a download button
  function hijackDownloadButton(button, getScoreText, getFilename, isText) {
    if (!button) return;

    const newBtn = button.cloneNode(true);
    button.parentNode.replaceChild(newBtn, button);

    newBtn.addEventListener('click', async e => {
      e.preventDefault();
      e.stopImmediatePropagation();

      const scoreText = getScoreText();
      if (!scoreText) {
        alert('No scoreboard data found. Submit first.');
        return;
      }

      const filename = sanitizeFilename(getFilename());
      if (isText) {
        downloadBlob(new Blob([scoreText], { type: 'text/plain' }), filename + '.txt');
      } else {
        await downloadScoreAsPNG(scoreText, filename + '.png');
      }
    }, true);
  }

  // Grab scoreboard and buttons
  const scoreboard = document.getElementById('scoreboardContainer');
  const downloadTxtBtn = document.getElementById('downloadTxtBtn');
  const downloadPngBtn = document.getElementById('downloadPngBtn');

      return `${htmlFile}|${name}|${id}|${dateStr}`;
    };

    hijackDownloadButton(downloadTxtBtn, () => scoreboard.textContent.trim(), getFilename, true);

  }

})();
