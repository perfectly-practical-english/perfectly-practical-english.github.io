/**
 * resolveRaw(source)
 * - If source is a filename (single line, no newlines), load it
 * - Otherwise treat source as literal raw text
 */
async function resolveRaw(source) {

  // Only treat actual filenames as fetch targets
  if (
    typeof source === "string" &&
    /^[\w\-./]+\.(txt|csv|json|md)$/i.test(source.trim())
  ) {
    try {

      const res = await fetch(source.trim(), {
        cache: "no-store"
      });

      if (!res.ok) {
        throw new Error(`Fetch failed (${res.status})`);
      }

      return await res.text();

    } catch (err) {

      console.error(
        "resolveRaw() fetch failed:",
        source,
        err
      );

      throw err;
    }
  }

  return String(source || "");
}</script>

// ---------------------------------------------------------
// Initialize tiles with multiple answers (Universal Resolver)
// ---------------------------------------------------------
async function initTiles() {
  const rawText = await resolveRaw(activeSectionText);

 // <- resolve raw text or fetch file

  lines = rawText
  .split("\n")
  .map(x => x.trim())
  .filter(x => x && x.includes("|"))
  .map((line, i) => {
    const parts = line.split(/\|/);
    const before = parts[0].trim();
    const after = parts[parts.length - 1].trim();
    const answers = parts.slice(1, -1)
      .map(a => a.trim())
      .filter(a => a !== "&" && a !== "")
      .map(a => normalize(a)); // normalize all answers
    return {
      id: i + 1,
      before,
      answers,
      after,
      typed: "",
      correct: null,
      timer: null,
      count: 60,
      color: pastelColors[i % pastelColors.length]
    };
  });

  activeIndex = 0;
  renderAll();
}


  // Render tiles
  function renderAll() {
    tilesWrap.innerHTML = "";
    lines.forEach((tile, pos) => {
      const div = document.createElement('div');
      div.className = 'tile';
      if (pos === activeIndex && gameActive) div.style.background = 'hsl(0,70%,85%)';
      else if (tile.correct === true) div.style.background = 'hsl(150,70%,85%)';
      else div.style.background = tile.color;

      const header = document.createElement('div');
      header.className = 'tile-header';

      const num = document.createElement('div');
      num.className = 'num';
      num.textContent = tile.id + '.';

      const sentence = document.createElement('div');
      sentence.className = 'sentence';
      const displayText = tile.typed.length > 0
        ? `<span class="blank">${tile.typed}</span>`
        : '<span class="blank">&nbsp;&nbsp;&nbsp;</span>';
      sentence.innerHTML = `${tile.before} ${displayText} ${tile.after}`;

      const rightSide = document.createElement('div');
      rightSide.style.display = 'flex';
      rightSide.style.flexDirection = 'column';
      rightSide.style.alignItems = 'center';

      const emoji = document.createElement('div');
      emoji.className = 'emoji';
      if (tile.correct === true) emoji.textContent = '😊';
      else if (tile.correct === false && tile.typed.length > 0) emoji.textContent = '😢';

      const countdown = document.createElement('div');
      countdown.className = 'countdown';
      countdown.textContent = gameActive ? tile.count + 's' : '';

      rightSide.appendChild(emoji);
      rightSide.appendChild(countdown);

      header.appendChild(num);
      header.appendChild(sentence);
      header.appendChild(rightSide);
      div.appendChild(header);

      if (gameActive && tile.correct === null) {
        div.addEventListener('click', () => {
          activeIndex = pos;
          syncHiddenInput();
          startCountdown(pos);
          renderAll();
        });
      }

      tilesWrap.appendChild(div);
    });

  function syncHiddenInput() {
    hiddenInput.value = lines[activeIndex].typed || "";
    hiddenInput.focus();
  }

  function startCountdown(index) {
    const tile = lines[index];
    if (!tile || !gameActive) return;
    if (tile.timer) clearInterval(tile.timer);
    tile.count = tile.correct === true ? 5 : tile.count || 15;

    tile.timer = setInterval(() => {
      tile.count--;
      renderAll();
      if (tile.count <= 0) {
        clearInterval(tile.timer);
        tile.timer = null;
        stashTile(index);
      }
    }, 1000);
  }

  function stashTile(index) {
    const tile = lines[index];
    if (tile) {
      lines.push(lines.splice(index, 1)[0]);
      activeIndex = 0;
      syncHiddenInput();
      renderAll();
      if (lines.length > 0) startCountdown(activeIndex);
    }
  }

    tile.typed = hiddenInput.value.trim();

    const matched = tile.answers.some(a => a === typedNorm);

    if (matched) {

      tile.count = 5;
    } else if (tile.typed.length > 0) {

      sadSound.play();
    } else {

  });

    if (ev.key === 'Backspace') {
      const tile = lines[activeIndex];

      const typedNorm = normalize(tile.typed);
      tile.correct = tile.answers.some(a => a === typedNorm)
        ? true
        : tile.typed.length > 0
        ? false
        : null;
      renderAll();

}

<script>


/* =========================================
   SECTION DIAL — SCROLL + CLICK ONLY
   (SECTION-SCOPED, MC-SAFE, AUTO-TRIGGERING)
   ========================================= */

(function () {

  const ITEM_HEIGHT = 38;

  let sections = [];
  let sectionIndex = 0; // 0 = placeholder

  let offset = 0;
  let startY = 0;
  let dragging = false;
let isProgrammaticSelect = false;


  /* ---------- GLOBAL MC POOL (SECTION ONLY) ---------- */
  window.sectionAnswerPool = [];

  function rebuildMCPool(sectionText) {
    window.sectionAnswerPool = sectionText
      .split("\n")
      .map(line => {
        const m = line.match(/\|([^|]+)\|/);
        return m ? m[1] : null;
      })
      .filter(Boolean);
}


  /* ---------- PARSE SECTIONS (STRICT ~ BOUNDARIES) ---------- */
  function parseSections(raw) {
    const chunks = raw.split(/\n(?=~+)/);

    return chunks
      .map(chunk => chunk.trim())
      .filter(chunk => chunk.startsWith("~"))
      .map(chunk => {
        const lines = chunk.split("\n");
        const name = lines.shift().replace(/^~+/, "").trim();
        const text = lines.join("\n").trim();
        return { name, text };
      });
  }

const parsedSections = parseSections(sentencesText);


  sections = [
    { name: "Select a category.", text: "" },
    ...parsedSections
  ];

  /* ---------- BUILD UI ---------- */
  const container = document.getElementById("sectionWheelContainer");


// ▲ / ▼ BUTTONS
const btnUp = document.getElementById("sectionUp");
const btnDown = document.getElementById("sectionDown");

btnUp.addEventListener("click", () => {
  selectSection(sectionIndex - 1, true);
});

btnDown.addEventListener("click", () => {
  selectSection(sectionIndex + 1, true);
});
container.style.cssText = `
position: relative;
height: ${ITEM_HEIGHT}px;
overflow: hidden;
touch-action: pan-y;
cursor: pointer;
width: 100%;
display: flex;
align-items: center;
justify-content: center;
border: 1px solid #999;
border-radius: 6px;
box-sizing: border-box;
`;
  const wheel = document.createElement("div");
  wheel.style.cssText = `
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    will-change: transform;
  `;

  sections.forEach((sec, index) => {
    const item = document.createElement("div");
    item.textContent = sec.name;
    item.style.cssText = `
      height: ${ITEM_HEIGHT}px;
      line-height: ${ITEM_HEIGHT}px;
      text-align: center;
      font-size: ${index === 0 ? "14px" : "15px"};
      font-style: ${index === 0 ? "italic" : "normal"};
      color: ${index === 0 ? "#999" : "#777"};
      user-select: none;
      white-space: nowrap;
    `;

item.addEventListener("click", () => {
  if (index === 0) return;
  selectSection(index, true);
});



    wheel.appendChild(item);
  });

  container.appendChild(wheel);

  /* ---------- UPDATE ---------- */
function update() {
  wheel.style.transform = `translateY(${offset}px)`;

  [...wheel.children].forEach((el, i) => {
    if (i === sectionIndex && i !== 0) {
      el.style.color = "#1f5fbf";
      el.style.fontWeight = "700";
    } else {
      el.style.color = i === 0 ? "#999" : "#777";
      el.style.fontWeight = "600";
    }
  });
}
  function fireSectionChange() {
if (sectionIndex === 0) return;

const section = sections[sectionIndex];


    window.sectionSelectionChanged = true;

    // 🔑 BUILD MC POOL HERE
    rebuildMCPool(section.text);

    window.dispatchEvent(new CustomEvent("sectionchange", {
      detail: {
        index: sectionIndex,

        name: section.name,
        text: section.text
      }
    }));
  }

function snap(fireEvent = false) {

  // derive selected row from current wheel position
  sectionIndex = Math.round(-offset / ITEM_HEIGHT);

  // clamp
  sectionIndex = Math.max(
    0,
    Math.min(sections.length - 1, sectionIndex)
  );

  // snap wheel visually
  offset = -sectionIndex * ITEM_HEIGHT;

  wheel.style.transition = "transform 0.15s ease-out";
  update();

  setTimeout(() => {
    wheel.style.transition = "";
  }, 150);

  if (fireEvent) {
    fireSectionChange();
  }
}

function selectSection(index, fireEvent = true) {
sectionIndex = Math.max(0, Math.min(sections.length - 1, index));

  offset = -sectionIndex * ITEM_HEIGHT;
  snap(fireEvent);
}




  /* ---------- DRAG ---------- */
  function start(y) {
    dragging = true;
    startY = y;
  }

  function move(y) {
    if (!dragging) return;
    offset += y - startY;
    startY = y;
    update();
  }

  function end() {
    if (!dragging) return;
    dragging = false;
    snap(true);
  }

  container.addEventListener("mousedown", e => start(e.clientY));
  window.addEventListener("mousemove", e => move(e.clientY));
  window.addEventListener("mouseup", end);

  container.addEventListener("touchstart", e => start(e.touches[0].clientY), { passive: true });
  container.addEventListener("touchmove", e => move(e.touches[0].clientY), { passive: true });
  container.addEventListener("touchend", end);

  /* ---------- MOUSE WHEEL ---------- */
  container.addEventListener("wheel", e => {
    e.preventDefault();
    offset += e.deltaY * -0.3;
    update();
    snap(true);
  }, { passive: false });

  /* ---------- INIT ---------- */
  offset = 0;
  update();




  /* ---------- SECTION SELECTION BRIDGE ---------- */
window.getSelectedSectionText = function () {
  if (sectionIndex === 0) return "";
  return sections[sectionIndex]?.text || "";
};

window.getSelectedSectionIndex = function () {
  return sectionIndex;
};


// 🔑 START ON PLACEHOLDER (NO AUTO-SELECTION)
sectionIndex = 0;
offset = 0;
update();


})();
</script>

    if(line === "---"){
      html.push(`<hr>`);
