<title>Emoji Slideshow</title>

<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
}

body {
    background: url('https://www.transparenttextures.com/patterns/stonewall.png'), black;
    font-family: Arial, sans-serif;
    background-size: cover;
    background-position: center;
}

/* ===============================
   GAME CONTAINER (WIDTH ANCHOR)
   =============================== */

.game-container {
    width: 310px;              /* вҶҗ SINGLE SOURCE OF TRUTH */
    margin: 0 auto;
    box-sizing: border-box;
    text-align: center;
}

/* ===============================
   GRID (CENTERED)
   =============================== */

.grid-container {
    display: flex;
    justify-content: center;
    margin: 12px 0;
}

.grid-item {
    width: 310px;
    height: 310px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 200px;
    color: #fff;

    border: 2px solid #ddd;
    border-radius: 16px;
    background-color: #333;

    box-shadow:
        inset 1px 1px 5px rgba(0,0,0,0.2),
        0 4px 6px rgba(0,0,0,0.2);

    position: relative;
    overflow: hidden;
}

/* Fade overlay */
.fade-layer {
    position: absolute;
    inset: 0;
    background-color: black;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
    z-index: 10;
}

/* ===============================
   SECTION SELECTOR ROW
   =============================== */

.formRow {
    display: flex;
    gap: 6px;

    width: 100%;               /* вҶҗ constrained by game-container */
    max-width: 100%;
    box-sizing: border-box;

    height: 38px;
    margin-bottom: 10px;

    align-items: stretch;
}

/* Children baseline */
.formRow > * {
    height: 100%;
    display: flex;
    align-items: center;
    box-sizing: border-box;
}

/* Selector buttons */
.formRow > button {
    flex: 0 0 38px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 14px;
    line-height: 1;

    background-color: #292929;
    color: #b5b5b5;

    border: 5px solid #3a3a3a;
    border-radius: 6px;

    cursor: pointer;
}

.formRow > button:hover:not(:disabled) {
    background-color: #333333;
}

.formRow > button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* Selector field */
#sectionWheelContainer {
    flex: 1 1 auto;
    min-width: 0;              /* вҶҗ CRITICAL: prevents overflow */

    padding: 0 10px;

    background-color: #292929;
    border: 5px solid #3a3a3a;
    border-radius: 8px;

    display: flex;
    align-items: center;
    overflow: hidden;
}

/* Selector text */
#sectionWheelContainer .wheel {
    flex: 1;

    font-size: 12px;
    line-height: 1;
    color: #b5b5b5;

    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;

    user-select: none;
    pointer-events: none;
}

/* ===============================
   FOOTER (ALIGNED TO GAME)
   =============================== */

footer.game-footer {
    margin-top: 10px;          /* вҶҗ EXACTLY 10px below game */
    width: 100%;
    text-align: center;
}

footer.game-footer p {
    margin: 0;
    font-size: 8px;
    line-height: 1.1;
    opacity: 0.8;
    color: #b5b5b5;
}

.ui-hidden {
    visibility: hidden;
    opacity: 0;
    pointer-events: none;
}
</style>
</head>

</head>
<body>



<div class="game-container">
    <h1>Random Word Grid</h1>

    <!-- UI SHELL (RESERVES SPACE FOR SELECTOR ONLY) -->
    <div class="ui-shell">
        <div class="formRow">
            <button type="button" id="sectionUp">в–І</button>

            <div id="sectionWheelContainer">
                <div class="wheel"></div>
            </div>

            <button type="button" id="sectionDown">в–ј</button>

            <button type="button" id="sectionStart" disabled>
                Start
            </button>
        </div>
    </div>

    <!-- GRID NEVER MOVES -->
    <div class="grid-container">
        <div class="grid-item" id="cube"></div>
        <div class="fade-layer" id="fadeLayer"></div>
    </div>

    <!-- FOOTER IS NOW PERMANENTLY BELOW IMAGE -->
    <footer class="game-footer">
        <p>&copy; 2026 Perfectly Practical Englishв„ў. All rights reserved.</p>
    </footer>
</div>

// FisherвҖ“Yates shuffle (must come first)
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// Parse ~Set sections
function parseSets(input) {
    const sets = [];
    const blocks = input.split(/~Set\s+/).slice(1);

    blocks.forEach(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
        const label = lines.shift();

        let scale = 1;

        if (/^%\d+%$/.test(lines[0])) {
            scale = parseInt(lines.shift().replace(/%/g, ''), 10) / 100;
        }

        sets.push({
            name: 'Set ' + label,
            scale,
            items: lines
        });
    });

    return sets;
}

const sets = parseSets(rawInput);

const wheel = document.querySelector('.wheel');
const startButton = document.getElementById('sectionStart');

wheel.textContent = 'Select a topic.';
startButton.disabled = true;


let currentSetIndex = -1;

let items = [];
let currentIndex = 0;
let slideshowTimer = null;

const cube = document.getElementById('cube');
const fadeLayer = document.getElementById('fadeLayer');

// Detect if string is an image
function isImage(filename) {
    return /\.(png|jpg|jpeg|gif|bmp|svg|webp)$/i.test(filename);
}

// Show either emoji/text or image
function showItem(item) {
    cube.innerHTML = '';

    if (isImage(item)) {
        const img = document.createElement('img');
        img.src = item;

        img.style.maxWidth = '100%';
        img.style.maxHeight = '100%';
        img.style.transform = `scale(${currentScale})`;
        img.style.transformOrigin = 'center';

        cube.appendChild(img);
    } else {
        cube.textContent = item;
    }
}





let currentScale = 1;


function startSection(index) {
    if (slideshowTimer) {
        clearInterval(slideshowTimer);
        slideshowTimer = null;
    }

    currentSetIndex = index;
    const set = sets[currentSetIndex];

    items = [...set.items];
    currentScale = set.scale;

    shuffle(items);
    currentIndex = 0;

    wheel.textContent = set.name;
    startButton.disabled = false;

    showItem(items[currentIndex]);
}

document.getElementById('sectionUp').onclick = () => {
    if (currentSetIndex === -1) {
        currentSetIndex = sets.length - 1;
    } else {
        currentSetIndex =
            (currentSetIndex - 1 + sets.length) % sets.length;
    }
    startSection(currentSetIndex);
};

document.getElementById('sectionDown').onclick = () => {
    if (currentSetIndex === -1) {
        currentSetIndex = 0;
    } else {
        currentSetIndex =
            (currentSetIndex + 1) % sets.length;
    }
    startSection(currentSetIndex);
};



/* в¬ҮпёҸ ADD THIS EXACTLY HERE в¬ҮпёҸ */

document.getElementById('sectionStart').onclick = () => {
    hideSelectorUI();
    slideshowTimer = setInterval(nextItem, 5000);
};

function hideSelectorUI() {
    document.querySelector('.formRow').classList.add('ui-hidden');
    document.querySelector('.game-footer').classList.add('ui-hidden');
}

function showSelectorUI() {
    document.querySelector('.formRow').classList.remove('ui-hidden');
    document.querySelector('.game-footer').classList.remove('ui-hidden');
}

function nextItem() {
    // 1пёҸвғЈ Fade TO black
    fadeLayer.style.opacity = 1;

    // 2пёҸвғЈ Hold black briefly
    setTimeout(() => {
        currentIndex = (currentIndex + 1) % items.length;
        showItem(items[currentIndex]);

        // 3пёҸвғЈ Fade FROM black
        setTimeout(() => {
            fadeLayer.style.opacity = 0;
        }, 150); // black hold duration

    }, 800); // fade-to-black duration
}

<script>
// Green border around viewport
const borderDiv = document.createElement('div');
borderDiv.style.position = 'fixed';
borderDiv.style.inset = '0';
borderDiv.style.boxShadow = 'inset 0 0 0 10px #39FF14';
borderDiv.style.pointerEvents = 'none';
borderDiv.style.zIndex = '9999';
document.body.appendChild(borderDiv);
</script>

<script>

(function () {
    let exitArmed = false;

    function exitSlideshow() {
        if (!slideshowTimer) return; // not running

        clearInterval(slideshowTimer);
        slideshowTimer = null;

        showSelectorUI();
        exitArmed = false;
    }

    function handleExitEvent(e) {
        // Ignore clicks on UI controls when selector is visible
        if (!document.querySelector('.formRow').classList.contains('ui-hidden')) {
            return;
        }

        // Prevent immediate exit from the same tap that started slideshow
        if (!exitArmed) {
            exitArmed = true;
            return;
        }

        exitSlideshow();
    }

    // Desktop
    document.addEventListener('click', handleExitEvent);

    // Mobile
    document.addEventListener('touchstart', handleExitEvent, { passive: true });
})();

</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>
