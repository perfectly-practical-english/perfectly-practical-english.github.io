<script>

// Raw sentences for scramble game
const rawSentences = `

~Visiting Bigfoot in the Forest

A group of campers find strange footprints in the forest.
They decide to follow the footprints carefully.
They walk deeper between the tall trees.
Suddenly, they hear a loud, mysterious howl nearby.
Then they see Bigfoot peeking out at them from behind a tree.
Bigfoot invites them to visit his giant redwood treehouse.
They climb up and enter the warm, cozy home.
They meet Bigfoot’s family and make friends.
Afterwards, they eat delicious nuts and berries from the forest with the Bigfoot family.
Finally, it is time to say goodbye, but the campers promise to visit again soon.~


~Visiting Nessie Under the Surface of Loche Ness

A group of divers find strange ripples in the water.
They decide to follow the current carefully.
They dive deeper between old rotten logs.
Suddenly, they hear a loud, mysterious roar nearby.
Then they see Nessie peeking out at them from inside an underwater cave.
Nessie invites them to visit her underwater cavern.
They dive deeper up and enter the warm, cozy cave.
They meet Nessie’s family and make friends.
Afterwards, they eat delicious fish and seaweed from the lake with sea monster family.
Finally, it is time to say goodbye, but the divers promise to visit again soon.~
`;


// --------------------------------------------------
// SECTION SELECTOR SOURCE (non-destructive)
// --------------------------------------------------

const sectionSource = rawSentences
  .split("~")
  .map(s => s.trim())
  .filter(Boolean)
  .map(block => {
    const lines = block.split("\n").map(l => l.trim()).filter(Boolean);
    return {
      label: lines[0],      // appears in selector
      text: lines.slice(1).join("\n") // emitted on select
    };
  });
/* =========================================
   SEQUENCE SCRAMBLE GAME ENGINE
   (Shell-compatible, section-aware)
   ========================================= */

let sentences = [];
let selected = null;
const container = document.getElementById('tiles');


// 🔁 Rebuild game when section changes
// 🔁 Rebuild game when section changes
window.addEventListener("sectionchange", async (e) => {
  const index = e.detail?.index;
  const text  = e.detail?.text;

  if (!index || index === 0 || !text || !text.trim()) return;

  // 🔒 lock in the selected section
  window.activeSectionIndex = index;
  activeSectionText  = text;

  buildGame();
});


// 🧱 Build game tiles
async function buildGame() {
  container.innerHTML = "";
  selected = null;

  const raw = activeSectionText;

  sentences = raw
    .trim()
    .split("\n")
    .map(s => s.trim())
    .filter(Boolean);

  const shuffled = shuffle([...sentences]);

shuffled.forEach(text => {
  const div = document.createElement('div');
  div.className = 'tile';

  div.innerHTML = `
    <div class="tile-header">
      <span class="num"></span>
      <span class="sentence">${text}</span>
    </div>
  `;

div.style.pointerEvents = 'auto';


  div.addEventListener('click', () => handleTileClick(div));
  container.appendChild(div);
});

  document.getElementById('scrambleSubmitBtn').disabled = false;
  document.getElementById('scrambleScoreboard').style.display = 'none';
}

// 🔁 Click-to-swap
function handleTileClick(tile) {
  if (!selected) {
    selected = tile;
    tile.classList.add('selected');
    return;
  }

  if (selected === tile) {
    tile.classList.remove('selected');
    selected = null;
    return;
  }

const s1 = selected.querySelector('.sentence');
const s2 = tile.querySelector('.sentence');

const tmp = s1.textContent;
s1.textContent = s2.textContent;
s2.textContent = tmp;


  selected.classList.remove('selected');
  selected = null;
}

// 🔀 Shuffle helper
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// 🧮 Score output
function getScoreOutput() {
  const tiles = [...container.querySelectorAll('.tile')];

  let score = 0;
  tiles.forEach((tile, i) => {
    if (tile.textContent === sentences[i]) score++;
  });

  const name = document.getElementById('scrambleName').value.trim();
  const id = document.getElementById('scrambleId').value.trim();
  const percent = ((score / sentences.length) * 100).toFixed(1);
  const date = new Date().toLocaleString('en-GB', { hour12: false });

  return `Name: ${name} | ID: ${id} | Date: ${date} | Score: ${score}/${sentences.length} (${percent}%)`;
}

// ✅ Submit
document.getElementById('scrambleSubmitBtn').addEventListener('click', () => {
  const out = getScoreOutput();
  document.getElementById('scrambleScoreOutput').textContent = out;
  document.getElementById('scrambleScoreboard').style.display = 'block';

  document.getElementById('scrambleSubmitBtn').disabled = true;

container.querySelectorAll('.tile').forEach(t => {
  t.style.pointerEvents = 'none';

});

});

// 📋 Copy
document.getElementById('scrambleCopyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(
    document.getElementById('scrambleScoreOutput').textContent
  );
  alert('Score copied!');
});

// 📄 TXT
document.getElementById('scrambleDownloadTextBtn').addEventListener('click', () => {
  const text = document.getElementById('scrambleScoreOutput').textContent;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'scramble_score.txt';
  a.click();
});

// 🖼 PNG
document.getElementById('scrambleDownloadPngBtn').addEventListener('click', () => {
  html2canvas(document.getElementById('scrambleScoreOutput')).then(canvas => {
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'scramble_score.png';
    a.click();
  });
});
</script>

<script>


/* =========================================
   SECTION DIAL — SCROLL + CLICK ONLY
   (SECTION-SCOPED, MC-SAFE, AUTO-TRIGGERING)
   ========================================= */

(function () {

  const ITEM_HEIGHT = 38;

  let sections = [];
let sectionIndex = 0; // placeholder (no selection yet)

  let offset = 0;
  let startY = 0;
  let dragging = false;
let isProgrammaticSelect = false;


  /* ---------- GLOBAL MC POOL (SECTION ONLY) ---------- */
  window.sectionAnswerPool = [];

  function rebuildMCPool(sectionText) {
    window.sectionAnswerPool = sectionText
      .split("\n")
      .map(line => {
        const m = line.match(/\|([^|]+)\|/);
        return m ? m[1] : null;
      })
      .filter(Boolean);
}


  /* ---------- PARSE SECTIONS (STRICT ~ BOUNDARIES) ---------- */
  function parseSections(raw) {
    const chunks = raw.split(/\n(?=~+)/);

    return chunks
      .map(chunk => chunk.trim())
      .filter(chunk => chunk.startsWith("~"))
      .map(chunk => {
        const lines = chunk.split("\n");
        const name = lines.shift().replace(/^~+/, "").trim();
        const text = lines.join("\n").trim();
        return { name, text };
      });
  }

sections = [
  { name: "Select a category.", text: "" },
  ...sectionSource.map(s => ({
    name: s.label,
    text: s.text
  }))
];


  /* ---------- BUILD UI ---------- */
  const container = document.getElementById("sectionWheelContainer");


// ▲ / ▼ BUTTONS
const btnUp = document.getElementById("sectionUp");
const btnDown = document.getElementById("sectionDown");

btnUp.addEventListener("click", () => {
  selectSection(sectionIndex - 1, true);
});

btnDown.addEventListener("click", () => {
  selectSection(sectionIndex + 1, true);
});
  container.style.cssText = `
    position: relative;
    height: ${ITEM_HEIGHT}px;
    overflow: hidden;
    margin-bottom: 10px;
    touch-action: pan-y;
    cursor: pointer;
  `;

const wheel = document.createElement("div");
wheel.className = "section-wheel";
wheel.style.cssText = `
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  will-change: transform;
`;




  sections.forEach((sec, index) => {
    const item = document.createElement("div");
    item.textContent = sec.name;
    item.style.cssText = `
      height: ${ITEM_HEIGHT}px;
      line-height: ${ITEM_HEIGHT}px;
      text-align: center;
      font-size: ${index === 0 ? "14px" : "15px"};
      font-style: ${index === 0 ? "italic" : "normal"};
      color: ${index === 0 ? "#999" : "#777"};
      user-select: none;
      white-space: nowrap;
    `;

item.addEventListener("click", () => {
  if (index === 0) return;
  selectSection(index, true);
});



    wheel.appendChild(item);
  });

  container.appendChild(wheel);




  /* ---------- UPDATE ---------- */
function update() {
  wheel.style.transform = `translateY(${offset}px)`;

  [...wheel.children].forEach((el, i) => {
    if (i === sectionIndex && i !== 0) {
      el.style.color = "#1f5fbf";
      el.style.fontWeight = "700";
    } else {
      el.style.color = i === 0 ? "#999" : "#777";
      el.style.fontWeight = "600";
    }
  });
}
  function fireSectionChange() {
if (sectionIndex === 0) return;

const section = sections[sectionIndex];


    window.sectionSelectionChanged = true;

    // 🔑 BUILD MC POOL HERE
    rebuildMCPool(section.text);

    window.dispatchEvent(new CustomEvent("sectionchange", {
      detail: {
        index: sectionIndex,

        name: section.name,
        text: section.text
      }
    }));
  }

// 🔓 expose for Start button
window.fireSelectedSection = fireSectionChange;


function snap() {
  offset = -sectionIndex * ITEM_HEIGHT;

  wheel.style.transition = "transform 0.15s ease-out";
  update();
  setTimeout(() => wheel.style.transition = "", 150);
}




function selectSection(index) {
  sectionIndex = Math.max(0, Math.min(sections.length - 1, index));
  offset = -sectionIndex * ITEM_HEIGHT;
  snap();
}






  /* ---------- DRAG ---------- */
  function start(y) {
    dragging = true;
    startY = y;
  }

  function move(y) {
    if (!dragging) return;
    offset += y - startY;
    startY = y;
    update();
  }

  function end() {
    if (!dragging) return;
    dragging = false;
    snap(true);
  }

  container.addEventListener("mousedown", e => start(e.clientY));
  window.addEventListener("mousemove", e => move(e.clientY));
  window.addEventListener("mouseup", end);

  container.addEventListener("touchstart", e => start(e.touches[0].clientY), { passive: true });
  container.addEventListener("touchmove", e => move(e.touches[0].clientY), { passive: true });
  container.addEventListener("touchend", end);

container.addEventListener("wheel", e => {
  e.preventDefault();

  if (e.deltaY > 0) {
    selectSection(sectionIndex + 1, true);
  } else {
    selectSection(sectionIndex - 1, true);
  }
}, { passive: false });





  /* ---------- SECTION SELECTION BRIDGE ---------- */
window.getSelectedSectionText = function () {
  if (sectionIndex === 0) return "";
  return sections[sectionIndex]?.text || "";
};

window.getSelectedSectionIndex = function () {
  return sectionIndex;
};

window.selectSectionByIndex = function (index) {
  if (!index || index === 0) return;

  // 🔥 FORCE section open
  const section = sections[index];

  window.dispatchEvent(new CustomEvent("sectionchange", {
    detail: {
      index,
      name: section.name,
      text: section.text
    }
  }));
};



// 🔑 START ON PLACEHOLDER VISUALLY, BUT ALLOW SELECTION
selectSection(0, false);

})();
</script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>




<script>
(async function () {
  'use strict';

  /* ===============================
     HARD GUARDS
     =============================== */

  const submitBtn  = document.getElementById("submitBtn");
  const scoreboard = document.getElementById("scoreboard");
  const scoreBtns  = document.getElementById("scoreButtons");

  const nameInput = document.getElementById("playerName");
  const idInput   = document.getElementById("playerID");

  if (!submitBtn || !scoreboard) {
    console.warn("⚠️ Add-on aborted: submitBtn or scoreboard missing");
    return;
  }

  /* ===============================
     FORCE SCOREBOARD WRAPPING
     =============================== */

  Object.assign(scoreboard.style, {
    whiteSpace: "normal",
    wordBreak: "break-word",
    overflowWrap: "anywhere",
    maxWidth: "100%"
  });

  /* ===============================
     HELPERS
     =============================== */

  function pad(n) {
    return String(n).padStart(2, "0");
  }

  function intlTimestamp() {
    const d = new Date();
    return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ` +
           `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function getFilename() {
    return decodeURIComponent(
      location.pathname.split("/").pop() || "index.html"
    );
  }

  function getSectionName() {
    return window.activeSectionText
      ? window.activeSectionText.split("\n")[0].trim()
      : document.querySelector("section h3")?.textContent.trim()
      || "Unknown Section";
  }

  /* ===============================
     CANONICAL SCORE STRING
     =============================== */

  function buildScoreString() {
    const tiles = [...document.querySelectorAll(".tile")];
    if (!tiles.length) return null; // REAL start condition

    let correct = 0;
    const total = tiles.length;

    tiles.forEach(tile => {
      if (
        tile.classList.contains("correct") ||
        tile.dataset.correct === "true" ||
        tile.getAttribute("aria-correct") === "true"
      ) {
        correct++;
      }
    });

    const percent = Math.round((correct / total) * 100);

    return [
      getFilename(),
      getSectionName(),
      nameInput?.value.trim() || "",
      idInput?.value.trim() || "",
      intlTimestamp(),
      `${correct}/${total}`,
      `${percent}%`
    ].join("|");
  }

  /* ===============================
     SUBMIT (NON-DESTRUCTIVE)
     =============================== */

  submitBtn.addEventListener("click", () => {
    const dataString = buildScoreString();
    if (!dataString) {
      alert("Start the game first.");
      return;
    }

scoreboard.textContent = dataString;
scoreboard.style.display = "block";
scoreboard.style.visibility = "visible";
scoreboard.style.opacity = "1";

if (scoreBtns) scoreBtns.style.display = "flex";

    document.querySelectorAll(".tile").forEach(t => {
      t.style.pointerEvents = "none";
    });

if (typeof saveToSupabase === "function") {
  requestAnimationFrame(() => saveToSupabase(dataString));
}
});

  /* ===============================
     DOWNLOAD / COPY
     =============================== */

  function sanitizeFilename(name) {
    return name.replace(/[\\/:*?"<>|]+/g, "_").slice(0, 200) || "score";
  }

  function buildDownloadName() {
    return sanitizeFilename(buildScoreString() || "score");
  }

  document.getElementById("copyScore")?.addEventListener("click", () => {
    if (!scoreboard.textContent) return;
    navigator.clipboard.writeText(scoreboard.textContent);
    alert("Score copied!");
  });

  document.getElementById("downloadTxt")?.addEventListener("click", () => {
    if (!scoreboard.textContent) return;
    const blob = new Blob([scoreboard.textContent], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = buildDownloadName() + ".txt";
    a.click();
  });

document.getElementById("downloadPng")?.addEventListener("click", async () => {
  if (!scoreboard.textContent || !window.html2canvas) return;

  // match on-screen wrapping width
  const renderWidth = scoreboard.getBoundingClientRect().width;

  const wrapper = document.createElement("div");
  wrapper.style.position = "fixed";
  wrapper.style.left = "-9999px";
  wrapper.style.top = "0";
  wrapper.style.width = renderWidth + "px";   // ✅ key fix
  wrapper.style.padding = "10px";              // ✅ 10px margin
  wrapper.style.background = "#fff";
  wrapper.style.fontFamily = "monospace";
  wrapper.style.fontSize = "14px";
  wrapper.style.whiteSpace = "pre-wrap";
  wrapper.style.wordBreak = "break-word";
  wrapper.style.overflowWrap = "anywhere";
  wrapper.style.color = "#000";
  wrapper.textContent = scoreboard.textContent;

  document.body.appendChild(wrapper);

  try {
    const canvas = await html2canvas(wrapper, {
      scale: 2,
      backgroundColor: "#fff"
    });

    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = buildDownloadName() + ".png";
    a.click();
  } finally {
    wrapper.remove();
  }
});



  /* ===============================
     SUPABASE (PARSED STRING)
     =============================== */

  if (!window.supabase) {
    console.warn("⚠️ Supabase not loaded (skipping save)");
    return;
  }

  const supabase = window.supabase.createClient(
    "https://rhmbuqwbjacvbobxmyvx.supabase.co",
    "YOUR_PUBLIC_ANON_KEY"
  );

  async function saveToSupabase(dataString) {
    const parts = dataString.split("|");
    if (parts.length !== 7) return;

    const [file, section, name, id, date, scorePart, percent] = parts;
    const [correct, total] = scorePart.split("/").map(Number);

    const row = {
      filename: file,
      section,
      student_name: name || null,
      student_id: id || null,
      score: correct,
      total,
      percentage_correct: Number(percent.replace("%", "")),
      raw_string: dataString,
      created_at: new Date().toISOString()
    };

    if (error) console.error("❌ Supabase insert failed:", error);
  }

})();

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});

<script>

(function(){

/* =========================
   RAW INSTRUCTIONS TEXT
========================= */

const RAW_TEXT = `

How to play...

1. Enter Name and ID..
2. Select a category.
3. Click Start to begin.
4. Click to select tiles.
5. Click to move the tiles into the correct order from top to bottom.
5. Click Submit to see your score.
6. Copy or download your score.

`;


/* =========================
   RAW TEXT PARSER
========================= */

function parseRawInstructions(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const html = [];

  lines.forEach(line => {

    if(line === "---"){
      html.push(`<hr>`);
      return;
    }

    if(/^\d+\./.test(line)){
      html.push(`<p>${line}</p>`);
      return;
    }

    if(!/[.!?:]$/.test(line)){
      html.push(`<h3>${line}</h3>`);
      return;
    }

    html.push(`<p>${line}</p>`);
  });

  return html.join("");
}


/* =========================
   CREATE STYLE
========================= */

const style = document.createElement("style");

style.textContent = `
#instructionsBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 16px;
  background:#2e8b57;
  color:#fff;
  border:none;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,0.6);
  z-index:99998;
}

#instructionsBtn:hover{
  background:#257047;
}

#instructionsRoot{
  position:fixed;
  inset:0;
  display:none;
  z-index:99999;
}

#instructionsBackdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
}

#instructionsModal{
  position:absolute;
  top:25px;
  left:50%;
  transform:translateX(-50%);
  width:min(650px,90vw);
  max-height:90vh;
  background:#fff;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#instructionsHeader{
  padding:12px 16px;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  gap:10px;
}

#instructionsTitle{
  color:#1976d2;
  font-weight:600;
  font-size:1.1em;
}

#instructionsBack{
  border:none;
  background:none;
  font-size:20px;
  cursor:pointer;
  color:#1976d2;
  font-weight:600;
}

#instructionsContent{
  padding:2px 18px 18px 18px;
  overflow-y:auto;
  line-height:1.6;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

#instructionsContent::-webkit-scrollbar{
  display:none;
}

#instructionsContent h3{
  color:#1976d2;
  margin:12px 0 4px 0;
  font-weight:600;
}

#instructionsContent p{
  margin:4px 0;
}

#instructionsContent hr{
  margin:12px 0;
}
`;

document.head.appendChild(style);


/* =========================
   CREATE BUTTON
========================= */

const btn = document.createElement("button");
btn.id = "instructionsBtn";
btn.textContent = "Instructions";

document.body.appendChild(btn);


/* =========================
   CREATE MODAL
========================= */

const root = document.createElement("div");
root.id = "instructionsRoot";

root.innerHTML = `
<div id="instructionsBackdrop"></div>

<div id="instructionsModal">

  <div id="instructionsHeader">
    <button id="instructionsBack">←</button>
    <span id="instructionsTitle">Instructions</span>
  </div>

  <div id="instructionsContent">
    ${parseRawInstructions(RAW_TEXT)}
  </div>

</div>
`;

document.body.appendChild(root);


/* =========================
   SCROLL LOCK
========================= */

const modalContent = document.getElementById("instructionsContent");

modalContent.addEventListener("wheel", e=>{
  e.stopPropagation();
},{passive:false});

modalContent.addEventListener("touchmove", e=>{
  e.stopPropagation();
},{passive:false});


/* =========================
   OPEN / CLOSE
========================= */

function openModal(){
  root.style.display="block";
  document.body.style.overflow="hidden";
  document.documentElement.style.overflow="hidden";
}

function closeModal(){
  root.style.display="none";
  document.body.style.overflow="";
  document.documentElement.style.overflow="";
}

btn.onclick = openModal;

document.getElementById("instructionsBack").onclick = closeModal;
document.getElementById("instructionsBackdrop").onclick = closeModal;

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeModal();
});

/* =========================
   DYNAMIC BODY PADDING FOR BUTTON
========================= */

function adjustBodyPadding(){
  const btnHeight = btn.offsetHeight + -25; // include some gap
  document.body.style.paddingBottom = `${btnHeight}px`;
}

// Initial adjustment
adjustBodyPadding();

// Update if window is resized (responsive)
window.addEventListener("resize", adjustBodyPadding);

})();
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>
