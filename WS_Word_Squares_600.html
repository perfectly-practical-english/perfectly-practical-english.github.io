    <title>Word Squares</title>
    <style>
        /* Customizable CSS Variables */
        :root {
            /* Base Colors */
            --primary-bg-color: #4CAF50;        /* Primary background color */
            --button-bg-color: #4CAF50;          /* Button background color */
            --button-text-color: white;          /* Button text color */
            --grid-border-color: #ddd;           /* Grid item border color */
            --grid-item-font-size: 16px;         /* Font size for grid items */
            --title-font-size: 24px;             /* Font size for title */
            --title-color: #333;                 /* Title color */
            --grid-item-text-color: #000;        /* Text color for grid items */
            --grid-gap: 10px;                    /* Gap between grid items */
            --grid-item-size: 100px;             /* Size of each grid item */
            --generate-button-size: 16px;        /* Font size of the button */
            --generate-button-padding: 10px 20px; /* Button padding */
            
            /* Hover Effects */
            --button-hover-bg-color: #45a049;    /* Button hover background color */
            --grid-item-hover-bg-color: #f0f0f0; /* Grid item hover background color */
        }

        /* Background color for the whole page - light grey stone */
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://www.transparenttextures.com/patterns/stonewall.png'), #dcdcdc;
            font-family: Arial, sans-serif;
            background-size: cover;
            background-position: center;
            flex-direction: column; /* Ensures footer will be at the bottom */
        }

        /* Darker grey container for the entire content (title, grid, and button) */
        .game-container {
            text-align: center;
            background-color: #333333; /* Even darker grey background for the container */
            border-radius: 8px; /* Rounded corners for container */
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4); /* Subtle shadow around the container */
        }

        /* Title with bold font */
        h1 {
            font-size: var(--title-font-size);
            color: var(--title-color);
            font-weight: bold; /* Make the title bold */
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, var(--grid-item-size));
            grid-template-rows: repeat(3, var(--grid-item-size));
            gap: var(--grid-gap);
            margin-top: 20px;
        }

        /* Grid item style with bold text */




.grid-item {
  width: var(--grid-item-size);
  height: var(--grid-item-size);

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: var(--grid-item-font-size);
  line-height: 1;
  font-family:
    "Apple Color Emoji",
    "Segoe UI Emoji",
    "Noto Color Emoji",
    sans-serif;

  color: var(--grid-item-text-color);

  border: 2px solid var(--grid-border-color);
  border-radius: 8px;
  background-color: #000000;

  box-shadow:
    inset 1px 1px 5px rgba(0, 0, 0, 0.2),
    0 4px 6px rgba(0, 0, 0, 0.2);

  transition:
    background-color 0.3s ease,
    transform 0.3s ease,
    box-shadow 0.3s ease;

  font-weight: bold;
}

/* Emoji override вАФ fills the square */
.grid-item .emoji {
  font-size: calc(var(--grid-item-size) * 0.8);
  line-height: 1;
  display: block;

  position: relative;
  top: -5px;   /* вђЖ bump emoji up ~5px */
}




        .grid-item:hover {
            background-color: var(--grid-item-hover-bg-color); /* Light background on hover */
            transform: scale(1.05); /* Slight scale on hover */
            box-shadow: inset 2px 2px 10px rgba(0, 0, 0, 0.3), 0 6px 12px rgba(0, 0, 0, 0.3); /* Enhanced shadow */
        }

#generateButton {
  margin-top: -100px;   /* move button up */
  padding: var(--generate-button-padding);
  font-size: var(--generate-button-size);
  cursor: pointer;
  background-color: var(--button-bg-color);
  color: var(--button-text-color);
  border: none;
  border-radius: 5px;
  transition: background-color 0.3s ease;
  font-weight: bold;
}

#generateButton:hover {
    background-color: var(--button-hover-bg-color);
}


/* ===============================
   FORM ROW (shared layout)
   =============================== */

.formRow {
  display: flex;
  flex-shrink: 0;
  flex-direction: row;
  flex-wrap: nowrap;
  gap: 3px;                     /* your requested 3px gap */
  
  /* Keep centered if needed, height same as before */
  width: calc(3 * var(--grid-item-size) + 2 * var(--grid-gap));
  height: 38px;
  margin-bottom: 10px;
  align-items: stretch;
}

/* All direct children share the same box */
.formRow > * {
  height: 100%;
  display: flex;
  align-items: center;
  box-sizing: border-box;
}

/* Buttons in the row */
.formRow > button {
  flex: 0 0 38px;
  padding: 0;
  margin: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  line-height: 1;
  background-color: #292929;
  color: #b5b5b5;
  border: 5px solid #3a3a3a;
  border-radius: 6px;
}

/* Hover (only if enabled) */
.formRow > button:hover:not(:disabled) {
  background-color: #333333;
}

/* Disabled state */
.formRow > button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Start button sizing */
#sectionStart {
  flex: 0 0 auto;
  padding: 0 12px;
  white-space: nowrap;
}

/* Selector field behaves like an input */
.formRow > #sectionWheelContainer {
  flex: 1 1 auto;                  /* fills remaining space */
  min-width: 0;
  max-width: none;                  /* allow full width */
  padding: 0 14px;                  /* keep left padding */
  background-color: #292929;
  border: 5px solid #3a3a3a;
  border-radius: 8px;
  display: flex;
  align-items: center;
  overflow: hidden;
}

/* SECTION WHEEL TEXT */
#sectionWheelContainer .wheel {
  flex: 1;
  font-size: 12px;
  line-height: 1;
  color: #b5b5b5;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  user-select: none;
  pointer-events: none;
}

/* ===============================
   WORD BASELINE (NO JUMPING)
   =============================== */

.word {
  display: inline-block;
  padding: 0 2px;
  border-radius: 4px;
  box-shadow: 0 0 0 2px transparent;
  transition:
    background-color 0.15s ease,
    box-shadow 0.15s ease;
}

/* ===============================
   SELECTED STATE (BLUE + HALO)
   =============================== */

.word.selected-word {
  background-color: rgba(25, 118, 210, 0.25);
  box-shadow: 0 0 0 2px rgba(25, 118, 210, 0.35);
}

.word.selected-word.correct,
.word.selected-word.incorrect {
  background-color: rgba(25, 118, 210, 0.25);
  box-shadow: 0 0 0 2px rgba(25, 118, 210, 0.35);
}

.word.correct {
  outline: 1px solid rgba(46, 125, 50, 0.6);
}

.word.incorrect {
  outline: 1px solid rgba(198, 40, 40, 0.6);
}

#sectionSelector {
  height: 64px;
  min-height: 64px;
  flex-shrink: 0;
}
#morphCanvas {
  margin-top: -10px;
}

/* Game footer styling */
footer.game-footer,
footer.game-footer p {
  margin-top: 10px;        /* вЬЕ 10px below green button */
  font-size: 8px;
  line-height: 1.1;
  opacity: 0.8;
  color: #b5b5b5;          /* light grey like Start button */
  text-align: center;     /* вЬЕ centered */
}

@media (max-height: 700px) {
  #generateButton {
    margin-top: -40px;
  }
}

// Function to parse raw input into an array of square objects
function parseSets(input) {
  const sets = {};
  const setBlocks = input.split(/~Set\s+/).slice(1);

  setBlocks.forEach(block => {
    const [setNameLine, ...rest] = block.split('\n');
    const setName = `Set ${setNameLine.trim()}`;
    sets[setName] = {};

    const squarePattern = /\|Square (\d+ [^:]+):\n([^|]+)/g;
    let match;

    while ((match = squarePattern.exec(block)) !== null) {
      const squareName = match[1].trim();
      const items = match[2]
        .split('\n')
        .map(v => v.trim())
        .filter(Boolean);

      sets[setName][squareName] = items;
    }
  });

  return sets;
}

const data = parseSets(rawInput);

let selectedSet = null;
let activeSet = null;
let squareKeys = [];


// Function to generate a random color
function getRandomColor() {
    const letters = '0123456789ABCDEF';
    let color = '#';
    for (let i = 0; i < 6; i++) {
        color += letters[Math.floor(Math.random() * 16)];
    }
    return color;
}

function isEmoji(value) {
  return /\p{Extended_Pictographic}/u.test(value);
}


function generateWords() {
  if (!activeSet) return;

  const gridItems = document.querySelectorAll('.grid-item');
  const squares = data[activeSet];

  gridItems.forEach((item, index) => {
    const squareName = squareKeys[index];
    const list = squares[squareName];
    const value = list[Math.floor(Math.random() * list.length)];

    item.style.backgroundColor = getRandomColor();

    if (isEmoji(value)) {
      item.innerHTML = `<span class="emoji">${value}</span>`;
    } else {
      item.textContent = value;
    }
  });
}

const setNames = Object.keys(data);
let setIndex = -1;

function updateWheel() {
  if (setIndex === -1) {
    document.querySelector('.wheel').textContent = "Select a category.";
    document.getElementById('sectionStart').disabled = true;
  } else {
    selectedSet = setNames[setIndex];
    document.querySelector('.wheel').textContent = selectedSet;
    document.getElementById('sectionStart').disabled = false;
  }
}
updateWheel();

document.getElementById('sectionUp').onclick = () => {
  setIndex = (setIndex - 1 + setNames.length) % setNames.length;
  updateWheel();
};

document.getElementById('sectionDown').onclick = () => {
  setIndex = (setIndex + 1) % setNames.length;
  updateWheel();
};

document.getElementById('sectionStart').onclick = () => {
  activeSet = selectedSet;
  squareKeys = Object.keys(data[activeSet]);
  generateWords();
};





// Attach event listener to generate button
document.getElementById('generateButton').addEventListener('click', generateWords);
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>

(function(){

/* =========================
   RAW INSTRUCTIONS TEXT
========================= */

const RAW_TEXT = `

How to play...

1. Select a set of Word Squares.
3. Click Start to begin.
4. Click the button to change the assortment.
5. Use the images to invent sentences and stories or play other games.

`;


/* =========================
   RAW TEXT PARSER
========================= */

function parseRawInstructions(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const html = [];

  lines.forEach(line => {

    if(line === "---"){
      html.push(`<hr>`);
      return;
    }

    if(/^\d+\./.test(line)){
      html.push(`<p>${line}</p>`);
      return;
    }

    if(!/[.!?:]$/.test(line)){
      html.push(`<h3>${line}</h3>`);
      return;
    }

    html.push(`<p>${line}</p>`);
  });

  return html.join("");
}


/* =========================
   CREATE STYLE
========================= */

const style = document.createElement("style");

style.textContent = `
#instructionsBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 16px;
  background:#2e8b57;
  color:#fff;
  border:none;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,0.6);
  z-index:99998;
}

#instructionsBtn:hover{
  background:#257047;
}

#instructionsRoot{
  position:fixed;
  inset:0;
  display:none;
  z-index:99999;
}

#instructionsBackdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
}

#instructionsModal{
  position:absolute;
  top:25px;
  left:50%;
  transform:translateX(-50%);
  width:min(650px,90vw);
  max-height:90vh;
  background:#fff;

  overflow:hidden;
}

}

#instructionsContent{

}

}

}

}
`;

document.head.appendChild(style);


/* =========================
   CREATE BUTTON
========================= */

const btn = document.createElement("button");
btn.id = "instructionsBtn";
btn.textContent = "Instructions";

document.body.appendChild(btn);


/* =========================
   CREATE MODAL
========================= */

const root = document.createElement("div");
root.id = "instructionsRoot";

root.innerHTML = `
<div id="instructionsBackdrop"></div>

<div id="instructionsModal">

  <div id="instructionsHeader">
    <button id="instructionsBack">вЖР</button>
    <span id="instructionsTitle">Instructions</span>
  </div>

  <div id="instructionsContent">
    ${parseRawInstructions(RAW_TEXT)}
  </div>

</div>
`;

document.body.appendChild(root);


/* =========================
   SCROLL LOCK
========================= */

const modalContent = document.getElementById("instructionsContent");

modalContent.addEventListener("wheel", e=>{
  e.stopPropagation();
},{passive:false});

modalContent.addEventListener("touchmove", e=>{
  e.stopPropagation();
},{passive:false});


/* =========================
   OPEN / CLOSE
========================= */

function openModal(){
  root.style.display="block";
  document.body.style.overflow="hidden";
  document.documentElement.style.overflow="hidden";
}

function closeModal(){
  root.style.display="none";
  document.body.style.overflow="";
  document.documentElement.style.overflow="";
}

btn.onclick = openModal;

document.getElementById("instructionsBack").onclick = closeModal;
document.getElementById("instructionsBackdrop").onclick = closeModal;

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeModal();
});

/* =========================
   DYNAMIC BODY PADDING FOR BUTTON
========================= */

function adjustBodyPadding(){
  const btnHeight = btn.offsetHeight + -25; // include some gap
  document.body.style.paddingBottom = `${btnHeight}px`;
}

// Initial adjustment
adjustBodyPadding();

// Update if window is resized (responsive)
window.addEventListener("resize", adjustBodyPadding);

})();
</script>

<script>
(function() {
  // ================================
  // Editable widths (in pixels)
  // ================================
  const selectorFieldWidth = 150; // width of #sectionWheelContainer
  const startButtonWidth = 92;    // width of #sectionStart

  function adjustSelectorRow() {
    const grid = document.querySelector('.grid-container');
    const formRow = document.querySelector('.formRow');
    const selector = document.getElementById('sectionWheelContainer');
    const startButton = document.getElementById('sectionStart');
    const upButton = document.getElementById('sectionUp');
    const downButton = document.getElementById('sectionDown');

    if (!grid || !formRow || !selector || !startButton || !upButton || !downButton) return;

    // Total width of the grid (3 columns + gaps)
    const gridWidth = grid.getBoundingClientRect().width;

    // Apply editable widths
    selector.style.width = selectorFieldWidth + 'px';
    startButton.style.width = startButtonWidth + 'px';

    // Recalculate formRow width to match the grid exactly
    const gapCount = 3; // up-selector, selector-down, down-start
    const gapSize = parseFloat(getComputedStyle(formRow).gap) || 3;
    const totalGaps = gapCount * gapSize;

    const upWidth = upButton.offsetWidth;
    const downWidth = downButton.offsetWidth;

    const totalRowWidth = upWidth + selectorFieldWidth + downWidth + startButtonWidth + totalGaps;

    formRow.style.width = totalRowWidth + 'px';
  }

  // Run once after page loads
  window.addEventListener('load', adjustSelectorRow);

  // Update on window resize
  window.addEventListener('resize', adjustSelectorRow);
})();
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>
