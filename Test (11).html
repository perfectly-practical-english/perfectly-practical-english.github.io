<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
:root{
  --paper:#e9e9e9;
  --outer:#b28ae8;
  --rule:#3f74ad;
  --red:#b82b2b;

  --pageW:852px;
  --pageH:1200px;

  --row:34px;
  --inputH:150px;

  --leftW:135px;
  --rightW:calc(var(--pageW) - var(--leftW));
}

*{box-sizing:border-box;}

html,body{
  margin:0;
  background:#dff2ff;
}

body{
  display:flex;
  justify-content:center;
}

.frame{
  background:var(--outer);
  padding:8px;
}

.page{
  position:relative;
  width:var(--pageW);
  height:var(--pageH);
  background:var(--paper);
  overflow:hidden;
  font-family:"Comic Sans MS",cursive;
}

/* ================= INPUTS ================= */

.inputBar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:var(--inputH);
  display:flex;
  z-index:20;
  border-bottom:2px solid var(--rule);
}

textarea{
  resize:none;
  font-family:inherit;
  font-size:14px;
  padding:10px 6px 6px 6px;
  border:none;
  outline:none;
  background:var(--paper);
  user-select:text;
  touch-action:auto;
  line-height:1.2;
}

#leftInput{ width:var(--leftW); }
#rightInput{ width:var(--rightW); }

/* ================= GRID ================= */

.lines{
  position:absolute;
  inset:var(--inputH) 0 0 0;

  background:repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent calc(var(--row) - 2px),
    var(--rule) calc(var(--row) - 1px),
    var(--rule) var(--row)
  );
}

.red{
  position:absolute;
  left:var(--leftW);
  top:0;
  bottom:0;
  width:3px;
  background:var(--red);
  z-index:9999;
  pointer-events:none;
  box-shadow:0 0 6px rgba(184,43,43,.4);
}

/* ================= SHEETS ================= */

.sheet{
  position:absolute;
  top:var(--inputH);
  bottom:0;
  display:grid;
  grid-auto-rows:var(--row);
  align-content:start;
}

.leftSheet{
  left:0;
  width:var(--leftW);
  grid-template-columns:var(--leftW);
}

.rightSheet{
  left:var(--leftW);
  width:var(--rightW);
  grid-template-columns:repeat(6,1fr);
}

.cell{
  display:flex;
  align-items:center;
  padding:0 1px;            /* nearly full-width tile */
  white-space:nowrap;
  overflow:hidden;
  user-select:none;
  cursor:pointer;
  border-right:1px solid rgba(0,0,0,.35);
}

.cell.selected{
  background:rgba(90,160,255,.28);
  outline:1px solid rgba(40,100,220,.8);
}

.tile{
  display:flex;
  align-items:center;

  width:100%;               /* fill cell width */
  height:calc(100% - 4px);

  padding:3px 8px;

  border:1px solid #666;
  border-radius:6px;
  background:white;

  cursor:grab;
  user-select:none;

  position:relative;
  top:-1px;                 /* move tile up ~1px */

  overflow:hidden;
}

.visually-hidden{
  display:none !important;
}


.color-Interjections { background:#8f8f8f; color:#ffffff; }          /* pastel gray */
.color-Verbs { background:#ffcccc; color:#333; }          /* pastel red */
.color-Adjectives { background:#d9f7b2; color:#333; }     /* pastel yellow-green */
.color-Adverbs { background:#ffd1dc; color:#333; }        /* pastel pink */
.color-Determiners { background:#c8f7c5; color:#333; }    /* pastel green */
.color-Pronouns { background:#e0c3fc; color:#333; }       /* pastel purple */
.color-Prepositions { background:#ffd8b1; color:#333; }   /* pastel orange */
.color-Conjunctions { background:#cfe8ff; color:#333; }   /* pastel blue */
.color-Interjections { background:#d3d3d3; color:#333; }  /* pastel gray */

</style>
</head>

<body>


<div class="frame">
<div class="page">

<div class="inputBar">
  <textarea id="leftInput"></textarea>
  <textarea id="rightInput"></textarea>
</div>

<div class="lines"></div>
<div class="red"></div>

<div class="sheet leftSheet" id="left"></div>
<div class="sheet rightSheet" id="right"></div>

</div>
</div>

<script>
async function loadData() {

    const txt = await fetch("data.txt").then(r => r.text());

    const sections = {};
    let current = "";

    txt.split(/\r?\n/).forEach(line => {

        if (line.startsWith("~")) {
            current = line.substring(1).trim();
            sections[current] = [];
            return;
        }

        if (current) {
            sections[current].push(line);
        }

    });

    document.getElementById("leftInput").value =
        (sections["Top Left field"] || []).join("\n").trim();

    document.getElementById("rightInput").value =
        (sections["Top Right Field"] || []).join("\n").trim();

    populateLeft(sections["Left Column"] || []);
    populateRight(sections["Right Table"] || []);
}
</script>

<script>
function populateLeft(lines) {

    const sheet = document.getElementById("left");
// DO NOT rebuild DOM structure.
// The DOM already exists from populateRight().
return;
</script>

<script>
function populateRight(lines) {

    const sheet = document.getElementById("right");
    sheet.innerHTML = "";

    let category = "";

    lines.forEach(line => {

        line = line.trim();

        if (!line) return;

        if (line.startsWith("|") && line.endsWith("|")) {
            category = line.slice(1, -1);
            return;
        }

        const cell = document.createElement("div");
        cell.className = "cell";

        const tile = document.createElement("div");
        tile.className = "tile";

        if (category) {
            tile.classList.add("color-" + category);
        }

        tile.textContent = line;

        cell.appendChild(tile);
        sheet.appendChild(cell);

    });

}
</script>

<script>
window.addEventListener("DOMContentLoaded", async () => {
    await loadData();
    buildGrid();
});</script>

<script>
(function(){

const LEFT_ROWS = 31;     // notebook rows
const RIGHT_ROWS = 31;
const RIGHT_COLS = 6;

window.buildGrid = buildGrid;

function buildGrid(){

    buildLeft();
    buildRight();
}

/* ==========================
   LEFT COLUMN
========================== */

function buildLeft(){

    const sheet = document.getElementById("left");

    const tiles = [...sheet.querySelectorAll(".tile")];

    sheet.innerHTML = "";

    for(let r=0;r<LEFT_ROWS;r++){

        const cell = document.createElement("div");
        cell.className = "cell";

        if(tiles[r]){
            cell.appendChild(tiles[r]);
        }

        sheet.appendChild(cell);
    }
}

/* ==========================
   RIGHT GRID
========================== */

function buildRight(){

const sheet = document.getElementById("right");

// only grab tiles that are already in a stable DOM state
const tiles = [...sheet.querySelectorAll(".tile")];

    let index = 0;

    for(let r=0;r<RIGHT_ROWS;r++){

        for(let c=0;c<RIGHT_COLS;c++){

            const cell = document.createElement("div");
            cell.className = "cell";

            if(index < tiles.length){
                cell.appendChild(tiles[index]);
                index++;
            }

            sheet.appendChild(cell);
        }
    }

}

})();
</script>

<script>

/* ==========================================================
   PNG OVERLAY TOOL (FIXED: overlay-based placement)
   Drop in before </body>
========================================================== */

(function(){

/* ==========================================================
   CONFIG
========================================================== */

const PNGS = [
    { label:"Small", file:"1overlay-small.png", width:80 },
    { label:"Large", file:"1overlay-large.png", width:140 },
    { label:"Circle", file:"Circleoverlay.png", width:120 }
];

/* ==========================================================
   CSS
========================================================== */

const style = document.createElement("style");

style.textContent = `
#pngToolbar{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:12px;
    display:flex;
    gap:6px;
    padding:6px;
    background:#333;
    border-radius:6px;
    z-index:2147483647;
    box-shadow:0 2px 10px rgba(0,0,0,.4);
}

#pngToolbar button{
    font-size:12px;
    padding:5px 12px;
    cursor:pointer;
}

#pngToolbar button.selected{
    background:#4a90e2;
    color:white;
}

/* FULL PAGE OVERLAY */
#overlayLayer{
    position:absolute;
    inset:0;
    z-index:99999;
    pointer-events:none; /* OFF by default */
}

/* draggable PNGs */
.overlayPng{
    position:absolute;
    pointer-events:auto;
    cursor:move;
    user-select:none;
    -webkit-user-drag:none;
}
`;

document.head.appendChild(style);

/* ==========================================================
   PAGE CONTAINER
========================================================== */

const page = document.querySelector(".page");
if(!page){
    console.error("No .page found.");
    return;
}

if(getComputedStyle(page).position === "static"){
    page.style.position = "relative";
}

/* ==========================================================
   OVERLAY
========================================================== */

const overlay = document.createElement("div");
overlay.id = "overlayLayer";
page.appendChild(overlay);

/* ==========================================================
   TOOLBAR
========================================================== */

const bar = document.createElement("div");
bar.id = "pngToolbar";
document.body.appendChild(bar);

let placeMode = null;

/* ==========================================================
   ENABLE / DISABLE PLACEMENT MODE
========================================================== */

function setPlaceMode(mode){
    placeMode = mode;

    // highlight button state handled externally
    overlay.style.pointerEvents = mode ? "auto" : "none";
}

/* ==========================================================
   BUTTONS
========================================================== */

PNGS.forEach(item => {
    const b = document.createElement("button");
    b.textContent = item.label;

    b.onclick = () => {
        [...bar.querySelectorAll("button")]
            .forEach(x => x.classList.remove("selected"));

        b.classList.add("selected");
        setPlaceMode(item);
    };

    bar.appendChild(b);
});

/* CLEAR */
const clear = document.createElement("button");
clear.textContent = "Clear";

clear.onclick = () => {
    overlay.innerHTML = "";
};

bar.appendChild(clear);

/* ==========================================================
   PLACEMENT (NOW ON OVERLAY ONLY)
========================================================== */

overlay.addEventListener("pointerdown", function(e){

    if(!placeMode) return;

    const rect = page.getBoundingClientRect();

    const img = document.createElement("img");
    img.className = "overlayPng";
    img.src = placeMode.file;
    img.style.width = placeMode.width + "px";

    img.style.left =
        (e.clientX - rect.left - placeMode.width / 2) + "px";

    img.style.top =
        (e.clientY - rect.top - placeMode.width / 2) + "px";

    overlay.appendChild(img);
    enableDrag(img);

    // EXIT placement mode immediately
    setPlaceMode(null);

    [...bar.querySelectorAll("button")]
        .forEach(x => x.classList.remove("selected"));
});

/* ==========================================================
   DRAGGING
========================================================== */

function enableDrag(el){

    el.addEventListener("pointerdown", function(ev){
        ev.stopPropagation();
        ev.preventDefault();

        const rect = page.getBoundingClientRect();

        const startLeft = parseFloat(el.style.left) || 0;
        const startTop = parseFloat(el.style.top) || 0;

        const offsetX = (ev.clientX - rect.left) - startLeft;
        const offsetY = (ev.clientY - rect.top) - startTop;

        function move(e){
            el.style.left =
                ((e.clientX - rect.left) - offsetX) + "px";

            el.style.top =
                ((e.clientY - rect.top) - offsetY) + "px";
        }

        function up(){
            window.removeEventListener("pointermove", move);
            window.removeEventListener("pointerup", up);
        }

        window.addEventListener("pointermove", move);
        window.addEventListener("pointerup", up);
    });
}

})();

</script>

<script>
(function(){

let selectedTile = null;

/* -----------------------------
   Helpers
----------------------------- */

function getTile(cell){
    return cell.querySelector(".tile");
}

function isEmpty(cell){
    return !getTile(cell);
}

function clearSelection(){

    document
        .querySelectorAll(".tile.selectedTile")
        .forEach(t => t.classList.remove("selectedTile"));

    selectedTile = null;
}

function selectTile(tile){

    clearSelection();

    selectedTile = tile;

    tile.classList.add("selectedTile");
}

function allCells(){

    return document.querySelectorAll(
        "#left .cell, #right .cell"
    );
}

/* -----------------------------
   Style
----------------------------- */

const style = document.createElement("style");

style.textContent = `
.tile.selectedTile{
    outline:3px solid #2d7cff;
    outline-offset:-2px;
}
`;

document.head.appendChild(style);

/* -----------------------------
   Install handlers
----------------------------- */

function install(){

    allCells().forEach(cell=>{

        if(cell.dataset.tileReady) return;

        cell.dataset.tileReady = "1";

        cell.addEventListener("click",function(e){

            const tile = getTile(cell);

            /* CLICKED A TILE */

            if(tile){

                selectTile(tile);

                e.stopPropagation();

                return;
            }

            /* CLICKED EMPTY CELL */

            if(selectedTile){

                cell.appendChild(selectedTile);

                clearSelection();
            }

        });

    });

}

/* -----------------------------
   Observe future tiles
----------------------------- */

const observer = new MutationObserver(install);

observer.observe(document.body,{
    childList:true,
    subtree:true
});

install();

/* -----------------------------
   Click page = deselect
----------------------------- */

document.addEventListener("click",function(e){

    if(
        e.target.closest(".tile")==null
    ){
        clearSelection();
    }

});

})();
</script>

<script>
(function(){

let editingTile = null;
let oldText = "";

/* -----------------------------
   Helpers
----------------------------- */

function allCells(){
    return document.querySelectorAll(
        "#left .cell, #right .cell"
    );
}

function getTile(cell){
    return cell.querySelector(".tile");
}

/* -----------------------------
   Begin editing
----------------------------- */

function editTile(tile){

    if(editingTile) return;

    editingTile = tile;
    oldText = tile.textContent;

    tile.contentEditable = true;
    tile.focus();

    const range = document.createRange();
    range.selectNodeContents(tile);

    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
}

/* -----------------------------
   Finish editing
----------------------------- */

function finishEdit(save){

    if(!editingTile) return;

    if(!save){
        editingTile.textContent = oldText;
    }

    if(editingTile.textContent.trim()===""){
        editingTile.parentNode.removeChild(editingTile);
    }

    editingTile.contentEditable = false;
    editingTile = null;
}

/* -----------------------------
   Install handlers
----------------------------- */

function install(){

    allCells().forEach(cell=>{

        if(cell.dataset.editReady) return;

        cell.dataset.editReady = "1";

        /* DOUBLE CLICK */

        cell.addEventListener("dblclick",function(e){

            let tile = getTile(cell);

            /* Existing tile */

            if(tile){

                editTile(tile);
                e.stopPropagation();
                return;
            }

            /* Empty cell */

            tile = document.createElement("div");
            tile.className = "tile";
            tile.textContent = "";

            cell.appendChild(tile);

            editTile(tile);

        });

    });

}

install();

const observer = new MutationObserver(install);

observer.observe(document.body,{
    childList:true,
    subtree:true
});

/* -----------------------------
   Blur saves
----------------------------- */

document.addEventListener("focusout",function(){

    if(editingTile){
        finishEdit(true);
    }

},true);

/* -----------------------------
   Keyboard
----------------------------- */

document.addEventListener("keydown",function(e){

    /* Editing */

    if(editingTile){

        if(e.key==="Escape"){

            e.preventDefault();
            finishEdit(false);
        }

        return;
    }

    /* Delete selected tile */

    const selected =
        document.querySelector(".tile.selectedTile");

    if(!selected) return;

    if(
        e.key==="Delete" ||
        e.key==="Backspace"
    ){

        e.preventDefault();

        selected.remove();
    }

});

})();
</script>

</body>
</html>
