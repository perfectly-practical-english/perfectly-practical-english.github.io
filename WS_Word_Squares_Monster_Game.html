<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Squares</title>
<style>
    /* ===============================
       Customizable CSS Variables
       =============================== */
    :root {
        --primary-bg-color: #4CAF50;
        --button-bg-color: #4CAF50;
        --button-text-color: white;
        --grid-border-color: #ddd;
        --grid-item-font-size: 70px;
        --title-font-size: 24px;
        --title-color: #333;
        --grid-item-text-color: #000;
        --grid-gap: 10px;
        --grid-item-size: 200px;
        --generate-button-size: 16px;
        --generate-button-padding: 10px 20px;

        --button-hover-bg-color: #45a049;
        --grid-item-hover-bg-color: #f0f0f0;
    }

    /* ===============================
       PAGE LAYOUT (FIXED)
       =============================== */
    body {
        min-height: 100vh;
        margin: 0;

        display: flex;
        flex-direction: column;

        justify-content: flex-start;   /* ✅ no vertical centering */
        align-items: center;

        padding-top: 40px;             /* ✅ moves game area up */

        background: url('https://www.transparenttextures.com/patterns/stonewall.png'), #dcdcdc;
        background-size: cover;
        background-position: center;

        font-family: Arial, sans-serif;
    }

    /* ===============================
       GAME CONTAINER
       =============================== */
    .game-container {
        text-align: center;
        background-color: #333333;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
    }

    /* ===============================
       TITLE
       =============================== */
    h1 {
        font-size: var(--title-font-size);
        color: var(--title-color);
        font-weight: bold;
        margin-top: 0;                 /* ✅ prevents extra top spacing */
    }

    /* ===============================
       GRID
       =============================== */
    .grid-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 20px;
    }

    .grid-item {
        width: var(--grid-item-size);
        height: var(--grid-item-size);

        display: flex;
        align-items: center;
        justify-content: center;

        font-size: 125px;              /* ✅ emojis fill space */
        line-height: 1;

        color: var(--grid-item-text-color);
        background-color: #000000;

        border: 2px solid var(--grid-border-color);
        border-radius: 8px;

        box-shadow:
            inset 1px 1px 5px rgba(0, 0, 0, 0.2),
            0 4px 6px rgba(0, 0, 0, 0.2);

        transition:
            background-color 0.3s ease,
            transform 0.3s ease,
            box-shadow 0.3s ease;

        font-weight: bold;
    }

    .grid-item:hover {
        background-color: var(--grid-item-hover-bg-color);
        transform: scale(1.05);
        box-shadow:
            inset 2px 2px 10px rgba(0, 0, 0, 0.3),
            0 6px 12px rgba(0, 0, 0, 0.3);
    }

    /* ===============================
       BUTTON
       =============================== */
    #generateButton {
        margin-top: 20px;
        padding: var(--generate-button-padding);
        font-size: var(--generate-button-size);

        cursor: pointer;
        background-color: var(--button-bg-color);
        color: var(--button-text-color);

        border: none;
        border-radius: 5px;

        transition: background-color 0.3s ease;
        font-weight: bold;
    }

    #generateButton:hover {
        background-color: var(--button-hover-bg-color);
    }

    /* ===============================
       IMAGES
       =============================== */
    img {
        width: 200px;
        height: 200px;
        object-fit: contain;
    }

    /* ===============================
       FOOTER
       =============================== */
    footer.game-footer,
    footer.game-footer p {
        margin-top: 10px;
        font-size: 8px;
        line-height: 1.1;
        opacity: 0.8;
        color: #b5b5b5;
        text-align: center;
    }

    /* ===============================
       SMALL HEIGHT SAFETY
       =============================== */
    @media (max-height: 700px) {
        body {
            padding-top: 20px;         /* ✅ adaptive lift */
        }
    }
</style>
</head>
<body>

    <div class="game-container">
        <h1>Random Word Cube</h1>
        <div class="grid-container">
            <div class="grid-item" id="cube"></div>
        </div>
        <button id="generateButton">What's next?</button>

    <!-- FOOTER IS NOW INSIDE -->
    <footer class="game-footer">
        <p>&copy; 2026 Perfectly Practical English™. All rights reserved.</p>
    </footer>
</div>

<script>
// Raw input with the <vawof_icon.png> placeholder for the image
const rawInput = `
Square 1 Time:
😄
😟
😠
<vawof_icon.png>
😄
😟
😠
<vawof_icon.png>
😄
😟
😠
<vawof_icon.png>
😄
😟
😠
<vawof_icon.png>
😄
😟
😠
<vawof_icon.png>
😄
😟
😠
<vawof_icon.png>
`;

// Function to parse raw input into an array of square objects
function parseInput(input) {
    const squarePattern = /Square (\d+ [A-Za-z]+):\n([^]+?)(?=Square \d+|$)/g;
    const squareArray = [];
    let match;

    while ((match = squarePattern.exec(input)) !== null) {
        const name = match[1];
        const words = match[2].split('\n').map(word => word.trim()).filter(Boolean); // Trim and remove empty lines
        squareArray.push({ name, words });
    }

    return squareArray;
}

// Convert raw input into the wordSquares array
const wordSquares = parseInput(rawInput);

// Function to generate a random color
function getRandomColor() {
    const letters = '0123456789ABCDEF';
    let color = '#';
    for (let i = 0; i < 6; i++) {
        color += letters[Math.floor(Math.random() * 16)];
    }
    return color;
}

// Function to randomize and assign words to grid while changing background colors
function generateWords() {
    // Get the grid item (only one in this case)
    const cube = document.getElementById('cube');

    // Randomize the background color on every button click
    cube.style.backgroundColor = getRandomColor();

    // Pick a random word from the "Time" square
    const square = wordSquares[0]; // Since we only have one square
    const randomWord = square.words[Math.floor(Math.random() * square.words.length)];

    // Clear current content (remove old images or text)
    cube.innerHTML = ''; // Removes the current content (text or images)

    // Check if the word is <vawof_icon.png> and insert the image
    if (randomWord === '<vawof_icon.png>') {
        const img = document.createElement('img');
        img.src = 'vawof_icon.png'; // Path to your PNG image
        img.alt = 'Image';
        cube.appendChild(img);
    } else {
        cube.textContent = randomWord; // Otherwise, insert the word as text
    }
}

// Attach event listener to generate button
document.getElementById('generateButton').addEventListener('click', generateWords);
</script>
<script>
  // Create a div element for the border
  const borderDiv = document.createElement('div');

  // Style it to be a narrow green border around the whole viewport
  borderDiv.style.position = 'fixed';
  borderDiv.style.inset = '0'; // ✅ replaces top/left + width/height
  borderDiv.style.border = '10px solid #39FF14'; // Green border
  borderDiv.style.boxSizing = 'border-box'; // Important!
  borderDiv.style.zIndex = '9999'; // On top of everything
  borderDiv.style.pointerEvents = 'none'; // Don't block clicks
  borderDiv.style.backgroundColor = 'transparent'; // No fill

// Add it to the body
document.body.appendChild(borderDiv);
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>

(function(){

/* =========================
   RAW INSTRUCTIONS TEXT
========================= */

const RAW_TEXT = `

How to play...

1. Click the button to see emojis appear.
2. If you see the monster, you are "it" or "out" or whatever, according to the game.

`;


/* =========================
   RAW TEXT PARSER
========================= */

function parseRawInstructions(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const html = [];

  lines.forEach(line => {

    if(line === "---"){
      html.push(`<hr>`);
      return;
    }

    if(/^\d+\./.test(line)){
      html.push(`<p>${line}</p>`);
      return;
    }

    if(!/[.!?:]$/.test(line)){
      html.push(`<h3>${line}</h3>`);
      return;
    }

    html.push(`<p>${line}</p>`);
  });

  return html.join("");
}


/* =========================
   CREATE STYLE
========================= */

const style = document.createElement("style");

style.textContent = `
#instructionsBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 16px;
  background:#2e8b57;
  color:#fff;
  border:none;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,0.6);
  z-index:99998;
}

#instructionsBtn:hover{
  background:#257047;
}

#instructionsRoot{
  position:fixed;
  inset:0;
  display:none;
  z-index:99999;
}

#instructionsBackdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
}

#instructionsModal{
  position:absolute;
  top:25px;
  left:50%;
  transform:translateX(-50%);
  width:min(650px,90vw);
  max-height:90vh;
  background:#fff;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#instructionsHeader{
  padding:12px 16px;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  gap:10px;
}

#instructionsTitle{
  color:#1976d2;
  font-weight:600;
  font-size:1.1em;
}

#instructionsBack{
  border:none;
  background:none;
  font-size:20px;
  cursor:pointer;
  color:#1976d2;
  font-weight:600;
}

#instructionsContent{
  padding:2px 18px 18px 18px;
  overflow-y:auto;
  line-height:1.6;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

#instructionsContent::-webkit-scrollbar{
  display:none;
}

#instructionsContent h3{
  color:#1976d2;
  margin:12px 0 4px 0;
  font-weight:600;
}

#instructionsContent p{
  margin:4px 0;
}

#instructionsContent hr{
  margin:12px 0;
}
`;

document.head.appendChild(style);


/* =========================
   CREATE BUTTON
========================= */

const btn = document.createElement("button");
btn.id = "instructionsBtn";
btn.textContent = "Instructions";

document.body.appendChild(btn);


/* =========================
   CREATE MODAL
========================= */

const root = document.createElement("div");
root.id = "instructionsRoot";

root.innerHTML = `
<div id="instructionsBackdrop"></div>

<div id="instructionsModal">

  <div id="instructionsHeader">
    <button id="instructionsBack">←</button>
    <span id="instructionsTitle">Instructions</span>
  </div>

  <div id="instructionsContent">
    ${parseRawInstructions(RAW_TEXT)}
  </div>

</div>
`;

document.body.appendChild(root);


/* =========================
   SCROLL LOCK
========================= */

const modalContent = document.getElementById("instructionsContent");

modalContent.addEventListener("wheel", e=>{
  e.stopPropagation();
},{passive:false});

modalContent.addEventListener("touchmove", e=>{
  e.stopPropagation();
},{passive:false});


/* =========================
   OPEN / CLOSE
========================= */

function openModal(){
  root.style.display="block";
  document.body.style.overflow="hidden";
  document.documentElement.style.overflow="hidden";
}

function closeModal(){
  root.style.display="none";
  document.body.style.overflow="";
  document.documentElement.style.overflow="";
}

btn.onclick = openModal;

document.getElementById("instructionsBack").onclick = closeModal;
document.getElementById("instructionsBackdrop").onclick = closeModal;

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeModal();
});

/* =========================
   DYNAMIC BODY PADDING FOR BUTTON
========================= */

function adjustBodyPadding(){
  const btnHeight = btn.offsetHeight + -25; // include some gap
  document.body.style.paddingBottom = `${btnHeight}px`;
}

// Initial adjustment
adjustBodyPadding();

// Update if window is resized (responsive)
window.addEventListener("resize", adjustBodyPadding);

})();
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>

</body>
</html>
