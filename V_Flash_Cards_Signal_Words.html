<style>
  /* Base */
  body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f7fdfb; }
  #layout { max-width: 480px; margin:0 auto; padding:20px; box-sizing: border-box; }
  h2 { text-align:left; margin-bottom:12px; font-size:20px; }

  .top-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: nowrap; align-items: center; }
  .top-bar input[type="text"] { flex: 1 1 45%; padding: 6px; font-size: 14px; border: 1px solid #9fc8e8; border-radius: 6px; box-sizing: border-box; min-width: 0; }
  .top-bar button { padding: 6px 12px; font-size: 14px; border: none; border-radius: 6px; background: #1976d2; color: #fff; cursor: pointer; }

  .flashcard-container { perspective: 1000px; margin-bottom: 12px; }
  .flashcard { width: 100%; min-height: 100px; background: #eaf6ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transform-style: preserve-3d; transition: transform 0.6s; position: relative; border: 1px solid #9aaed1; box-sizing: border-box; }
  .flashcard.flipped { transform: rotateY(180deg); }
  .flashcard .front, .flashcard .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 12px; padding: 12px; text-align: center; box-sizing: border-box; }

.flashcard .back {
    transform: rotateY(180deg);
    background: #ffeacf;
    font-size: 14px;
    text-align: left;
    align-items: center;        /* horizontal center */
    justify-content: center;    /* vertical center */
    display: flex;
    flex-direction: column;
    padding: 12px 16px;
    overflow-wrap: break-word;
}

  #vocabHeader { font-size: 16px; font-weight: bold; color: white; background: #1976d2; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-bottom: 12px; text-align: center; transition: background 0.3s; }
  #vocabHeader:hover { background: #1565c0; }

  #vocabList { list-style-type: disc; list-style-position: outside; padding-left: 20px; margin:0; }
  #vocabList li { margin-bottom: 6px; font-size: 14px; text-align: left; }

  #exampleInput { width: 100%; padding: 8px; font-size: 14px; border: 1px solid #9aaed1; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box; }

  #navButtons { display: flex; gap: 12px; justify-content: space-between; margin-bottom: 12px; }

  #scoreboard { display: none; border: 2px solid #39FF14; padding: 20px; border-radius: 10px; background: #fff; font-family: monospace; font-size: 14px; max-height: 50vh; overflow-y: auto; box-sizing: border-box; }
  #scoreboard pre { margin: 0; }
  #scoreboard .btn-group { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }

  button { padding: 6px 12px; font-size: 14px; border: none; border-radius: 6px; background: #1976d2; color: white; cursor: pointer; transition: background 0.3s; }
  button:hover { background: #1565c0; }

  @media (max-width: 480px) {
    h2 { font-size: 18px; }
    .flashcard { font-size: 16px; min-height: 90px; }
    #exampleInput { font-size: 13px; padding: 6px; }
    #navButtons button, #scoreboard button { font-size: 13px; padding: 5px 10px; }
    .top-bar input[type="text"] { font-size: 13px; padding: 5px; }
  }


/* Footer styles */
#copyrightSection {
  margin-top: 0px;   /* move it up by 20px */
  text-align: left;    /* flush left text */
  padding: 0;          /* remove centering padding */
  font-size: 8px;
}


/* ===============================
   FORM ROW (shared layout)
   =============================== */

.formRow {
  display: flex;
  flex-direction: row;
  align-items: center;
  flex-wrap: nowrap;        /* 🔒 NEVER stack */
  gap: 6px;
  width: 100%;
  margin-bottom: 10px;
}

/* Buttons in a row */
.formRow > button {
  margin-top: -10px;   /* bump buttons up 3–5px */

  flex: 0 0 38px;
  height: 38px;
  padding: 0;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Selector field behaves like an input */
.formRow > #sectionWheelContainer {
  flex: 1 1 auto;
  min-width: 0;
  height: 38px;
  position: relative;
  background: #fff;
  border: 1px solid #999;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.15);
}

/* BUTTONS */
.sectionBtn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 38px;
  height: 38px;
  font-size: 18px;
  padding: 0;
  line-height: 1;
  z-index: 2;
}

#sectionUp {
  left: -3px;
}

#sectionDown {
  right: -3px;
}


.reading-highlight {
  background: #cce5ff;
  transition: background 0.2s ease;
}

.read-line {
  display: block;
}

#scoreOutput {
  white-space: pre-wrap;      /* keeps line breaks */
  word-break: break-word;     /* breaks long strings */
  overflow-wrap: anywhere;    /* forces wrap if needed */
}

<script>
async function resolveRaw(source) {
  // If it looks like inline content, return it directly
  if (source.includes('\n')) return source.trim();

  // Otherwise, treat it as a filename and fetch it
  const res = await fetch(source);
  if (!res.ok) throw new Error("Failed to load " + source);
  return (await res.text()).trim();
}
</script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// --- Starfield ---
const canvas = document.getElementById('terrainCanvas');
const ctx = canvas.getContext('2d');
canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
const stars = [];
for(let i=0;i<200;i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, z: Math.random()*2+0.5});
function drawStarfield(){
  ctx.fillStyle='black'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let s of stars){
    s.x -= 0.5*s.z;
    if(s.x<0){ s.x=canvas.width; s.y=Math.random()*canvas.height; s.z=Math.random()*2+0.5; }
    ctx.fillStyle='white'; ctx.fillRect(s.x,s.y,s.z,s.z);
  }
  requestAnimationFrame(drawStarfield);
}
drawStarfield();
</script>

<script>
// ✅ Flexible parser: supports both old verbose and simple "word - definition" lines
function parseVocabInput(input) {
  const lines = input.split("\n").map(l => l.trim()).filter(l => l.length > 0);
  const result = [];
  let currentWord = null;
  let currentDef = "";

  lines.forEach(line => {
    // Line starts with bullet → verbose format
    if (/^[•*-]/.test(line)) {
      if (currentWord) result.push({ word: currentWord, definition: currentDef.trim() });
      const match = line.match(/^[•*-]\s*(.+?)\s*(?:–|—|-)\s*(.+)/);
      if (match) { currentWord = match[1].trim(); currentDef = match[2].trim(); }
      else { currentWord = line.replace(/^[•*-]\s*/, ""); currentDef = ""; }
    } 
    // Simple "word - definition" format
 else if (/\s[-–—]\s/.test(line)) {
  if (currentWord) {
    result.push({
      word: currentWord,
      definition: currentDef.trim()
    });
  }

  const match = line.match(/^(.+?)\s[-–—]\s(.+)$/);
  if (match) {
    currentWord = match[1].trim();
    currentDef = match[2].trim();
  }
}

    else { // continuation line
      currentDef = currentDef ? currentDef + "<br/>" + line : line;
    }
  });
  if (currentWord) result.push({ word: currentWord, definition: currentDef.trim() });
  return result;
}

// Example vocab source: old verbose OR simple format
const rawVocabText = `

and, also, too, with, plus, as well as, not only...but also, both...and

• Cause / Effect 🔗 – words that show a reason or result<br>
because, so, since, because of, due to, as a result, therefore, that’s why

• Comparison / Similarity / Difference ⚖️ – words that compare things<br>
like, as, as...as, than, similar to, different from, more than, less than, the most, just as...so, whereas, in contrast to

• Contrast / Opposition 🎭 – words that show differences<br>
but, although, though, even though, however, yet, still, despite, instead, whereas, while, on the other hand

• Frequency 〰️ – words that tell how often something happens<br>
always, usually, often, sometimes, occasionally, rarely, never, every day, once a week, hardly ever, from time to time

• Possibility / Certainty 🎲 – words that show how possible or sure something is<br>
maybe, probably, possibly, must, might, may, could, can, definitely, certainly

• Advice / Obligation / Permission ☝️ – words that tell rules or give guidance<br>
must, must not, have to, don’t have to, should, ought to, had better, can, cannot, may, could

• Manner 🎭 – words that tell how something is done<br>

• Place / Location 📍 – words that tell where something is<br>

• Relative Words 👨‍👩‍👧‍👦 – words that connect ideas about time, place, reason, or manner<br>

• Direction / Movement 🧭 – words that show movement or direction<br>
to, from, toward, away from, up, down, forward, back

• Affirmative and Negative ✔️❌ – words that show yes or no<br>
yes, no

`;

</script>

let vocabPairs = [];


window.addEventListener("sectionchange", (e) => {

<script>
/* =========================================
   HARD SECTION CORPUS OVERRIDE (MC-IMMUNE)
   ========================================= */

(function () {

  // Preserve original full text
  const FULL_TEXT = window.wordListText;

  // Active corpus exposed globally
  window.activeExerciseText = "";

  // 🔥 OVERRIDE wordListText dynamically
  Object.defineProperty(window, "wordListText", {
    get() {
      return window.activeExerciseText || FULL_TEXT;
    },
    set(val) {
      // allow initial assignment only
      window._wordListText = val;
    }
  });

  // Listen for section changes
window.addEventListener("sectionchange", (e) => {
  const sectionText = e.detail?.text || "";

  // Build sentences ONLY from section
  sentences.length = 0;
  allCorrectAnswers.length = 0;

  const lines = sectionText
    .split("\n")
    .map(s => s.trim())
    .filter(Boolean);

  lines.forEach(line => {
    if (!line.includes("|")) return;
    sentences.push(line);

    const matches = line.match(/\|(.+?)\|/g);
    if (matches) {
      matches.forEach(m =>
        allCorrectAnswers.push(m.replace(/\|/g, ""))
      );
    }
  });

  allCorrectAnswers = [...new Set(allCorrectAnswers)];

  // Reset runtime state
  nextSentenceIndex = 0;
  activeSentences.length = 0;
  totalWords = 0;
  correctWords = 0;

  // Clear UI
  mcButtonsContainer.innerHTML = "";
  typedDisplay.textContent = "";

  console.log("✅ Section locked:", e.detail.name);
});

})();

<script>


/* =========================================
   SECTION DIAL — SCROLL + CLICK ONLY
   (SECTION-SCOPED, MC-SAFE, AUTO-TRIGGERING)
   ========================================= */

(function () {

  const ITEM_HEIGHT = 38;

  let sections = [];
  let sectionIndex = 0; // 0 = placeholder

  let offset = 0;
  let startY = 0;
  let dragging = false;
let isProgrammaticSelect = false;


  /* ---------- GLOBAL MC POOL (SECTION ONLY) ---------- */
  window.sectionAnswerPool = [];

  function rebuildMCPool(sectionText) {
    window.sectionAnswerPool = sectionText
      .split("\n")
      .map(line => {
        const m = line.match(/\|([^|]+)\|/);
        return m ? m[1] : null;
      })
      .filter(Boolean);

    // DEBUG — remove later
    console.log("MC pool rebuilt (section only):", window.sectionAnswerPool);
  }

  /* ---------- PARSE SECTIONS (STRICT ~ BOUNDARIES) ---------- */
  function parseSections(raw) {
    const chunks = raw.split(/\n(?=~+)/);

    return chunks
      .map(chunk => chunk.trim())
      .filter(chunk => chunk.startsWith("~"))
      .map(chunk => {
        const lines = chunk.split("\n");
        const name = lines.shift().replace(/^~+/, "").trim();
        const text = lines.join("\n").trim();
        return { name, text };
      });
  }

  const parsedSections = parseSections(window.__RAW_SECTION_TEXT__);


  sections = [
    { name: "Select a category.", text: "" },
    ...parsedSections
  ];

  /* ---------- BUILD UI ---------- */
  const container = document.getElementById("sectionWheelContainer");


// ▲ / ▼ BUTTONS
const btnUp = document.getElementById("sectionUp");
const btnDown = document.getElementById("sectionDown");

btnUp.addEventListener("click", () => {
  selectSection(sectionIndex - 1, true);
});

btnDown.addEventListener("click", () => {
  selectSection(sectionIndex + 1, true);
});
  container.style.cssText = `
    position: relative;
    height: ${ITEM_HEIGHT}px;
    overflow: hidden;
    margin-bottom: 10px;
    touch-action: pan-y;
    cursor: pointer;
  `;

  const wheel = document.createElement("div");
  wheel.style.cssText = `
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    will-change: transform;
  `;

  sections.forEach((sec, index) => {
    const item = document.createElement("div");
    item.textContent = sec.name;
    item.style.cssText = `
      height: ${ITEM_HEIGHT}px;
      line-height: ${ITEM_HEIGHT}px;
      text-align: center;
      font-size: ${index === 0 ? "14px" : "15px"};
      font-style: ${index === 0 ? "italic" : "normal"};
      color: ${index === 0 ? "#999" : "#777"};
      user-select: none;
      white-space: nowrap;
    `;

item.addEventListener("click", () => {
  selectSection(index, true);
});


    wheel.appendChild(item);
  });

  container.appendChild(wheel);

  /* ---------- UPDATE ---------- */
function update() {
  wheel.style.transform = `translateY(${offset}px)`;

  [...wheel.children].forEach((el, i) => {
    if (i === sectionIndex && i !== 0) {
      el.style.color = "#1f5fbf";
      el.style.fontWeight = "700";
    } else {
      el.style.color = i === 0 ? "#999" : "#777";
      el.style.fontWeight = "600";
    }
  });
}
  function fireSectionChange() {
if (sectionIndex === 0) return;

const section = sections[sectionIndex];


    window.sectionSelectionChanged = true;

    // 🔑 BUILD MC POOL HERE
    rebuildMCPool(section.text);

    window.dispatchEvent(new CustomEvent("sectionchange", {
      detail: {
        index: sectionIndex,

        name: section.name,
        text: section.text
      }
    }));
  }

function snap(fireEvent = false) {
  // 🔑 CALCULATE INDEX FROM OFFSET
  const rawIndex = Math.round(-offset / ITEM_HEIGHT);
  sectionIndex = Math.max(1, Math.min(sections.length - 1, rawIndex));

  offset = -sectionIndex * ITEM_HEIGHT;

  wheel.style.transition = "transform 0.15s ease-out";
  update();
  setTimeout(() => wheel.style.transition = "", 150);

  if (fireEvent) {
    fireSectionChange();
  }
}


function selectSection(index, fireEvent = true) {
  sectionIndex = Math.max(1, Math.min(sections.length - 1, index));
  offset = -sectionIndex * ITEM_HEIGHT;
  snap(fireEvent);
}




  /* ---------- DRAG ---------- */
  function start(y) {
    dragging = true;
    startY = y;
  }

  function move(y) {
    if (!dragging) return;
    offset += y - startY;
    startY = y;
    update();
  }

  function end() {
    if (!dragging) return;
    dragging = false;
    snap(true);
  }

  container.addEventListener("mousedown", e => start(e.clientY));
  window.addEventListener("mousemove", e => move(e.clientY));
  window.addEventListener("mouseup", end);

  container.addEventListener("touchstart", e => start(e.touches[0].clientY), { passive: true });
  container.addEventListener("touchmove", e => move(e.touches[0].clientY), { passive: true });
  container.addEventListener("touchend", end);

  /* ---------- MOUSE WHEEL ---------- */
  container.addEventListener("wheel", e => {
    e.preventDefault();
    offset += e.deltaY * -0.3;
    update();
    snap(true);
  }, { passive: false });

  /* ---------- INIT ---------- */
  offset = 0;
  update();




  /* ---------- SECTION SELECTION BRIDGE ---------- */
window.getSelectedSectionText = function () {
  if (sectionIndex === 0) return "";
  return sections[sectionIndex]?.text || "";
};

window.getSelectedSectionIndex = function () {
  return sectionIndex;
};


})();
</script>


<script>

async function loadVocab(source) {
  let text = "";
  // If it looks like a filename (ends with .txt), fetch it
  if (source.trim().endsWith(".txt")) {
    try {
      const res = await fetch(source.trim());
      if (!res.ok) throw new Error("Failed to load file");
      text = await res.text();
    } catch (err) {
      console.error("Error loading vocab file:", err);
      return [];
    }
  } else {
    // Otherwise treat as raw text
    text = source;
  }
  return parseVocabInput(text);
}

// Example usage:
// ❌ Disabled: section selector now controls vocab loading
// loadVocab("vocab.txt").then(pairs => {
//   console.log("Loaded vocab pairs:", pairs);
// });

// Initialize vocabPairs

let studentSentences = [];
let flashcardIndex = 0;


const flashcard = document.getElementById('flashcard');
const front = flashcard.querySelector('.front');
const back = flashcard.querySelector('.back');
const exampleInput = document.getElementById('exampleInput');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const finishBtn = document.getElementById('finishBtn');
const nameEl = document.getElementById('name');
const idEl = document.getElementById('studentId');
const scoreboard = document.getElementById('scoreboard');
const scoreOutput = document.getElementById('scoreOutput');
const vocabList = document.getElementById('vocabList');
const vocabHeader = document.getElementById('vocabHeader');

// Render vocab list
function renderVocabList() {
  vocabList.innerHTML = vocabPairs.map(p =>
    `<li class="read-line">${p.word}: ${p.definition}</li>`
  ).join('');
}
vocabHeader.addEventListener('click', () => {
  vocabList.style.display = vocabList.style.display === 'none' ? 'block' : 'none';
});

// Flashcards
function updateFlashcard() {
  if (!vocabPairs.length) return;

  front.textContent = vocabPairs[flashcardIndex].word;
  back.innerHTML = vocabPairs[flashcardIndex].definition;
  exampleInput.value = studentSentences[flashcardIndex] || '';

  prevBtn.style.display = flashcardIndex === 0 ? "none" : "inline-block";
  nextBtn.textContent =
    flashcardIndex === vocabPairs.length - 1 ? "Finish" : "Next";

  flashcard.classList.remove('flipped');
}


function checkInputs() {
  finishBtn.style.display = 'inline-block';
}

flashcard.addEventListener('click', () => flashcard.classList.toggle('flipped'));
exampleInput.addEventListener('input', () =>
  studentSentences[flashcardIndex] = exampleInput.value.trim()
);

nameEl.addEventListener('input', checkInputs);
idEl.addEventListener('input', checkInputs);

prevBtn.addEventListener('click', () => {
  if (flashcardIndex > 0) {
    flashcardIndex--;
    updateFlashcard();
  }
});
nextBtn.addEventListener('click', () => {
  studentSentences[flashcardIndex] = exampleInput.value.trim();

if (flashcardIndex < vocabPairs.length - 1) {
  flashcardIndex++;
  updateFlashcard();
}

  else { showScoreboard(); }
});
// finishBtn.addEventListener('click', showScoreboard);

function showScoreboard() {
  const name = nameEl.value.trim() || 'Unknown';
  const sid = idEl.value.trim() || 'N/A';
  const now = new Date();

  const formattedDate =
    `${String(now.getDate()).padStart(2,'0')}/` +
    `${String(now.getMonth()+1).padStart(2,'0')}/` +
    `${now.getFullYear()} ` +
    `${String(now.getHours()).padStart(2,'0')}:` +
    `${String(now.getMinutes()).padStart(2,'0')}:` +

<script>
(function () {

  let utterance = null;
  let speaking = false;
  let paused = false;

  const vocabHeader = document.getElementById("vocabHeader");
  const vocabList = document.getElementById("vocabList");

  function stripEmojis(text) {
    return text.replace(/[\p{Emoji}\p{Extended_Pictographic}]/gu, "").trim();
  }

  function getTextToRead() {
    if (vocabList.style.display !== "none") {
      const header = "Vocabulary List. ";
      const items = [...vocabList.querySelectorAll("li")].map(li => stripEmojis(li.innerText)).join(". ");
      return header + items;
    }
    const word = stripEmojis(document.querySelector("#flashcard .front")?.innerText || "");
    const def = stripEmojis(document.querySelector("#flashcard .back")?.innerText || "");
    return `${word}. ${def}`;
  }

  function createUtterance(text) {
    if (!text) return null;
    const u = new SpeechSynthesisUtterance(stripEmojis(text));
u.rate = 0.75;   // 👈 slower speech (default is 1.0)
    u.onend = () => { speaking = false; paused = false; };
    return u;
  }

  function startReading() {
    if (paused) { synth.resume(); paused = false; return; }
    if (!speaking) {
      const text = getTextToRead();
      utterance = createUtterance(text);
      if (!utterance) return;
      synth.speak(utterance);
      speaking = true;
    }
  }

  function togglePause() { if (!speaking) return; paused ? synth.resume() : synth.pause(); paused = !paused; }
  function restartReading() { if (speaking) synth.cancel(); paused = false; speaking = false; startReading(); }
  function stopSpeech() { synth.cancel(); speaking = false; paused = false; }
  window.stopSpeech = stopSpeech;

  function ensureControlsExist() {
    const nav = document.getElementById("navButtons");
    if (!nav) return;
    let controls = document.getElementById("inlineAudioControls");
    if (controls) return controls;

    controls = document.createElement("div");
    controls.id = "inlineAudioControls";
    controls.style.display = "none";
    controls.style.gap = "8px";
    controls.style.marginLeft = "auto";
    controls.style.alignItems = "center";

  { text: "⏸️", title: "Pause/Resume", action: togglePause },
  { text: "▶️", title: "Start", action: startReading }
];

      btn.style.cursor = "pointer";
      btn.addEventListener("click", b.action);
      controls.appendChild(btn);
    });

    nav.appendChild(controls);
    return controls;
  }

  const controls = ensureControlsExist();
  function syncControls() {
    const isOpen = vocabList.style.display !== "none";
    stopSpeech();
    controls.style.display = isOpen ? "flex" : "none";
  }

  const observer = new MutationObserver(syncControls);

})();

<script>
(async function() {
  'use strict';

  // Sanitize filenames for download
  function sanitizeFilename(name) {
    return name.trim()
      .replace(/[\\/:*?"<>|]+/g, '_')
      .replace(/[\r\n]+/g, '_')
      .slice(0, 200) || 'score';
  }

  function downloadBlob(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(a.href);
      a.remove();
    }, 2000);
  }

  async function downloadScoreAsPNG(text, filename) {
    const wrapper = document.createElement('div');
    wrapper.innerHTML = text.replace(/\n/g, '<br>');
    wrapper.style.whiteSpace = 'pre-wrap';
    wrapper.style.fontFamily = 'monospace';
    wrapper.style.padding = '10px';
    wrapper.style.backgroundColor = '#fff';
    wrapper.style.color = '#000';
    document.body.appendChild(wrapper);

    try {
      const canvas = await html2canvas(wrapper, { scale: 2, backgroundColor: '#fff' });
      const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      downloadBlob(blob, filename);
    } catch (err) {
      console.error(err);
      alert('PNG download failed');
    } finally {
      wrapper.remove();
    }
  }

  function hijackButton(button, getScoreText, getFilename, isText) {
    if (!button) return;
    const newBtn = button.cloneNode(true);
    button.parentNode.replaceChild(newBtn, button);

    newBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      e.stopImmediatePropagation();

      const scoreText = getScoreText();
      if (!scoreText) {
        alert('No scoreboard data found. Complete the activity first.');
        return;
      }

      const filename = sanitizeFilename(getFilename());
      if (isText) {
        downloadBlob(new Blob([scoreText], { type: 'text/plain' }), filename + '.txt');
      } else {
        await downloadScoreAsPNG(scoreText, filename + '.png');
      }
    }, true);
  }

  // Scoreboard elements
  const scoreOutput = document.getElementById('scoreOutput');
  const nameEl = document.getElementById('name');

    return `${rawFilename}|${name}|${id}|${dateStr}`;
  };

  const downloadTextBtn = document.getElementById('downloadTextBtn');
  const downloadPngBtn = document.getElementById('downloadPngBtn');

  if (copyBtn) {
    copyBtn.addEventListener('click', () => {
      const text = scoreOutput.textContent.trim();
      if (!text) { alert('No scoreboard data found.'); return; }
      navigator.clipboard.writeText(text).then(() => alert('Copied!'));
    });
  }

  hijackButton(downloadTextBtn, () => scoreOutput.textContent.trim(), getFilename, true);
  hijackButton(downloadPngBtn, () => scoreOutput.textContent.trim(), getFilename, false);

})();

<script>
(function () {
  const synth = window.speechSynthesis;
  const finishBtn = document.getElementById("finishBtn");

  let utterance = null;
  let textNodes = [];
  let currentIndex = 0;
  let state = "idle"; // idle | speaking | paused

  /* =========================
     TEXT SELECTION → NODE MAP
  ========================= */

function getAllReadableNodes() {
  const walker = document.createTreeWalker(
    document.getElementById("readingArea"),
      NodeFilter.SHOW_TEXT,
      {
        acceptNode(node) {
          if (!node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
          if (node.parentElement.closest("script, style, button, input")) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      }
    );

    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);
    return nodes;
  }

  function findStartIndex(selection) {
    if (!selection.anchorNode) return 0;
    return textNodes.findIndex(n => n === selection.anchorNode);
  }

  /* =========================
     HIGHLIGHT + SCROLL
  ========================= */

  let currentHighlight = null;

  function highlightNode(node) {
    if (!node || !node.parentElement) return;

    if (currentHighlight) {
      currentHighlight.style.background = "";
    }

    const el = node.parentElement;
    el.style.background = "#cce5ff"; // light blue
    el.scrollIntoView({ behavior: "smooth", block: "center" });

    currentHighlight = el;
  }

  /* =========================
     SPEECH ENGINE
  ========================= */

  function speakNext() {
    if (currentIndex >= textNodes.length) {
      stop();
      return;
    }

    const node = textNodes[currentIndex];
    const text = node.nodeValue.trim();

    if (!text) {
      currentIndex++;
      speakNext();
      return;
    }

    highlightNode(node);

    utterance = new SpeechSynthesisUtterance(text);

    utterance.onend = () => {
      currentIndex++;
      speakNext();
    };

    synth.speak(utterance);
  }

  function startFromSelection() {
    const selection = window.getSelection();

    if (!selection || selection.isCollapsed) {
      alert("Select a word first.");
      return;
    }

    textNodes = getAllReadableNodes();
    currentIndex = findStartIndex(selection);

    synth.cancel();
    state = "speaking";
    updateButton();

    speakNext();
  }

  function pause() {
    synth.pause();
    state = "paused";
    updateButton();
  }

  function resume() {
    synth.resume();
    state = "speaking";
    updateButton();
  }

  function stop() {
    synth.cancel();
    state = "idle";
    updateButton();

    if (currentHighlight) {
      currentHighlight.style.background = "";
      currentHighlight = null;
    }
  }

  /* =========================
     BUTTON STATE MACHINE
  ========================= */

  function updateButton() {
    if (state === "idle") finishBtn.textContent = "🔊";
    if (state === "speaking") finishBtn.textContent = "⏸️";
    if (state === "paused") finishBtn.textContent = "▶️";
  }

  finishBtn.addEventListener("click", () => {
    if (state === "idle") {
      startFromSelection();
    } else if (state === "speaking") {
      pause();
    } else if (state === "paused") {
      resume();
    }
  });

  /* =========================
     OPTIONAL: STOP ON NEW SELECTION
  ========================= */

  document.addEventListener("selectionchange", () => {
    if (state !== "idle") {
      stop();
    }
  });

  updateButton();
})();
</script>

<script>
(function () {

  /* =========================
     1. PALE BLUE SELECTION STYLE
  ========================= */
  const style = document.createElement("style");
  style.textContent = `
    ::selection {
      background: rgba(140, 190, 255, 0.25); /* very pale blue */
      color: inherit;
    }

    ::-moz-selection {
      background: rgba(140, 190, 255, 0.25);
      color: inherit;
    }

    /* remove tap flash */
    * {
      -webkit-tap-highlight-color: transparent;
    }
  `;
  document.head.appendChild(style);

  /* =========================
     2. WORD SELECTION ON CLICK
  ========================= */

  function selectWord(el, wordIndex) {
    const text = el.textContent;
    const words = text.split(/(\s+)/); // keep spaces

    let charStart = 0;
    let start = 0;
    let end = 0;

    for (let i = 0; i < words.length; i++) {
      const w = words[i];
      const len = w.length;

      if (i === wordIndex) {
        start = charStart;
        end = charStart + len;
        break;
      }

      charStart += len;
    }

    const range = document.createRange();
    const textNode = el.firstChild;

    if (!textNode || textNode.nodeType !== 3) return;

    range.setStart(textNode, start);
    range.setEnd(textNode, end);

    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  /* =========================
     3. ATTACH CLICK HANDLER
  ========================= */

  document.addEventListener("click", function (e) {
    const target = e.target;

    // only operate on plain text elements
    if (!target || target.children.length > 0) return;

    const text = target.textContent;
    if (!text || !text.includes(" ")) return;

    // find clicked word position using caret
    const range = document.caretRangeFromPoint
      ? document.caretRangeFromPoint(e.clientX, e.clientY)
      : null;

    if (!range || !range.startContainer) return;

    const node = range.startContainer;
    if (node.nodeType !== 3) return;

    const words = text.split(/(\s+)/);
    let offset = range.startOffset;

    let charCount = 0;
    let wordIndex = 0;

    for (let i = 0; i < words.length; i++) {
      charCount += words[i].length;
      if (offset <= charCount) {
        wordIndex = i;
        break;
      }
    }

    selectWord(target, wordIndex);
  });

})();
</script>

<script>
(function () {

  /* =========================
     1. EMOJI STRIPPER (ROBUST)
  ========================= */
  function removeEmojis(text) {
    return text
      // modern emoji ranges
      .replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu, "")
      // variation selectors + modifiers
      .replace(/\uFE0F/g, "")
      .replace(/\u200D/g, "")
      .trim();
  }

  /* =========================
     2. WRAP SPEECH SYNTHESIS
  ========================= */

  const originalSpeak = window.speechSynthesis.speak.bind(window.speechSynthesis);

  window.speechSynthesis.speak = function (utterance) {
    if (utterance && utterance.text) {
      utterance.text = removeEmojis(utterance.text);
    }
    return originalSpeak(utterance);
  };

  /* =========================
     3. OPTIONAL SAFETY WRAPPER
     (for direct SpeechSynthesisUtterance usage)
  ========================= */

  window.createCleanUtterance = function (text, options = {}) {
    const clean = removeEmojis(text);
    const u = new SpeechSynthesisUtterance(clean);

    Object.assign(u, options);
    return u;
  };

})();
</script>
