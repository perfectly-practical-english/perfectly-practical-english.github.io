<script>

/**
 * resolveRaw(source)
 * - If source is a filename (single line, no newlines), load it
 * - Otherwise treat source as literal raw text
 */
async function resolveRaw(source) {
  if (typeof source === "string" && !source.includes("\n")) {
    try {
      const res = await fetch(source, { cache: "no-store" });
      if (res.ok) return await res.text();
    } catch {}
  }
  return source;
}

<script>
/* =========================================================
   STANDALONE SECTION VISIBILITY PATCH
   (NO HTML MODIFICATIONS REQUIRED)
   ========================================================= */

(function () {

  /* 🔗 Declare dependencies here (ONE place, declarative) */
  const SECTION_DEPENDENCIES = {
    readingSection: ["#text1"],
    mcSection: ["#mcContainer"],
    fibSection: ["#fibContainer"],
    scrambleSection: ["#scrambleContainer"],
    sequenceSection: ["#sequenceContainer"],

    instructionsSectionReadingSpeaking: [
      "#instructionsContainerReadingSpeaking"
    ],
    instructionsSectionWritingSpeaking: [
      "#instructionsContainerWritingSpeaking"
    ],

    vocabSection: ["#wordTiles", "#definitionTiles"],
    posSection: ["#instructions", "#exercises"]
  };

  function hasContent(el) {
    return el && el.textContent.trim().length > 0;
  }

  function update(sectionId, selectors) {
    const section = document.getElementById(sectionId);
    if (!section) return;

    const visible = selectors.some(sel =>
      hasContent(document.querySelector(sel))
    );

    section.style.display = visible ? "" : "none";
  }

  function observe(sectionId, selectors) {
    selectors.forEach(sel => {
      const target = document.querySelector(sel);
      if (!target) return;

      new MutationObserver(() =>
        update(sectionId, selectors)
      ).observe(target, {
        childList: true,
        subtree: true,
        characterData: true
      });
    });
  }

  function init() {
    Object.entries(SECTION_DEPENDENCIES).forEach(
      ([sectionId, selectors]) => {
        update(sectionId, selectors);
        observe(sectionId, selectors);
      }
    );
  }

  document.addEventListener("DOMContentLoaded", init);
})();
</script>

const lockInputs = false;
const showPlaceholders = true;
const useShuffledPlaceholders = true;

function parseVocabInput(text){
  const lines = text.trim().split('\n');
  const pairs = [];

  // Broad but SAFE emoji range (no Unicode properties)
  const EMOJI_REGEX = /[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu;

  for(let i = 0; i < lines.length; i++){

  }

function applyPlaceholders(){
  if(!showPlaceholders) return;
  const inputs = document.querySelectorAll('.tile-input');

  if(useShuffledPlaceholders){
    // Use first example if available, otherwise main word
    const placeholders = shuffle(
      vocabPairs.map(p => {
        if(p.examples){
          return p.examples.split(',')[0].trim();
        } else {
          return p.word;
        }
      })
    );
    inputs.forEach((i, idx) => i.placeholder = placeholders[idx] || '');
  } else {
    inputs.forEach(i => i.placeholder = 'Type the word...');
  }
}

function shuffle(array){
  const arr = [...array];
  for(let i = arr.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ================= CORE STATE =================
let vocabPairs = [];
let selectedTile = null;
// ==============================================

let currentSectionIndex = 0;

function createVocabTile(index){
  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.dataset.index = index;

  const num = document.createElement('div');
  num.className = 'tile-number';
  num.textContent = index + 1;

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'tile-input';

  tile.append(num, input);

  if(lockInputs){
    input.readOnly = true;
    input.style.color = 'darkgreen';
    input.style.caretColor = 'transparent';
  } else {
    input.addEventListener('input', () => {
      const v = input.value.trim().toLowerCase();
      if(v === ''){
        tile.classList.remove('valid','invalid');
        return;
      }
      const matchesAny = vocabPairs.some(p => p.word.toLowerCase() === v);
      tile.classList.toggle('valid', matchesAny);
      tile.classList.toggle('invalid', !matchesAny);
    });
  }

  tile.addEventListener('click', ev => handleTileClick(tile, ev));
  return tile;
}

// ===== TILE REORDER LOGIC =====
function handleTileClick(tile, event){
  if(event.target.tagName === 'INPUT') return;

  if(!selectedTile){
    selectedTile = tile;
    tile.classList.add('selected-tile');
    return;
  }

  if(selectedTile === tile){
    tile.classList.remove('selected-tile');
    selectedTile = null;
    return;
  }

  const parent = tile.parentNode;
  const tiles = Array.from(parent.children);
  const a = tiles.indexOf(selectedTile);
  const b = tiles.indexOf(tile);

  parent.insertBefore(
    selectedTile,
    a < b ? tile.nextSibling : tile
  );

  selectedTile.classList.remove('selected-tile');
  selectedTile = null;
}

  vocabPairs.forEach((p, i) => {

      wordCol.children[i].classList.add('invalid');

const total = vocabPairs.length;
const percent = total === 0 ? 0 : Math.round((score / total) * 100);

document.getElementById('vocabScoreOutput').textContent =
  `${file}|Vocabulary|${name}|${id}|${dt}|${score}/${total}|${percent}%`;
  document.getElementById('vocabScoreboard').style.display = 'block';
}

function parseSections(raw) {
  const chunks = raw
    .split(/\n(?=~+)/)
    .map(c => c.trim())
    .filter(c => c.startsWith("~"));

  return chunks.map(chunk => {
    const lines = chunk.split("\n");
    const name = lines.shift().replace(/^~+/, "").trim();
    const text = lines.join("\n").trim();
    return { name, text };
  });
}

function detectSectionType(sectionText) {
  if (/<br>/.test(sectionText)) return "signal";
  if (sectionText.includes("•")) return "vocab";
  return "unknown";
}





// ===== SAFE INIT =====

const sectionData = sections.map(sec => ({

// ===== SECTION WHEEL DISPLAY =====
const wheel = document.querySelector('.wheel');
let currentSectionIndex = null; // start with no selection

function updateWheel() {
  if (currentSectionIndex === null) {
    wheel.textContent = "Select a category."; // placeholder text
    document.getElementById('sectionStart').disabled = true;
  } else {
    wheel.textContent = sectionData[currentSectionIndex].name;
    document.getElementById('sectionStart').disabled =
      sectionData[currentSectionIndex].pairs.length === 0;
  }
}

// Initial display
updateWheel();

// ===== SECTION NAVIGATION BUTTONS =====
document.getElementById('sectionUp').addEventListener('click', () => {
  if (currentSectionIndex === null) currentSectionIndex = 0;
  else currentSectionIndex =
    (currentSectionIndex - 1 + sectionData.length) % sectionData.length;

});

document.getElementById('sectionDown').addEventListener('click', () => {
  if (currentSectionIndex === null) currentSectionIndex = 0;
  else currentSectionIndex =
    (currentSectionIndex + 1) % sectionData.length;
  updateWheel();
});
  // ===== SECTION START BUTTON =====
document.getElementById('sectionStart').addEventListener('click', () => {
  const activeSection = sectionData[currentSectionIndex];

  vocabPairs = activeSection.pairs;

  setupVocabGame();

  // show the vocab board only now

if (board) board.classList.add('active');

  document.getElementById('sectionStart').disabled = true;
});



});

<script>
document.addEventListener('DOMContentLoaded', () => {

  /* ========= MINIMUM REQUIREMENTS ========= */

  const MIN_CHARS = 50;
  const MIN_END_PUNCT = 3;

  function meetsMinimums() {
    const text = Array.from(
      document.querySelectorAll('[id^="writingInput_"]')
    ).map(ta => ta.value).join('\n');

    const chars = text.length;
    const punct = (text.match(/[.!?]/g) || []).length;

    return chars >= MIN_CHARS && punct >= MIN_END_PUNCT;
  }

  /* ========= SPACING / ALIGN HELPERS ========= */

  function applySpacing(el) {
    el.style.marginTop = '5px';
    el.style.marginBottom = '5px';
  }

  function flushLeft(el) {
    el.style.textAlign = 'left';
  }

  /* ========= RAW PROMPT TEXT ========= */

  const rawGhostWriting = `
|Ghost Writing Instructions: Read carefully.|

[Prompt]
Write a short ghostwritten paragraph in first person.

[Extra]
Stay in character. Do not mention names.

[Prompt]
Rewrite the paragraph in third person.

[Extra]
Change sentence structure. Avoid repetition.

[Prompt]
Add a concluding paragraph.
`;

  /* ========= PARSER ========= */

  function parseRaw(raw) {
    const blocks = raw.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);
    const parsed = { header: null, prompts: [] };
    let current = null;

    blocks.forEach(b => {
      if (b.startsWith('|') && b.endsWith('|')) {
        parsed.header = b.slice(1, -1);
      } else if (b.startsWith('[Prompt]')) {
        current = { text: b.replace('[Prompt]', '').trim(), extra: null };
        parsed.prompts.push(current);
      } else if (b.startsWith('[Extra]') && current) {
        current.extra = b.replace('[Extra]', '').trim();
      }
    });

    return parsed;
  }

  const parsed = parseRaw(rawGhostWriting);

  /* ========= TARGET STRUCTURE ========= */

  const section = document.getElementById('writingSectionGhostWriting');
  const inlineInputs = section.querySelector('.inline-inputs');
  applySpacing(inlineInputs);

  const oldWrapper = section.querySelector('.textarea-wrapper');
  if (oldWrapper) oldWrapper.remove();

  const insertPoint = inlineInputs.nextSibling;

  /* ========= HEADER INSTRUCTIONS ========= */

  if (parsed.header) {
    const instr = document.createElement('div');
    instr.className = 'instructions';
    instr.textContent = parsed.header;
    flushLeft(instr);
    applySpacing(instr);
    section.insertBefore(instr, insertPoint);
  }

  /* ========= PROMPTS + INPUTS ========= */

  let submitted = false;

  parsed.prompts.forEach((prompt, i) => {

    const h3 = document.createElement('h3');
    h3.textContent = prompt.text;
    flushLeft(h3);
    applySpacing(h3);
    section.insertBefore(h3, insertPoint);

    if (prompt.extra) {
      const extra = document.createElement('div');
      extra.className = 'instructions extra-text';
      extra.textContent = prompt.extra;
      flushLeft(extra);
      applySpacing(extra);
      section.insertBefore(extra, insertPoint);
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'textarea-wrapper';
    applySpacing(wrapper);

    const ta = document.createElement('textarea');
    ta.id = `writingInput_${i + 1}`;
    ta.placeholder = 'Start writing here...';
    ta.style.userSelect = 'text';

    wrapper.appendChild(ta);

    const counter = document.createElement('div');
    counter.className = 'counter';
    counter.textContent = '0 characters | ~0 sentences';
    wrapper.appendChild(counter);

    ta.addEventListener('input', () => {
      const text = ta.value;
      const chars = text.length;
      const sentences = (text.match(/[.!?]+/g) || []).length;
      counter.textContent = `${chars} characters | ~${sentences} sentences`;

      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';

      if (submitted) buildScoreboard();
    });

    section.insertBefore(wrapper, insertPoint);
  });

  /* ========= SUBMIT ENABLE ========= */

  const nameInput = document.getElementById('writingName');
  const idInput   = document.getElementById('writingId');
  const submitBtn = document.getElementById('writingSubmitBtn');

  function updateSubmitState() {
    submitBtn.disabled = !(nameInput.value.trim() && idInput.value.trim());
  }

  nameInput.addEventListener('input', updateSubmitState);
  idInput.addEventListener('input', updateSubmitState);
  updateSubmitState();

  /* ========= SCOREBOARD ========= */

  const scoreOutput = document.getElementById('writingScoreOutput');
  const scoreboard  = document.getElementById('writingScoreboard');

  function buildScoreboard() {
    const filename = window.location.pathname.split('/').pop();
    const nm = nameInput.value.trim();
    const id = idInput.value.trim();

    const dateStr = new Date().toLocaleString('en-GB', {
      day: '2-digit',
      month: '2-digit',
      year: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: false
    });

    const paragraphs = Array.from(
      section.querySelectorAll('[id^="writingInput_"]')
    )
    .map(ta => ta.value.trim())
    .filter(Boolean);

    const bodyText = paragraphs.join('\n\n');
    const chars = bodyText.length;
    const sentences = (bodyText.match(/[.!?]+/g) || []).length;

    scoreOutput.textContent =
`${filename}|Section: Writing|Name: ${nm}|ID: ${id}|Date: ${dateStr}|Characters: ${chars}|~Sentences: ${sentences}

${bodyText}`;
  }

  /* ========= SUBMIT (WITH WARNING ONLY) ========= */

  submitBtn.addEventListener('click', () => {

    if (!meetsMinimums()) {
      alert(
        `Minimum requirements not met:\n` +
        `• At least ${MIN_CHARS} characters\n` +
        `• At least ${MIN_END_PUNCT} end punctuation marks (. ! ?)`
      );
      return;
    }

    submitted = true;
    buildScoreboard();
    scoreboard.style.display = 'block';
    submitBtn.disabled = true;
  });

  /* ========= COPY ========= */

  document.getElementById('writingCopyBtn').addEventListener('click', async () => {
    await navigator.clipboard.writeText(scoreOutput.textContent);
  });

<script>
/* =========================
   Buttons
========================= */
const highlightBtn = document.getElementById('highlightSelected');
const copyBtn = document.getElementById('copySelected');
const restartBtn = document.getElementById('restartBtn');
const pauseResumeBtn = document.getElementById('pauseResumeBtn');
const startBtn = document.getElementById('startBtn');

/* =========================
   State & Voices
========================= */
let isPaused = false;
let teacherVoice = null;
let studentVoice = null;

/* =========================
   Load voices (teacher = Zira/Samantha/US Female, student = Aria/Victoria/UK Female)
========================= */
function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;

  // Teacher: en-US Zira (Windows), Google US English Female (Chrome), Samantha (Mac)
  teacherVoice =
    voices.find(v => v.name === "Microsoft Zira" && v.lang === "en-US") ||
    voices.find(v => v.name === "Google US English Female") ||
    voices.find(v => v.name === "Samantha") ||
    voices.find(v => v.lang.startsWith("en") && v.name.toLowerCase().includes("female")) ||
    voices[0];

  // Student: en-GB Aria (Windows), Google UK English (Chrome), Victoria (Mac)
  studentVoice =
    voices.find(v => v.name === "Microsoft Aria" && v.lang === "en-GB") ||
    voices.find(v => v.name === "Google UK English") ||
    voices.find(v => v.name === "Victoria") ||
    voices.find(v => v.lang.startsWith("en") && v.name.toLowerCase().includes("female")) ||
    voices[0];
}

// Load voices dynamically
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

/* =========================
   Selection helpers
========================= */
function getSelectedText() {
  return window.getSelection().toString().trim();
}

function getReadableFromCaret() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;

  const range = sel.getRangeAt(0);

  let node = range.startContainer;
  if (node.nodeType === 3) node = node.parentElement;

  const block = node.closest('p, div, li, article, section');
  if (!block) return null;

  const subRange = document.createRange();
  subRange.selectNodeContents(block);
  subRange.setStart(range.startContainer, range.startOffset);

  const text = subRange.toString().trim();
  return text || null; // return null only if empty
}


/* =========================
   Highlight toggle
========================= */
highlightBtn.addEventListener('click', () => {
  const selection = window.getSelection();
  if (!selection.rangeCount) return;

  const range = selection.getRangeAt(0);
  if (range.collapsed) return;

  let alreadyHighlighted = false;
  const spans = range.commonAncestorContainer.querySelectorAll
    ? range.commonAncestorContainer.querySelectorAll('span.highlighted')
    : [];

  spans.forEach(span => {
    if (selection.containsNode(span, true)) {
      alreadyHighlighted = true;
    }
  });

  if (!alreadyHighlighted) {
    const span = document.createElement('span');
    span.className = 'highlighted';
    range.surroundContents(span);
  } else {
    const contents = range.cloneContents();
    const frag = document.createDocumentFragment();

    Array.from(contents.childNodes).forEach(node => {
      if (node.nodeType === 1 && node.classList.contains('highlighted')) {
        while (node.firstChild) frag.appendChild(node.firstChild);
      } else {
        frag.appendChild(node.cloneNode(true));
      }
    });

    range.deleteContents();
    range.insertNode(frag);
  }

  selection.removeAllRanges();
  selection.addRange(range);
});

/* =========================
   Copy selected text
========================= */
copyBtn.addEventListener('click', async () => {
  const text = getSelectedText();
  if (!text) return alert('No text selected');

  try {
    await navigator.clipboard.writeText(text);
    alert('Copied to clipboard!');
  } catch (err) {
    alert('Copy failed');
  }
});

/* =========================
   Speech functions
========================= */
function speakTeacher(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.voice = teacherVoice;
  u.rate = 0.88;    // slightly slower, more mature
  u.pitch = 1.15;   // slightly lower for adult warmth
  u.volume = 0.95;
  u.text = text.replace(/([,.!?])/g, "$1 "); // slight pause after punctuation
  speechSynthesis.speak(u);
}


function speakStudent(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.voice = studentVoice;
  u.rate = 0.98;
  u.pitch = 1.50;
  u.volume = 0.80;
  speechSynthesis.speak(u);
}


function speakDialog(text) {
  const lines = text.split(/\n+/).map(l => l.trim()).filter(Boolean);

  lines.forEach(line => {
    if (/^teacher:/i.test(line)) {
      speakTeacher(line.replace(/^teacher:\s*/i, ""));
    } else if (/^student:/i.test(line)) {
      speakStudent(line.replace(/^student:\s*/i, ""));
    } else {
      speakTeacher(line);
    }
  });
}

/* =========================
   START
========================= */
startBtn.addEventListener('click', () => {
  speechSynthesis.cancel();
  isPaused = false;
  pauseResumeBtn.textContent = '⏸';

  const selectedText = getSelectedText();
  if (selectedText) {
    speakStudent(selectedText);
    return;
  }

  const caretText = getReadableFromCaret();
  if (!caretText) {
    alert("Place the cursor inside readable text.");
    return;
  }

  speakDialog(caretText);
});

/* =========================
   Pause / Resume
========================= */
pauseResumeBtn.addEventListener('click', () => {
  if (!speechSynthesis.speaking) return;

  if (!isPaused) {
    speechSynthesis.pause();
    isPaused = true;
    pauseResumeBtn.textContent = '▶';
  } else {
    speechSynthesis.resume();
    isPaused = false;
    pauseResumeBtn.textContent = '⏸';
  }
});

/* =========================
   Restart
========================= */
restartBtn.addEventListener('click', () => {
  speechSynthesis.cancel();
  isPaused = false;
  pauseResumeBtn.textContent = '⏸';
  startBtn.click();
});
</script>

<script>
// ---------------------- UNIVERSAL PIPE-BASED FEEDBACK ----------------------
document.addEventListener("DOMContentLoaded", () => {

  // --- Web Audio context ---
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioContext();

  function playCorrect() {
    audioCtx.resume().then(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    });
  }

  function playWrong() {
    audioCtx.resume().then(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(450, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.25);
      gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    });
  }

  // --- normalize strings for comparison ---
  function normalize(str) {
    return str.trim().toLowerCase().replace(/\s+/g, ' ');
  }

  // --- feedback for multiple-choice (radio/checkbox) ---
  function handleSelection(exercise, selectedValues) {
    const correct = exercise.dataset.correct.split('|').map(normalize);
    let isCorrect;

    if (exercise.querySelectorAll('input[type="checkbox"]').length > 0) {
      // Checkbox / multi-select: all selected must match all correct
      const normalizedSelected = selectedValues.map(normalize).sort();
      isCorrect = normalizedSelected.join('|') === correct.sort().join('|');
    } else {
      // Single choice or fill-in-the-blank
      isCorrect = normalize(selectedValues[0]) === correct[0];
    }

    // Remove old emoji
    exercise.querySelectorAll('.mc-emoji').forEach(span => span.remove());

    // Add emoji for radio/checkbox labels
    exercise.querySelectorAll('input').forEach(input => {
      const lbl = input.closest('label');
      if (!lbl) return;

      const inputValue = normalize(input.value || input.value);
      const span = document.createElement('span');
      span.className = 'mc-emoji';
      span.style.marginLeft = "8px";
      if (input.checked) span.textContent = isCorrect ? "😊" : "😢";
      else span.textContent = '';
      lbl.appendChild(span);
    });

    // Play sound
    if (isCorrect) playCorrect();
    else playWrong();
  }

  // --- universal event listener ---
  document.body.addEventListener('change', e => {
    const input = e.target;
    const exercise = input.closest('.exercise');
    if (!exercise) return;

    if (input.type === 'radio' || input.type === 'checkbox') {
      const selected = Array.from(exercise.querySelectorAll('input:checked')).map(inp => inp.value);
      handleSelection(exercise, selected);
    } else if (input.tagName === 'INPUT' || input.tagName === 'TEXTAREA') {
      // For FIB / text input: compare value
      handleSelection(exercise, [input.value]);
    }
  });

  console.log("✅ Universal pipe-based emoji + audio feedback initialized.");
});
</script>

  background:none;
  font-size:20px;
  cursor:pointer;
  color:#1976d2;
  font-weight:600;
}

#instructionsContent{
  padding:2px 18px 18px 18px;
  overflow-y:auto;
  line-height:1.6;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

#instructionsContent::-webkit-scrollbar{
  display:none;
}

#instructionsContent h3{
  color:#1976d2;
  margin:12px 0 4px 0;
  font-weight:600;
}

#instructionsContent p{
  margin:4px 0;
}

#instructionsContent hr{
  margin:12px 0;
}
`;

document.head.appendChild(style);


/* =========================
   CREATE BUTTON
========================= */

const btn = document.createElement("button");
btn.id = "instructionsBtn";
btn.textContent = "Instructions";

document.body.appendChild(btn);


/* =========================
   CREATE MODAL
========================= */

const root = document.createElement("div");
root.id = "instructionsRoot";

root.innerHTML = `
<div id="instructionsBackdrop"></div>

<div id="instructionsModal">

  <div id="instructionsHeader">
    <button id="instructionsBack">←</button>
    <span id="instructionsTitle">Instructions</span>
  </div>

  <div id="instructionsContent">
    ${parseRawInstructions(RAW_TEXT)}
  </div>

</div>
`;

document.body.appendChild(root);


/* =========================
   SCROLL LOCK
========================= */

const modalContent = document.getElementById("instructionsContent");

modalContent.addEventListener("wheel", e=>{
  e.stopPropagation();
},{passive:false});

modalContent.addEventListener("touchmove", e=>{
  e.stopPropagation();
},{passive:false});


/* =========================
   OPEN / CLOSE
========================= */

function openModal(){
  root.style.display="block";
  document.body.style.overflow="hidden";
  document.documentElement.style.overflow="hidden";
}

function closeModal(){
  root.style.display="none";
  document.body.style.overflow="";
  document.documentElement.style.overflow="";
}

btn.onclick = openModal;

document.getElementById("instructionsBack").onclick = closeModal;
document.getElementById("instructionsBackdrop").onclick = closeModal;

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeModal();
});

/* =========================
   DYNAMIC BODY PADDING FOR BUTTON
========================= */

function adjustBodyPadding(){
  const btnHeight = btn.offsetHeight + -25; // include some gap
  document.body.style.paddingBottom = `${btnHeight}px`;
}

// Initial adjustment
adjustBodyPadding();

// Update if window is resized (responsive)
window.addEventListener("resize", adjustBodyPadding);

})();
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>

</body>
</html>
