<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Break Time</title>

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: sans-serif;
    overflow: hidden;
    color: white;
  }

  /* Center overlay */
  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
  }

  h1 {
    font-size: 60px;
    margin: 0;
    color: white;
    text-shadow: 0 0 30px black, 0 0 60px black;
  }

  #timer {
    font-size: 40px;
    margin-top: 20px;
    color: orange;
    text-shadow: 0 0 20px black;
  }

  button {
    margin-top: 40px;
    padding: 10px 20px;
    font-size: 18px;
    background: orange;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
  }

  button:hover {
    background: #ffb347;
  }
</style>
</head>

<body>

<div class="overlay">
  <h1>☕ Break Time</h1>
  <div id="timer">5:00</div>
  <button onclick="startBreak()">Start / Restart</button>
</div>

<script>
let interval = null;
let remaining = 300;

function render() {
  const m = Math.floor(remaining / 60);
  const s = String(remaining % 60).padStart(2, '0');
  document.getElementById("timer").textContent = `${m}:${s}`;
}

function startBreak(duration = 300) {
  clearInterval(interval);

  remaining = duration;
  render();

  interval = setInterval(() => {
    remaining--;
    render();

    if (remaining <= 0) {
      clearInterval(interval);
      interval = null;
      document.getElementById("timer").textContent = "Time's up!";
    }
  }, 1000);
}

// auto-start on load
window.onload = () => startBreak();
</script>

</body>
</html>
