<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaleidoscope</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #111;
  overflow: hidden;
  font-family: sans-serif;
}
canvas { display: block; }

#centerHotspot {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 150px;
  height: 150px;
  transform: translate(-50%, -50%);
  cursor: pointer;
  z-index: 20;
}

/* CONTROL PANEL SLIDE-OUT */


#controls {
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  width: 250px;
background: rgba(20, 20, 20, 0.7);  color: white;
  padding: 25px 20px; /* more breathing room from green border */
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 15px;
  transition: transform 0.3s ease-in-out;
  transform: translateX(-100%);
  font-size: 0.9em;
  z-index: 9999;
  overflow-y: auto;
}

#controls.visible { transform: translateX(0); }

#controls .closeBtn {
  position: absolute;
  top: 15px; /* moved down */
  right: 10px;
  cursor: pointer;
  font-weight: bold;
  font-size: 1.2em;
}

.control-group label {
  margin-left: 0; /* flush with checkbox left edge */
}

input[type=range] {
  width: 100%; /* full width respecting panel padding */
}


input[type=range] {
  width: 100%; /* full width inside padded panel */
  margin-left: 0; /* flush with label left edge */
  box-sizing: border-box;
}


.checkbox-group {
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* 2 items per row */
  gap: 6px 12px; /* vertical and horizontal gaps */
  align-items: start;
}
</style>
</head>
<body>

<canvas id="kaleidoscope"></canvas>
<div id="centerHotspot"></div>

<div id="controls">
  <div class="closeBtn" id="closeControls">×</div>

  <div class="control-group">
    <label for="slices">Slices: <span class="value-display" id="slicesValue">6</span></label>
    <input type="range" id="slices" min="2" max="12" value="6">
  </div>

  <div class="control-group">
    <label for="speed">Speed: <span class="value-display" id="speedValue">0.0003</span></label>
    <input type="range" id="speed" min="0" max="0.02" step="0.001" value="0.0003">
  </div>

  <div class="control-group">
    <label for="size">Bead Size: <span class="value-display" id="sizeValue">8</span></label>
    <input type="range" id="size" min="2" max="50" value="8">
  </div>

  <div class="control-group">
    <label for="density">Density: <span class="value-display" id="densityValue">60</span></label>
    <input type="range" id="density" min="5" max="200" value="60">
  </div>

  <div class="control-group">
    <label for="zoom">Zoom: <span class="value-display" id="zoomValue">1</span></label>
    <input type="range" id="zoom" min="0.5" max="3" step="0.01" value="1.75">
  </div>

  <div class="control-group">
    <label>Shapes:</label>
    <div class="checkbox-group">
      <label><input type="checkbox" class="shapeOption" value="circle" checked> Circle</label>
      <label><input type="checkbox" class="shapeOption" value="triangle" checked> Triangle</label>
      <label><input type="checkbox" class="shapeOption" value="square"> Square</label>
      <label><input type="checkbox" class="shapeOption" value="irregular"> Sparkles</label>
    </div>
  </div>

  <div class="control-group">
    <label>Palette:</label>
    <div class="checkbox-group">
      <label><input type="checkbox" class="paletteOption" value="rainbow" checked> Rainbow</label>
      <label><input type="checkbox" class="paletteOption" value="warm"> Warm</label>
      <label><input type="checkbox" class="paletteOption" value="cool"> Cool</label>
      <label><input type="checkbox" class="paletteOption" value="pastel"> Pastel</label>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('kaleidoscope');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;
let cx = w / 2, cy = h / 2;

const hotspot = document.getElementById('centerHotspot');
const controls = document.getElementById('controls');
const closeBtn = document.getElementById('closeControls');

hotspot.addEventListener('click', () => controls.classList.toggle('visible'));
closeBtn.addEventListener('click', () => controls.classList.remove('visible'));

let slices = +document.getElementById('slices').value;
let speed = +document.getElementById('speed').value;
let beadSize = +document.getElementById('size').value;
let density = +document.getElementById('density').value;
let zoom = +document.getElementById('zoom').value;

const slicesValue = document.getElementById('slicesValue');
const speedValue = document.getElementById('speedValue');
const sizeValue = document.getElementById('sizeValue');
const densityValue = document.getElementById('densityValue');
const zoomValue = document.getElementById('zoomValue');

document.getElementById('slices').addEventListener('input', e => {
  slices = +e.target.value;
  slicesValue.textContent = slices;
  generateBeads();
});
document.getElementById('speed').addEventListener('input', e => {
  speed = +e.target.value;
  speedValue.textContent = speed.toFixed(4);
});
document.getElementById('size').addEventListener('input', e => {
  beadSize = +e.target.value;
  sizeValue.textContent = beadSize;
  generateBeads();
});
document.getElementById('density').addEventListener('input', e => {
  density = +e.target.value;
  densityValue.textContent = density;
  generateBeads();
});
document.getElementById('zoom').addEventListener('input', e => {
  zoom = +e.target.value;
  zoomValue.textContent = zoom.toFixed(2);
});

function getSelectedShapes() {
  return Array.from(document.querySelectorAll('.shapeOption'))
    .filter(cb => cb.checked)
    .map(cb => cb.value);
}

function getSelectedPalettes() {
  return Array.from(document.querySelectorAll('.paletteOption'))
    .filter(cb => cb.checked)
    .map(cb => cb.value);
}

document.querySelectorAll('.shapeOption').forEach(cb => cb.addEventListener('change', generateBeads));
document.querySelectorAll('.paletteOption').forEach(cb => cb.addEventListener('change', generateBeads));

const palettes = {
  rainbow: ['#ff0000','#ff7f00','#ffff00','#00ff00','#0000ff','#4b0082','#9400d3'],
  warm: ['#ff4500','#ff8c00','#ffd700','#ff6347','#ff69b4'],
  cool: ['#00ffff','#1e90ff','#4169e1','#00fa9a','#40e0d0'],
  pastel: ['#ffb3ba','#ffdfba','#ffffba','#baffc9','#bae1ff']
};

function randomPaletteColor() {
  const selected = getSelectedPalettes();
  const pool = selected.length ? selected.flatMap(p => palettes[p]) : palettes.rainbow;
  return pool[Math.floor(Math.random() * pool.length)];
}

let beads = [];
function generateBeads() {
  const shapes = getSelectedShapes();
  beads = [];
  for (let i = 0; i < density; i++) {
    const radius = Math.random() * beadSize + 2;
    const r = Math.random() * Math.min(w, h) / 2;
    const theta = Math.random() * 2 * Math.PI / slices;
    beads.push({
      r,
      theta,
      radius,
      speed: Math.random() * 0.01,
      color: randomPaletteColor(),
      angleOffset: Math.random() * 2 * Math.PI,
      shape: shapes[Math.floor(Math.random() * shapes.length)],
      alpha: 0.2 + Math.random() * 0.3
    });
  }
}
generateBeads();

function drawBead(b) {
  const x = b.r * Math.cos(b.theta + b.angleOffset);
  const y = b.r * Math.sin(b.theta + b.angleOffset);
  ctx.save();
  ctx.globalAlpha = b.alpha;
  switch (b.shape) {
    case 'circle':
      ctx.beginPath();
      ctx.arc(x, y, b.radius, 0, Math.PI * 2);
      ctx.fillStyle = b.color;
      ctx.fill();
      break;
    case 'triangle':
      ctx.beginPath();
      ctx.moveTo(x, y - b.radius);
      ctx.lineTo(x + b.radius, y + b.radius);
      ctx.lineTo(x - b.radius, y + b.radius);
      ctx.closePath();
      ctx.fillStyle = b.color;
      ctx.fill();
      break;
    case 'square':
      ctx.fillStyle = b.color;
      ctx.fillRect(x - b.radius, y - b.radius, b.radius * 2, b.radius * 2);
      break;
    case 'irregular':
      ctx.beginPath();
      ctx.moveTo(x, y);
      for (let i = 0; i < 3; i++) {
        ctx.lineTo(x + (Math.random() - 0.5) * b.radius * 2, y + (Math.random() - 0.5) * b.radius * 2);
      }
      ctx.closePath();
      ctx.fillStyle = b.color;
      ctx.fill();
      break;
  }
  ctx.restore();
}

let globalAngle = 0;
function animate() {
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(0, 0, w, h);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(zoom, zoom);
  ctx.rotate(globalAngle);

  const sliceAngle = Math.PI * 2 / slices;
  beads.sort((a, b) => a.r - b.r);

  beads.forEach(b => {
    b.angleOffset += b.speed;
    for (let i = 0; i < slices; i++) {
      ctx.save();
      ctx.rotate(sliceAngle * i);
      if (i % 2) ctx.scale(1, -1);
      drawBead(b);
      ctx.restore();
    }
  });

  ctx.restore();
  globalAngle += speed;
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
  cx = w / 2;
  cy = h / 2;
  generateBeads();
});
</script>

<script>
// Close controls if clicking outside of the panel
document.addEventListener('click', function(event) {
  const panel = document.getElementById('controls');
  const hotspot = document.getElementById('centerHotspot');
  
  // If panel is open and click is not on panel or hotspot
  if (panel.classList.contains('visible') &&
      !panel.contains(event.target) &&
      !hotspot.contains(event.target)) {
    panel.classList.remove('visible');
  }
});
</script>

<script>
const borderDiv = document.createElement('div');
borderDiv.style.position = 'fixed';
borderDiv.style.inset = '0';
borderDiv.style.border = '12px solid #39FF14';
borderDiv.style.boxSizing = 'border-box';
borderDiv.style.zIndex = '9999';
borderDiv.style.pointerEvents = 'none';
document.body.appendChild(borderDiv);
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>

(function(){

/* =========================
   RAW INSTRUCTIONS TEXT
========================= */

const RAW_TEXT = `

How to play...

1. CLick the center to view kaleidoscope elements adjustments.
2. Move the sliders to adjust elements.

`;


/* =========================
   RAW TEXT PARSER
========================= */

function parseRawInstructions(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const html = [];

  lines.forEach(line => {

    if(line === "---"){
      html.push(`<hr>`);
      return;
    }

    if(/^\d+\./.test(line)){
      html.push(`<p>${line}</p>`);
      return;
    }

    if(!/[.!?:]$/.test(line)){
      html.push(`<h3>${line}</h3>`);
      return;
    }

    html.push(`<p>${line}</p>`);
  });

  return html.join("");
}


/* =========================
   CREATE STYLE
========================= */

const style = document.createElement("style");

style.textContent = `
#instructionsBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 16px;
  background:#2e8b57;
  color:#fff;
  border:none;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,0.6);
  z-index:99998;
}

#instructionsBtn:hover{
  background:#257047;
}

#instructionsRoot{
  position:fixed;
  inset:0;
  display:none;
  z-index:99999;
}

#instructionsBackdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
}

#instructionsModal{
  position:absolute;
  top:25px;
  left:50%;
  transform:translateX(-50%);
  width:min(650px,90vw);
  max-height:90vh;
  background:#fff;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#instructionsHeader{
  padding:12px 16px;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  gap:10px;
}

#instructionsTitle{
  color:#1976d2;
  font-weight:600;
  font-size:1.1em;
}

#instructionsBack{
  border:none;
  background:none;
  font-size:20px;
  cursor:pointer;
  color:#1976d2;
  font-weight:600;
}

#instructionsContent{
  padding:2px 18px 18px 18px;
  overflow-y:auto;
  line-height:1.6;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

#instructionsContent::-webkit-scrollbar{
  display:none;
}

#instructionsContent h3{
  color:#1976d2;
  margin:12px 0 4px 0;
  font-weight:600;
}

#instructionsContent p{
  margin:4px 0;
}

#instructionsContent hr{
  margin:12px 0;
}
`;

document.head.appendChild(style);


/* =========================
   CREATE BUTTON
========================= */

const btn = document.createElement("button");
btn.id = "instructionsBtn";
btn.textContent = "Instructions";

document.body.appendChild(btn);


/* =========================
   CREATE MODAL
========================= */

const root = document.createElement("div");
root.id = "instructionsRoot";

root.innerHTML = `
<div id="instructionsBackdrop"></div>

<div id="instructionsModal">

  <div id="instructionsHeader">
    <button id="instructionsBack">←</button>
    <span id="instructionsTitle">Instructions</span>
  </div>

  <div id="instructionsContent">
    ${parseRawInstructions(RAW_TEXT)}
  </div>

</div>
`;

document.body.appendChild(root);


/* =========================
   SCROLL LOCK
========================= */

const modalContent = document.getElementById("instructionsContent");

modalContent.addEventListener("wheel", e=>{
  e.stopPropagation();
},{passive:false});

modalContent.addEventListener("touchmove", e=>{
  e.stopPropagation();
},{passive:false});


/* =========================
   OPEN / CLOSE
========================= */

function openModal(){
  root.style.display="block";
  document.body.style.overflow="hidden";
  document.documentElement.style.overflow="hidden";
}

function closeModal(){
  root.style.display="none";
  document.body.style.overflow="";
  document.documentElement.style.overflow="";
}

btn.onclick = openModal;

document.getElementById("instructionsBack").onclick = closeModal;
document.getElementById("instructionsBackdrop").onclick = closeModal;

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeModal();
});

/* =========================
   DYNAMIC BODY PADDING FOR BUTTON
========================= */

function adjustBodyPadding(){
  const btnHeight = btn.offsetHeight + -25; // include some gap
  document.body.style.paddingBottom = `${btnHeight}px`;
}

// Initial adjustment
adjustBodyPadding();

// Update if window is resized (responsive)
window.addEventListener("resize", adjustBodyPadding);

})();
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>

</body>
</html>
